    (function() {
      function showDiagnostics(msg, type) {
        var errorDiv = document.getElementById('debug-error-box');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'debug-error-box';
          errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:black;padding:20px;z-index:99999;font-family:monospace;font-size:14px;overflow:auto;border: 5px solid red;';
          document.body.appendChild(errorDiv);
        }
        errorDiv.innerHTML += '<h3>[' + type + ']</h3><pre style="color:red;white-space:pre-wrap;">' + msg + '</pre><hr>';
        fetch('http://localhost:9999/error?type=' + encodeURIComponent(type) + '&msg=' + encodeURIComponent(msg)).catch(function(){});
      }
      window.addEventListener('error', function(e) {
        showDiagnostics(e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n' + (e.error ? e.error.stack : ''), 'Window Error');
      });
      window.addEventListener('unhandledrejection', function(e) {
        showDiagnostics(e.reason, 'Unhandled Rejection');
      });
      var originalError = console.error;
      console.error = function() {
        var args = Array.prototype.slice.call(arguments);
        originalError.apply(console, args);
        showDiagnostics(args.join(' '), 'Console Error');
      };
    })();

    // Force unregister all service workers to clear stale browser cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('Unregistered service worker to clear cache:', registration);
        }
      }).catch(err => console.error('Error clearing service workers:', err));
    }
  </script>

    // Time Ago Formatter
    function formatTimeAgo(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMins < 1) return 'Baru saja';
      if (diffMins < 60) return `${diffMins} menit lalu`;
      if (diffHours < 24) return `${diffHours} jam lalu`;
      if (diffDays === 1) return 'Kemarin';
      if (diffDays < 7) return `${diffDays} hari lalu`;
      return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // QR Code Generator
    function generateQRCode(text) {
      const canvas = document.createElement('canvas');

      });
      return canvas.toDataURL('image/png');

    // Camera Utils
    async function captureFromCamera() {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const video = document.createElement('video');
        const constraints = { video: { facingMode: 'environment' } };
        
        navigator.mediaDevices.getUserMedia(constraints)
          .then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
              video.play();
              setTimeout(() => {
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                stream.getTracks().forEach(track => track.stop());
                resolve(canvas.toDataURL('image/png'));
              }, 500);
            };
          })
          .catch(reject);
      });
    }

    // Merge databases using Last-Write-Wins (LWW)
    function mergeDB(local, cloud) {
      if (!cloud) return local;
      
      const mergeList = (localList = [], cloudList = []) => {
        const map = new Map();
        localList.forEach(item => {
          map.set(item.id, item);
        });
        cloudList.forEach(item => {
          const localItem = map.get(item.id);
          if (!localItem) {
            map.set(item.id, item);
          } else {
            const localTime = new Date(localItem.updatedAt || 0).getTime();
            const cloudTime = new Date(item.updatedAt || 0).getTime();
            if (cloudTime > localTime) {
              map.set(item.id, item);
            }
          }
        });
        return Array.from(map.values());
      };

      return {
        users: mergeList(local.users, cloud.users),
        products: mergeList(local.products, cloud.products),
        transactions: mergeList(local.transactions, cloud.transactions),
        categories: cloud.categories || local.categories || defaultData.categories,
        shifts: mergeList(local.shifts, cloud.shifts),
        bypassRequests: mergeList(local.bypassRequests, cloud.bypassRequests),
        approvedBypasses: mergeList(local.approvedBypasses, cloud.approvedBypasses),
        scans: mergeList(local.scans, cloud.scans),
        productProposals: mergeList(local.productProposals, cloud.productProposals),
        adminApprovals: mergeList(local.adminApprovals, cloud.adminApprovals),
        members: mergeList(local.members, cloud.members),
        cashierReports: mergeList(local.cashierReports, cloud.cashierReports)
      };
    }

    // ==================== SIMULATED BACKEND VALIDATION LAYER ====================
    function validateProductData(data, editProductId = null) {
      const price = parseFloat(data.price);
      const cost = parseFloat(data.cost);
      const stock = parseFloat(data.stock);
      const wholesalePrice = parseFloat(data.wholesalePrice || 0);
      const wholesaleMinQty = parseFloat(data.wholesaleMinQty || 0);

      if (isNaN(price) || price < 0) {
        return "Harga jual tidak boleh bernilai negatif atau kosong.";
      }
      if (isNaN(cost) || cost < 0) {
        return "Modal / harga beli tidak boleh kosong atau bernilai negatif.";
      }
      if (isNaN(stock) || stock < 0) {
        return "Stok tidak boleh bernilai negatif.";
      }
      if (isNaN(wholesalePrice) || wholesalePrice < 0) {
        return "Harga grosir tidak boleh bernilai negatif.";
      }
      if (isNaN(wholesaleMinQty) || wholesaleMinQty < 0) {
        return "Jumlah minimal grosir tidak boleh bernilai negatif.";
      }
      const minStock = parseFloat(data.minStock || 0);
      if (isNaN(minStock) || minStock < 0) {
        return "Batas minimum stok tidak boleh bernilai negatif.";
      }

      // Check SKU uniqueness
      const db = getDB();
      const skuExists = db.products.some(p => p.sku === data.sku && p.id !== editProductId && p.active !== false);
      if (skuExists && data.sku) {
        return `Kode barang "${data.sku}" sudah digunakan oleh produk lain.`;
      }

      return null; // Valid
    }

    function validateUserData(data, editUserId = null) {
      if (!data.name || !data.name.trim()) {
        return "Nama pengguna wajib diisi.";
      }
      
      const email = data.email ? data.email.trim() : '';
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        return "Email tidak valid. Pastikan format email benar (contoh: user@mail.com).";
      }

      const db = getDB();
      const emailExists = db.users.some(u => u.email.toLowerCase() === email.toLowerCase() && u.id !== editUserId);
      if (emailExists) {
        return `Email "${email}" sudah terdaftar pada pengguna lain.`;
      }

      // Password check for new users
      if (!editUserId && (!data.password || data.password.length < 4)) {
        return "Kata sandi wajib diisi dan minimal terdiri dari 4 karakter.";
      }

      return null; // Valid
    }

    // ==================== STATE MANAGEMENT ====================
    const AppContext = createContext(null);

    function useAppState() {
      const [user, setUser] = useState(null);
      const [page, setPage] = useState('pos');
      const [cart, setCart] = useState([]);
      const [sidebar, setSidebar] = useState(false); // Default tertutup di mobile
      const [toasts, setToasts] = useState([]);
      const [dbVersion, setDbVersion] = useState(0);

      // New state variables
      const [activeShift, setActiveShift] = useState(null);
      const [isLocked, setIsLocked] = useState(false);
      const [syncEnabled, setSyncEnabled] = useState(false);
      const [syncCode, setSyncCode] = useState('');
      const [syncStatus, setSyncStatus] = useState('idle');
      const [bypassApproved, setBypassApproved] = useState(false);
      const [showSyncModal, setShowSyncModal] = useState(false);
      const [showTutupShiftModal, setShowTutupShiftModal] = useState(false);

      // Persisted POS States for Auto-Save
      const [selectedMember, setSelectedMember] = useState(null);
      const [discount, setDiscount] = useState(0);
      const [roundingMode, setRoundingMode] = useState('100');

      // Online status tracking
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [lastTransaction, setLastTransaction] = useState(null);
      const [showSuccessModal, setShowSuccessModal] = useState(false);

      useEffect(() => {
        const handleOnline = () => {
          setIsOnline(true);
          addToast('Koneksi internet terhubung', 'success');
        };
        const handleOffline = () => {
          setIsOnline(false);
          addToast('Koneksi internet terputus. Mode offline aktif.', 'info');
        };
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      // Reset cashier bypass status on app load to enforce strict re-request on exit/refresh
      useEffect(() => {
        const db = getDB();
        let changed = false;
        db.users.forEach(u => {
          if (u.role !== 'admin' && u.role !== 'owner' && u.entryStatus !== 'exited') {
            u.entryStatus = 'exited';
            u.updatedAt = new Date().toISOString();
            changed = true;
          }
        });
        if (changed) {
          saveDB(db);
          refreshDB();
        }
      }, []);

      // Auto-Save discount, rounding, and member selection to LocalStorage
      useEffect(() => {
        if (user) {
          if (selectedMember) {
            localStorage.setItem(`pos_selected_member_id_${user.id}`, selectedMember.id);
          } else {
            localStorage.removeItem(`pos_selected_member_id_${user.id}`);
          }
          localStorage.setItem(`pos_discount_${user.id}`, String(discount));
          localStorage.setItem(`pos_rounding_mode_${user.id}`, roundingMode);
        }
      }, [selectedMember, discount, roundingMode, user]);

      // Auto-Restore discount, rounding, and member selection on login/refresh
      useEffect(() => {
        if (user) {
          const savedMemberId = localStorage.getItem(`pos_selected_member_id_${user.id}`);
          const savedDiscount = localStorage.getItem(`pos_discount_${user.id}`);
          const savedRounding = localStorage.getItem(`pos_rounding_mode_${user.id}`);

          const db = getDB();
          if (savedMemberId) {
            const memberObj = db.members.find(m => m.id === savedMemberId);
            setSelectedMember(memberObj || null);
          } else {
            setSelectedMember(null);
          }
          setDiscount(savedDiscount ? parseFloat(savedDiscount) || 0 : 0);
          setRoundingMode(savedRounding || '100');
        } else {
          setSelectedMember(null);
          setDiscount(0);
          setRoundingMode('100');
        }
      }, [user, dbVersion]);

      useEffect(() => {
        const savedUser = sessionStorage.getItem('pos_user');
        if (savedUser) setUser(JSON.parse(savedUser));
        
        const savedLocked = sessionStorage.getItem('pos_locked') === 'true';
        if (savedLocked) setIsLocked(true);

        const enabled = localStorage.getItem('pos_sync_enabled') === 'true';
        const code = localStorage.getItem('pos_sync_code') || '';
        setSyncEnabled(enabled);
        setSyncCode(code);

        // Auto-buka sidebar jika layar lebar
        if (window.innerWidth > 768) setSidebar(true);
      }, []);

      const login = (userData) => {
        setUser(userData);
        sessionStorage.setItem('pos_user', JSON.stringify(userData));
        if (userData.role === 'owner') {
          setPage('owner_dashboard');
        } else {
          setPage('pos');
        }
      };

      const logout = () => {
        if (user) {
          const db = getDB();
          const userIdx = db.users.findIndex(u => u.id === user.id);
          if (userIdx !== -1) {
            db.users[userIdx].entryStatus = 'exited';
            db.users[userIdx].updatedAt = new Date().toISOString();
            saveDB(db);
          }
        }
        setUser(null);
        sessionStorage.removeItem('pos_user');
        sessionStorage.removeItem('pos_locked');
      };

      const addToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 3000);
      };

      const refreshDB = () => setDbVersion(v => v + 1);

      // Check shift and operational hours bypass
      useEffect(() => {
        if (user) {
          const db = getDB();
          if (user.role !== 'admin' && user.role !== 'owner') {
            const openShift = db.shifts.find(s => s.cashierId === user.id && s.status === 'open');
            setActiveShift(openShift || null);

            const dbUser = db.users.find(u => u.id === user.id);
            const approved = dbUser && dbUser.entryStatus === 'entered';
            setBypassApproved(approved);
          } else {
            setActiveShift(null);
            setBypassApproved(true);
          }
        } else {
          setActiveShift(null);
          setBypassApproved(false);
        }
      }, [user, dbVersion]);

      // Lock Screen Action
      const lockScreen = () => {
        setIsLocked(true);
        sessionStorage.setItem('pos_locked', 'true');
        addToast('Layar dikunci', 'info');
      };

      const unlockScreen = (password) => {
        if (!user) return false;
        const db = getDB();
        const found = db.users.find(u => u.email === user.email && u.password === password);
        if (found) {
          setIsLocked(false);
          sessionStorage.removeItem('pos_locked');
          addToast('Layar terbuka', 'success');
          return true;
        }
        return false;
      };

      // Shift Management
      const startShift = (modalUang) => {
        if (!user) return;
        const db = getDB();
        const newShift = {
          id: 'SF' + Date.now(),
          cashierId: user.id,
          cashierName: user.name,
          startTime: new Date().toISOString(),
          endTime: null,
          startCash: modalUang,
          expectedCash: modalUang,
          actualCash: 0,
          difference: 0,
          status: 'open',
          updatedAt: new Date().toISOString()
        };
        db.shifts.push(newShift);
        saveDB(db);
        refreshDB();
        addToast(`Shift dibuka dengan modal Rp ${modalUang.toLocaleString('id-ID')}`, 'success');
      };

      const endShift = (actualCash) => {
        if (!user || !activeShift) return;
        const db = getDB();
        const shiftIdx = db.shifts.findIndex(s => s.id === activeShift.id);
        if (shiftIdx !== -1) {
          const shift = db.shifts[shiftIdx];
          const cashSales = db.transactions
            .filter(t => t.cashier === user.name && new Date(t.date) >= new Date(shift.startTime) && t.method === 'cash' && !t.deleted)
            .reduce((sum, t) => sum + t.total, 0);

          const expectedCash = shift.startCash + cashSales;
          const diff = actualCash - expectedCash;

          shift.endTime = new Date().toISOString();
          shift.expectedCash = expectedCash;
          shift.actualCash = actualCash;
          shift.difference = diff;
          shift.status = 'closed';
          shift.updatedAt = new Date().toISOString();

          db.shifts[shiftIdx] = shift;
          saveDB(db);
          refreshDB();
          
          if (diff === 0) {
            addToast('Shift ditutup. Uang laci pas!', 'success');
          } else if (diff > 0) {
            addToast(`Shift ditutup. Selisih lebih: +Rp ${diff.toLocaleString('id-ID')}`, 'info');
          } else {
            addToast(`Shift ditutup. Selisih kurang: -Rp ${Math.abs(diff).toLocaleString('id-ID')}`, 'error');
          }
          
          logout();
        }
      };

      // Cloud Sync Actions
      const enableSync = async (code) => {
        let activeCode = code;
        setSyncStatus('syncing');
        if (!activeCode) {
          activeCode = await createNewCloudBucket();
          if (!activeCode) {
            setSyncStatus('error');
            addToast('Gagal membuat kode sinkronisasi cloud', 'error');
            return;
          }
        }
        localStorage.setItem('pos_sync_enabled', 'true');
        localStorage.setItem('pos_sync_code', activeCode);
        setSyncEnabled(true);
        setSyncCode(activeCode);
        await triggerSync(activeCode);
      };

      const disableSync = () => {
        localStorage.setItem('pos_sync_enabled', 'false');
        localStorage.removeItem('pos_sync_code');
        setSyncEnabled(false);
        setSyncCode('');
        setSyncStatus('idle');
        addToast('Sinkronisasi cloud dinonaktifkan', 'info');
      };

      const triggerSync = async (codeToUse = syncCode) => {
        if (!codeToUse) return;
        setSyncStatus('syncing');
        const cloudData = await fetchCloudData(codeToUse);
        const localData = getDB();
        
        if (cloudData) {
          const merged = mergeDB(localData, cloudData);
          saveDB(merged);
          await pushCloudData(codeToUse, merged);
          refreshDB();
          setSyncStatus('success');
          addToast('Sinkronisasi cloud berhasil', 'success');
        } else {
          const success = await pushCloudData(codeToUse, localData);
          if (success) {
            setSyncStatus('success');
            addToast('Data lokal diunggah ke cloud', 'success');
          } else {
            setSyncStatus('error');
            addToast('Koneksi ke cloud gagal', 'error');
          }
        }
      };

      // ==================== SUPABASE SYNC ====================
      // Pull from Supabase once on mount, then subscribe to realtime changes
      useEffect(() => {
        let channel = null;

        const initSupabase = async () => {
          // 1. Fetch latest from Supabase and merge with local
          const cloudData = await sbFetch();
          if (cloudData) {
            const localData = getDB();
            const merged = mergeDB(localData, cloudData);
            if (JSON.stringify(merged) !== JSON.stringify(localData)) {
              localStorage.setItem(DB_KEY, JSON.stringify(merged));
              setDbVersion(v => v + 1);
            }
          } else {
            // First device: push local data to Supabase
            sbPush(getDB());
          }

          // 2. Subscribe to realtime changes so other devices auto-sync
          if (sbClient) {
            channel = sbClient.channel('pos_realtime')
              .on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'pos_sync',
                filter: 'id=eq.main'
              }, (payload) => {
                const cloudDb = payload.new?.db_data;
                if (!cloudDb) return;
                const local = getDB();
                const merged = mergeDB(local, cloudDb);
                if (JSON.stringify(merged) !== JSON.stringify(local)) {
                  localStorage.setItem(DB_KEY, JSON.stringify(merged));
                  setDbVersion(v => v + 1);
                }
              })
              .subscribe((status) => {
                console.log('[Supabase Realtime]', status);
              });
          }
        };

        initSupabase();

        return () => {
          if (channel && sbClient) sbClient.removeChannel(channel);
        };
      }, []);

      // Idle Timeout - auto-lock layar setelah 15 menit tidak aktif
      useEffect(() => {
        if (!user) return;
        let idleTimer;
        const resetTimer = () => {
          clearTimeout(idleTimer);
          idleTimer = setTimeout(() => {
            setIsLocked(true);
            sessionStorage.setItem('pos_locked', 'true');
          }, 15 * 60 * 1000); // 15 menit
        };
        const events = ['mousemove', 'keydown', 'click', 'touchstart', 'scroll'];
        events.forEach(ev => document.addEventListener(ev, resetTimer, { passive: true }));
        resetTimer();
        return () => {
          clearTimeout(idleTimer);
          events.forEach(ev => document.removeEventListener(ev, resetTimer));
        };
      }, [user]);

      // Operational Hours Bypass Requests
      const submitBypassRequest = async (loc) => {
        const db = getDB();
        const newReq = {
          id: 'REQ' + Date.now(),
          name: user?.name || 'Kasir',
          email: user?.email || '',
          time: new Date().toISOString(),
          location: loc || 'Lokasi tidak diketahui',
          device: navigator.userAgent,
          status: 'pending',
          updatedAt: new Date().toISOString()
        };
        db.bypassRequests.push(newReq);
        saveDB(db);
        refreshDB();
        addToast('Permintaan izin masuk dikirim', 'info');
      };

      const approveBypassRequest = async (reqId) => {
        const db = getDB();
        const idx = db.bypassRequests.findIndex(r => r.id === reqId);
        if (idx !== -1) {
          db.bypassRequests[idx].status = 'approved';
          db.bypassRequests[idx].updatedAt = new Date().toISOString();
          
          // Update entryStatus untuk user yang di-approve
          const userIdx = db.users.findIndex(u => u.email === db.bypassRequests[idx].email);
          if (userIdx !== -1) {
            db.users[userIdx].entryStatus = 'entered';
            db.users[userIdx].updatedAt = new Date().toISOString();
          }
          
          const todayStr = new Date().toDateString();
          db.approvedBypasses.push({
            id: 'APP' + Date.now(),
            email: db.bypassRequests[idx].email,
            date: todayStr,
            updatedAt: new Date().toISOString()
          });
          
          saveDB(db);
          refreshDB();
          addToast('Akses disetujui', 'success');
        }
      };

      const rejectBypassRequest = async (reqId) => {
        const db = getDB();
        const idx = db.bypassRequests.findIndex(r => r.id === reqId);
        if (idx !== -1) {
          db.bypassRequests[idx].status = 'rejected';
          db.bypassRequests[idx].updatedAt = new Date().toISOString();
          
          saveDB(db);
          refreshDB();
          addToast('Akses ditolak', 'error');
        }
      };

      // Cart Actions
      const addToCart = (product) => {
        setCart(prev => {
          const ex = prev.find(i => i.id === product.id);
          if (ex) {
            if (ex.qty >= product.stock) {
              addToast('Stok tidak mencukupi', 'error');
              return prev;
            }
            return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
          }
          return [...prev, { ...product, qty: 1 }];
        });
      };

      const addToCartWithQty = (product, qty) => {
        setCart(prev => {
          const ex = prev.find(i => i.id === product.id);
          if (ex) {
            const newQty = ex.qty + qty;
            if (newQty > product.stock) {
              addToast('Stok tidak mencukupi', 'error');
              return prev;
            }
            return prev.map(i => i.id === product.id ? { ...i, qty: parseFloat(newQty.toFixed(3)) } : i);
          }
          if (qty > product.stock) {
            addToast('Stok tidak mencukupi', 'error');
            return prev;
          }
          return [...prev, { ...product, qty: parseFloat(qty.toFixed(3)) }];
        });
      };

      const updateCartQty = (id, delta) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const newQty = item.qty + delta;
            if (newQty > item.stock) {
              addToast('Stok tidak mencukupi', 'error');
              return item;
            }
            return newQty > 0 ? { ...item, qty: newQty } : item;
          }
          return item;
        }).filter(item => item.qty > 0));
      };

      const removeFromCart = (id) => setCart(prev => prev.filter(item => item.id !== id));
      const clearCart = () => setCart([]);

      const saveScanData = (photoData, scanType = 'photo') => {
        const db = getDB();
        const scanId = 'SCAN' + Date.now();
        const qrCode = generateQRCode(scanId);
        db.scans.push({
          id: scanId,
          userId: user?.id || '',
          photoData,
          qrCode,
          scanType,
          createdAt: new Date().toISOString()
        });
        saveDB(db);
        refreshDB();
        return scanId;
      };

      // Auto-Save Cart to LocalStorage
      useEffect(() => {
        if (user) {
          localStorage.setItem(`pos_cart_${user.id}`, JSON.stringify(cart));
          // Save active cart globally for Customer Display Screen
          localStorage.setItem('pos_active_cart', JSON.stringify({
            cart,
            user,
            timestamp: Date.now()
          }));
        }
      }, [cart, user]);

      // Auto-Restore Cart from LocalStorage
      useEffect(() => {
        if (user) {
          const saved = localStorage.getItem(`pos_cart_${user.id}`);
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              if (parsed && parsed.length > 0) {
                setCart(parsed);
              }
            } catch(e) {}
          }
        } else {
          setCart([]);
        }
      }, [user]);

      return {
        user, page, cart, sidebar, toasts, dbVersion,
        activeShift, isLocked, syncEnabled, syncCode, syncStatus, bypassApproved,
        showSyncModal, showTutupShiftModal,
        selectedMember, setSelectedMember, discount, setDiscount, roundingMode, setRoundingMode,
        isOnline, lastTransaction, setLastTransaction, showSuccessModal, setShowSuccessModal,
        setPage, setSidebar, setToasts, addToast, login, logout,
        addToCart, addToCartWithQty, updateCartQty, removeFromCart, clearCart, refreshDB,
        lockScreen, unlockScreen, startShift, endShift,
        enableSync, disableSync, triggerSync, setShowSyncModal, setShowTutupShiftModal,
        submitBypassRequest, approveBypassRequest, rejectBypassRequest, saveScanData
      };
    }

    // ==================== COMPONENTS ====================
    function Toast({ toast, onClose }) {
      const bgColors = {
        success: 'bg-emerald-600',
        error: 'bg-rose-600',
        info: 'bg-sky-600'
      };
      const icons = {
        success: 'check-circle',
        error: 'alert-circle',
        info: 'info'
      };

      return (
        <div className={`${bgColors[toast.type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 mb-2 animate-[slideIn_0.3s_ease-out]`}>
          <Icon name={icons[toast.type]} size={20} />
          <span className="text-sm font-medium">{toast.message}</span>
          <button onClick={() => onClose(toast.id)} className="ml-2 p-1 hover:bg-white/20 rounded-lg">
            <Icon name="x" size={16} />
          </button>
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { error: null };
      }

      static getDerivedStateFromError(error) {
        return { error };
      }

      componentDidCatch(error, info) {
        console.error('Render error:', error, info);
      }

      handleLogout = () => {
        sessionStorage.removeItem('pos_user');
        sessionStorage.removeItem('pos_locked');
        window.location.reload();
      };

      render() {
        if (this.state.error) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-zinc-100 p-4">
              <div className="w-full max-w-md bg-white rounded-3xl shadow-xl border border-zinc-200 p-6 text-left">
                <div className="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center mb-4">
                  <Icon name="alert-triangle" size={24} />
                </div>
                <h1 className="text-xl font-bold text-zinc-900 mb-2">Aplikasi berhenti sebentar</h1>
                <p className="text-sm text-zinc-600 leading-relaxed mb-4">Ada data akun atau halaman yang membuat tampilan gagal dimuat. Klik keluar lalu login lagi.</p>
                <pre className="text-xs bg-zinc-50 border border-zinc-200 rounded-xl p-3 overflow-auto max-h-32 text-rose-600 mb-4">{String(this.state.error?.message || this.state.error)}</pre>
                <button onClick={this.handleLogout} className="w-full py-3 bg-zinc-900 text-white rounded-xl font-bold">Keluar dan Muat Ulang</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ==================== PAGES ====================

    // 1. LOGIN PAGE
    function LoginPage() {
      const app = useContext(AppContext);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);



      const handleLogin = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        
        // 1. Coba sync dari Supabase dulu agar akun baru dari device lain tersedia
        try {
          const cloudData = await sbFetch();
          if (cloudData) {
            const localData = getDB();
            const merged = mergeDB(localData, cloudData);
            localStorage.setItem(DB_KEY, JSON.stringify(merged));
            console.log('[Login] Synced from Supabase OK');
          }
        } catch(syncErr) {
          console.log('[Login] Supabase sync skipped (offline/error):', syncErr);
          // Tidak masalah — lanjut pakai data lokal
        }
        
        // 2. Baca data terbaru (sudah di-merge jika Supabase berhasil)
        const db = getDB();
        const loginEmail = email.trim().toLowerCase();
        const loginPassword = password.trim();
        const user = db.users.find(u => (u.email || '').trim().toLowerCase() === loginEmail && String(u.password || '').trim() === loginPassword);
        
        if (!user) {
          const emailExists = db.users.some(u => (u.email || '').trim().toLowerCase() === loginEmail);
          setError(emailExists ? 'Password salah. Periksa kembali password Anda.' : 'Email tidak terdaftar. Hubungi admin untuk mendaftarkan akun Anda.');
          setLoading(false);
          return;
        }
        if (!user.active) {
          setError('Akun tidak aktif');
          setLoading(false);
          return;
        }
        
        const safeUser = makeSafeUser(user, db);
        app.login(safeUser);
      };



      return (
        <div className="min-h-screen flex items-center justify-center bg-zinc-100 p-4">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden animate-[scaleIn_0.3s_ease-out]">
            <div className="bg-sky-600 p-8 text-center text-white">
              <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                <Icon name="shopping-bag" size={32} color="white" />
              </div>
              <h1 className="text-2xl font-bold">Smile POS</h1>
              <p className="text-sky-100 mt-1 text-sm">Sistem Kasir Pintar</p>
            </div>

    function DynamicQRCode({ text, width = 170 }) {
      const canvasRef = useRef(null);
      const [error, setError] = useState(false);

      useEffect(() => {
        setError(false);
        if (canvasRef.current && text) {
          if (typeof QRCode !== 'undefined') {
            QRCode.toCanvas(canvasRef.current, text, { width: width, margin: 1 }, function(err) {
              if (err) {
                console.error(err);
                setError(true);
              }
            });
          } else {
            setError(true);
          }
        }
      }, [text, width]);

      if (error) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${width}x${width}&data=${encodeURIComponent(text)}`;
        return <img src={qrUrl} alt="QR Code" className="mx-auto border border-zinc-200 rounded-xl" style={{ width: `${width}px`, height: `${width}px` }} />;
      }

      return <canvas ref={canvasRef} className="mx-auto border border-zinc-200 rounded-xl" />;
    }

    // 1b. OWNER DASHBOARD
    function OwnerDashboard() {
      const app = useContext(AppContext);
      const db = getDB();
      const [filter, setFilter] = useState('7days');
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      const allTx = useMemo(() => db.transactions || [], [db.transactions, app.dbVersion]);

      const filteredTx = useMemo(() => {
        const now = new Date();
        let txs = allTx.filter(t => !t.deleted);

        if (filter === 'today') {
          txs = txs.filter(t => new Date(t.date).toDateString() === now.toDateString());
        } else if (filter === '7days') {
          const past = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
          txs = txs.filter(t => new Date(t.date) >= past);
        } else if (filter === 'month') {
          txs = txs.filter(t => {
            const d = new Date(t.date);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
          });
        }
        return txs;
      }, [allTx, filter]);

      // Calculations
      const metrics = useMemo(() => {
        let totalRevenue = 0;
        let totalCost = 0;
        
        filteredTx.forEach(tx => {
          totalRevenue += (tx.total || 0);
          tx.items.forEach(item => {
            const costVal = item.cost !== undefined ? item.cost : 0;
            totalCost += (costVal * item.qty);
          });
        });

        const profit = totalRevenue - totalCost;
        return {
          revenue: totalRevenue,
          cost: totalCost,
          profit: profit,
          count: filteredTx.length
        };
      }, [filteredTx]);

      // Best Sellers
      const bestSellers = useMemo(() => {
        const counts = {};
        filteredTx.forEach(tx => {
          tx.items.forEach(item => {
            if (!counts[item.id]) {
              counts[item.id] = { id: item.id, name: item.name, category: item.category, qty: 0, revenue: 0 };
            }
            counts[item.id].qty += item.qty;
            counts[item.id].revenue += (item.effectivePrice * item.qty);
          });
        });
        return Object.values(counts).sort((a, b) => b.qty - a.qty).slice(0, 5);
      }, [filteredTx]);

      // Shifts
      const shiftsList = useMemo(() => {
        return [...(db.shifts || [])].sort((a, b) => new Date(b.startTime) - new Date(a.startTime)).slice(0, 5);
      }, [db.shifts, app.dbVersion]);

      // Audit Logs
      const auditList = useMemo(() => {
        return (db.auditLogs || []).slice(0, 10);
      }, [db.auditLogs, app.dbVersion]);

      const { chartLabels, chartDataSales, chartDataProfit } = useMemo(() => {
        const daily = {};
        filteredTx.forEach(t => {
          const d = new Date(t.date).toLocaleDateString('id-ID', { month: 'short', day: 'numeric' });
          if (!daily[d]) {
            daily[d] = { sales: 0, cost: 0 };
          }
          daily[d].sales += t.total;
          t.items.forEach(item => {
            const costVal = item.cost !== undefined ? item.cost : 0;
            daily[d].cost += (costVal * item.qty);
          });
        });
        const labels = Object.keys(daily).reverse();
        const sales = Object.values(daily).map(v => v.sales).reverse();
        const profits = Object.values(daily).map(v => v.sales - v.cost).reverse();
        return { chartLabels: labels, chartDataSales: sales, chartDataProfit: profits };
      }, [filteredTx]);

      // Render chart
      useEffect(() => {
        if (!chartRef.current) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const ctx = chartRef.current.getContext('2d');
        const salesGradient = ctx.createLinearGradient(0, 0, 0, 240);
        salesGradient.addColorStop(0, 'rgba(59, 89, 152, 0.25)'); // deep slate-blue (sky-600)
        salesGradient.addColorStop(1, 'rgba(59, 89, 152, 0.0)');

        const profitGradient = ctx.createLinearGradient(0, 0, 0, 240);
        profitGradient.addColorStop(0, 'rgba(16, 185, 129, 0.25)'); // emerald-500
        profitGradient.addColorStop(1, 'rgba(16, 185, 129, 0.0)');

        chartInstance.current = new Chart(chartRef.current, {
          type: 'line',
          data: {
            labels: chartLabels,
            datasets: [
              {
                label: 'Pendapatan',
                data: chartDataSales,
                borderColor: '#3b5998', // sky-600
                backgroundColor: salesGradient,
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#3b5998',
                pointRadius: 3
              },
              {
                label: 'Laba Bersih',
                data: chartDataProfit,
                borderColor: '#10b981', // emerald-500
                backgroundColor: profitGradient,
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#10b981',
                pointRadius: 3
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { position: 'top', labels: { font: { family: 'Inter', size: 10, weight: 'bold' } } },
              tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.95)',
                titleFont: { size: 12, weight: 'bold', family: 'Inter' },
                bodyFont: { size: 11, family: 'Inter' },
                padding: 12,
                cornerRadius: 12,
                callbacks: {
                  label: function(context) {
                    return ` ${context.dataset.label}: Rp ${context.raw.toLocaleString('id-ID')}`;
                  }
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: 'rgba(0, 0, 0, 0.04)', drawBorder: false },
                ticks: {
                  callback: (value) => 'Rp ' + value.toLocaleString('id-ID'),
                  font: { family: 'Inter', size: 10 },
                  color: '#64748b'
                }
              },
              x: {
                grid: { display: false },
                ticks: { font: { family: 'Inter', size: 10 }, color: '#64748b' }
              }
            }
          }
        });

        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [chartLabels, chartDataSales, chartDataProfit]);

      return (
        <div className="pb-16 md:pb-8 text-left">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
              <h3 className="text-xl font-bold text-zinc-800">Dashboard Owner</h3>
              <p className="text-sm text-zinc-500">Analisis bisnis, inventaris, dan kinerja karyawan berjalan</p>
            </div>
            <div className="flex gap-2 w-full sm:w-auto">
              <select value={filter} onChange={e => setFilter(e.target.value)} className="px-4 py-2.5 bg-white border border-zinc-200 rounded-xl font-semibold outline-none text-zinc-700 shadow-sm flex-1 sm:flex-none">
                <option value="today">Hari Ini</option>
                <option value="7days">7 Hari Terakhir</option>
                <option value="month">Bulan Ini</option>
              </select>
            </div>
          </div>

          {/* Cards metrics */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-sky-50 text-sky-650 flex items-center justify-center flex-shrink-0">
                <Icon name="wallet" size={24} />
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Pendapatan</p>
                <h4 className="text-xl font-extrabold text-zinc-850">Rp {metrics.revenue.toLocaleString('id-ID')}</h4>
              </div>
            </div>

            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center flex-shrink-0">
                <Icon name="receipt" size={24} />
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Total Modal (HPP)</p>
                <h4 className="text-xl font-extrabold text-zinc-855">Rp {metrics.cost.toLocaleString('id-ID')}</h4>
              </div>
            </div>

            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center flex-shrink-0">
                <Icon name="trending-up" size={24} />
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Laba Bersih</p>
                <h4 className={`text-xl font-extrabold ${metrics.profit >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                  Rp {metrics.profit.toLocaleString('id-ID')}
                </h4>
              </div>
            </div>

            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-violet-50 text-violet-600 flex items-center justify-center flex-shrink-0">
                <Icon name="shopping-bag" size={24} />
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Transaksi</p>
                <h4 className="text-xl font-extrabold text-zinc-850">{metrics.count} Nota</h4>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            {/* Sales Graph */}
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs lg:col-span-2 flex flex-col h-80">
              <h4 className="font-bold text-sm text-zinc-800 mb-4">Tren Penjualan & Laba</h4>
              <div className="flex-1 relative">
                <canvas ref={chartRef}></canvas>
              </div>
            </div>

            {/* Best Sellers */}
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex flex-col h-80">
              <h4 className="font-bold text-sm text-zinc-800 mb-4">Produk Terlaris</h4>
              <div className="flex-1 overflow-y-auto custom-scroll space-y-3">
                {bestSellers.length === 0 ? (
                  <p className="text-xs text-zinc-400 text-center py-16">Belum ada transaksi</p>
                ) : (
                  bestSellers.map((item, idx) => (
                    <div key={item.id} className="flex justify-between items-center border-b border-zinc-50 pb-2">
                      <div className="min-w-0">
                        <p className="text-xs font-bold text-zinc-800 truncate">{idx + 1}. {item.name}</p>
                        <p className="text-[10px] text-zinc-400">{item.category}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-xs font-bold text-zinc-800">{item.qty} pcs</p>
                        <p className="text-[10px] text-zinc-400 font-medium">Rp {item.revenue.toLocaleString('id-ID')}</p>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            {/* Shifts Monitoring */}
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs overflow-hidden flex flex-col max-h-96">
              <h4 className="font-bold text-sm text-zinc-800 mb-4 flex items-center gap-2">

                      <th className="p-2 text-left">Kasir</th>
                      <th className="p-2 text-left">Waktu Mulai</th>

                    </tr>

                  <tbody className="divide-y divide-zinc-100">
                    {shiftsList.length === 0 ? (
                      <tr><td colSpan="5" className="p-4 text-center text-zinc-400">Tidak ada riwayat shift</td></tr>

                      shiftsList.map(s => (

            {/* Audit Logs */}
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs overflow-hidden flex flex-col max-h-96">

              </h4>

        </div>
      );

      const [category, setCategory] = useState('All');
      const [showDiscountModal, setShowDiscountModal] = useState(false);
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [payMethod, setPayMethod] = useState('cash'); // cash or qris
      const [paymentAmount, setPaymentAmount] = useState('');
      const [processing, setProcessing] = useState(false);
      const [mobileView, setMobileView] = useState(() => window.innerWidth < 768 ? 'cart' : 'products'); // 'products' or 'cart' (untuk layar kecil)
      const [qrisZoom, setQrisZoom] = useState(false);

      // New state variables
      const [showPOSScanner, setShowPOSScanner] = useState(false);
      const [showOpenPriceModal, setShowOpenPriceModal] = useState(false);
      const [selectedOpenPriceProduct, setSelectedOpenPriceProduct] = useState(null);
      const [manualPriceInput, setManualPriceInput] = useState('');
      const [memberSearchQuery, setMemberSearchQuery] = useState('');
      const [isSplitPayment, setIsSplitPayment] = useState(false);
      const [splitCashAmount, setSplitCashAmount] = useState('');
      const [splitQrisAmount, setSplitQrisAmount] = useState('');
      const [qrisMode, setQrisMode] = useState('shop'); // 'shop', 'dynamic', 'saved'
      const [selectedSavedScanId, setSelectedSavedScanId] = useState('');

      // CRM Member states & functions
      const [showMemberModal, setShowMemberModal] = useState(null); // null, { mode: 'add' }, { mode: 'edit', member }
      const [memberInputName, setMemberInputName] = useState('');
      const [memberInputPhone, setMemberInputPhone] = useState('');
      const [memberInputDiscount, setMemberInputDiscount] = useState('0');

      useEffect(() => {
        if (showMemberModal) {
          if (showMemberModal.mode === 'edit' && showMemberModal.member) {
            setMemberInputName(showMemberModal.member.name || '');
            setMemberInputPhone(showMemberModal.member.phone || '');
            setMemberInputDiscount(String(showMemberModal.member.discount || '0'));
          } else {
            setMemberInputName('');
            setMemberInputPhone('');
            setMemberInputDiscount('0');
          }
        }
      }, [showMemberModal]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'F2') {
            e.preventDefault();
            const searchInput = document.querySelector('input[placeholder*="Cari menu"]');
            if (searchInput) searchInput.focus();
          } else if (e.key === 'F8') {
            e.preventDefault();
            if (app.cart.length > 0) {
              setShowPaymentModal(true);
            } else {
              app.addToast('Keranjang belanja kosong', 'info');
            }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [app.cart]);

      const handleSaveMember = (e) => {
        e.preventDefault();
        if (!memberInputName.trim()) {
          app.addToast('Nama pelanggan wajib diisi', 'error');
          return;
        }
        
        const discVal = parseFloat(memberInputDiscount) || 0;
        if (discVal < 0 || discVal > 100) {
          app.addToast('Diskon harus berkisar antara 0 - 100%', 'error');
          return;
        }

        const db = getDB();
        
        if (showMemberModal.mode === 'add') {
          const phoneExists = db.members.some(m => m.phone === memberInputPhone.trim() && memberInputPhone.trim() !== '');
          if (phoneExists) {
            app.addToast('Nomor telepon sudah terdaftar', 'error');
            return;
          }

          const newMember = {
            id: 'm_' + Date.now(),
            name: memberInputName.trim(),
            phone: memberInputPhone.trim(),
            points: 0,
            discount: discVal,
            createdAt: new Date().toISOString()
          };
          db.members.push(newMember);
          saveDB(db);
          app.refreshDB();
          setSelectedMember(newMember); // Auto select the newly added member
          app.addToast(`Pelanggan ${newMember.name} berhasil ditambahkan!`, 'success');
        } else {
          const memberId = showMemberModal.member.id;
          const idx = db.members.findIndex(m => m.id === memberId);
          if (idx !== -1) {
            db.members[idx].name = memberInputName.trim();
            db.members[idx].phone = memberInputPhone.trim();
            db.members[idx].discount = discVal;
            saveDB(db);
            app.refreshDB();
            
            const updated = db.members[idx];
            setSelectedMember(updated); // Update selected member state
            app.addToast(`Data pelanggan ${updated.name} berhasil diperbarui!`, 'success');
          }
        }
        setShowMemberModal(null);
      };

      const handleDeleteMember = (memberId) => {
        if (confirm('Apakah Anda yakin ingin menghapus pelanggan ini dari CRM?')) {
          const db = getDB();
          const idx = db.members.findIndex(m => m.id === memberId);
          if (idx !== -1) {
            const memberName = db.members[idx].name;
            db.members.splice(idx, 1);
            saveDB(db);
            app.refreshDB();
            setSelectedMember(null);
            app.addToast(`Pelanggan ${memberName} berhasil dihapus.`, 'info');
          }
        }
      };

      const db = getDB();
      const members = db.members || [];
      const filteredMembers = members.filter(m => {
        const q = memberSearchQuery.trim().toLowerCase();
        if (!q) return true;
        return `${m.name || ''} ${m.phone || ''}`.toLowerCase().includes(q);
      });
      // Filter out inactive products and sort by updatedAt desc
      let products = db.products.filter(p => p.active !== false).sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
      // Load categories dynamically from db
      const categories = ['All', ...db.categories];

      if (category !== 'All') products = products.filter(p => p.category === category);
      if (search) {
        const q = search.toLowerCase();
        products = products.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q));
      }

      // GS1 Barcode Weight Parser helper
      const parseGS1Barcode = (barcode, prodList) => {
        if (!barcode || barcode.length < 12 || !barcode.startsWith('21')) {
          return null;
        }
        // Try 5-digit SKU (digits 2-7)
        let skuPart = barcode.slice(2, 7); // e.g. "00055"
        let weightPart = barcode.slice(7, 12); // e.g. "01250"
        let weightKg = parseFloat(weightPart) / 1000;
        
        let product = prodList.find(p => p.sku.toLowerCase().includes(skuPart.toLowerCase()) || skuPart.toLowerCase().includes(p.sku.toLowerCase()));
        if (!product) {
          // Try 4-digit SKU (digits 2-6)
          skuPart = barcode.slice(2, 6); // e.g. "0055"
          weightPart = barcode.slice(6, 11); // e.g. "01250"
          weightKg = parseFloat(weightPart) / 1000;
          product = prodList.find(p => p.sku.toLowerCase().includes(skuPart.toLowerCase()) || skuPart.toLowerCase().includes(p.sku.toLowerCase()));
        }

        if (product) {
          return { product, weight: weightKg };
        }
        return null;
      };

      const getEffectivePrice = (item) => {
        if (item.wholesaleMinQty > 0 && item.wholesalePrice > 0 && item.qty >= item.wholesaleMinQty) {
          return item.wholesalePrice;
        }
        return item.price;
      };

      const cartDetails = useMemo(() => {
        let baseSubtotal = 0;
        let taxTotal = 0;
        app.cart.forEach(item => {
          const effPrice = getEffectivePrice(item);
          if (item.taxIncluded) {
            const base = (effPrice / 1.1) * item.qty;
            const tax = (effPrice * 0.1 / 1.1) * item.qty;
            baseSubtotal += base;
            taxTotal += tax;
          } else {
            const base = effPrice * item.qty;
            const tax = (effPrice * 0.1) * item.qty;
            baseSubtotal += base;
            taxTotal += tax;
          }
        });

        // Member discount
        let memberDiscountAmount = 0;
        if (selectedMember && selectedMember.discount > 0) {
          memberDiscountAmount = (baseSubtotal + taxTotal) * (selectedMember.discount / 100);
        }

        const totalBeforeDiscount = baseSubtotal + taxTotal;
        const totalDiscount = discount + memberDiscountAmount;
        let finalTotal = Math.max(0, totalBeforeDiscount - totalDiscount);

        // Rounding
        let roundingDiff = 0;
        if (payMethod === 'cash' && roundingMode !== 'off') {
          const roundVal = parseInt(roundingMode);
          const roundedTotal = Math.round(finalTotal / roundVal) * roundVal;
          roundingDiff = roundedTotal - finalTotal;
          finalTotal = roundedTotal;
        }

        return {
          subtotal: baseSubtotal,
          tax: taxTotal,
          memberDiscount: memberDiscountAmount,
          discount: totalDiscount,
          total: finalTotal,
          rounding: roundingDiff
        };
      }, [app.cart, discount, selectedMember, payMethod, roundingMode]);

      const subtotal = cartDetails.subtotal;
      const tax = cartDetails.tax;
      const total = cartDetails.total;

      // Fitur Quick Actions Scanner (Live Camera)
      const handleScan = () => {
        setShowPOSScanner(true);
      };

      const handleScanSuccess = (code) => {
        app.addToast(`Scan Berhasil: ${code}`, 'success');
        setShowPOSScanner(false);
        const scanId = app.saveScanData(code, 'barcode');
        
        if (showPaymentModal) {
          setQrisMode('saved');
          setSelectedSavedScanId(scanId);
          return;
        }

        const dbProducts = getDB().products.filter(p => p.active !== false);
        
        // 1. Check GS1 barcode
        const gs1 = parseGS1Barcode(code, dbProducts);
        if (gs1) {
          if (gs1.product.openPrice) {
            setSelectedOpenPriceProduct(gs1.product);
            setManualPriceInput('');
            setShowOpenPriceModal(true);
          } else {
            app.addToCartWithQty(gs1.product, gs1.weight);
            app.addToast(`Ditambahkan: ${gs1.product.name} (${gs1.weight} kg)`, 'success');
          }
          return;
        }

        // 2. Check exact SKU match
        const matched = dbProducts.find(p => p.sku.toLowerCase() === code.trim().toLowerCase());
        if (matched) {
          if (matched.openPrice) {
            setSelectedOpenPriceProduct(matched);
            setManualPriceInput('');
            setShowOpenPriceModal(true);
          } else {
            app.addToCart(matched);
            app.addToast(`Ditambahkan: ${matched.name}`, 'success');
          }
        } else {
          setSearch(code);
        }
      };

      const handlePhotoCapture = (photoData) => {
        const scanId = app.saveScanData(photoData, 'photo');
        app.addToast('Foto berhasil ditangkap & disimpan ke log scans', 'success');
        setShowPOSScanner(false);
        if (showPaymentModal) {
          setQrisMode('saved');
          setSelectedSavedScanId(scanId);
        }
      };

      const handleCheckout = async (e) => {
        e?.preventDefault();
        
        let finalPayMethod = payMethod;
        let amtPaid = parseFloat(paymentAmount) || 0;
        let qrisPaid = total;
        let cashChange = 0;
        let splitDetails = null;

        if (isSplitPayment) {
          finalPayMethod = 'split';
          const cashAmt = parseFloat(splitCashAmount) || 0;
          const qrisAmt = parseFloat(splitQrisAmount) || 0;
          if (cashAmt + qrisAmt < total) {
            app.addToast('Total split payment kurang dari jumlah tagihan', 'error');
            return;
          }
          amtPaid = cashAmt + qrisAmt;
          qrisPaid = qrisAmt;
          cashChange = Math.max(0, (cashAmt + qrisAmt) - total);
          splitDetails = { cash: cashAmt, qris: qrisAmt };
        } else {
          if (payMethod === 'cash') {
            if (amtPaid < total) {
              app.addToast('Uang pembayaran kurang', 'error');
              return;
            }
            cashChange = amtPaid - total;
          } else {
            amtPaid = total;
            cashChange = 0;
          }
        }

        setProcessing(true);
        try {
          await new Promise(r => setTimeout(r, 800)); // Simulasi
          
          const txId = 'TX' + Date.now();
          const tx = {
            id: txId,
            date: new Date().toISOString(),
            cashier: app.user.name,
            items: app.cart.map(item => ({
              ...item,
              effectivePrice: getEffectivePrice(item)
            })),
            subtotal: cartDetails.subtotal,
            tax: cartDetails.tax,
            memberDiscount: cartDetails.memberDiscount,
            discount: cartDetails.discount,
            rounding: cartDetails.rounding,
            total: total,
            method: finalPayMethod,
            payment: amtPaid,
            change: cashChange,
            splitDetails: splitDetails,
            memberId: selectedMember ? selectedMember.id : null,
            memberName: selectedMember ? selectedMember.name : null,
            kitchenStatus: app.cart.some(item => ['Makanan', 'Minuman'].includes(item.category)) ? 'cooking' : 'none',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };

          // Strict check inside simulated backend layer for prices and stocks
          tx.items.forEach(item => {
            if (item.effectivePrice < 0) throw new Error("Harga tidak boleh minus");
            if (item.qty <= 0) throw new Error("Jumlah item tidak boleh nol atau negatif");
          });

          let rpcSuccess = false;
          if (sbClient && app.isOnline) {
            try {
              const { data: newCloudDb, error: rpcError } = await sbClient.rpc('process_checkout', { p_transaction: tx });
              if (!rpcError && newCloudDb) {
                localStorage.setItem(DB_KEY, JSON.stringify(newCloudDb));
                rpcSuccess = true;
                console.log('[Supabase RPC] Checkout sukses atomik di server');
              } else {
                console.warn('[Supabase RPC] Gagal, fallback ke lokal:', rpcError);
              }
            } catch (rpcExc) {
              console.warn('[Supabase RPC] Exception, fallback ke lokal:', rpcExc);
            }
          }

          if (!rpcSuccess) {
            const newDb = getDB();
            newDb.transactions.unshift(tx);
            
            // Deduct stock and validate locally
            app.cart.forEach(item => {
              const p = newDb.products.find(x => x.id === item.id);
              if (p) {
                const newStock = parseFloat((p.stock - item.qty).toFixed(3));
                if (newStock < 0) {
                  throw new Error(`Stok produk "${p.name}" tidak mencukupi untuk transaksi ini.`);
                }
                p.stock = newStock;
                p.updatedAt = new Date().toISOString();
              }
            });

            // Award Member points
            if (selectedMember) {
              const pointsEarned = Math.floor(total / 10000);
              const memberIdx = newDb.members.findIndex(m => m.id === selectedMember.id);
              if (memberIdx !== -1) {
                newDb.members[memberIdx].points += pointsEarned;
              }
            }

            saveDB(newDb);
          }

          // Catat audit log untuk manual discount di client
          if (tx.discount > 0) {
            logAuditAction('Diskon Manual', `Memberikan diskon senilai Rp ${tx.discount.toLocaleString('id-ID')} pada transaksi ${tx.id}`, app.user);
          }

          app.setLastTransaction(tx);
          app.setShowSuccessModal(true);

          app.refreshDB();
          app.clearCart();
          setDiscount(0);
          setSelectedMember(null);
          setIsSplitPayment(false);
          setSplitCashAmount('');
          setSplitQrisAmount('');
          setShowPaymentModal(false);
          setProcessing(false);
          if(window.innerWidth < 768) setMobileView('products');
          
          app.addToast(`Pembayaran sukses. Kembalian: Rp ${cashChange.toLocaleString('id-ID')}`, 'success');
        } catch (error) {
          setProcessing(false);
          console.error("Checkout error:", error);
          app.addToast(`Gagal menyimpan transaksi: ${error.message}. Tenang, data Anda aman di memori lokal dan akan dicoba kirim ulang otomatis.`, 'error');
        }
      };

      return (
        <div className="h-full flex flex-col md:flex-row gap-6 relative">
          {/* BAGIAN KIRI: PRODUK (Disembunyikan di mobile jika melihat keranjang) */}
          <div className={`flex-1 flex-col overflow-hidden ${mobileView === 'cart' ? 'hidden' : 'flex'}`}>
            <div className="flex flex-col sm:flex-row gap-3 mb-4">
              <div className="relative flex-1">
                <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                  <Icon name="search" size={18} className="text-zinc-400" />
                </div>
                <input 
                  type="text" 
                  placeholder="Cari menu atau kode barang (F2)..." 
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      const query = search.trim();
                      if (!query) return;
                      const dbProducts = getDB().products.filter(p => p.active !== false);
                      
                      // 1. GS1 Barcode
                      const gs1 = parseGS1Barcode(query, dbProducts);
                      if (gs1) {
                        if (gs1.product.openPrice) {
                          setSelectedOpenPriceProduct(gs1.product);
                          setManualPriceInput('');
                          setShowOpenPriceModal(true);
                        } else {
                          app.addToCartWithQty(gs1.product, gs1.weight);
                          app.addToast(`Ditambahkan: ${gs1.product.name} (${gs1.weight} kg)`, 'success');
                        }
                        setSearch('');
                        return;
                      }

                      // 2. Exact match
                      const matched = dbProducts.find(p => p.sku.toLowerCase() === query.toLowerCase() || p.name.toLowerCase() === query.toLowerCase());
                      if (matched) {
                        if (matched.openPrice) {
                          setSelectedOpenPriceProduct(matched);
                          setManualPriceInput('');
                          setShowOpenPriceModal(true);
                        } else {
                          app.addToCart(matched);
                          app.addToast(`Ditambahkan: ${matched.name}`, 'success');
                        }
                        setSearch('');
                      } else {
                        app.addToast('Produk tidak ditemukan', 'error');
                      }
                    }
                  }}
                  className="w-full pl-10 pr-12 py-3 bg-white border border-zinc-200 rounded-xl focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none shadow-sm"
                />
                <button onClick={handleScan} className="absolute inset-y-0 right-2 flex items-center p-2 text-zinc-400 hover:text-sky-600" title="Buka Kamera Scanner">
                  <Icon name="scan-line" size={20} />
                </button>
              </div>
              <div className="overflow-x-auto hide-scrollbar flex gap-1.5 pb-1">
                {categories.map(c => (
                  <button 
                    key={c}
                    onClick={() => setCategory(c)}
                    className={`whitespace-nowrap px-3 py-1.5 text-sm rounded-lg font-medium transition ${category === c ? 'bg-sky-600 text-white shadow-md' : 'bg-white text-zinc-600 border border-zinc-200 hover:bg-zinc-50'}`}
                  >
                    {c}
                  </button>
                ))}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto custom-scroll pb-24 md:pb-4">
              <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-4">
                {products.map(p => (
                  <div 
                    key={p.id}
                    onClick={() => {
                      if (p.stock <= 0) return;
                      if (p.openPrice) {
                        setSelectedOpenPriceProduct(p);
                        setManualPriceInput('');
                        setShowOpenPriceModal(true);
                      } else {
                        app.addToCart(p);
                      }
                    }}
                    className={`bg-white rounded-2xl border border-zinc-200 overflow-hidden cursor-pointer transition ${p.stock === 0 ? 'grayscale opacity-50' : 'hover:shadow-lg hover:border-sky-400 active:scale-[0.98]'}`}
                  >
                    <div className="aspect-square bg-zinc-100 flex items-center justify-center relative">
                      {p.image ? (
                        <img src={p.image} className="w-full h-full object-cover" alt={p.name} />
                      ) : (
                        <span className="text-4xl font-bold text-zinc-300">{p.name.substring(0,2).toUpperCase()}</span>
                      )}
                      {p.stock === 0 && (
                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                          <span className="bg-rose-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-lg">HABIS</span>
                        </div>
                      )}
                      {p.stock > 0 && p.stock <= 5 && (
                        <div className="absolute top-2 right-2 bg-orange-500 text-white text-[10px] font-bold px-2 py-1 rounded-md">
                          Sisa {p.stock}
                        </div>
                      )}
                    </div>
                    <div className="p-3 md:p-4 text-left">
                      <p className="text-xs text-zinc-500 font-medium mb-1">{p.category}</p>
                      <h4 className="font-semibold text-zinc-850 text-sm md:text-base leading-tight mb-1.5 line-clamp-2">{p.name}</h4>
                      <div className="flex items-center justify-between flex-wrap gap-1">
                        <div className="font-bold text-sky-600">
                          {p.openPrice ? 'Harga Dinamis' : `Rp ${p.price.toLocaleString('id-ID')}`}
                        </div>
                        {p.wholesalePrice > 0 && (
                          <span className="bg-emerald-50 text-emerald-700 text-[9px] font-bold px-1.5 py-0.5 rounded-md border border-emerald-250" title={`Beli min ${p.wholesaleMinQty} dapat harga Rp ${p.wholesalePrice.toLocaleString('id-ID')}`}>
                            Grosir
                          </span>
                        )}
                      </div>
                      <div className="text-[10px] text-zinc-400 mt-2 flex items-center gap-1 font-medium bg-zinc-50 py-1 px-2 rounded-md w-fit">
                        <Icon name="clock" size={10} />
                        <span>Update: {formatTimeAgo(p.updatedAt)}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Floating Cart Button (Mobile Only) */}
          {mobileView === 'products' && (
            <div className="md:hidden fixed bottom-20 left-4 right-4 z-30 animate-[slideUp_0.3s_ease-out]">
              <button 
                onClick={() => setMobileView('cart')} 
                className="w-full bg-zinc-900 text-white rounded-2xl shadow-xl p-4 flex justify-between items-center"
              >
                <div className="flex items-center gap-3">
                  <div className="relative">
                    <Icon name="shopping-bag" size={24} />
                    <span className="absolute -top-2 -right-2 bg-rose-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">{app.cart.reduce((a,b)=>a+b.qty,0)}</span>
                  </div>
                  <span className="font-semibold text-sm">{app.cart.length > 0 ? 'Lihat Pesanan' : 'Pesanan / Pelanggan'}</span>
                </div>
                <span className="font-bold">Rp {total.toLocaleString('id-ID')}</span>
              </button>
            </div>
          )}

          {/* BAGIAN KANAN: KERANJANG */}
          <div className={`w-full md:w-80 lg:w-96 flex flex-col bg-white rounded-3xl border border-zinc-200 shadow-sm overflow-hidden ${mobileView === 'products' ? 'hidden md:flex' : 'flex'}`}>
            <div className="p-5 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <div className="flex items-center gap-3">
                {mobileView === 'cart' && (
                  <button onClick={() => setMobileView('products')} className="md:hidden p-2 -ml-2 bg-white rounded-xl border border-zinc-200">
                    <Icon name="chevron-left" size={20} />
                  </button>
                )}
                <div>
                  <h3 className="font-bold text-lg text-zinc-800">Pesanan</h3>
                  <p className="text-xs text-zinc-500">{app.user?.name} • TX-{Date.now().toString().slice(-4)}</p>
                </div>
              </div>
              {app.cart.length > 0 && (
                <button onClick={app.clearCart} className="p-2 text-rose-500 hover:bg-rose-50 rounded-xl transition">
                  <Icon name="trash-2" size={20} />
                </button>
              )}
            </div>

            {/* CRM Member Selection */}
            <div className="px-5 py-3.5 bg-zinc-50 border-b border-zinc-150 flex flex-col gap-2">
              <div className="flex items-center justify-between">
                <span className="text-xs font-bold text-zinc-500 uppercase tracking-wider">Pelanggan</span>
                <div className="flex gap-2 items-center">
                  {selectedMember && (
                    <button onClick={() => setSelectedMember(null)} className="text-[10px] text-rose-500 font-semibold hover:underline">Lepas</button>
                  )}
                  <button onClick={() => setShowMemberModal({ mode: 'add' })} className="text-[10px] text-zinc-700 font-bold hover:underline flex items-center gap-0.5">
                    <Icon name="plus" size={12} /> Tambah
                  </button>
                </div>
              </div>
              {selectedMember ? (
                <div className="flex items-center justify-between bg-white border border-zinc-200 rounded-xl p-3 shadow-sm text-left">
                  <div className="flex-1 min-w-0 pr-2">
                    <p className="font-semibold text-zinc-800 text-sm truncate">{selectedMember.name}</p>
                    <p className="text-[10px] text-zinc-500">{selectedMember.phone || 'Tanpa telp'} | {selectedMember.points || 0} Poin</p>
                  </div>
                  <div className="flex items-center gap-1.5 flex-shrink-0">
                    {selectedMember.discount > 0 && (
                      <span className="bg-zinc-100 text-zinc-700 text-[10px] font-bold px-1.5 py-0.5 rounded border border-zinc-200">Diskon {selectedMember.discount}%</span>
                    )}
                    <button onClick={() => setShowMemberModal({ mode: 'edit', member: selectedMember })} className="p-1 text-zinc-500 hover:bg-zinc-100 rounded transition" title="Edit Pelanggan">
                      <Icon name="edit" size={14} />
                    </button>
                    <button onClick={() => handleDeleteMember(selectedMember.id)} className="p-1 text-rose-500 hover:bg-rose-50 rounded transition" title="Hapus Pelanggan">
                      <Icon name="trash" size={14} />
                    </button>
                  </div>
                </div>
              ) : (
                <div className="space-y-2">
                  <select 
                    value={selectedMember ? selectedMember.id : ''} 
                    onChange={e => {
                      const m = getDB().members.find(x => x.id === e.target.value);
                      setSelectedMember(m || null);
                    }}
                    className="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-xs font-semibold outline-none text-zinc-700 focus:border-zinc-500 shadow-sm"
                  >
                    <option value="">Pilih pelanggan yang belanja</option>
                    {members.map(m => (
                      <option key={m.id} value={m.id}>{m.name} ({m.phone})</option>
                    ))}
                  </select>

                  <div className="relative">
                    <Icon name="search" size={13} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400" />
                    <input
                      type="text"
                      value={memberSearchQuery}
                      onChange={e => setMemberSearchQuery(e.target.value)}
                      placeholder="Cari pelanggan untuk edit atau hapus"
                      className="w-full pl-8 pr-3 py-2 bg-white border border-zinc-200 rounded-xl text-xs font-medium outline-none text-zinc-700 focus:border-zinc-500 shadow-sm"
                    />
                  </div>

                  <div className="max-h-32 overflow-y-auto custom-scroll space-y-1">
                    {filteredMembers.length > 0 ? filteredMembers.map(m => (
                      <div key={m.id} className="flex items-center justify-between gap-2 bg-white border border-zinc-200 rounded-xl px-3 py-2 text-left">
                        <button
                          type="button"
                          onClick={() => setSelectedMember(m)}
                          className="min-w-0 flex-1 text-left"
                          title="Pilih pelanggan"
                        >
                          <p className="text-xs font-bold text-zinc-800 truncate">{m.name}</p>
                          <p className="text-[10px] text-zinc-500 truncate">{m.phone || 'Tanpa telp'} | {m.points || 0} Poin</p>
                        </button>
                        <button onClick={() => setShowMemberModal({ mode: 'edit', member: m })} className="p-1.5 text-zinc-500 hover:bg-zinc-100 rounded-lg transition" title="Edit Pelanggan">
                          <Icon name="pencil" size={13} />
                        </button>
                        <button onClick={() => handleDeleteMember(m.id)} className="p-1.5 text-rose-500 hover:bg-rose-50 rounded-lg transition" title="Hapus Pelanggan">
                          <Icon name="trash-2" size={13} />
                        </button>
                      </div>
                    )) : (
                      <div className="bg-white border border-dashed border-zinc-200 rounded-xl px-3 py-3 text-center text-[11px] text-zinc-400">
                        Pelanggan tidak ditemukan
