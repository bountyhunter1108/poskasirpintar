    (function() {
      function showDiagnostics(msg, type) {
        var errorDiv = document.getElementById('debug-error-box');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'debug-error-box';
          errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:white;color:black;padding:20px;z-index:99999;font-family:monospace;font-size:14px;overflow:auto;border: 5px solid red;';
          document.body.appendChild(errorDiv);
        }
        errorDiv.innerHTML += '<h3>[' + type + ']</h3><pre style="color:red;white-space:pre-wrap;">' + msg + '</pre><hr>';
        fetch('http://localhost:9999/error?type=' + encodeURIComponent(type) + '&msg=' + encodeURIComponent(msg)).catch(function(){});
      }
      window.addEventListener('error', function(e) {
        showDiagnostics(e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n' + (e.error ? e.error.stack : ''), 'Window Error');
      });
      window.addEventListener('unhandledrejection', function(e) {
        showDiagnostics(e.reason, 'Unhandled Rejection');
      });
      var originalError = console.error;
      console.error = function() {
        var args = Array.prototype.slice.call(arguments);
        originalError.apply(console, args);
        showDiagnostics(args.join(' '), 'Console Error');
      };
    })();

    // Force unregister all service workers to clear stale browser cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('Unregistered service worker to clear cache:', registration);
        }
      }).catch(err => console.error('Error clearing service workers:', err));
    }
  </script>

        if (ref.current) {
          ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
          lucide.createIcons({
            root: ref.current,
            attrs: { class: className, width: size, height: size, color: color }

    // Time Ago Formatter
    function formatTimeAgo(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMins < 1) return 'Baru saja';
      if (diffMins < 60) return `${diffMins} menit lalu`;
      if (diffHours < 24) return `${diffHours} jam lalu`;
      if (diffDays === 1) return 'Kemarin';
      if (diffDays < 7) return `${diffDays} hari lalu`;
      return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // QR Code Generator

      const canvas = document.createElement('canvas');

        if (error) console.error(error);
      });
      return canvas.toDataURL('image/png');

    // Camera Utils
    async function captureFromCamera() {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const video = document.createElement('video');
        const constraints = { video: { facingMode: 'environment' } };
        
        navigator.mediaDevices.getUserMedia(constraints)
          .then(stream => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
              video.play();
              setTimeout(() => {
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                stream.getTracks().forEach(track => track.stop());
                resolve(canvas.toDataURL('image/png'));
              }, 500);
            };
          })
          .catch(reject);
      });
    }

    async function fetchCloudData(bucketId) {
      try {
        const response = await fetch(`https://kvdb.io/${bucketId}/db`);

          const text = await response.text();
          return text ? JSON.parse(text) : null;

          body: JSON.stringify(data)

        return true;
      } catch (e) {
        console.error("Gagal mengunggah data ke cloud:", e);
        return false;
      }
    }

          return bucketId.trim();
        }
        return null;
      } catch (e) {
        console.error("Gagal membuat bucket cloud baru:", e);
        return null;
      }
    }

    // Merge databases using Last-Write-Wins (LWW)
    function mergeDB(local, cloud) {
      if (!cloud) return local;
      
      const mergeList = (localList = [], cloudList = []) => {
        const map = new Map();
        localList.forEach(item => {
          map.set(item.id, item);
        });
        cloudList.forEach(item => {
          const localItem = map.get(item.id);
          if (!localItem) {
            map.set(item.id, item);
          } else {
            const localTime = new Date(localItem.updatedAt || 0).getTime();
            const cloudTime = new Date(item.updatedAt || 0).getTime();
            if (cloudTime > localTime) {
              map.set(item.id, item);
            }
          }
        });
        return Array.from(map.values());
      };

      return {
        users: mergeList(local.users, cloud.users),
        products: mergeList(local.products, cloud.products),
        transactions: mergeList(local.transactions, cloud.transactions),
        categories: cloud.categories || local.categories || defaultData.categories,
        shifts: mergeList(local.shifts, cloud.shifts),
        bypassRequests: mergeList(local.bypassRequests, cloud.bypassRequests),
        approvedBypasses: mergeList(local.approvedBypasses, cloud.approvedBypasses),
        scans: mergeList(local.scans, cloud.scans),
        productProposals: mergeList(local.productProposals, cloud.productProposals),
        adminApprovals: mergeList(local.adminApprovals, cloud.adminApprovals),
        members: mergeList(local.members, cloud.members),
        cashierReports: mergeList(local.cashierReports, cloud.cashierReports),
        auditLogs: mergeList(local.auditLogs, cloud.auditLogs),
        purchases: mergeList(local.purchases, cloud.purchases),
        officeSupplies: mergeList(local.officeSupplies, cloud.officeSupplies),
        schedules: mergeList(local.schedules, cloud.schedules),
        officeTasks: mergeList(local.officeTasks, cloud.officeTasks),
        invoices: mergeList(local.invoices, cloud.invoices),
        expenses: mergeList(local.expenses, cloud.expenses),
        paymentVerifications: mergeList(local.paymentVerifications, cloud.paymentVerifications),
        attendance: mergeList(local.attendance, cloud.attendance),
        leaveRequests: mergeList(local.leaveRequests, cloud.leaveRequests),
        payrollSlips: mergeList(local.payrollSlips, cloud.payrollSlips),
        crmLeads: mergeList(local.crmLeads, cloud.crmLeads),
        promoCoupons: mergeList(local.promoCoupons, cloud.promoCoupons),
        stockLedger: mergeList(local.stockLedger, cloud.stockLedger),
        damagedGoods: mergeList(local.damagedGoods, cloud.damagedGoods)
      };
    }

    // ==================== SIMULATED BACKEND VALIDATION LAYER ====================
    function validateProductData(data, editProductId = null) {
      const price = parseFloat(data.price);
      const cost = parseFloat(data.cost);
      const stock = parseFloat(data.stock);
      const wholesalePrice = parseFloat(data.wholesalePrice || 0);
      const wholesaleMinQty = parseFloat(data.wholesaleMinQty || 0);

      if (isNaN(price) || price < 0) {
        return "Harga jual tidak boleh bernilai negatif atau kosong.";
      }
      if (isNaN(cost) || cost < 0) {
        return "Modal / harga beli tidak boleh kosong atau bernilai negatif.";
      }
      if (isNaN(stock) || stock < 0) {
        return "Stok tidak boleh bernilai negatif.";
      }
      if (isNaN(wholesalePrice) || wholesalePrice < 0) {
        return "Harga grosir tidak boleh bernilai negatif.";
      }
      if (isNaN(wholesaleMinQty) || wholesaleMinQty < 0) {
        return "Jumlah minimal grosir tidak boleh bernilai negatif.";
      }
      const minStock = parseFloat(data.minStock || 0);
      if (isNaN(minStock) || minStock < 0) {
        return "Batas minimum stok tidak boleh bernilai negatif.";
      }

      // Check SKU uniqueness
      const db = getDB();
      const skuExists = db.products.some(p => p.sku === data.sku && p.id !== editProductId && p.active !== false);
      if (skuExists && data.sku) {
        return `Kode barang "${data.sku}" sudah digunakan oleh produk lain.`;
      }

      return null; // Valid
    }

    function validateUserData(data, editUserId = null) {
      if (!data.name || !data.name.trim()) {
        return "Nama pengguna wajib diisi.";
      }
      
      const email = data.email ? data.email.trim() : '';
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        return "Email tidak valid. Pastikan format email benar (contoh: user@mail.com).";
      }

      const db = getDB();
      const emailExists = db.users.some(u => u.email.toLowerCase() === email.toLowerCase() && u.id !== editUserId);
      if (emailExists) {
        return `Email "${email}" sudah terdaftar pada pengguna lain.`;
      }

      // Password check for new users
      if (!editUserId && (!data.password || data.password.length < 4)) {
        return "Kata sandi wajib diisi dan minimal terdiri dari 4 karakter.";
      }

      // Keamanan Akun Pemilik & Peran Kustom
      const currentSessionUser = JSON.parse(sessionStorage.getItem('pos_user') || 'null');
      
      // 1. Staf lain tidak boleh mengubah akun Pemilik
      const targetUser = db.users.find(u => u.id === editUserId);
      if (targetUser && targetUser.role === 'owner') {
        if (!currentSessionUser || currentSessionUser.role !== 'owner') {
          return "Akses Ditolak: Anda tidak memiliki akses untuk mengubah akun Pemilik!";
        }
      }

      // 2. Staf lain tidak boleh menyetel role ke owner/pemilik (kustom maupun standar)
      const cleanRole = (data.role || '').toLowerCase().replace(/[^a-z]/g, '');
      const isOwnerRole = cleanRole === 'owner' || cleanRole === 'pemilik' || cleanRole.includes('owner') || cleanRole.includes('pemilik');
      if (isOwnerRole && (!currentSessionUser || currentSessionUser.role !== 'owner')) {
        return "Akses Ditolak: Anda tidak diizinkan membuat atau menetapkan role Pemilik/Owner!";
      }

      return null; // Valid
    }

    // ==================== STATE MANAGEMENT ====================
    const AppContext = createContext(null);

    function useAppState() {
      const [user, setUser] = useState(null);
      const [page, setPage] = useState('pos');
      const [cart, setCart] = useState([]);
      const [sidebar, setSidebar] = useState(false); // Default tertutup di mobile
      const [toasts, setToasts] = useState([]);
      const [dbVersion, setDbVersion] = useState(0);

      // New state variables
      const [activeShift, setActiveShift] = useState(null);
      const [isLocked, setIsLocked] = useState(false);
      const [syncEnabled, setSyncEnabled] = useState(false);
      const [syncCode, setSyncCode] = useState('');
      const [syncStatus, setSyncStatus] = useState('idle');
      const [bypassApproved, setBypassApproved] = useState(false);
      const [showSyncModal, setShowSyncModal] = useState(false);
      const [showTutupShiftModal, setShowTutupShiftModal] = useState(false);

      // Persisted POS States for Auto-Save
      const [selectedMember, setSelectedMember] = useState(null);
      const [discount, setDiscount] = useState(0);
      const [roundingMode, setRoundingMode] = useState('100');

      // Online status tracking
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [lastTransaction, setLastTransaction] = useState(null);
      const [showSuccessModal, setShowSuccessModal] = useState(false);

      useEffect(() => {
        const handleOnline = () => {
          setIsOnline(true);
          addToast('Koneksi internet terhubung', 'success');
        };
        const handleOffline = () => {
          setIsOnline(false);
          addToast('Koneksi internet terputus. Mode offline aktif.', 'info');
        };
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      // Reset cashier bypass status on app load to enforce strict re-request on exit/refresh
      useEffect(() => {
        const db = getDB();
        let changed = false;
        db.users.forEach(u => {
          if (u.role !== 'admin' && u.role !== 'owner' && u.entryStatus !== 'exited') {
            u.entryStatus = 'exited';
            u.updatedAt = new Date().toISOString();
            changed = true;
          }
        });
        if (changed) {
          saveDB(db);
          refreshDB();
        }
      }, []);

      // Auto-Save discount, rounding, and member selection to LocalStorage
      useEffect(() => {
        if (user) {
          if (selectedMember) {
            localStorage.setItem(`pos_selected_member_id_${user.id}`, selectedMember.id);
          } else {
            localStorage.removeItem(`pos_selected_member_id_${user.id}`);
          }
          localStorage.setItem(`pos_discount_${user.id}`, String(discount));
          localStorage.setItem(`pos_rounding_mode_${user.id}`, roundingMode);
        }
      }, [selectedMember, discount, roundingMode, user]);

      // Auto-Restore discount, rounding, and member selection on login/refresh
      useEffect(() => {
        if (user) {
          const savedMemberId = localStorage.getItem(`pos_selected_member_id_${user.id}`);
          const savedDiscount = localStorage.getItem(`pos_discount_${user.id}`);
          const savedRounding = localStorage.getItem(`pos_rounding_mode_${user.id}`);

          const db = getDB();
          if (savedMemberId) {
            const memberObj = db.members.find(m => m.id === savedMemberId);
            setSelectedMember(memberObj || null);
          } else {
            setSelectedMember(null);
          }
          setDiscount(savedDiscount ? parseFloat(savedDiscount) || 0 : 0);
          setRoundingMode(savedRounding || '100');
        } else {
          setSelectedMember(null);
          setDiscount(0);
          setRoundingMode('100');
        }
      }, [user, dbVersion]);

      useEffect(() => {
        const savedUser = sessionStorage.getItem('pos_user');
        if (savedUser) {
          const parsed = JSON.parse(savedUser);
          setUser(parsed);
          if (parsed.role === 'owner') {
            setPage('owner_dashboard');
          } else if (['admin_operasional', 'admin_keuangan', 'admin_hr', 'admin_marketing', 'admin_gudang', 'keuangan', 'manager', 'supervisor', 'staff'].includes(parsed.roleId)) {
            setPage('admin_workspace');
          }
        }
        
        const savedLocked = sessionStorage.getItem('pos_locked') === 'true';
        if (savedLocked) setIsLocked(true);

        const enabled = localStorage.getItem('pos_sync_enabled') === 'true';
        const code = localStorage.getItem('pos_sync_code') || '';
        setSyncEnabled(enabled);
        setSyncCode(code);

        // Auto-buka sidebar jika layar lebar
        if (window.innerWidth > 768) setSidebar(true);
      }, []);

      const login = (userData) => {
        setUser(userData);
        sessionStorage.setItem('pos_user', JSON.stringify(userData));
        if (userData.role === 'owner') {
          setPage('owner_dashboard');
        } else if (['admin_operasional', 'admin_keuangan', 'admin_hr', 'admin_marketing', 'admin_gudang', 'keuangan', 'manager', 'supervisor', 'staff'].includes(userData.roleId)) {
          setPage('admin_workspace');
        } else {
          setPage('pos');
        }
      };

      const logout = () => {
        if (user) {
          const db = getDB();
          const userIdx = db.users.findIndex(u => u.id === user.id);
          if (userIdx !== -1) {
            db.users[userIdx].entryStatus = 'exited';
            db.users[userIdx].updatedAt = new Date().toISOString();
            saveDB(db);
          }
        }
        setUser(null);
        sessionStorage.removeItem('pos_user');
        sessionStorage.removeItem('pos_locked');
      };

      const addToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 3000);
      };

      const refreshDB = () => setDbVersion(v => v + 1);

      // Check shift and operational hours bypass
      useEffect(() => {
        if (user) {
          const db = getDB();
          if (user.role !== 'admin' && user.role !== 'owner') {
            const openShift = db.shifts.find(s => s.cashierId === user.id && s.status === 'open');
            setActiveShift(openShift || null);

            const dbUser = db.users.find(u => u.id === user.id);
            const approved = dbUser && dbUser.entryStatus === 'entered';
            setBypassApproved(approved);
          } else {
            setActiveShift(null);
            setBypassApproved(true);
          }
          setActiveShift(null);
          setBypassApproved(false);
        }
      }, [user, dbVersion]);

      // Real-time user activity tracking
      useEffect(() => {
        if (user) {
          const updateActive = () => {
            const db = getDB();
            const uIdx = db.users.findIndex(u => u.id === user.id);
            if (uIdx !== -1) {
              const nowStr = new Date().toISOString();
              db.users[uIdx].lastActive = nowStr;
              db.users[uIdx].entryStatus = 'entered';
              saveDB(db);
            }
          };
          updateActive();
          const timer = setInterval(updateActive, 60000); // refresh every minute
          return () => clearInterval(timer);
        }
      }, [user]);

      // Lock Screen Action
      const lockScreen = () => {
        setIsLocked(true);
        sessionStorage.setItem('pos_locked', 'true');
        addToast('Layar dikunci', 'info');
      };

      const unlockScreen = (password) => {
        if (!user) return false;
        const db = getDB();
        const found = db.users.find(u => u.email === user.email && u.password === password);
        if (found) {
          setIsLocked(false);
          sessionStorage.removeItem('pos_locked');
          addToast('Layar terbuka', 'success');
          return true;
        }
        return false;
      };

      // Shift Management
      const startShift = (modalUang) => {
        if (!user) return;
        const db = getDB();
        const newShift = {
          id: 'SF' + Date.now(),
          cashierId: user.id,
          cashierName: user.name,
          startTime: new Date().toISOString(),
          endTime: null,
          startCash: modalUang,
          expectedCash: modalUang,
          actualCash: 0,
          difference: 0,
          status: 'open',
          updatedAt: new Date().toISOString()
        };
        db.shifts.push(newShift);
        saveDB(db);
        refreshDB();
        addToast(`Shift dibuka dengan modal Rp ${modalUang.toLocaleString('id-ID')}`, 'success');
      };

      const endShift = (actualCash) => {
        if (!user || !activeShift) return;
        const db = getDB();
        const shiftIdx = db.shifts.findIndex(s => s.id === activeShift.id);
        if (shiftIdx !== -1) {
          const shift = db.shifts[shiftIdx];
          const cashSales = db.transactions
            .filter(t => t.cashier === user.name && new Date(t.date) >= new Date(shift.startTime) && t.method === 'cash' && !t.deleted)
            .reduce((sum, t) => sum + t.total, 0);

          const expectedCash = shift.startCash + cashSales;
          const diff = actualCash - expectedCash;

          shift.endTime = new Date().toISOString();
          shift.expectedCash = expectedCash;
          shift.actualCash = actualCash;
          shift.difference = diff;
          shift.status = 'closed';
          shift.updatedAt = new Date().toISOString();

          db.shifts[shiftIdx] = shift;
          saveDB(db);
          refreshDB();
          
          if (diff === 0) {
            addToast('Shift ditutup. Uang laci pas!', 'success');
          } else if (diff > 0) {
            addToast(`Shift ditutup. Selisih lebih: +Rp ${diff.toLocaleString('id-ID')}`, 'info');
          } else {
            addToast(`Shift ditutup. Selisih kurang: -Rp ${Math.abs(diff).toLocaleString('id-ID')}`, 'error');
          }
          
          logout();
        }
      };

      // Cloud Sync Actions
      const enableSync = async (code) => {
        let activeCode = code;
        setSyncStatus('syncing');
        if (!activeCode) {
          activeCode = await createNewCloudBucket();
          if (!activeCode) {
            setSyncStatus('error');
            addToast('Gagal membuat kode sinkronisasi cloud', 'error');
            return;
          }
        }
        localStorage.setItem('pos_sync_enabled', 'true');
        localStorage.setItem('pos_sync_code', activeCode);
        setSyncEnabled(true);
        setSyncCode(activeCode);
        await triggerSync(activeCode);
      };

      const disableSync = () => {
        localStorage.setItem('pos_sync_enabled', 'false');
        localStorage.removeItem('pos_sync_code');
        setSyncEnabled(false);
        setSyncCode('');
        setSyncStatus('idle');
        addToast('Sinkronisasi cloud dinonaktifkan', 'info');
      };

      const triggerSync = async (codeToUse = syncCode) => {
        if (!codeToUse) return;
        setSyncStatus('syncing');
        const cloudData = await fetchCloudData(codeToUse);
        const localData = getDB();
        
        if (cloudData) {
          const merged = mergeDB(localData, cloudData);
          saveDB(merged);
          await pushCloudData(codeToUse, merged);
          refreshDB();
          setSyncStatus('success');
          addToast('Sinkronisasi cloud berhasil', 'success');
        } else {
          const success = await pushCloudData(codeToUse, localData);
          if (success) {
            setSyncStatus('success');
            addToast('Data lokal diunggah ke cloud', 'success');
          } else {
            setSyncStatus('error');
            addToast('Koneksi ke cloud gagal', 'error');
          }
        }
      };

      // ==================== SUPABASE SYNC ====================
      // Pull from Supabase once on mount, then subscribe to realtime changes
      useEffect(() => {
        let channel = null;

        const initSupabase = async () => {
          // 1. Fetch latest from Supabase and merge with local
          const cloudData = await sbFetch();
          if (cloudData) {
            const localData = getDB();
            const merged = mergeDB(localData, cloudData);
            if (JSON.stringify(merged) !== JSON.stringify(localData)) {
              localStorage.setItem(DB_KEY, JSON.stringify(merged));
              setDbVersion(v => v + 1);
            }
          } else {
            // First device: push local data to Supabase
            sbPush(getDB());
          }

          // 2. Subscribe to realtime changes so other devices auto-sync
          if (sbClient) {
            channel = sbClient.channel('pos_realtime')
              .on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'pos_sync',
                filter: 'id=eq.main'
              }, (payload) => {
                const cloudDb = payload.new?.db_data;
                if (!cloudDb) return;
                const local = getDB();
                const merged = mergeDB(local, cloudDb);
                if (JSON.stringify(merged) !== JSON.stringify(local)) {
                  localStorage.setItem(DB_KEY, JSON.stringify(merged));
                  setDbVersion(v => v + 1);
                }
              })
              .subscribe((status) => {
                console.log('[Supabase Realtime]', status);
              });
          }
        };

        initSupabase();

        return () => {
          if (channel && sbClient) sbClient.removeChannel(channel);
        };
      }, []);

      // Idle Timeout - auto-lock layar setelah 15 menit tidak aktif
      useEffect(() => {
        if (!user) return;
        let idleTimer;
        const resetTimer = () => {
          clearTimeout(idleTimer);
          idleTimer = setTimeout(() => {
            setIsLocked(true);
            sessionStorage.setItem('pos_locked', 'true');
          }, 15 * 60 * 1000); // 15 menit
        };
        const events = ['mousemove', 'keydown', 'click', 'touchstart', 'scroll'];
        events.forEach(ev => document.addEventListener(ev, resetTimer, { passive: true }));
        resetTimer();
        return () => {
          clearTimeout(idleTimer);
          events.forEach(ev => document.removeEventListener(ev, resetTimer));
        };
      }, [user]);

      // Operational Hours Bypass Requests
      const submitBypassRequest = async (loc) => {
        const db = getDB();
        const newReq = {
          id: 'REQ' + Date.now(),
          name: user?.name || 'Kasir',
          email: user?.email || '',
          time: new Date().toISOString(),
          location: loc || 'Lokasi tidak diketahui',
          device: navigator.userAgent,
          status: 'pending',
          updatedAt: new Date().toISOString()
        };
        db.bypassRequests.push(newReq);
        saveDB(db);
        refreshDB();
        addToast('Permintaan izin masuk dikirim', 'info');
      };

      const approveBypassRequest = async (reqId) => {
        const db = getDB();
        const idx = db.bypassRequests.findIndex(r => r.id === reqId);
        if (idx !== -1) {
          db.bypassRequests[idx].status = 'approved';
          db.bypassRequests[idx].updatedAt = new Date().toISOString();
          
          // Update entryStatus untuk user yang di-approve
          const userIdx = db.users.findIndex(u => u.email === db.bypassRequests[idx].email);
          if (userIdx !== -1) {
            db.users[userIdx].entryStatus = 'entered';
            db.users[userIdx].updatedAt = new Date().toISOString();
          }
          
          const todayStr = new Date().toDateString();
          db.approvedBypasses.push({
            id: 'APP' + Date.now(),
            email: db.bypassRequests[idx].email,
            date: todayStr,
            updatedAt: new Date().toISOString()
          });
          
          saveDB(db);
          refreshDB();
          addToast('Akses disetujui', 'success');
        }
      };

      const rejectBypassRequest = async (reqId) => {
        const db = getDB();
        const idx = db.bypassRequests.findIndex(r => r.id === reqId);
        if (idx !== -1) {
          db.bypassRequests[idx].status = 'rejected';
          db.bypassRequests[idx].updatedAt = new Date().toISOString();
          
          saveDB(db);
          refreshDB();
          addToast('Akses ditolak', 'error');
        }
      };

      // Cart Actions
      const addToCart = (product) => {
        setCart(prev => {
          const ex = prev.find(i => i.id === product.id);
          if (ex) {
            if (ex.qty >= product.stock) {
              addToast('Stok tidak mencukupi', 'error');
              return prev;
            }
            return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
          }
          return [...prev, { ...product, qty: 1 }];
        });
      };

      const addToCartWithQty = (product, qty) => {
        setCart(prev => {
          const ex = prev.find(i => i.id === product.id);
          if (ex) {
            const newQty = ex.qty + qty;
            if (newQty > product.stock) {
              addToast('Stok tidak mencukupi', 'error');
              return prev;
            }
            return prev.map(i => i.id === product.id ? { ...i, qty: parseFloat(newQty.toFixed(3)) } : i);
          }
          if (qty > product.stock) {
            addToast('Stok tidak mencukupi', 'error');
            return prev;
          }
          return [...prev, { ...product, qty: parseFloat(qty.toFixed(3)) }];
        });
      };

      const updateCartQty = (id, delta) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const newQty = item.qty + delta;
            if (newQty > item.stock) {
              addToast('Stok tidak mencukupi', 'error');
              return item;
            }
            return newQty > 0 ? { ...item, qty: newQty } : item;
          }
          return item;
        }).filter(item => item.qty > 0));
      };

      const removeFromCart = (id) => setCart(prev => prev.filter(item => item.id !== id));
      const clearCart = () => setCart([]);

      const saveScanData = (photoData, scanType = 'photo') => {
        const db = getDB();
        const scanId = 'SCAN' + Date.now();
        const qrCode = generateQRCode(scanId);
        db.scans.push({
          id: scanId,
          userId: user?.id || '',
          photoData,
          qrCode,
          scanType,
          createdAt: new Date().toISOString()
        });
        saveDB(db);
        refreshDB();
        return scanId;
      };

      // Auto-Save Cart to LocalStorage
      useEffect(() => {
        if (user) {
          localStorage.setItem(`pos_cart_${user.id}`, JSON.stringify(cart));
          // Save active cart globally for Customer Display Screen
          localStorage.setItem('pos_active_cart', JSON.stringify({
            cart,
            user,
            timestamp: Date.now()
          }));
        }
      }, [cart, user]);

      // Auto-Restore Cart from LocalStorage
      useEffect(() => {
        if (user) {
          const saved = localStorage.getItem(`pos_cart_${user.id}`);
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              if (parsed && parsed.length > 0) {
                setCart(parsed);
              }
            } catch(e) {}
          }
        } else {
          setCart([]);
        }
      }, [user]);

      return {
        user, page, cart, sidebar, toasts, dbVersion,
        activeShift, isLocked, syncEnabled, syncCode, syncStatus, bypassApproved,
        showSyncModal, showTutupShiftModal,
        selectedMember, setSelectedMember, discount, setDiscount, roundingMode, setRoundingMode,
        isOnline, lastTransaction, setLastTransaction, showSuccessModal, setShowSuccessModal,
        setPage, setSidebar, setToasts, addToast, login, logout,
        addToCart, addToCartWithQty, updateCartQty, removeFromCart, clearCart, refreshDB,
        lockScreen, unlockScreen, startShift, endShift,
        enableSync, disableSync, triggerSync, setShowSyncModal, setShowTutupShiftModal,
        submitBypassRequest, approveBypassRequest, rejectBypassRequest, saveScanData
      };
    }

    // ==================== COMPONENTS ====================
    function Toast({ toast, onClose }) {
      const bgColors = {
        success: 'bg-emerald-600',
        error: 'bg-rose-600',
        info: 'bg-sky-600'
      };
      const icons = {
        success: 'check-circle',
        error: 'alert-circle',
        info: 'info'
      };

      return (
        <div className={`${bgColors[toast.type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 mb-2 animate-[slideIn_0.3s_ease-out]`}>
          <Icon name={icons[toast.type]} size={20} />

          <button onClick={() => onClose(toast.id)} className="ml-2 p-1 hover:bg-white/20 rounded-lg">

          </button>
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { error: null };
      }

      static getDerivedStateFromError(error) {
        return { error };
      }

      componentDidCatch(error, info) {
        console.error('Render error:', error, info);
      }

      handleLogout = () => {
        sessionStorage.removeItem('pos_user');
        sessionStorage.removeItem('pos_locked');
        window.location.reload();
      };

      render() {
        if (this.state.error) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-zinc-100 p-4">
              <div className="w-full max-w-md bg-white rounded-3xl shadow-xl border border-zinc-200 p-6 text-left">
                <div className="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center mb-4">
                  <Icon name="alert-triangle" size={24} />
                </div>
                <h1 className="text-xl font-bold text-zinc-900 mb-2">Aplikasi berhenti sebentar</h1>
                <p className="text-sm text-zinc-600 leading-relaxed mb-4">Ada data akun atau halaman yang membuat tampilan gagal dimuat. Klik keluar lalu login lagi.</p>
                <pre className="text-xs bg-zinc-50 border border-zinc-200 rounded-xl p-3 overflow-auto max-h-32 text-rose-600 mb-4">{String(this.state.error?.message || this.state.error)}</pre>
                <button onClick={this.handleLogout} className="w-full py-3 bg-zinc-900 text-white rounded-xl font-bold">Keluar dan Muat Ulang</button>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function DynamicQRCode({ text, width = 170 }) {
      const canvasRef = useRef(null);
      const [error, setError] = useState(false);

      useEffect(() => {
        setError(false);
        if (canvasRef.current && text) {
          if (typeof QRCode !== 'undefined') {
            QRCode.toCanvas(canvasRef.current, text, { width: width, margin: 1 }, function(err) {
              if (err) {
                console.error(err);
                setError(true);
              }
            });
          } else {
            setError(true);
          }
        }
      }, [text, width]);

      if (error) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${width}x${width}&data=${encodeURIComponent(text)}`;
        return <img src={qrUrl} alt="QR Code" className="mx-auto border border-zinc-200 rounded-xl" style={{ width: `${width}px`, height: `${width}px` }} />;
      }

      return <canvas ref={canvasRef} className="mx-auto border border-zinc-200 rounded-xl" />;
    }

    // 1b. OWNER DASHBOARD
    function OwnerDashboard() {
      const app = useContext(AppContext);
      const db = getDB();
      const [filter, setFilter] = useState('7days');
      const [dashboardTab, setDashboardTab] = useState('overview'); // 'overview', 'staff', 'finance', 'audit'
      const [selectedStaffDetail, setSelectedStaffDetail] = useState(null);
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      const allTx = useMemo(() => db.transactions || [], [db.transactions, app.dbVersion]);

      const filteredTx = useMemo(() => {
        const now = new Date();
        let txs = allTx.filter(t => !t.deleted);

        if (filter === 'today') {
          txs = txs.filter(t => new Date(t.date).toDateString() === now.toDateString());
        } else if (filter === '7days') {
          const past = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
          txs = txs.filter(t => new Date(t.date) >= past);
        } else if (filter === 'month') {
          txs = txs.filter(t => {
            const d = new Date(t.date);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
          });
        }
        return txs;
      }, [allTx, filter]);

      // Calculations
      const metrics = useMemo(() => {
        let totalRevenue = 0;
        let totalCost = 0;
        
        filteredTx.forEach(tx => {
          totalRevenue += (tx.total || 0);
          tx.items.forEach(item => {
            const costVal = item.cost !== undefined ? item.cost : 0;
            totalCost += (costVal * item.qty);
          });
        });

        const profit = totalRevenue - totalCost;
        return {
          revenue: totalRevenue,
          cost: totalCost,
          profit: profit,
          count: filteredTx.length
        };
      }, [filteredTx]);

      // Best Sellers
      const bestSellers = useMemo(() => {
        const counts = {};
        filteredTx.forEach(tx => {
          tx.items.forEach(item => {
            if (!counts[item.id]) {
              counts[item.id] = { id: item.id, name: item.name, category: item.category, qty: 0, revenue: 0 };
            }
            counts[item.id].qty += item.qty;
            counts[item.id].revenue += (item.effectivePrice * item.qty);
          });
        });
        return Object.values(counts).sort((a, b) => b.qty - a.qty).slice(0, 5);
      }, [filteredTx]);

      // Shifts
      const shiftsList = useMemo(() => {
        return [...(db.shifts || [])].sort((a, b) => new Date(b.startTime) - new Date(a.startTime)).slice(0, 5);
      }, [db.shifts, app.dbVersion]);

      // Audit Logs
      const auditList = useMemo(() => {
        return (db.auditLogs || []).slice(0, 10);
      }, [db.auditLogs, app.dbVersion]);

      const { chartLabels, chartDataSales, chartDataProfit } = useMemo(() => {
        const daily = {};
        filteredTx.forEach(t => {
          const d = new Date(t.date).toLocaleDateString('id-ID', { month: 'short', day: 'numeric' });
          if (!daily[d]) {
            daily[d] = { sales: 0, cost: 0 };
          }
          daily[d].sales += t.total;
          t.items.forEach(item => {
            const costVal = item.cost !== undefined ? item.cost : 0;
            daily[d].cost += (costVal * item.qty);
          });
        });
        const labels = Object.keys(daily).reverse();
        const sales = Object.values(daily).map(v => v.sales).reverse();
        const profits = Object.values(daily).map(v => v.sales - v.cost).reverse();
        return { chartLabels: labels, chartDataSales: sales, chartDataProfit: profits };
      }, [filteredTx]);

      // Render chart
      useEffect(() => {
        if (dashboardTab !== 'overview' || !chartRef.current) return;
        if (chartInstance.current) chartInstance.current.destroy();

        const ctx = chartRef.current.getContext('2d');
        const salesGradient = ctx.createLinearGradient(0, 0, 0, 240);
        salesGradient.addColorStop(0, 'rgba(59, 89, 152, 0.25)'); // deep slate-blue (sky-600)
        salesGradient.addColorStop(1, 'rgba(59, 89, 152, 0.0)');

        const profitGradient = ctx.createLinearGradient(0, 0, 0, 240);
        profitGradient.addColorStop(0, 'rgba(16, 185, 129, 0.25)'); // emerald-500
        profitGradient.addColorStop(1, 'rgba(16, 185, 129, 0.0)');

        chartInstance.current = new Chart(chartRef.current, {
          type: 'line',
          data: {
            labels: chartLabels,
            datasets: [
              {
                label: 'Pendapatan',
                data: chartDataSales,
                borderColor: '#3b5998', // sky-600
                backgroundColor: salesGradient,
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#3b5998',
                pointRadius: 3
              },
              {
                label: 'Laba Bersih',
                data: chartDataProfit,
                borderColor: '#10b981', // emerald-500
                backgroundColor: profitGradient,
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#10b981',
                pointRadius: 3
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { position: 'top', labels: { font: { family: 'Inter', size: 10, weight: 'bold' } } },
              tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.95)',
                titleFont: { size: 12, weight: 'bold', family: 'Inter' },
                bodyFont: { size: 11, family: 'Inter' },
                padding: 12,
                cornerRadius: 12,
                callbacks: {
                  label: function(context) {
                    return ` ${context.dataset.label}: Rp ${context.raw.toLocaleString('id-ID')}`;
                  }
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: 'rgba(0, 0, 0, 0.04)', drawBorder: false },
                ticks: {
                  callback: (value) => 'Rp ' + value.toLocaleString('id-ID'),
                  font: { family: 'Inter', size: 10 },
                  color: '#64748b'
                }
              },
              x: {
                grid: { display: false },
                ticks: { font: { family: 'Inter', size: 10 }, color: '#64748b' }
              }
            }
          }
        });

        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [chartLabels, chartDataSales, chartDataProfit, dashboardTab]);

      const renderOverview = () => (
        <>
          {/* Cards metrics */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6 animate-[fadeIn_0.2s]">
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-sky-50 text-sky-650 flex items-center justify-center flex-shrink-0">
                <Icon name="wallet" size={24} />
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Pendapatan</p>
                <h4 className="text-xl font-extrabold text-zinc-855">Rp {metrics.revenue.toLocaleString('id-ID')}</h4>
              </div>
            </div>

            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center flex-shrink-0">
                <Icon name="receipt" size={24} />
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Total Modal (HPP)</p>
                <h4 className="text-xl font-extrabold text-zinc-855">Rp {metrics.cost.toLocaleString('id-ID')}</h4>
              </div>
            </div>

            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center flex-shrink-0">
                <Icon name="trending-up" size={24} />
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Laba Bersih</p>
                <h4 className={`text-xl font-extrabold ${metrics.profit >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                  Rp {metrics.profit.toLocaleString('id-ID')}
                </h4>
              </div>
            </div>

            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-violet-50 text-violet-600 flex items-center justify-center flex-shrink-0">
                <Icon name="shopping-bag" size={24} />
              </div>
              <div>
                <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Transaksi</p>
                <h4 className="text-xl font-extrabold text-zinc-855">{metrics.count} Nota</h4>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            {/* Sales Graph */}
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs lg:col-span-2 flex flex-col h-80">
              <h4 className="font-bold text-sm text-zinc-800 mb-4">Tren Penjualan & Laba</h4>
              <div className="flex-1 relative">
                <canvas ref={chartRef}></canvas>
              </div>
            </div>

            {/* Best Sellers */}
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex flex-col h-80">
              <h4 className="font-bold text-sm text-zinc-800 mb-4">Produk Terlaris</h4>
              <div className="flex-1 overflow-y-auto custom-scroll space-y-3">
                {bestSellers.length === 0 ? (
                  <p className="text-xs text-zinc-400 text-center py-16">Belum ada transaksi</p>
                ) : (
                  bestSellers.map((item, idx) => (
                    <div key={item.id} className="flex justify-between items-center border-b border-zinc-50 pb-2">
                      <div className="min-w-0">
                        <p className="text-xs font-bold text-zinc-800 truncate">{idx + 1}. {item.name}</p>
                        <p className="text-[10px] text-zinc-400">{item.category}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-xs font-bold text-zinc-800">{item.qty} pcs</p>
                        <p className="text-[10px] text-zinc-400 font-medium">Rp {item.revenue.toLocaleString('id-ID')}</p>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>

          {/* Shifts Monitoring */}
          <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs overflow-hidden flex flex-col max-h-96">
            <h4 className="font-bold text-sm text-zinc-800 mb-4 flex items-center gap-2">
              <Icon name="key-round" size={16} className="text-amber-500" />
              <span>Pemantauan Shift Kasir Aktif</span>
            </h4>
            <div className="flex-1 overflow-auto custom-scroll">
              <table className="w-full text-xs">
                <thead className="bg-zinc-50 font-bold text-zinc-550 border-b border-zinc-150">
                  <tr>
                    <th className="p-2 text-left">Kasir</th>
                    <th className="p-2 text-left">Waktu Mulai</th>
                    <th className="p-2 text-right">Modal Awal</th>
                    <th className="p-2 text-right">Uang Laci</th>
                    <th className="p-2 text-right">Selisih</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-zinc-100">
                  {shiftsList.length === 0 ? (
                    <tr><td colSpan="5" className="p-4 text-center text-zinc-400">Tidak ada riwayat shift</td></tr>
                  ) : (
                    shiftsList.map(s => (
                      <tr key={s.id} className="hover:bg-zinc-50/50">
                        <td className="p-2 font-semibold text-zinc-700">{s.cashierName}</td>
                        <td className="p-2 text-zinc-450">{new Date(s.startTime).toLocaleDateString('id-ID', {day:'numeric',month:'short'})} {new Date(s.startTime).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'})}</td>
                        <td className="p-2 text-right text-zinc-700">Rp {s.startCash?.toLocaleString('id-ID')}</td>
                        <td className="p-2 text-right font-bold text-zinc-800">
                          {s.status === 'open' ? 'Shift Berjalan' : `Rp ${s.actualCash?.toLocaleString('id-ID')}`}
                        </td>
                        <td className={`p-2 text-right font-bold ${s.difference === 0 ? 'text-emerald-600' : s.difference > 0 ? 'text-sky-600' : 'text-rose-600'}`}>
                          {s.status === 'open' ? '-' : s.difference === 0 ? 'Pas' : (s.difference > 0 ? '+' : '') + s.difference.toLocaleString('id-ID')}
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </>
      );

      const renderStaffTracking = () => {
        const staffs = db.users.filter(u => u.role !== 'owner');
        
        return (
          <div className="space-y-6 animate-[fadeIn_0.2s]">
            <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs">
              <h4 className="font-bold text-sm text-zinc-800 mb-4 flex items-center gap-2">
                <Icon name="users" size={18} className="text-sky-600" />
                <span>Pelacakan Kehadiran & Kegiatan Anggota (Real-time)</span>
              </h4>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {staffs.map(u => {
                  const now = new Date();
                  const isOnline = u.entryStatus === 'entered' && u.lastActive && (now - new Date(u.lastActive)) < 15 * 60 * 1000;
                  
                  const staffTx = allTx.filter(t => t.cashierId === u.id || (t.cashier && t.cashier.toLowerCase() === u.name.toLowerCase()));
                  const totalSales = staffTx.reduce((sum, t) => sum + t.total, 0);
                  
                  const uName = u.name || u.email;
                  const recentLogs = db.auditLogs.filter(log => log.user === uName || log.email === u.email).slice(0, 3);
                  const addedProducts = db.products.filter(p => p.createdById === u.id || p.createdBy === u.name).length;

                  return (
                    <div key={u.id} className="border border-zinc-200 rounded-2xl p-4 bg-zinc-50/50 hover:bg-white transition flex flex-col justify-between space-y-4">
                      <div className="flex justify-between items-start">
                        <div className="flex items-center gap-3">
                          <div className="w-10 h-10 rounded-full bg-sky-100 text-sky-700 flex items-center justify-center font-bold text-sm">
                            {u.name?.substring(0, 2).toUpperCase()}
                          </div>
                          <div>
                            <h5 className="font-bold text-zinc-800 text-sm flex items-center gap-2">
                              {u.name}
                              <span className="text-[10px] bg-zinc-200 text-zinc-650 font-bold px-1.5 py-0.5 rounded uppercase">{u.role === 'keuangan' ? 'Keuangan' : u.role}</span>
                            </h5>
                            <p className="text-xs text-zinc-450">{u.email}</p>
                          </div>
                        </div>
                        
                        <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold ${
                          isOnline ? 'bg-emerald-100 text-emerald-700' : 'bg-zinc-200 text-zinc-500'
                        }`}>
                          <span className={`w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-emerald-500 animate-pulse' : 'bg-zinc-400'}`}></span>
                          {isOnline ? 'Online (Aktif)' : 'Offline'}
                        </span>
                      </div>

                      <div className="grid grid-cols-3 gap-2 bg-white border border-zinc-200 rounded-xl p-3 text-center text-xs">
                        <div>
                          <p className="text-zinc-450 text-[10px] uppercase font-bold mb-0.5">Aktif Terakhir</p>
                          <p className="font-semibold text-zinc-700 truncate" title={u.lastActive ? new Date(u.lastActive).toLocaleString('id-ID') : 'Belum pernah'}>
                            {u.lastActive ? formatTimeAgo(u.lastActive) : 'Belum Pernah'}
                          </p>
                        </div>
                        <div>
                          <p className="text-zinc-450 text-[10px] uppercase font-bold mb-0.5">Penjualan</p>
                          <p className="font-bold text-zinc-800">{staffTx.length} Nota <span className="text-[10px] text-zinc-400 font-normal">(Rp {totalSales.toLocaleString('id-ID')})</span></p>
                        </div>
                        <div>
                          <p className="text-zinc-450 text-[10px] uppercase font-bold mb-0.5">Input Barang</p>
                          <p className="font-bold text-zinc-800">{addedProducts} Produk</p>
                        </div>
                      </div>

                      <div className="space-y-1.5 text-left">
                        <p className="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">Aktivitas Terakhir:</p>
                        {recentLogs.length === 0 ? (
                          <p className="text-xs text-zinc-450 italic">Belum ada catatan aktivitas</p>
                        ) : (
                          recentLogs.map(log => (
                            <div key={log.id} className="text-[11px] border-l-2 border-sky-400 pl-2 py-0.5">
                              <span className="font-bold text-zinc-700">{log.action}: </span>
                              <span className="text-zinc-655">{log.details} </span>
                              <span className="text-[9px] text-zinc-400 font-mono">({formatTimeAgo(log.timestamp)})</span>
                            </div>
                          ))
                        )}
                      </div>

                      <button
                        onClick={() => setSelectedStaffDetail(u)}
                        className="w-full mt-2 py-2 bg-sky-50 hover:bg-sky-100 text-sky-600 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5"
                      >
                        <Icon name="eye" size={13} />
                        Detail Aktivitas
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      const renderFinance = () => {
        const approvedPurchases = (db.purchases || []).filter(p => p.status === 'approved');
        
        let buyTotal = 0;
        let refundTotal = 0;
        let takeTotal = 0;
        let voidTotal = 0;

        approvedPurchases.forEach(p => {
          const tVal = p.total || ((p.approvedQty || p.qty || 0) * (p.cost || 0));
          if (p.type === 'buy') buyTotal += tVal;
          else if (p.type === 'refund') refundTotal += tVal;
          else if (p.type === 'take') takeTotal += tVal;
          else if (p.type === 'void') voidTotal += tVal;
        });

        const revenue = metrics.revenue;
        const hpp = metrics.cost;
        const grossProfit = metrics.profit;
        const netProfit = grossProfit - buyTotal - takeTotal - voidTotal + refundTotal;
        const marginPct = revenue > 0 ? (grossProfit / revenue) * 100 : 0;

        const lowStockItems = db.products.filter(p => p.active !== false && p.stock <= (p.minStock || 5));
        const totalRestockBudget = lowStockItems.reduce((sum, p) => {
          const needed = Math.max(0, (p.minStock || 5) - p.stock);
          return sum + (needed * (p.cost || 0));
        }, 0);

        return (
          <div className="space-y-6 animate-[fadeIn_0.2s] text-left">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
                <div className="w-12 h-12 rounded-xl bg-sky-50 text-sky-650 flex items-center justify-center flex-shrink-0">
                  <Icon name="landmark" size={24} />
                </div>
                <div>
                  <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Laba Kotor Penjualan</p>
                  <h4 className="text-lg font-extrabold text-zinc-855">Rp {grossProfit.toLocaleString('id-ID')}</h4>
                  <p className="text-[10px] text-zinc-400 mt-1">Margin: {marginPct.toFixed(1)}%</p>
                </div>
              </div>

              <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
                <div className="w-12 h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center flex-shrink-0">
                  <Icon name="shopping-bag" size={24} />
                </div>
                <div>
                  <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Biaya Belanja & Operasional</p>
                  <h4 className="text-lg font-extrabold text-rose-650">Rp {(buyTotal + takeTotal + voidTotal).toLocaleString('id-ID')}</h4>
                  <p className="text-[10px] text-zinc-450 mt-1">Beli: Rp {buyTotal.toLocaleString('id-ID')} | Ambil: Rp {takeTotal.toLocaleString('id-ID')}</p>
                </div>
              </div>

              <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex items-center gap-4">
                <div className="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center flex-shrink-0">
                  <Icon name="trending-up" size={24} />
                </div>
                <div>
                  <p className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-0.5">Laba Bersih Akhir</p>
                  <h4 className={`text-lg font-extrabold ${netProfit >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                    Rp {netProfit.toLocaleString('id-ID')}
                  </h4>
                  <p className="text-[10px] text-zinc-400 mt-1">Sesudah pengadaan & retur</p>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs lg:col-span-1 text-left flex flex-col justify-between">
                <div>
                  <h4 className="font-bold text-sm text-zinc-800 mb-4">Rincian Pengeluaran Ritel</h4>
                  <div className="space-y-3">
                    <div className="flex justify-between items-center py-2 border-b border-zinc-100">
                      <span className="text-xs text-zinc-500 font-semibold flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-sky-500"></span>Pembelian (Buy)</span>
                      <span className="text-xs font-bold text-zinc-850">Rp {buyTotal.toLocaleString('id-ID')}</span>
                    </div>
                    <div className="flex justify-between items-center py-2 border-b border-zinc-100">
                      <span className="text-xs text-zinc-500 font-semibold flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-violet-500"></span>Ambil Stok (Take)</span>
                      <span className="text-xs font-bold text-zinc-855">Rp {takeTotal.toLocaleString('id-ID')}</span>
                    </div>
                    <div className="flex justify-between items-center py-2 border-b border-zinc-100">
                      <span className="text-xs text-zinc-500 font-semibold flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-rose-500"></span>Void Barang (Void)</span>
                      <span className="text-xs font-bold text-zinc-855">Rp {voidTotal.toLocaleString('id-ID')}</span>
                    </div>
                    <div className="flex justify-between items-center py-2">
                      <span className="text-xs text-zinc-500 font-semibold flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-emerald-500"></span>Retur Supplier (Refund)</span>
                      <span className="text-xs font-bold text-emerald-600">+ Rp {refundTotal.toLocaleString('id-ID')}</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs lg:col-span-2 text-left">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-4">
                  <h4 className="font-bold text-sm text-zinc-800">Rencana Anggaran Belanja (Restock)</h4>
                  <span className="text-xs font-bold bg-rose-50 text-rose-600 px-2.5 py-1 rounded-lg border border-rose-100">Estimasi Budget: Rp {totalRestockBudget.toLocaleString('id-ID')}</span>
                </div>
                <div className="overflow-x-auto max-h-56 custom-scroll">
                  <table className="w-full text-xs text-left">
                    <thead className="bg-zinc-50 text-zinc-550 border-b border-zinc-150 font-bold sticky top-0">
                      <tr>
                        <th className="p-2">Produk</th>
                        <th className="p-2 text-center">Stok</th>
                        <th className="p-2 text-center">Minimum</th>
                        <th className="p-2 text-right">Modal/HPP</th>
                        <th className="p-2 text-right">Rencana Belanja</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-zinc-100">
                      {lowStockItems.length === 0 ? (
                        <tr><td colSpan="5" className="p-4 text-center text-zinc-400 font-medium">Stok semua produk aman!</td></tr>
                      ) : (
                        lowStockItems.map(p => {
                          const needed = Math.max(0, (p.minStock || 5) - p.stock);
                          const budget = needed * (p.cost || 0);
                          return (
                            <tr key={p.id} className="hover:bg-zinc-50/50">
                              <td className="p-2">
                                <div className="font-bold text-zinc-800">{p.name}</div>
                                <div className="text-[10px] text-zinc-400">{p.category}</div>
                              </td>
                              <td className="p-2 text-center text-rose-600 font-bold">{p.stock} pcs</td>
                              <td className="p-2 text-center text-zinc-500 font-medium">{p.minStock || 5} pcs</td>
                              <td className="p-2 text-right text-zinc-700">Rp {p.cost?.toLocaleString('id-ID')}</td>
                              <td className="p-2 text-right font-bold text-zinc-800">Rp {budget.toLocaleString('id-ID')}</td>
                            </tr>
                          );
                        })
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const renderFullAuditLogs = () => {
        const fullLogs = db.auditLogs || [];
        return (
          <div className="bg-white border border-zinc-200 rounded-2xl p-5 shadow-xs flex flex-col animate-[fadeIn_0.2s]">
            <h4 className="font-bold text-sm text-zinc-800 mb-4 flex items-center gap-2">
              <Icon name="history" size={18} className="text-zinc-600" />
              <span>Seluruh Catatan Audit Sistem ({fullLogs.length})</span>
            </h4>
            <div className="overflow-x-auto">
              <table className="w-full text-xs text-left">
                <thead className="bg-zinc-50 border-b border-zinc-200 text-zinc-550 font-bold">
                  <tr>
                    <th className="p-3">Waktu</th>
                    <th className="p-3">Pengguna (Role)</th>
                    <th className="p-3">Aktivitas</th>
                    <th className="p-3">Detail</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-zinc-100">
                  {fullLogs.length === 0 ? (
                    <tr><td colSpan="4" className="p-6 text-center text-zinc-400">Tidak ada log aktivitas</td></tr>
                  ) : (
                    fullLogs.map(log => (
                      <tr key={log.id} className="hover:bg-zinc-50/50">
                        <td className="p-3 text-zinc-450 font-mono" style={{ whiteSpace: 'nowrap' }}>{new Date(log.timestamp).toLocaleString('id-ID')}</td>
                        <td className="p-3">
                          <div className="font-bold text-zinc-700">{log.user}</div>
                          <div className="text-[10px] text-zinc-400 font-medium">{log.role}</div>
                        </td>
                        <td className="p-3">
                          <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${
                            log.action === 'Penjualan' ? 'bg-emerald-50 text-emerald-700' :
                            log.action === 'Diskon Manual' ? 'bg-amber-50 text-amber-700' :
                            log.action === 'Tambah Produk' ? 'bg-sky-50 text-sky-700' :
                            log.action === 'Ubah Produk' ? 'bg-indigo-50 text-indigo-700' :
                            log.action === 'Hapus Produk' ? 'bg-rose-50 text-rose-700' : 'bg-zinc-100 text-zinc-600'
                          }`}>{log.action}</span>
                        </td>
                        <td className="p-3 text-zinc-600 font-medium leading-relaxed">{log.details}</td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      return (
        <div className="pb-16 md:pb-8 text-left">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
              <h3 className="text-xl font-bold text-zinc-800">Dashboard Owner</h3>
              <p className="text-sm text-zinc-500">Analisis bisnis, inventaris, dan kinerja karyawan berjalan</p>
            </div>
            {dashboardTab === 'overview' && (
              <div className="flex gap-2 w-full sm:w-auto">
                <select value={filter} onChange={e => setFilter(e.target.value)} className="px-4 py-2.5 bg-white border border-zinc-200 rounded-xl font-semibold outline-none text-zinc-700 shadow-sm flex-1 sm:flex-none">
                  <option value="today">Hari Ini</option>
                  <option value="7days">7 Hari Terakhir</option>
                  <option value="month">Bulan Ini</option>
                </select>
              </div>
            )}
          </div>

          {/* Tab selector */}
          <div className="flex border-b border-zinc-200 mb-6 gap-6 text-sm font-semibold overflow-x-auto custom-scroll whitespace-nowrap">
            <button onClick={() => setDashboardTab('overview')} className={`pb-3 transition ${dashboardTab === 'overview' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400 hover:text-zinc-700'}`}>
              Ringkasan & Analitik
            </button>
            <button onClick={() => setDashboardTab('staff')} className={`pb-3 transition ${dashboardTab === 'staff' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400 hover:text-zinc-700'}`}>
              Pelacakan Karyawan (Real-time)
            </button>
            <button onClick={() => setDashboardTab('finance')} className={`pb-3 transition ${dashboardTab === 'finance' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400 hover:text-zinc-700'}`}>
              Manajemen Keuangan & HPP
            </button>
