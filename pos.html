        </div>
      );
    }

    // ==================== PURCHASES PAGE (PENGADAAN) ====================
    function PurchasesPage() {
      const app = useContext(AppContext);
      const db = getDB();
      const [showForm, setShowForm] = useState(false);
      const [showApproveModal, setShowApproveModal] = useState(null);
      const [showRejectModal, setShowRejectModal] = useState(null);
      
      const [productName, setProductName] = useState('');
      const [supplierName, setSupplierName] = useState('');
      const [qty, setQty] = useState('');
      const [cost, setCost] = useState('');
      const [type, setType] = useState('buy');
      const [notes, setNotes] = useState('');
      const [selectedProductId, setSelectedProductId] = useState('');

      const [appQty, setAppQty] = useState('');
      const [appCost, setAppCost] = useState('');
      const [appNotes, setAppNotes] = useState('');
      const [rejNotes, setRejNotes] = useState('');
      const [appActionType, setAppActionType] = useState('buy');

      const list = useMemo(() => {
        return (db.purchases || []).sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [db.purchases, app.dbVersion]);

      const handleCreate = (e) => {
        e.preventDefault();
        const currentDb = getDB();
        currentDb.purchases = currentDb.purchases || [];
        
        let pName = productName;
        if (selectedProductId) {
          const match = currentDb.products.find(p => p.id === selectedProductId);
          if (match) pName = match.name;
        }

        const newProposal = {
          id: 'PRC' + Date.now(),
          proposedBy: app.user.name,
          proposedById: app.user.id,
          proposedByRole: app.user.role,
          date: new Date().toISOString(),
          productName: pName,
          productId: selectedProductId || null,
          supplierName,
          qty: parseFloat(qty),
          cost: parseFloat(cost),
          total: parseFloat(qty) * parseFloat(cost),
          type,
          status: 'pending',
          notes,
          approvedQty: parseFloat(qty),
          ownerNotes: ''
        };

        currentDb.purchases.push(newProposal);
        logAuditAction('Ajukan Pengadaan', `Mengajukan pengadaan "${pName}" (${qty} pcs) ke Pemilik.`, app.user);
        saveDB(currentDb);
        app.refreshDB();
        
        setProductName('');
        setSupplierName('');
        setQty('');
        setCost('');
        setType('buy');
        setNotes('');
        setSelectedProductId('');
        setShowForm(false);
        app.addToast('Pengajuan pengadaan berhasil dikirim', 'success');
      };

      const handleApprove = (e) => {
        e.preventDefault();
        const currentDb = getDB();
        const idx = currentDb.purchases.findIndex(p => p.id === showApproveModal.id);
        if (idx !== -1) {
          const p = currentDb.purchases[idx];
          const finalQty = parseFloat(appQty);
          const finalCost = parseFloat(appCost);
          const finalTotal = finalQty * finalCost;

          p.type = appActionType; // Owner overrides type
          if (appActionType === 'void') {
            p.status = 'void';
          } else {
            p.status = 'approved';
          }
          p.approvedQty = finalQty;
          p.cost = finalCost;
          p.total = finalTotal;
          p.ownerNotes = appNotes;
          p.feedbackSeen = false; // Flag for proposer notification
          p.updatedAt = new Date().toISOString();

          let matchedProduct = null;
          if (p.productId) {
            matchedProduct = currentDb.products.find(x => x.id === p.productId);
          } else {
            matchedProduct = currentDb.products.find(x => x.name.toLowerCase() === p.productName.toLowerCase());
          }

          if (p.status === 'approved') {
            if (p.type === 'buy') {
              if (matchedProduct) {
                matchedProduct.stock = parseFloat((matchedProduct.stock + finalQty).toFixed(3));
                matchedProduct.cost = finalCost;
                matchedProduct.updatedAt = new Date().toISOString();
              } else {
                currentDb.products.push({
                  id: 'p' + Date.now(),
                  sku: 'SKU' + Date.now().toString().slice(-6),
                  name: p.productName,
                  category: 'Lainnya',
                  price: finalCost * 1.5,
                  cost: finalCost,
                  stock: finalQty,
                  active: true,
                  minStock: 5,
                  createdAt: new Date().toISOString(),
                  updatedAt: new Date().toISOString(),
                  createdBy: app.user?.name,
                  createdById: app.user?.id
                });
              }
            } else if (['refund', 'take'].includes(p.type)) {
              if (matchedProduct) {
                matchedProduct.stock = Math.max(0, parseFloat((matchedProduct.stock - finalQty).toFixed(3)));
                matchedProduct.updatedAt = new Date().toISOString();
              }
            }
          }

          logAuditAction('Persetujuan Pengadaan', `Owner menyetujui pengadaan "${p.productName}" dengan tindakan "${appActionType}" (${finalQty} pcs, Total Rp ${finalTotal.toLocaleString('id-ID')}).`, app.user);
          saveDB(currentDb);
          app.refreshDB();
        }
        setShowApproveModal(null);
        app.addToast('Pengadaan berhasil diproses oleh Owner', 'success');
      };

      const handleReject = (e) => {
        e.preventDefault();
        const currentDb = getDB();
        const idx = currentDb.purchases.findIndex(p => p.id === showRejectModal.id);
        if (idx !== -1) {
          const p = currentDb.purchases[idx];
          p.status = 'rejected';
          p.ownerNotes = rejNotes;
          p.feedbackSeen = false; // Flag for proposer notification
          p.updatedAt = new Date().toISOString();

          logAuditAction('Tolak Pengadaan', `Menolak pengadaan "${p.productName}" dengan alasan: ${rejNotes}`, app.user);
          saveDB(currentDb);
          app.refreshDB();
        }
        setShowRejectModal(null);
        setRejNotes('');
        app.addToast('Pengadaan ditolak oleh Owner', 'info');
      };

      const handleVoid = (id) => {
        if (!confirm('Apakah Anda yakin ingin membatalkan pengajuan ini?')) return;
        const currentDb = getDB();
        const idx = currentDb.purchases.findIndex(p => p.id === id);
        if (idx !== -1) {
          const p = currentDb.purchases[idx];
          p.status = 'void';
          p.updatedAt = new Date().toISOString();

          logAuditAction('Void Pengadaan', `Membatalkan (void) pengadaan "${p.productName}"`, app.user);
          saveDB(currentDb);
          app.refreshDB();
          app.addToast('Pengadaan di-void', 'warning');
        }
      };

      return (
        <div className="pb-24 md:pb-8 text-left">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
              <h3 className="text-xl font-bold text-zinc-800">Manajemen Pengadaan & Ritel</h3>
              <p className="text-sm text-zinc-500">Ajukan pembelian produk, retur barang, atau kelola inventaris ritel.</p>
            </div>
            {['admin', 'owner', 'keuangan'].includes(app.user?.role) && (
              <button
                onClick={() => {
                  setProductName('');
                  setSupplierName('');
                  setQty('');
                  setCost('');
                  setType('buy');
                  setNotes('');
                  setSelectedProductId('');
                  setShowForm(true);
                }}
                className="px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 text-white rounded-xl text-sm font-semibold flex items-center justify-center gap-2 shadow-md transition cursor-pointer"
              >
                <Icon name="plus" size={18} /> Ajukan Pengadaan
              </button>
            )}
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left">
                <thead className="bg-zinc-50 border-b border-zinc-200">
                  <tr>
                    <th className="px-5 py-3.5 text-xs font-bold text-zinc-500 uppercase tracking-wider">Proposal / Tanggal</th>
                    <th className="px-5 py-3.5 text-xs font-bold text-zinc-500 uppercase tracking-wider">Pengaju</th>
                    <th className="px-5 py-3.5 text-xs font-bold text-zinc-500 uppercase tracking-wider">Produk & Supplier</th>
                    <th className="px-5 py-3.5 text-xs font-bold text-zinc-500 uppercase tracking-wider">Jenis</th>
                    <th className="px-5 py-3.5 text-xs font-bold text-zinc-500 uppercase tracking-wider">Estimasi Harga & Jumlah</th>
                    <th className="px-5 py-3.5 text-xs font-bold text-zinc-500 uppercase tracking-wider text-center">Status</th>
                    <th className="px-5 py-3.5 text-xs font-bold text-zinc-500 uppercase tracking-wider text-right pr-8">Aksi</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-zinc-100 text-sm">
                  {list.map(p => {
                    const dateStr = new Date(p.date).toLocaleString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                    return (
                      <tr key={p.id} className="hover:bg-zinc-50/50">
                        <td className="px-5 py-4 font-mono text-xs">
                          <div className="font-bold text-sky-650">{p.id}</div>
                          <div className="text-[10px] text-zinc-450 mt-0.5">{dateStr}</div>
                        </td>
                        <td className="px-5 py-4">
                          <div className="font-bold text-zinc-700">{p.proposedBy}</div>
                          <div className="text-[10px] text-zinc-400 capitalize">{p.proposedByRole === 'keuangan' ? 'Keuangan' : p.proposedByRole}</div>
                        </td>
                        <td className="px-5 py-4">
                          <div className="font-bold text-zinc-800">{p.productName}</div>
                          <div className="text-xs text-zinc-450">Supplier: {p.supplierName || '-'}</div>
                          {p.notes && <div className="text-[10px] text-zinc-500 italic mt-1 font-mono">Ket: {p.notes}</div>}
                        </td>
                        <td className="px-5 py-4">
                          <span className={`inline-flex px-2 py-0.5 rounded-lg text-xs font-bold ${
                            p.type === 'buy' ? 'bg-sky-50 text-sky-700' :
                            p.type === 'refund' ? 'bg-amber-50 text-amber-700' :
                            p.type === 'take' ? 'bg-violet-50 text-violet-700' : 'bg-rose-50 text-rose-700'
                          }`}>
                            {p.type === 'buy' ? 'Beli Baru / Restock' :
                             p.type === 'refund' ? 'Retur Pemasok' :
                             p.type === 'take' ? 'Ambil Stok' : 'Void Barang'}
                          </span>
                        </td>
                        <td className="px-5 py-4">
                          <div className="font-bold text-zinc-800">Rp {p.total?.toLocaleString('id-ID')}</div>
                          <div className="text-xs text-zinc-450">{p.approvedQty || p.qty} pcs @ Rp {p.cost?.toLocaleString('id-ID')}</div>
                        </td>
                        <td className="px-5 py-4 text-center">
                          <span className={`inline-flex px-2.5 py-1 rounded-full text-xs font-bold ${
                            p.status === 'approved' ? 'bg-emerald-50 text-emerald-700' :
                            p.status === 'rejected' ? 'bg-rose-50 text-rose-700' :
                            p.status === 'void' ? 'bg-zinc-100 text-zinc-500' : 'bg-amber-50 text-amber-700 animate-pulse'
                          }`}>
                            {p.status === 'approved' ? 'Disetujui' :
                             p.status === 'rejected' ? 'Ditolak' :
                             p.status === 'void' ? 'Dibatalkan' : 'Menunggu'}
                          </span>
                          {p.ownerNotes && <div className="text-[10px] text-zinc-400 mt-1">Catatan: {p.ownerNotes}</div>}
                        </td>
                        <td className="px-5 py-4 text-right pr-6">
                          <div className="flex justify-end gap-1.5">
                            {p.status === 'pending' && app.user?.role === 'owner' && (
                              <>
                                <button
                                  onClick={() => {
                                    setAppQty(String(p.qty));
                                    setAppCost(String(p.cost));
                                    setAppNotes('');
                                    setAppActionType(p.type || 'buy');
                                    setShowApproveModal(p);
                                  }}
                                  className="px-2.5 py-1.5 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded-lg text-xs font-bold transition flex items-center gap-1"
                                >
                                  <Icon name="check" size={13} /> Setujui
                                </button>
                                <button
                                  onClick={() => {
                                    setRejNotes('');
                                    setShowRejectModal(p);
                                  }}
                                  className="px-2.5 py-1.5 bg-rose-50 text-rose-700 hover:bg-rose-100 rounded-lg text-xs font-bold transition flex items-center gap-1"
                                >
                                  <Icon name="x" size={13} /> Tolak
                                </button>
                              </>
                            )}
                            {p.status === 'pending' && (app.user?.id === p.proposedById || app.user?.role === 'owner') && (
                              <button
                                onClick={() => handleVoid(p.id)}
                                className="p-2 text-zinc-500 hover:bg-zinc-100 rounded-lg transition"
                                title="Batalkan Pengajuan"
                              >
                                <Icon name="slash" size={14} />
                              </button>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                  {list.length === 0 && (
                    <tr>
                      <td colSpan="7" className="text-center py-16 text-zinc-400 font-medium">
                        <Icon name="shopping-bag" size={40} className="mx-auto mb-3 text-zinc-300" />
                        <p>Belum ada pengajuan pengadaan barang</p>
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {showForm && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4 animate-[fadeIn_0.2s]">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s]">
                <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
                  <h3 className="font-bold text-zinc-855 text-lg flex items-center gap-2">
                    <Icon name="shopping-bag" className="text-sky-600" />
                    <span>Buat Pengajuan Pengadaan</span>
                  </h3>
                  <button onClick={() => setShowForm(false)} className="p-2 bg-zinc-100 text-zinc-500 hover:bg-zinc-200 rounded-full transition"><Icon name="x" size={16} /></button>
                </div>
                <form onSubmit={handleCreate} className="p-6 space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Tipe Pengadaan</label>
                    <select value={type} onChange={e => {
                      setType(e.target.value);
                      setSelectedProductId('');
                      setProductName('');
                      setCost('');
                    }} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-semibold focus:border-sky-500">
                      <option value="buy">Pembelian Baru / Restock (Buy)</option>
                      <option value="refund">Retur ke Supplier (Refund)</option>
                      <option value="take">Ambil Stok (Ambil Berapa)</option>
                      <option value="void">Void / Pembatalan Barang (Void)</option>
                    </select>
                  </div>

                  {type !== 'buy' ? (
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Pilih Produk Dari Katalog</label>
                      <select
                        value={selectedProductId}
                        onChange={e => {
                          setSelectedProductId(e.target.value);
                          const prod = db.products.find(x => x.id === e.target.value);
                          if (prod) {
                            setProductName(prod.name);
                            setCost(String(prod.cost || 0));
                          } else {
                            setProductName('');
                            setCost('');
                          }
                        }}
                        className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-medium focus:border-sky-500"
                        required
                      >
                        <option value="">-- Pilih Produk --</option>
                        {db.products.filter(p => p.active !== false).map(p => (
                          <option key={p.id} value={p.id}>{p.name} (Stok: {p.stock} | HPP: Rp {p.cost})</option>
                        ))}
                      </select>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Sumber Produk</label>
                        <select
                          onChange={e => {
                            const val = e.target.value;
                            if (val === 'new') {
                              setSelectedProductId('');
                              setProductName('');
                              setCost('');
                            } else {
                              setSelectedProductId(val);
                              const prod = db.products.find(x => x.id === val);
                              if (prod) {
                                setProductName(prod.name);
                                setCost(String(prod.cost || 0));
                              }
                            }
                          }}
                          className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-semibold focus:border-sky-500"
                        >
                          <option value="new">-- Produk Baru (Ketik Nama Manual) --</option>
                          {db.products.filter(p => p.active !== false).map(p => (
                            <option key={p.id} value={p.id}>Restock: {p.name} (Stok: {p.stock} | HPP: Rp {p.cost})</option>
                          ))}
                        </select>
                      </div>

                      {!selectedProductId && (
                        <div>
                          <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Nama Produk Baru</label>
                          <input type="text" value={productName} onChange={e => setProductName(e.target.value)} required className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-medium focus:border-sky-500" placeholder="Ketik nama produk baru..." />
                        </div>
                      )}
                    </div>
                  )}

                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Supplier / Pemasok</label>
                    <input type="text" value={supplierName} onChange={e => setSupplierName(e.target.value)} required className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-medium focus:border-sky-500" placeholder="Nama supplier/pemasok..." />
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Jumlah (Qty)</label>
                      <input type="number" value={qty} onChange={e => setQty(e.target.value)} required min="1" step="any" className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-medium focus:border-sky-500" placeholder="0" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Harga per Unit (Rp)</label>
                      <input type="number" value={cost} onChange={e => setCost(e.target.value)} required min="0" className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-medium focus:border-sky-500" placeholder="HPP unit..." />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Catatan / Keterangan</label>
                    <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={3} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-medium focus:border-sky-500" placeholder="Alasan pengadaan atau detail khusus..."></textarea>
                  </div>

                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={() => setShowForm(false)} className="flex-1 py-3 bg-zinc-100 text-zinc-700 rounded-xl text-sm font-semibold hover:bg-zinc-200 transition">Batal</button>
                    <button type="submit" className="flex-1 py-3 bg-sky-600 text-white rounded-xl text-sm font-semibold hover:bg-sky-700 transition shadow-md flex items-center justify-center gap-1.5"><Icon name="send" size={16} />Kirim Pengajuan</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {showApproveModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4 animate-[fadeIn_0.2s]">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-[scaleIn_0.2s]">
                <div className="p-5 border-b border-emerald-100 bg-emerald-50/50 flex justify-between items-center">
                  <h3 className="font-bold text-emerald-900 text-base flex items-center gap-2">
                    <Icon name="check-circle-2" />
                    <span>Persetujuan Pengadaan</span>
                  </h3>
                  <button onClick={() => setShowApproveModal(null)} className="p-1.5 text-zinc-400 hover:bg-zinc-100 rounded-full transition"><Icon name="x" size={16} /></button>
                </div>
                <form onSubmit={handleApprove} className="p-5 space-y-4 text-left">
                  <div className="bg-zinc-50 rounded-2xl p-4 border border-zinc-100 text-xs text-zinc-650 space-y-1">
                    <p><span className="font-bold">Barang:</span> {showApproveModal.productName}</p>
                    <p><span className="font-bold">Supplier:</span> {showApproveModal.supplierName}</p>
                    <p><span className="font-bold">Pengaju:</span> {showApproveModal.proposedBy} ({showApproveModal.proposedByRole === 'keuangan' ? 'Keuangan' : showApproveModal.proposedByRole})</p>
                    <p><span className="font-bold">Diajukan:</span> {showApproveModal.qty} pcs @ Rp {showApproveModal.cost?.toLocaleString('id-ID')} (Total: Rp {showApproveModal.total?.toLocaleString('id-ID')})</p>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">Opsi Tindakan Pemilik</label>
                    <select value={appActionType} onChange={e => setAppActionType(e.target.value)} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-semibold focus:border-sky-500">
                      <option value="buy">Pembelian Baru / Restock (Buy)</option>
                      <option value="refund">Return ke Supplier (Refund)</option>
                      <option value="take">Ambil Stok (Ambil Berapa)</option>
                      <option value="void">Void / Pembatalan Barang</option>
                    </select>
                  </div>

                  {appActionType !== 'void' && (
                    <>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">Setujui Kuantitas (Ambil Berapa)</label>
                        <input type="number" value={appQty} onChange={e => setAppQty(e.target.value)} required min="1" step="any" className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-semibold focus:border-sky-500" />
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">Setujui Harga per Unit (Rp)</label>
                        <input type="number" value={appCost} onChange={e => setAppCost(e.target.value)} required min="0" className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-semibold focus:border-sky-500" />
                      </div>
                    </>
                  )}

                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">Catatan Pemilik</label>
                    <textarea value={appNotes} onChange={e => setAppNotes(e.target.value)} rows={2} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-850 text-sm font-medium focus:border-sky-500" placeholder="Catatan persetujuan..."></textarea>
                  </div>

                  <div className="flex gap-2.5 pt-1">
                    <button type="button" onClick={() => setShowApproveModal(null)} className="flex-1 py-2.5 bg-zinc-100 text-zinc-700 rounded-xl text-xs font-bold hover:bg-zinc-200 transition">Batal</button>
                    <button type="submit" className="flex-1 py-2.5 bg-emerald-600 text-white rounded-xl text-xs font-bold hover:bg-emerald-700 transition shadow-md">
                      Konfirmasi & Laporan
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {showRejectModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4 animate-[fadeIn_0.2s]">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-[scaleIn_0.2s]">
                <div className="p-5 border-b border-rose-100 bg-rose-50/50 flex justify-between items-center">
                  <h3 className="font-bold text-rose-900 text-base flex items-center gap-2">
                    <Icon name="x-circle" />
                    <span>Tolak Pengadaan</span>
                  </h3>
                  <button onClick={() => setShowRejectModal(null)} className="p-1.5 text-zinc-400 hover:bg-zinc-100 rounded-full transition"><Icon name="x" size={16} /></button>
                </div>
                <form onSubmit={handleReject} className="p-5 space-y-4 text-left">
                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">Alasan Penolakan</label>
                    <textarea value={rejNotes} onChange={e => setRejNotes(e.target.value)} required rows={3} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-zinc-800 text-sm font-medium focus:border-sky-500" placeholder="Alasan mengapa pengadaan ini ditolak..."></textarea>
                  </div>

                  <div className="flex gap-2.5 pt-1">
                    <button type="button" onClick={() => setShowRejectModal(null)} className="flex-1 py-2.5 bg-zinc-100 text-zinc-700 rounded-xl text-xs font-bold hover:bg-zinc-200 transition">Batal</button>
                    <button type="submit" className="flex-1 py-2.5 bg-rose-600 text-white rounded-xl text-xs font-bold hover:bg-rose-700 transition shadow-md">
                      Tolak Pengajuan
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ScannerModal({ user, onClose, appState }) {
      // Keamanan: Cegah non-owner mengubah foto profil owner
      if (user?.role === 'owner' && appState.user?.role !== 'owner') {
        useEffect(() => {
          appState.addToast('Akses Ditolak: Anda tidak memiliki akses untuk menambah foto Pemilik!', 'error');
          onClose();
        }, []);
        return null;
      }

      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [cameraError, setCameraError] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        let activeStream = null;
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(s => {
            activeStream = s;
            setStream(s);
            if (videoRef.current) {
              videoRef.current.srcObject = s;
              videoRef.current.setAttribute("playsinline", true);
              videoRef.current.play();
            }
          })
          .catch(err => {
            console.error("Gagal kamera:", err);
            setCameraError("Tidak dapat mengakses kamera. Pastikan izin kamera aktif.");
          });

        return () => {
          if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
          }
        };
      }, []);

      const handleCapture = () => {
        if (canvasRef.current && videoRef.current) {
          setLoading(true);
          const video = videoRef.current;
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          
          const photo = canvas.toDataURL('image/png');
          appState.saveScanData(photo, 'photo');
          appState.addToast(`Foto ${user.name} berhasil disimpan`, 'success');
          setLoading(false);
          onClose();
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxDim = 300;
            let w = img.width;
            let h = img.height;
            if (w > h) {
              if (w > maxDim) { h *= maxDim / w; w = maxDim; }
            } else {
              if (h > maxDim) { w *= maxDim / h; h = maxDim; }
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            
            const photo = canvas.toDataURL('image/jpeg', 0.85);
            appState.saveScanData(photo, 'photo');
            appState.addToast(`Foto ${user.name} berhasil disimpan`, 'success');
            onClose();
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s_ease-out] border border-zinc-200">
            <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <div>
                <h3 className="text-lg font-bold text-zinc-800 text-left">Ambil Foto Pengguna</h3>
                <p className="text-xs text-zinc-500 mt-1 text-left">{user.name} ({user.role.toUpperCase()})</p>
              </div>
              <button onClick={onClose} type="button" className="p-2 bg-zinc-100 rounded-full text-zinc-500 hover:bg-zinc-200 transition"><Icon name="x" size={16} /></button>
            </div>
            <div className="p-6 flex flex-col items-center">

    function POSScannerModal({ onClose, onScanSuccess, onPhotoCapture, appState }) {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [cameraError, setCameraError] = useState('');
      const animationRef = useRef(null);

      useEffect(() => {
        let activeStream = null;
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(s => {
            activeStream = s;
            setStream(s);
            if (videoRef.current) {
              videoRef.current.srcObject = s;
              videoRef.current.setAttribute("playsinline", true);
              videoRef.current.play();
            }
          })
          .catch(err => {
            console.error("Gagal kamera:", err);
            setCameraError("Tidak dapat mengakses kamera. Pastikan izin kamera aktif.");
          });

        return () => {
          if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
          }
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
          }
        };
      }, []);

      const tick = () => {
        if (videoRef.current && videoRef.current.readyState === videoRef.current.HAVE_ENOUGH_DATA) {
          const video = videoRef.current;
          const canvas = canvasRef.current;
          if (canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = 300;
            canvas.height = 300;
            const size = Math.min(video.videoWidth, video.videoHeight);
            const sx = (video.videoWidth - size) / 2;
            const sy = (video.videoHeight - size) / 2;
            ctx.drawImage(video, sx, sy, size, size, 0, 0, canvas.width, canvas.height);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            try {
              const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
              });
              if (code && code.data) {
                onScanSuccess(code.data);
                return;
              }
            } catch(e) {
              console.error("jsQR error:", e);
            }
          }
        }
        animationRef.current = requestAnimationFrame(tick);
      };

      useEffect(() => {
        if (stream) {
          animationRef.current = requestAnimationFrame(tick);
        }
      }, [stream]);

      const handleCapture = () => {
        if (canvasRef.current) {
          const photo = canvasRef.current.toDataURL('image/png');
          onPhotoCapture(photo);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let qrCodeDecoded = null;
            try {
              const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
              });
              if (code && code.data) {
                qrCodeDecoded = code.data;
              }
            } catch (err) {
              console.error("jsQR error:", err);
            }
            
            if (qrCodeDecoded) {
              onScanSuccess(qrCodeDecoded);
            } else {
              const maxDim = 600;
              let w = img.width;
              let h = img.height;
              if (w > h) {
                if (w > maxDim) { h *= maxDim / w; w = maxDim; }
              } else {
                if (h > maxDim) { w *= maxDim / h; h = maxDim; }
              }
              const outputCanvas = document.createElement('canvas');
              outputCanvas.width = w;
              outputCanvas.height = h;
              const outputCtx = outputCanvas.getContext('2d');
              outputCtx.drawImage(img, 0, 0, w, h);
              
              const photo = outputCanvas.toDataURL('image/jpeg', 0.85);
              onPhotoCapture(photo);
            }
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-zinc-900/60 backdrop-blur-sm p-4">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s_ease-out] border border-zinc-200">
            <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <div>
                <h3 className="text-lg font-bold text-zinc-800 text-left">Pindai QR / Barcode / Foto</h3>
                <p className="text-xs text-zinc-500 text-left mt-1">Arahkan kamera ke kode QR/barcode atau klik Ambil Foto</p>
              </div>
              <button onClick={onClose} className="p-2 bg-zinc-100 rounded-full hover:bg-zinc-200"><Icon name="x" size={16} /></button>
            </div>
            
            <div className="p-6 flex flex-col items-center">
              {cameraError ? (
                <div className="w-full h-64 bg-zinc-50 rounded-2xl flex flex-col items-center justify-center text-zinc-400 border-2 border-dashed border-zinc-200 p-4 mb-4">
                  <Icon name="camera-off" size={48} className="mb-2 text-zinc-300" />
                  <p className="text-xs font-semibold text-center text-zinc-500 leading-normal">{cameraError}</p>
                </div>
              ) : (
                <div className="w-full aspect-square bg-zinc-950 rounded-2xl relative overflow-hidden border-4 border-sky-500 shadow-inner flex items-center justify-center mb-4">
                  <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover" />
                  <canvas ref={canvasRef} className="hidden" />
                  <div className="absolute inset-0 border-[32px] border-black/45 pointer-events-none">
                    <div className="w-full h-full border border-sky-400/80 relative">
                      <div className="absolute inset-x-0 top-1/2 h-0.5 bg-red-500/80 animate-pulse"></div>
                    </div>
                  </div>
                </div>
              )}
              
              <div className="w-full flex flex-col gap-3">
                <div className="flex gap-3">
                  {!cameraError && (
                    <button 
                      onClick={handleCapture}
                      className="flex-1 py-3 bg-sky-600 hover:bg-sky-700 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10"
                    >
                      <Icon name="camera" size={18} /> Ambil Foto
                    </button>
                  )}
                  <button 
                    onClick={onClose} 
                    className="flex-1 py-3 bg-zinc-150 hover:bg-zinc-200 text-zinc-700 rounded-xl font-bold"
                  >
                    Batal
                  </button>
                </div>

                <label className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/10 cursor-pointer transition active:scale-[0.98]">
                  <Icon name="upload" size={18} />
                  <span>Unggah File Gambar / Bukti Scan</span>
                  <input type="file" accept="image/*" onChange={handleFileUpload} className="hidden" />
                </label>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function UserForm({ user, onSave, onCancel }) {

      const [email, setEmail] = useState(user?.email || '');
      const [password, setPassword] = useState('');

      const [role, setRole] = useState(() => {
        if (!user?.role) return 'cashier';
        return standardRoles.includes(user.role) ? user.role : 'custom';
      });
      const [customRole, setCustomRole] = useState(() => {
        if (!user?.role) return '';
        return standardRoles.includes(user.role) ? '' : user.role;
      });

        e.preventDefault();
        const selectedRole = role === 'custom' ? customRole.trim().toLowerCase() : role;
        if (!selectedRole) {
          alert('Role wajib diisi');
          return;
        }
        const cleanRole = selectedRole.toLowerCase().replace(/[^a-z]/g, '');
        if ((cleanRole === 'owner' || cleanRole === 'pemilik' || cleanRole.includes('owner') || cleanRole.includes('pemilik')) && app.user?.role !== 'owner') {
          alert('Akses Ditolak: Anda tidak diizinkan membuat atau menetapkan role Pemilik/Owner!');

        setLoading(false);
        setInputCode('');

      // Prefill procurement checks from session

        const pre = sessionStorage.getItem('prefill_procurement');
        if (pre) {
          sessionStorage.removeItem('prefill_procurement');
          // Prefill handled inside PurchasesPage, but we notify user they can access PurchasesPage
        }
      }, []);

      const proposerFeedbacks = useMemo(() => {
        return (db.purchases || []).filter(p => p.proposedById === app.user?.id && p.status !== 'pending' && p.feedbackSeen !== true);
      }, [db.purchases, app.user?.id, app.dbVersion]);

        const currentDb = getDB();

        if (found) {
          found.feedbackSeen = true;
          saveDB(currentDb);
          app.refreshDB();
          app.addToast('Laporan ditandai dibaca', 'success');

      const renderFeedbackNotifications = () => {
        if (proposerFeedbacks.length === 0) return null;
        return (

              <div key={fb.id} className="bg-sky-50 border border-sky-200 rounded-2xl p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 animate-[fadeIn_0.3s]">

                  </div>
                  <div className="text-left">
                    <h4 className="font-bold text-sky-900 text-sm">Laporan Pengajuan Pengadaan</h4>
                    <p className="text-xs text-sky-700 mt-0.5">
                      Proposal <span className="font-mono font-semibold">{fb.id}</span> untuk <strong>{fb.productName}</strong> diproses oleh Owner:

        const bonus = parseFloat(payBonus) || 0;
        
        const overtimePay = oth * otr;
        const bpjsKes = base * 0.01;
        const bpjsKet = base * 0.02;
        const deductions = bpjsKes + bpjsKet;
        const netSalary = base + overtimePay + bonus - deductions;

        const emp = db.users.find(u => u.id === payEmployee);
        
        setSlipResult({
          employeeName: emp ? emp.name : 'Staf',
          employeeRole: emp ? emp.roleLabel || emp.role : 'Kasir',
          month: payMonth,
          base,
          overtimePay,
          bonus,
          deductions,
          bpjsKes,
          bpjsKet,
          total: netSalary
        });

        const task = currentDb.officeTasks.find(t => t.id === id);
        if (task) {
          task.status = task.status === 'Selesai' ? 'Belum Selesai' : 'Selesai';
          logAuditAction('Update Tugas Staf', `Staf mengubah status tugas "${task.title}" menjadi ${task.status}`, app.user);
          saveDB(currentDb);
          app.refreshDB();
          app.addToast('Status tugas diperbarui', 'success');
        }
      };

                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Stok Awal</label>
                        <input type="number" value={supplyStock} onChange={e => setSupplyStock(e.target.value)} required min="0" className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-sm" placeholder="0" />

                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Satuan</label>
                        <input type="text" value={supplyUnit} onChange={e => setSupplyUnit(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-sm" placeholder="Roll, Pcs, Box..." />
                      </div>
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-zinc-900 text-white rounded-xl font-bold text-xs hover:bg-zinc-800 transition">Simpan Barang</button>
                  </form>
                </div>

                  <div className="overflow-x-auto">

                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">

                          <th className="p-3 text-center">Stok</th>
                          <th className="p-3 text-center">Status</th>
                          <th className="p-3 text-center">Update Stok</th>
                          <th className="p-3 text-right">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">

                          <tr key={item.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-bold text-zinc-700">{item.name}</td>
                            <td className="p-3 text-center font-mono">{item.stock} {item.unit}</td>
                            <td className="p-3 text-center">
                              <span className={`px-2 py-0.5 rounded font-bold ${
                                item.status === 'Cukup' ? 'bg-emerald-50 text-emerald-700' :
                                item.status === 'Menipis' ? 'bg-amber-50 text-amber-700' : 'bg-rose-50 text-rose-700'
                              }`}>{item.status}</span>
                            </td>
                            <td className="p-3 text-center">
                              <div className="inline-flex gap-1">
                                <button onClick={() => handleUpdateSupply(item.id, -1)} className="p-1 bg-zinc-100 hover:bg-zinc-200 rounded text-zinc-650 font-bold">-1</button>
                                <button onClick={() => handleUpdateSupply(item.id, 1)} className="p-1 bg-zinc-100 hover:bg-zinc-200 rounded text-zinc-650 font-bold">+1</button>
                              </div>
                            </td>
                            <td className="p-3 text-right space-x-1">
                              {item.status !== 'Cukup' && (
                                <button onClick={() => handleQuickProcureSupply(item)} className="px-2 py-1 bg-sky-50 text-sky-700 font-bold rounded hover:bg-sky-100" title="Ajukan Pengadaan">Ajukan</button>
                              )}

                            </td>
                          </tr>
                        ))}
                        {(db.officeSupplies || []).length === 0 && (
                          <tr><td colSpan="5" className="text-center p-8 text-zinc-400">Belum ada perlengkapan kantor tercatat.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: SCHEDULER */}
            {activeTab === 'scheduler' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Penjadwalan Shift Baru</h4>
                  <form onSubmit={handleAddSchedule} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Pilih Karyawan</label>
                      <select value={schEmployee} onChange={e => setSchEmployee(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-sm focus:bg-white">
                        <option value="">-- Pilih Staf --</option>
                        {staffList.map(s => (
                          <option key={s.id} value={s.id}>{s.name} ({s.roleLabel || s.role})</option>

                      </select>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Hari</label>

                          <option value="Selasa">Selasa</option>
                          <option value="Rabu">Rabu</option>
                          <option value="Kamis">Kamis</option>
                          <option value="Jumat">Jumat</option>
                          <option value="Sabtu">Sabtu</option>
                          <option value="Minggu">Minggu</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Shift</label>

                          <option value="Sore">Sore</option>
                          <option value="Malam">Malam</option>

                        </select>
                      </div>

                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Catatan Tambahan</label>

                </div>

                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                          <th className="p-3 text-left">Nama Staf</th>
                          <th className="p-3 text-left">Jabatan</th>
                          <th className="p-3 text-center">Hari</th>
                          <th className="p-3 text-center">Shift Kerja</th>
                          <th className="p-3 text-left">Catatan</th>
                          <th className="p-3 text-right">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">
                        {schedulesList.map(s => (
                          <tr key={s.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-bold text-zinc-700">{s.employeeName}</td>
                            <td className="p-3 text-zinc-500 capitalize">{s.employeeRole}</td>
                            <td className="p-3 text-center font-semibold text-sky-700">{s.day}</td>
                            <td className="p-3 text-center">
                              <span className={`px-2 py-0.5 rounded font-bold ${
                                s.shift === 'Pagi' ? 'bg-sky-50 text-sky-700' :
                                s.shift === 'Sore' ? 'bg-amber-50 text-amber-700' :
                                s.shift === 'Malam' ? 'bg-indigo-50 text-indigo-700' : 'bg-zinc-100 text-zinc-500'
                              }`}>{s.shift}</span>
                            </td>
                            <td className="p-3 text-zinc-500 italic truncate max-w-[150px]">{s.notes || '-'}</td>
                            <td className="p-3 text-right">
                              <button onClick={() => handleDeleteSchedule(s.id)} className="p-1 bg-rose-50 text-rose-600 rounded hover:bg-rose-100"><Icon name="trash-2" size={12} /></button>
                            </td>
                          </tr>
                        ))}
                        {schedulesList.length === 0 && (
                          <tr><td colSpan="6" className="text-center p-8 text-zinc-400">Belum ada penjadwalan shift staf.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: CHECKLIST */}
            {activeTab === 'checklist' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Tambah Pekerjaan Operasional</h4>
                  <form onSubmit={handleAddTask} className="flex gap-2">
                    <input type="text" value={taskText} onChange={e => setTaskText(e.target.value)} required className="flex-1 px-3 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-xs" placeholder="Bersihkan etalase, cek modal..." />
                    <button type="submit" className="px-4 bg-sky-600 hover:bg-sky-700 text-white rounded-xl font-bold text-xs transition flex items-center justify-center"><Icon name="plus" size={14} /></button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Checklist Harian Toko</h4>

                    {tasksList.map(task => (
                      <div key={task.id} className="flex items-center justify-between p-3 bg-zinc-50 hover:bg-zinc-100/50 rounded-xl border border-zinc-150 transition">
                        <div className="flex items-center gap-3">
                          <input type="checkbox" checked={task.completed} onChange={() => handleToggleTask(task.id)} className="w-4 h-4 text-sky-600 accent-sky-600 rounded cursor-pointer" />
                          <span className={`text-xs font-semibold ${task.completed ? 'line-through text-zinc-400' : 'text-zinc-700'}`}>{task.text}</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] text-zinc-400">Oleh: {task.createdBy}</span>
                          <button onClick={() => handleDeleteTask(task.id)} className="p-1 text-rose-50 hover:bg-rose-100 hover:text-rose-600 rounded transition"><Icon name="trash-2" size={12} /></button>
                        </div>
                      </div>
                    ))}
                    {tasksList.length === 0 && (
                      <p className="text-center py-8 text-zinc-400 text-xs">Belum ada tugas operasional.</p>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderKeuangan = () => {
        return (
          <div className="space-y-6 text-left">
            <div className="flex border-b border-zinc-200 gap-4 mb-4">
              <button onClick={() => setActiveTab('invoices')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'invoices' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Invoice Pemasok</button>
              <button onClick={() => setActiveTab('expenses')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'expenses' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Pengeluaran Manual</button>
              <button onClick={() => setActiveTab('posverify')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'posverify' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Verifikasi Pembayaran</button>
            </div>

            {/* TAB: INVOICES */}
            {activeTab === 'invoices' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">

                  <form onSubmit={handleAddInvoice} className="space-y-4">

                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nama Pemasok (Supplier)</label>
                      <input type="text" value={invSupplier} onChange={e => setInvSupplier(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-sm" placeholder="PT Sumber Rasa Abadi..." />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Total Tagihan (Rp)</label>
                        <input type="number" value={invAmount} onChange={e => setInvAmount(e.target.value)} required min="1" className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-sm" placeholder="0" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Jatuh Tempo</label>
                        <input type="date" value={invDueDate} onChange={e => setInvDueDate(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-sm" />
                      </div>
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-zinc-900 text-white rounded-xl font-bold text-xs hover:bg-zinc-800 transition">Catat Tagihan</button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Invoice Pemasok Terdaftar</h4>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                          <th className="p-3 text-left">No Invoice</th>
                          <th className="p-3 text-left">Pemasok</th>
                          <th className="p-3 text-right">Nominal</th>
                          <th className="p-3 text-center">Jatuh Tempo</th>
                          <th className="p-3 text-center">Status</th>
                          <th className="p-3 text-right">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">
                        {invoicesList.map(item => (
                          <tr key={item.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-mono font-bold text-sky-750">{item.invNo}</td>
                            <td className="p-3 font-bold text-zinc-700">{item.supplier}</td>
                            <td className="p-3 text-right font-bold text-zinc-800">Rp {item.amount.toLocaleString('id-ID')}</td>
                            <td className="p-3 text-center text-zinc-500">{item.dueDate}</td>
                            <td className="p-3 text-center">
                              <span className={`px-2 py-0.5 rounded font-bold ${
                                item.status === 'Lunas' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'
                              }`}>{item.status}</span>
                            </td>
                            <td className="p-3 text-right space-x-1">
                              {item.status !== 'Lunas' && (
                                <button onClick={() => handlePayInvoice(item.id)} className="px-2 py-1 bg-emerald-50 text-emerald-700 font-bold rounded hover:bg-emerald-100">Bayar</button>
                              )}
                              <button onClick={() => handleDeleteInvoice(item.id)} className="p-1 bg-rose-50 text-rose-600 rounded hover:bg-rose-100"><Icon name="trash-2" size={12} /></button>
                            </td>

                          <tr><td colSpan="6" className="text-center p-8 text-zinc-400">Belum ada invoice supplier tercatat.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

                            <td className="p-3 text-right font-bold text-zinc-800">Rp {item.amount.toLocaleString('id-ID')}</td>

                              <button onClick={() => deleteExpense(item.id)} className="p-1 bg-rose-50 text-rose-600 rounded hover:bg-rose-100"><Icon name="trash-2" size={12} /></button>

                        <th className="p-3 text-left">Metode</th>
                        <th className="p-3 text-left">Nama Pembeli</th>
                        <th className="p-3 text-right">Nominal</th>

                      {verificationsList.map(item => (
                        <tr key={item.id} className="hover:bg-zinc-50/50">
                          <td className="p-3 font-mono font-bold text-zinc-500">{item.txId || item.id}</td>
                          <td className="p-3"><span className="px-2 py-0.5 bg-sky-50 text-sky-700 font-bold rounded uppercase">{item.method}</span></td>
                          <td className="p-3 font-semibold text-zinc-700">{item.customer || 'Pelanggan Umum'}</td>
                          <td className="p-3 text-right font-bold text-zinc-800">Rp {item.amount.toLocaleString('id-ID')}</td>
                          <td className="p-3 text-center text-zinc-400">{new Date(item.date).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}</td>
                          <td className="p-3 text-center">
                            <span className={`px-2 py-0.5 rounded font-bold ${
                              item.status === 'Terverifikasi' ? 'bg-emerald-50 text-emerald-700' :
                              item.status === 'Ditolak' ? 'bg-rose-50 text-rose-700' : 'bg-amber-50 text-amber-700 animate-pulse'
                            }`}>{item.status}</span>
                          </td>
                          <td className="p-3 text-right space-x-1">
                            {item.status === 'Menunggu' && (
                              <>
                                <button onClick={() => handleVerifyPayment(item.id, true)} className="px-2 py-1 bg-emerald-50 text-emerald-700 font-bold rounded hover:bg-emerald-100" title="Verifikasi Lunas">Terima</button>
                                <button onClick={() => handleVerifyPayment(item.id, false)} className="px-2 py-1 bg-rose-50 text-rose-700 font-bold rounded hover:bg-rose-100" title="Tolak">Tolak</button>
                              </>
                            )}
                            {item.status !== 'Menunggu' && (
                              <span className="text-[10px] text-zinc-400 font-mono">Verified by {item.verifiedBy}</span>
                            )}
                          </td>
                        </tr>
                      ))}
                      {verificationsList.length === 0 && (
                        <tr><td colSpan="7" className="text-center p-8 text-zinc-400">Tidak ada transaksi nontunai menunggu verifikasi.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderHR = () => {
        return (
          <div className="space-y-6 text-left">
            <div className="flex border-b border-zinc-200 gap-4 mb-4">
              <button onClick={() => setActiveTab('attendance')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'attendance' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Absensi Staf</button>
              <button onClick={() => setActiveTab('leaves')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'leaves' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Pengajuan Cuti</button>
              <button onClick={() => setActiveTab('payroll')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'payroll' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Kalkulator Slip Gaji</button>
              <button onClick={() => setActiveTab('recruits')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'recruits' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Rekrutmen Staf</button>
            </div>

            {/* TAB: ATTENDANCE */}
            {activeTab === 'attendance' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Koreksi Absensi Manual</h4>
                  <form onSubmit={handleAddAttendance} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Pilih Karyawan</label>
                      <select value={attEmployee} onChange={e => setAttEmployee(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-sm focus:bg-white">
                        <option value="">-- Pilih Staf --</option>
                        {staffList.map(s => (
                          <option key={s.id} value={s.id}>{s.name} ({s.roleLabel || s.role})</option>
                        ))}
                      </select>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Tanggal</label>
                        <input type="date" value={attDate} onChange={e => setAttDate(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Status Kehadiran</label>
                        <select value={attStatus} onChange={e => setAttStatus(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:bg-white">
                          <option value="Hadir">Hadir</option>
                          <option value="Sakit">Sakit</option>
                          <option value="Izin">Izin / Cuti</option>
                          <option value="Alfa">Alpa (Tanpa Keterangan)</option>
                        </select>
                      </div>
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-zinc-900 text-white rounded-xl font-bold text-xs hover:bg-zinc-800 transition">Simpan Koreksi</button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Log Absensi Karyawan</h4>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                          <th className="p-3 text-left">Karyawan</th>
                          <th className="p-3 text-center">Tanggal</th>
                          <th className="p-3 text-center">Status Kehadiran</th>
                          <th className="p-3 text-right">Diperbarui</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">
                        {attendanceList.map(item => (
                          <tr key={item.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-bold text-zinc-700">{item.employeeName}</td>
                            <td className="p-3 text-center text-zinc-650">{item.date}</td>
                            <td className="p-3 text-center">
                              <span className={`px-2 py-0.5 rounded font-bold ${
                                item.status === 'Hadir' ? 'bg-emerald-50 text-emerald-700' :
                                item.status === 'Sakit' ? 'bg-amber-50 text-amber-700' :
                                item.status === 'Izin' ? 'bg-sky-50 text-sky-700' : 'bg-rose-50 text-rose-700'
                              }`}>{item.status}</span>
                            </td>
                            <td className="p-3 text-right text-zinc-400 font-mono text-[10px]">{formatTimeAgo(item.updatedAt)}</td>
                          </tr>
                        ))}
                        {attendanceList.length === 0 && (
                          <tr><td colSpan="4" className="text-center p-8 text-zinc-400">Belum ada data kehadiran staf.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: LEAVES */}
            {activeTab === 'leaves' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Buat Permohonan Cuti Staf</h4>
                  <form onSubmit={handleAddLeave} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nama Karyawan</label>
                      <select value={leaveEmployee} onChange={e => setLeaveEmployee(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-sm focus:bg-white">
                        <option value="">-- Pilih Staf --</option>
                        {staffList.map(s => (
                          <option key={s.id} value={s.id}>{s.name} ({s.roleLabel || s.role})</option>
                        ))}
                      </select>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Tanggal Mulai</label>
                        <input type="date" value={leaveStart} onChange={e => setLeaveStart(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Tanggal Selesai</label>
                        <input type="date" value={leaveEnd} onChange={e => setLeaveEnd(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Alasan Cuti</label>
                      <input type="text" value={leaveReason} onChange={e => setLeaveReason(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-sm focus:bg-white" placeholder="Alasan mudik, sakit, dll..." />
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-zinc-900 text-white rounded-xl font-bold text-xs hover:bg-zinc-800 transition">Ajukan Cuti</button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Pengajuan Cuti Karyawan</h4>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                          <th className="p-3 text-left">Karyawan</th>
                          <th className="p-3 text-left">Durasi Cuti</th>
                          <th className="p-3 text-left">Alasan</th>
                          <th className="p-3 text-center">Status</th>
                          <th className="p-3 text-right">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">
                        {leaveList.map(item => (
                          <tr key={item.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-bold text-zinc-700">{item.employeeName}</td>
                            <td className="p-3 text-zinc-650">{item.start} s/d {item.end}</td>
                            <td className="p-3 text-zinc-500 italic">{item.reason}</td>
                            <td className="p-3 text-center">
                              <span className={`px-2 py-0.5 rounded font-bold ${
                                item.status === 'Disetujui' ? 'bg-emerald-50 text-emerald-700' :
                                item.status === 'Ditolak' ? 'bg-rose-50 text-rose-700' : 'bg-amber-50 text-amber-700'
                              }`}>{item.status}</span>
                            </td>
                            <td className="p-3 text-right space-x-1">
                              {item.status === 'Menunggu' && (
                                <>
                                  <button onClick={() => handleApproveLeave(item.id, true)} className="px-2 py-1 bg-emerald-50 text-emerald-700 font-bold rounded hover:bg-emerald-100">Setujui</button>
                                  <button onClick={() => handleApproveLeave(item.id, false)} className="px-2 py-1 bg-rose-50 text-rose-700 font-bold rounded hover:bg-rose-100">Tolak</button>
                                </>
                              )}
                            </td>
                          </tr>
                        ))}
                        {leaveList.length === 0 && (
                          <tr><td colSpan="5" className="text-center p-8 text-zinc-400">Tidak ada pengajuan cuti.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: PAYROLL */}
            {activeTab === 'payroll' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Kalkulator Gaji & BPJS</h4>
                  <div className="space-y-3.5">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nama Karyawan</label>
                      <select value={payEmployee} onChange={e => setPayEmployee(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none text-sm focus:bg-white">
                        <option value="">-- Pilih Staf --</option>
                        {staffList.map(s => (
                          <option key={s.id} value={s.id}>{s.name} ({s.roleLabel || s.role})</option>
                        ))}
                      </select>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Bulan Gaji</label>
                        <input type="text" value={payMonth} onChange={e => setPayMonth(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" placeholder="Mei 2026" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Gaji Pokok (Rp)</label>
