    // 2. POS PAGE
    function POSPage() {
      const app = useContext(AppContext);
      const { selectedMember, setSelectedMember, discount, setDiscount, roundingMode, setRoundingMode } = app;
      const [search, setSearch] = useState('');
      const [category, setCategory] = useState('All');
      const [showDiscountModal, setShowDiscountModal] = useState(false);
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [payMethod, setPayMethod] = useState('cash'); // cash or qris
      const [paymentAmount, setPaymentAmount] = useState('');
      const [processing, setProcessing] = useState(false);
      const [mobileView, setMobileView] = useState(() => window.innerWidth < 768 ? 'cart' : 'products'); // 'products' or 'cart' (untuk layar kecil)
      const [qrisZoom, setQrisZoom] = useState(false);

      // New state variables
      const [showPOSScanner, setShowPOSScanner] = useState(false);
      const [showOpenPriceModal, setShowOpenPriceModal] = useState(false);
      const [selectedOpenPriceProduct, setSelectedOpenPriceProduct] = useState(null);
      const [manualPriceInput, setManualPriceInput] = useState('');
      const [memberSearchQuery, setMemberSearchQuery] = useState('');
      const [isSplitPayment, setIsSplitPayment] = useState(false);
      const [splitCashAmount, setSplitCashAmount] = useState('');
      const [splitQrisAmount, setSplitQrisAmount] = useState('');
      const [qrisMode, setQrisMode] = useState('shop'); // 'shop', 'dynamic', 'saved'
      const [selectedSavedScanId, setSelectedSavedScanId] = useState('');

      // CRM Member states & functions
      const [showMemberModal, setShowMemberModal] = useState(null); // null, { mode: 'add' }, { mode: 'edit', member }
      const [memberInputName, setMemberInputName] = useState('');
      const [memberInputPhone, setMemberInputPhone] = useState('');
      const [memberInputDiscount, setMemberInputDiscount] = useState('0');

      useEffect(() => {
        if (showMemberModal) {
          if (showMemberModal.mode === 'edit' && showMemberModal.member) {
            setMemberInputName(showMemberModal.member.name || '');
            setMemberInputPhone(showMemberModal.member.phone || '');
            setMemberInputDiscount(String(showMemberModal.member.discount || '0'));
          } else {
            setMemberInputName('');
            setMemberInputPhone('');
            setMemberInputDiscount('0');
          }
        }
      }, [showMemberModal]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'F2') {
            e.preventDefault();
            const searchInput = document.querySelector('input[placeholder*="Cari menu"]');
            if (searchInput) searchInput.focus();
          } else if (e.key === 'F8') {
            e.preventDefault();
            if (app.cart.length > 0) {
              setShowPaymentModal(true);
            } else {
              app.addToast('Keranjang belanja kosong', 'info');
            }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [app.cart]);

      const handleSaveMember = (e) => {
        e.preventDefault();
        if (!memberInputName.trim()) {
          app.addToast('Nama pelanggan wajib diisi', 'error');
          return;
        }
        
        const discVal = parseFloat(memberInputDiscount) || 0;
        if (discVal < 0 || discVal > 100) {
          app.addToast('Diskon harus berkisar antara 0 - 100%', 'error');
          return;
        }

        const db = getDB();
        
        if (showMemberModal.mode === 'add') {
          const phoneExists = db.members.some(m => m.phone === memberInputPhone.trim() && memberInputPhone.trim() !== '');
          if (phoneExists) {
            app.addToast('Nomor telepon sudah terdaftar', 'error');
            return;
          }

          const newMember = {
            id: 'm_' + Date.now(),
            name: memberInputName.trim(),
            phone: memberInputPhone.trim(),
            points: 0,
            discount: discVal,
            createdAt: new Date().toISOString()
          };
          db.members.push(newMember);
          saveDB(db);
          app.refreshDB();
          setSelectedMember(newMember); // Auto select the newly added member
          app.addToast(`Pelanggan ${newMember.name} berhasil ditambahkan!`, 'success');
        } else {
          const memberId = showMemberModal.member.id;
          const idx = db.members.findIndex(m => m.id === memberId);
          if (idx !== -1) {
            db.members[idx].name = memberInputName.trim();
            db.members[idx].phone = memberInputPhone.trim();
            db.members[idx].discount = discVal;
            saveDB(db);
            app.refreshDB();
            
            const updated = db.members[idx];
            setSelectedMember(updated); // Update selected member state
            app.addToast(`Data pelanggan ${updated.name} berhasil diperbarui!`, 'success');
          }
        }
        setShowMemberModal(null);
      };

      const handleDeleteMember = (memberId) => {
        if (confirm('Apakah Anda yakin ingin menghapus pelanggan ini dari CRM?')) {
          const db = getDB();
          const idx = db.members.findIndex(m => m.id === memberId);
          if (idx !== -1) {
            const memberName = db.members[idx].name;
            db.members.splice(idx, 1);
            saveDB(db);
            app.refreshDB();
            setSelectedMember(null);
            app.addToast(`Pelanggan ${memberName} berhasil dihapus.`, 'info');
          }
        }
      };

      const db = getDB();
      const members = db.members || [];
      const filteredMembers = members.filter(m => {
        const q = memberSearchQuery.trim().toLowerCase();
        if (!q) return true;
        return `${m.name || ''} ${m.phone || ''}`.toLowerCase().includes(q);
      });
      // Filter out inactive products and sort by updatedAt desc
      let products = db.products.filter(p => p.active !== false).sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
      // Load categories dynamically from db
      const categories = ['All', ...db.categories];

      if (category !== 'All') products = products.filter(p => p.category === category);
      if (search) {
        const q = search.toLowerCase();
        products = products.filter(p => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q));
      }

      // GS1 Barcode Weight Parser helper
      const parseGS1Barcode = (barcode, prodList) => {
        if (!barcode || barcode.length < 12 || !barcode.startsWith('21')) {
          return null;
        }
        // Try 5-digit SKU (digits 2-7)
        let skuPart = barcode.slice(2, 7); // e.g. "00055"
        let weightPart = barcode.slice(7, 12); // e.g. "01250"
        let weightKg = parseFloat(weightPart) / 1000;
        
        let product = prodList.find(p => p.sku.toLowerCase().includes(skuPart.toLowerCase()) || skuPart.toLowerCase().includes(p.sku.toLowerCase()));
        if (!product) {
          // Try 4-digit SKU (digits 2-6)
          skuPart = barcode.slice(2, 6); // e.g. "0055"
          weightPart = barcode.slice(6, 11); // e.g. "01250"
          weightKg = parseFloat(weightPart) / 1000;
          product = prodList.find(p => p.sku.toLowerCase().includes(skuPart.toLowerCase()) || skuPart.toLowerCase().includes(p.sku.toLowerCase()));
        }

        if (product) {
          return { product, weight: weightKg };
        }
        return null;
      };

      const getEffectivePrice = (item) => {
        if (item.wholesaleMinQty > 0 && item.wholesalePrice > 0 && item.qty >= item.wholesaleMinQty) {
          return item.wholesalePrice;
        }
        return item.price;
      };

      const cartDetails = useMemo(() => {
        let baseSubtotal = 0;
        let taxTotal = 0;
        app.cart.forEach(item => {
          const effPrice = getEffectivePrice(item);
          if (item.taxIncluded) {
            const base = (effPrice / 1.1) * item.qty;
            const tax = (effPrice * 0.1 / 1.1) * item.qty;
            baseSubtotal += base;
            taxTotal += tax;
          } else {
            const base = effPrice * item.qty;
            const tax = (effPrice * 0.1) * item.qty;
            baseSubtotal += base;
            taxTotal += tax;
          }
        });

        // Member discount
        let memberDiscountAmount = 0;
        if (selectedMember && selectedMember.discount > 0) {
          memberDiscountAmount = (baseSubtotal + taxTotal) * (selectedMember.discount / 100);
        }

        const totalBeforeDiscount = baseSubtotal + taxTotal;
        const totalDiscount = discount + memberDiscountAmount;
        let finalTotal = Math.max(0, totalBeforeDiscount - totalDiscount);

        // Rounding
        let roundingDiff = 0;
        if (payMethod === 'cash' && roundingMode !== 'off') {
          const roundVal = parseInt(roundingMode);
          const roundedTotal = Math.round(finalTotal / roundVal) * roundVal;
          roundingDiff = roundedTotal - finalTotal;
          finalTotal = roundedTotal;
        }

        return {
          subtotal: baseSubtotal,
          tax: taxTotal,
          memberDiscount: memberDiscountAmount,
          discount: totalDiscount,
          total: finalTotal,
          rounding: roundingDiff
        };
      }, [app.cart, discount, selectedMember, payMethod, roundingMode]);

      const subtotal = cartDetails.subtotal;
      const tax = cartDetails.tax;
      const total = cartDetails.total;

      // Fitur Quick Actions Scanner (Live Camera)
      const handleScan = () => {
        setShowPOSScanner(true);
      };

      const handleScanSuccess = (code) => {
        app.addToast(`Scan Berhasil: ${code}`, 'success');
        setShowPOSScanner(false);
        const scanId = app.saveScanData(code, 'barcode');
        
        if (showPaymentModal) {
          setQrisMode('saved');
          setSelectedSavedScanId(scanId);
          return;
        }

        const dbProducts = getDB().products.filter(p => p.active !== false);
        
        // 1. Check GS1 barcode
        const gs1 = parseGS1Barcode(code, dbProducts);
        if (gs1) {
          if (gs1.product.openPrice) {
            setSelectedOpenPriceProduct(gs1.product);
            setManualPriceInput('');
            setShowOpenPriceModal(true);
          } else {
            app.addToCartWithQty(gs1.product, gs1.weight);
            app.addToast(`Ditambahkan: ${gs1.product.name} (${gs1.weight} kg)`, 'success');
          }
          return;
        }

        // 2. Check exact SKU match
        const matched = dbProducts.find(p => p.sku.toLowerCase() === code.trim().toLowerCase());
        if (matched) {
          if (matched.openPrice) {
            setSelectedOpenPriceProduct(matched);
            setManualPriceInput('');
            setShowOpenPriceModal(true);
          } else {
            app.addToCart(matched);
            app.addToast(`Ditambahkan: ${matched.name}`, 'success');
          }
        } else {
          setSearch(code);
        }
      };

      const handlePhotoCapture = (photoData) => {
        const scanId = app.saveScanData(photoData, 'photo');
        app.addToast('Foto berhasil ditangkap & disimpan ke log scans', 'success');
        setShowPOSScanner(false);
        if (showPaymentModal) {
          setQrisMode('saved');
          setSelectedSavedScanId(scanId);
        }
      };

      const handleCheckout = async (e) => {
        e?.preventDefault();
        
        let finalPayMethod = payMethod;
        let amtPaid = parseFloat(paymentAmount) || 0;
        let qrisPaid = total;
        let cashChange = 0;
        let splitDetails = null;

        if (isSplitPayment) {
          finalPayMethod = 'split';
          const cashAmt = parseFloat(splitCashAmount) || 0;
          const qrisAmt = parseFloat(splitQrisAmount) || 0;
          if (cashAmt + qrisAmt < total) {
            app.addToast('Total split payment kurang dari jumlah tagihan', 'error');
            return;
          }
          amtPaid = cashAmt + qrisAmt;
          qrisPaid = qrisAmt;
          cashChange = Math.max(0, (cashAmt + qrisAmt) - total);
          splitDetails = { cash: cashAmt, qris: qrisAmt };
        } else {
          if (payMethod === 'cash') {
            if (amtPaid < total) {
              app.addToast('Uang pembayaran kurang', 'error');
              return;
            }
            cashChange = amtPaid - total;
          } else {
            amtPaid = total;
            cashChange = 0;
          }
        }

        setProcessing(true);
        try {
          await new Promise(r => setTimeout(r, 800)); // Simulasi
          
          const txId = 'TX' + Date.now();
          const tx = {
            id: txId,
            date: new Date().toISOString(),
            cashier: app.user.name,
            cashierId: app.user.id,
            items: app.cart.map(item => ({
              ...item,
              effectivePrice: getEffectivePrice(item)
            })),
            subtotal: cartDetails.subtotal,
            tax: cartDetails.tax,
            memberDiscount: cartDetails.memberDiscount,
            discount: cartDetails.discount,
            rounding: cartDetails.rounding,
            total: total,
            method: finalPayMethod,
            payment: amtPaid,
            change: cashChange,
            splitDetails: splitDetails,
            memberId: selectedMember ? selectedMember.id : null,
            memberName: selectedMember ? selectedMember.name : null,
            kitchenStatus: app.cart.some(item => ['Makanan', 'Minuman'].includes(item.category)) ? 'cooking' : 'none',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
          };

          // Strict check inside simulated backend layer for prices and stocks
          tx.items.forEach(item => {
            if (item.effectivePrice < 0) throw new Error("Harga tidak boleh minus");
            if (item.qty <= 0) throw new Error("Jumlah item tidak boleh nol atau negatif");
          });

          let rpcSuccess = false;
          if (sbClient && app.isOnline) {
            try {
              const { data: newCloudDb, error: rpcError } = await sbClient.rpc('process_checkout', { p_transaction: tx });
              if (!rpcError && newCloudDb) {
                localStorage.setItem(DB_KEY, JSON.stringify(newCloudDb));
                rpcSuccess = true;
                console.log('[Supabase RPC] Checkout sukses atomik di server');
              } else {
                console.warn('[Supabase RPC] Gagal, fallback ke lokal:', rpcError);
              }
            } catch (rpcExc) {
              console.warn('[Supabase RPC] Exception, fallback ke lokal:', rpcExc);
            }
          }

          if (!rpcSuccess) {
            const newDb = getDB();
            newDb.transactions.unshift(tx);
            
            // Deduct stock and validate locally
            app.cart.forEach(item => {
              const p = newDb.products.find(x => x.id === item.id);
              if (p) {
                const newStock = parseFloat((p.stock - item.qty).toFixed(3));
                if (newStock < 0) {
                  throw new Error(`Stok produk "${p.name}" tidak mencukupi untuk transaksi ini.`);
                }
                p.stock = newStock;
                p.updatedAt = new Date().toISOString();
              }
            });

            // Award Member points
            if (selectedMember) {
              const pointsEarned = Math.floor(total / 10000);
              const memberIdx = newDb.members.findIndex(m => m.id === selectedMember.id);
              if (memberIdx !== -1) {
                newDb.members[memberIdx].points += pointsEarned;
              }
            }

            saveDB(newDb);
          }

          // Catat audit log untuk transaksi dan manual discount di client
          logAuditAction('Penjualan', `Melakukan transaksi penjualan dengan ID ${tx.id} senilai Rp ${tx.total.toLocaleString('id-ID')}`, app.user);
          if (tx.discount > 0) {
            logAuditAction('Diskon Manual', `Memberikan diskon senilai Rp ${tx.discount.toLocaleString('id-ID')} pada transaksi ${tx.id}`, app.user);
          }

          app.setLastTransaction(tx);
          app.setShowSuccessModal(true);

          app.refreshDB();
          app.clearCart();
          setDiscount(0);
          setSelectedMember(null);
          setIsSplitPayment(false);
          setSplitCashAmount('');
          setSplitQrisAmount('');
          setShowPaymentModal(false);
          setProcessing(false);
          if(window.innerWidth < 768) setMobileView('products');
          
          app.addToast(`Pembayaran sukses. Kembalian: Rp ${cashChange.toLocaleString('id-ID')}`, 'success');
        } catch (error) {
          setProcessing(false);
          console.error("Checkout error:", error);
          app.addToast(`Gagal menyimpan transaksi: ${error.message}. Tenang, data Anda aman di memori lokal dan akan dicoba kirim ulang otomatis.`, 'error');
        }
      };

      return (
        <div className="h-full flex flex-col md:flex-row gap-6 relative">
          {/* BAGIAN KIRI: PRODUK (Disembunyikan di mobile jika melihat keranjang) */}
          <div className={`flex-1 flex-col overflow-hidden ${mobileView === 'cart' ? 'hidden' : 'flex'}`}>
            <div className="flex flex-col sm:flex-row gap-3 mb-4">
              <div className="relative flex-1">
                <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                  <Icon name="search" size={18} className="text-zinc-400" />
                </div>
                <input 
                  type="text" 
                  placeholder="Cari menu atau kode barang (F2)..." 
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  onKeyDown={e => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      const query = search.trim();
                      if (!query) return;
                      const dbProducts = getDB().products.filter(p => p.active !== false);
                      
                      // 1. GS1 Barcode
                      const gs1 = parseGS1Barcode(query, dbProducts);
                      if (gs1) {
                        if (gs1.product.openPrice) {
                          setSelectedOpenPriceProduct(gs1.product);
                          setManualPriceInput('');
                          setShowOpenPriceModal(true);
                        } else {
                          app.addToCartWithQty(gs1.product, gs1.weight);
                          app.addToast(`Ditambahkan: ${gs1.product.name} (${gs1.weight} kg)`, 'success');
                        }
                        setSearch('');
                        return;
                      }

                      // 2. Exact match
                      const matched = dbProducts.find(p => p.sku.toLowerCase() === query.toLowerCase() || p.name.toLowerCase() === query.toLowerCase());
                      if (matched) {
                        if (matched.openPrice) {
                          setSelectedOpenPriceProduct(matched);
                          setManualPriceInput('');
                          setShowOpenPriceModal(true);
                        } else {
                          app.addToCart(matched);
                          app.addToast(`Ditambahkan: ${matched.name}`, 'success');
                        }
                        setSearch('');
                      } else {
                        app.addToast('Produk tidak ditemukan', 'error');
                      }
                    }
                  }}
                  className="w-full pl-10 pr-12 py-3 bg-white border border-zinc-200 rounded-xl focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none shadow-sm"
                />
                <button onClick={handleScan} className="absolute inset-y-0 right-2 flex items-center p-2 text-zinc-400 hover:text-sky-600" title="Buka Kamera Scanner">
                  <Icon name="scan-line" size={20} />
                </button>
              </div>
              <div className="overflow-x-auto hide-scrollbar flex gap-1.5 pb-1">
                {categories.map(c => (
                  <button 
                    key={c}
                    onClick={() => setCategory(c)}
                    className={`whitespace-nowrap px-3 py-1.5 text-sm rounded-lg font-medium transition ${category === c ? 'bg-sky-600 text-white shadow-md' : 'bg-white text-zinc-600 border border-zinc-200 hover:bg-zinc-50'}`}
                  >
                    {c}
                  </button>
                ))}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto custom-scroll pb-24 md:pb-4">
              <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-4">
                {products.map(p => (
                  <div 
                    key={p.id}
                    onClick={() => {
                      if (p.stock <= 0) return;
                      if (p.openPrice) {
                        setSelectedOpenPriceProduct(p);
                        setManualPriceInput('');
                        setShowOpenPriceModal(true);
                      } else {
                        app.addToCart(p);
                      }
                    }}
                    className={`bg-white rounded-2xl border border-zinc-200 overflow-hidden cursor-pointer transition ${p.stock === 0 ? 'grayscale opacity-50' : 'hover:shadow-lg hover:border-sky-400 active:scale-[0.98]'}`}
                  >
                    <div className="aspect-square bg-zinc-100 flex items-center justify-center relative">
                      {p.image ? (
                        <img src={p.image} className="w-full h-full object-cover" alt={p.name} />
                      ) : (
                        <span className="text-4xl font-bold text-zinc-300">{p.name.substring(0,2).toUpperCase()}</span>
                      )}
                      {p.stock === 0 && (
                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                          <span className="bg-rose-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-lg">HABIS</span>
                        </div>
                      )}
                      {p.stock > 0 && p.stock <= 5 && (
                        <div className="absolute top-2 right-2 bg-orange-500 text-white text-[10px] font-bold px-2 py-1 rounded-md">
                          Sisa {p.stock}
                        </div>
                      )}
                    </div>
                    <div className="p-3 md:p-4 text-left">
                      <p className="text-xs text-zinc-500 font-medium mb-1">{p.category}</p>
                      <h4 className="font-semibold text-zinc-850 text-sm md:text-base leading-tight mb-1.5 line-clamp-2">{p.name}</h4>
                      <div className="flex items-center justify-between flex-wrap gap-1">
                        <div className="font-bold text-sky-600">
                          {p.openPrice ? 'Harga Dinamis' : `Rp ${p.price.toLocaleString('id-ID')}`}
                        </div>
                        {p.wholesalePrice > 0 && (
                          <span className="bg-emerald-50 text-emerald-700 text-[9px] font-bold px-1.5 py-0.5 rounded-md border border-emerald-250" title={`Beli min ${p.wholesaleMinQty} dapat harga Rp ${p.wholesalePrice.toLocaleString('id-ID')}`}>
                            Grosir
                          </span>
                        )}
                      </div>
                      <div className="text-[10px] text-zinc-400 mt-2 flex items-center gap-1 font-medium bg-zinc-50 py-1 px-2 rounded-md w-fit">
                        <Icon name="clock" size={10} />
                        <span>Update: {formatTimeAgo(p.updatedAt)}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Floating Cart Button (Mobile Only) */}
          {mobileView === 'products' && (
            <div className="md:hidden fixed bottom-20 left-4 right-4 z-30 animate-[slideUp_0.3s_ease-out]">
              <button 
                onClick={() => setMobileView('cart')} 
                className="w-full bg-zinc-900 text-white rounded-2xl shadow-xl p-4 flex justify-between items-center"
              >
                <div className="flex items-center gap-3">
                  <div className="relative">
                    <Icon name="shopping-bag" size={24} />
                    <span className="absolute -top-2 -right-2 bg-rose-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">{app.cart.reduce((a,b)=>a+b.qty,0)}</span>
                  </div>
                  <span className="font-semibold text-sm">{app.cart.length > 0 ? 'Lihat Pesanan' : 'Pesanan / Pelanggan'}</span>
                </div>
                <span className="font-bold">Rp {total.toLocaleString('id-ID')}</span>
              </button>
            </div>
          )}

          {/* BAGIAN KANAN: KERANJANG */}
          <div className={`w-full md:w-80 lg:w-96 flex flex-col bg-white rounded-3xl border border-zinc-200 shadow-sm overflow-hidden ${mobileView === 'products' ? 'hidden md:flex' : 'flex'}`}>
            <div className="p-5 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <div className="flex items-center gap-3">
                {mobileView === 'cart' && (
                  <button onClick={() => setMobileView('products')} className="md:hidden p-2 -ml-2 bg-white rounded-xl border border-zinc-200">
                    <Icon name="chevron-left" size={20} />
                  </button>
                )}
                <div>
                  <h3 className="font-bold text-lg text-zinc-800">Pesanan</h3>
                  <p className="text-xs text-zinc-500">{app.user?.name} • TX-{Date.now().toString().slice(-4)}</p>
                </div>
              </div>
              {app.cart.length > 0 && (
                <button onClick={app.clearCart} className="p-2 text-rose-500 hover:bg-rose-50 rounded-xl transition">
                  <Icon name="trash-2" size={20} />
                </button>
              )}
            </div>

            {/* CRM Member Selection */}
            <div className="px-5 py-3.5 bg-zinc-50 border-b border-zinc-150 flex flex-col gap-2">
              <div className="flex items-center justify-between">
                <span className="text-xs font-bold text-zinc-500 uppercase tracking-wider">Pelanggan</span>
                <div className="flex gap-2 items-center">
                  {selectedMember && (
                    <button onClick={() => setSelectedMember(null)} className="text-[10px] text-rose-500 font-semibold hover:underline">Lepas</button>
                  )}
                  <button onClick={() => setShowMemberModal({ mode: 'add' })} className="text-[10px] text-zinc-700 font-bold hover:underline flex items-center gap-0.5">
                    <Icon name="plus" size={12} /> Tambah
                  </button>
                </div>
              </div>
              {selectedMember ? (
                <div className="flex items-center justify-between bg-white border border-zinc-200 rounded-xl p-3 shadow-sm text-left">
                  <div className="flex-1 min-w-0 pr-2">
                    <p className="font-semibold text-zinc-800 text-sm truncate">{selectedMember.name}</p>
                    <p className="text-[10px] text-zinc-500">{selectedMember.phone || 'Tanpa telp'} | {selectedMember.points || 0} Poin</p>
                  </div>
                  <div className="flex items-center gap-1.5 flex-shrink-0">
                    {selectedMember.discount > 0 && (
                      <span className="bg-zinc-100 text-zinc-700 text-[10px] font-bold px-1.5 py-0.5 rounded border border-zinc-200">Diskon {selectedMember.discount}%</span>
                    )}
                    <button onClick={() => setShowMemberModal({ mode: 'edit', member: selectedMember })} className="p-1 text-zinc-500 hover:bg-zinc-100 rounded transition" title="Edit Pelanggan">
                      <Icon name="edit" size={14} />
                    </button>
                    <button onClick={() => handleDeleteMember(selectedMember.id)} className="p-1 text-rose-500 hover:bg-rose-50 rounded transition" title="Hapus Pelanggan">
                      <Icon name="trash" size={14} />
                    </button>
                  </div>
                </div>
              ) : (
                <div className="space-y-2">
                  <select 
                    value={selectedMember ? selectedMember.id : ''} 
                    onChange={e => {
                      const m = getDB().members.find(x => x.id === e.target.value);
                      setSelectedMember(m || null);
                    }}
                    className="w-full px-3 py-2 bg-white border border-zinc-200 rounded-xl text-xs font-semibold outline-none text-zinc-700 focus:border-zinc-500 shadow-sm"
                  >
                    <option value="">Pilih pelanggan yang belanja</option>
                    {members.map(m => (
                      <option key={m.id} value={m.id}>{m.name} ({m.phone})</option>
                    ))}
                  </select>

                  <div className="relative">
                    <Icon name="search" size={13} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400" />
                    <input
                      type="text"
                      value={memberSearchQuery}
                      onChange={e => setMemberSearchQuery(e.target.value)}
                      placeholder="Cari pelanggan untuk edit atau hapus"
                      className="w-full pl-8 pr-3 py-2 bg-white border border-zinc-200 rounded-xl text-xs font-medium outline-none text-zinc-700 focus:border-zinc-500 shadow-sm"
                    />
                  </div>

                  <div className="max-h-32 overflow-y-auto custom-scroll space-y-1">
                    {filteredMembers.length > 0 ? filteredMembers.map(m => (
                      <div key={m.id} className="flex items-center justify-between gap-2 bg-white border border-zinc-200 rounded-xl px-3 py-2 text-left">
                        <button
                          type="button"
                          onClick={() => setSelectedMember(m)}
                          className="min-w-0 flex-1 text-left"
                          title="Pilih pelanggan"
                        >
                          <p className="text-xs font-bold text-zinc-800 truncate">{m.name}</p>
                          <p className="text-[10px] text-zinc-500 truncate">{m.phone || 'Tanpa telp'} | {m.points || 0} Poin</p>
                        </button>
                        <button onClick={() => setShowMemberModal({ mode: 'edit', member: m })} className="p-1.5 text-zinc-500 hover:bg-zinc-100 rounded-lg transition" title="Edit Pelanggan">
                          <Icon name="pencil" size={13} />
                        </button>
                        <button onClick={() => handleDeleteMember(m.id)} className="p-1.5 text-rose-500 hover:bg-rose-50 rounded-lg transition" title="Hapus Pelanggan">
                          <Icon name="trash-2" size={13} />
                        </button>
                      </div>
                    )) : (
                      <div className="bg-white border border-dashed border-zinc-200 rounded-xl px-3 py-3 text-center text-[11px] text-zinc-400">
                        Pelanggan tidak ditemukan
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll">
              {app.cart.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center text-zinc-400">
                  <Icon name="shopping-bag" size={48} className="mb-4 text-zinc-200" />
                  <p className="font-medium">Belum ada pesanan</p>
                </div>
              ) : (
                app.cart.map(item => {
                  const effPrice = getEffectivePrice(item);
                  const isWholesale = item.wholesaleMinQty > 0 && item.qty >= item.wholesaleMinQty;
                  return (
                    <div key={item.id} className="flex flex-col gap-3 pb-4 border-b border-zinc-100 last:border-0 relative group">
                      <div className="flex justify-between">
                        <div className="flex-1 pr-2 text-left">
                          <h4 className="font-medium text-zinc-800 text-sm">{item.name}</h4>
                          <div className="flex items-center gap-1.5 mt-1">
                            <div className="text-sky-600 font-semibold text-sm">Rp {effPrice.toLocaleString('id-ID')}</div>
                            {isWholesale && (
                              <span className="text-[9px] bg-emerald-500 text-white font-bold px-1.5 py-0.5 rounded">Grosir</span>
                            )}
                          </div>
                        </div>
                        <button onClick={() => app.removeFromCart(item.id)} className="text-rose-400 hover:text-rose-600 p-1 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                          <Icon name="x-circle" size={20} />
                        </button>
                      </div>
                      <div className="flex items-center justify-between">
                        <div className="text-xs text-zinc-500">Sub: Rp {(effPrice * item.qty).toLocaleString('id-ID')}</div>
                        <div className="flex items-center gap-3 bg-zinc-50 border border-zinc-200 rounded-xl p-1">
                          <button 
                            onClick={() => app.updateCartQty(item.id, -1)} 
                            className="touch-target md:w-8 md:h-8 w-10 h-10 bg-white rounded-lg shadow-sm border border-zinc-100 text-zinc-650 hover:bg-zinc-50 active:bg-zinc-100 flex items-center justify-center transition-colors"
                          >
                            <Icon name="minus" size={16} />
                          </button>
                          <span className="w-6 text-center font-semibold text-sm">{item.qty}</span>
                          <button 
                            onClick={() => app.updateCartQty(item.id, 1)} 
                            disabled={item.qty >= item.stock}
                            className={`touch-target md:w-8 md:h-8 w-10 h-10 rounded-lg shadow-sm border flex items-center justify-center transition-colors ${item.qty >= item.stock ? 'bg-zinc-100 border-zinc-200 text-zinc-350 cursor-not-allowed opacity-50' : 'bg-white border-zinc-100 text-zinc-650 hover:bg-zinc-50 active:bg-zinc-100'}`}
                          >
                            <Icon name="plus" size={16} />
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            <div className="p-5 bg-zinc-50/80 border-t border-zinc-100">
              <div className="space-y-3 mb-5 text-sm">
                <div className="flex justify-between text-zinc-605">
                  <span>Subtotal</span>
                  <span className="font-semibold text-zinc-800">Rp {subtotal.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between text-zinc-605">
                  <span>Pajak (PPN 10%)</span>
                  <span className="font-semibold text-zinc-800">Rp {tax.toLocaleString('id-ID')}</span>
                </div>
                {cartDetails.memberDiscount > 0 && (
                  <div className="flex justify-between text-zinc-605">
                    <span>Diskon Member</span>
                    <span className="font-semibold text-sky-600">- Rp {cartDetails.memberDiscount.toLocaleString('id-ID')}</span>
                  </div>
                )}
                
                <div className="flex justify-between items-center text-zinc-605">
                  <span>Diskon Manual</span>
                  {discount > 0 ? (
                    <div className="flex items-center gap-2">
                      <span className="font-semibold text-rose-500">- Rp {discount.toLocaleString('id-ID')}</span>
                      <button onClick={() => setDiscount(0)} className="text-zinc-400 hover:text-zinc-650"><Icon name="x" size={14}/></button>
                    </div>
                  ) : (
                    <button 
                      onClick={() => setShowDiscountModal(true)}
                      disabled={app.cart.length === 0} 
                      className="text-sky-600 font-semibold hover:underline text-xs bg-sky-50 px-2 py-1 rounded-md"
                    >
                      + Tambah Diskon
                    </button>
                  )}
                </div>

                {cartDetails.rounding !== 0 && (
                  <div className="flex justify-between text-zinc-605">
                    <span>Pembulatan Tunai</span>
                    <span className={`font-semibold ${cartDetails.rounding > 0 ? 'text-zinc-600' : 'text-emerald-600'}`}>
                      {cartDetails.rounding > 0 ? '+' : ''} Rp {cartDetails.rounding.toLocaleString('id-ID')}
                    </span>
                  </div>
                )}
                
                <div className="flex justify-between text-lg font-bold text-zinc-900 pt-3 border-t border-zinc-200/60">
                  <span>Total Tagihan</span>
                  <span className="text-sky-600 font-extrabold text-xl">Rp {total.toLocaleString('id-ID')}</span>
                </div>
              </div>
              <button 
                onClick={() => { setPaymentAmount(''); setPayMethod('cash'); setShowPaymentModal(true); }}
                disabled={app.cart.length === 0}
                className="w-full py-4 bg-zinc-900 disabled:bg-zinc-300 disabled:cursor-not-allowed text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-zinc-800 active:scale-[0.98] transition flex items-center justify-center gap-2"
              >
                <Icon name="credit-card" size={22} />
                Bayar Sekarang
              </button>
            </div>
          </div>

          {/* PAYMENT MODAL */}
          {showPaymentModal && (
            <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
              <div className="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden animate-[slideUp_0.3s_ease-out] max-h-[90vh] overflow-y-auto custom-scroll text-left">
                <div className="px-6 py-4 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50 sticky top-0 z-10 backdrop-blur-md">
                  <h3 className="text-lg font-bold text-zinc-800">Metode Pembayaran</h3>
                  <button onClick={() => setShowPaymentModal(false)} className="p-2 bg-white border border-zinc-200 rounded-full text-zinc-400 hover:text-zinc-650">
                    <Icon name="x" size={18} />
                  </button>
                </div>
                
                <div className="p-6 space-y-6">
                  {/* Top Details */}
                  <div className="flex justify-between items-end bg-sky-50 border border-sky-100 rounded-2xl p-4">
                    <div className="text-left">
                      <p className="text-xs text-sky-700 font-bold uppercase tracking-wider mb-0.5">Total Tagihan</p>
                      <p className="text-3xl font-extrabold text-sky-800">Rp {total.toLocaleString('id-ID')}</p>
                    </div>
                    {selectedMember && (
                      <div className="text-right">
                        <span className="bg-sky-100 text-sky-700 text-[10px] font-extrabold px-2.5 py-1 rounded-full">Member: {selectedMember.name}</span>
                      </div>
                    )}
                  </div>

                  {/* Settings: Rounding & Split Toggle */}
                  <div className="grid grid-cols-2 gap-4 pt-1">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Pembulatan Tunai</label>
                      <select 
                        value={roundingMode} 
                        onChange={e => setRoundingMode(e.target.value)}
                        className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-xs font-semibold outline-none text-zinc-700 focus:bg-white focus:border-sky-500 shadow-sm"
                      >
                        <option value="off">Tanpa Pembulatan</option>
                        <option value="100">Ke Rp 100 terdekat</option>
                        <option value="500">Ke Rp 500 terdekat</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Metode Split Payment</label>
                      <button 
                        type="button"
                        onClick={() => {
                          setIsSplitPayment(!isSplitPayment);
                          setSplitCashAmount('');
                          setSplitQrisAmount('');
                        }}
                        className={`w-full py-2.5 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5 ${isSplitPayment ? 'bg-sky-600 border-sky-600 text-white' : 'bg-white border-zinc-200 text-zinc-650 hover:bg-zinc-50'}`}
                      >
                        <Icon name={isSplitPayment ? 'check-circle' : 'circle'} size={14} />
                        Split (Tunai + QRIS)
                      </button>
                    </div>
                  </div>

                  {isSplitPayment ? (
                    /* SPLIT PAYMENT FORM */
                    <form onSubmit={handleCheckout} className="space-y-5">
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Bagian 1: Tunai (Cash)</label>
                          <div className="relative">
                            <span className="absolute left-3 top-2.5 text-zinc-400 text-xs font-bold">Rp</span>
                            <input 
                              type="text"
                              value={splitCashAmount ? parseInt(splitCashAmount).toLocaleString('id-ID') : ''}
                              onChange={e => {
                                const val = e.target.value.replace(/[^0-9]/g, '');
                                setSplitCashAmount(val);
                                const numVal = parseFloat(val) || 0;
                                setSplitQrisAmount(Math.max(0, total - numVal).toString());
                              }}
                              className="w-full pl-8 pr-3 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm font-semibold focus:bg-white focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none text-zinc-800"
                              placeholder="0"
                              required
                            />
                          </div>
                          
                          {/* Quick cash helper for Split Cash */}
                          <div className="flex gap-1.5 mt-2">
                            <button type="button" onClick={() => { setSplitCashAmount('50000'); setSplitQrisAmount(Math.max(0, total - 50000).toString()); }} className="flex-1 py-1 border border-zinc-200 rounded-lg text-[10px] font-bold text-zinc-600 bg-white hover:bg-zinc-50">50k</button>
                            <button type="button" onClick={() => { setSplitCashAmount('100000'); setSplitQrisAmount(Math.max(0, total - 100000).toString()); }} className="flex-1 py-1 border border-zinc-200 rounded-lg text-[10px] font-bold text-zinc-600 bg-white hover:bg-zinc-50">100k</button>
                          </div>
                        </div>

                        <div>
                          <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Bagian 2: QRIS / Debit</label>
                          <div className="relative">
                            <span className="absolute left-3 top-2.5 text-zinc-400 text-xs font-bold">Rp</span>
                            <input 
                              type="text"
                              value={splitQrisAmount ? parseInt(splitQrisAmount).toLocaleString('id-ID') : ''}
                              onChange={e => {
                                const val = e.target.value.replace(/[^0-9]/g, '');
                                setSplitQrisAmount(val);
                              }}
                              className="w-full pl-8 pr-3 py-2.5 bg-zinc-55 border border-zinc-200 rounded-xl text-sm font-semibold outline-none text-zinc-800"
                              placeholder="0"
                              required
                            />
                          </div>
                        </div>
                      </div>

                      {/* Display QRIS helper if QRIS amount > 0 */}
                      {parseFloat(splitQrisAmount) > 0 && (
                        <div className="bg-zinc-50 border border-zinc-200 rounded-2xl p-4 text-center">
                          <p className="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3">Pindai QRIS Bagian Non-Tunai (Rp {parseInt(splitQrisAmount).toLocaleString('id-ID')})</p>
                          <QRISDisplay totalAmount={parseFloat(splitQrisAmount)} qrisMode={qrisMode} setQrisMode={setQrisMode} selectedSavedScanId={selectedSavedScanId} setSelectedSavedScanId={setSelectedSavedScanId} db={db} setQrisZoom={setQrisZoom} />
                        </div>
                      )}

                      <div className="flex justify-between items-center p-3 bg-zinc-50 rounded-xl border border-zinc-100 text-sm">
                        <span className="text-zinc-500 font-bold">Total Terbayar</span>
                        <span className="text-base font-extrabold text-zinc-800">

                              setPaymentAmount(val);
                            }}

                      type="text" 
                      required

                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Nomor Telepon</label>
                    <input 
                      type="text" 
                      value={memberInputPhone}
                      onChange={e => setMemberInputPhone(e.target.value)}

                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Diskon Member (%)</label>
                    <div className="relative">
                      <input 
                        type="number" 
                        value={memberInputDiscount}
                        onChange={e => setMemberInputDiscount(e.target.value)}

                        className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm"
                      />
                      <span className="absolute right-4 top-3 text-zinc-400 font-bold text-sm">%</span>

                <div className="grid grid-cols-2 gap-3 mt-6">
                  <button type="button" onClick={() => setShowMemberModal(null)} className="py-3 bg-zinc-100 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-200 transition text-sm">Batal</button>
                  <button type="submit" className="py-3 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 transition text-sm flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10">

                <h3 className="text-sm font-bold text-zinc-800 mb-4">

          {/* OPEN PRICE MODAL */}
