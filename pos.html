                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll">
              {app.cart.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center text-zinc-400">
                  <Icon name="shopping-bag" size={48} className="mb-4 text-zinc-200" />
                  <p className="font-medium">Belum ada pesanan</p>
                </div>
              ) : (
                app.cart.map(item => {
                  const effPrice = getEffectivePrice(item);
                  const isWholesale = item.wholesaleMinQty > 0 && item.qty >= item.wholesaleMinQty;
                  return (
                    <div key={item.id} className="flex flex-col gap-3 pb-4 border-b border-zinc-100 last:border-0 relative group">
                      <div className="flex justify-between">
                        <div className="flex-1 pr-2 text-left">
                          <h4 className="font-medium text-zinc-800 text-sm">{item.name}</h4>
                          <div className="flex items-center gap-1.5 mt-1">
                            <div className="text-sky-600 font-semibold text-sm">Rp {effPrice.toLocaleString('id-ID')}</div>
                            {isWholesale && (
                              <span className="text-[9px] bg-emerald-500 text-white font-bold px-1.5 py-0.5 rounded">Grosir</span>
                            )}
                          </div>
                        </div>
                        <button onClick={() => app.removeFromCart(item.id)} className="text-rose-400 hover:text-rose-600 p-1 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                          <Icon name="x-circle" size={20} />
                        </button>
                      </div>
                      <div className="flex items-center justify-between">
                        <div className="text-xs text-zinc-500">Sub: Rp {(effPrice * item.qty).toLocaleString('id-ID')}</div>
                        <div className="flex items-center gap-3 bg-zinc-50 border border-zinc-200 rounded-xl p-1">
                          <button 
                            onClick={() => app.updateCartQty(item.id, -1)} 
                            className="touch-target md:w-8 md:h-8 w-10 h-10 bg-white rounded-lg shadow-sm border border-zinc-100 text-zinc-650 hover:bg-zinc-50 active:bg-zinc-100 flex items-center justify-center transition-colors"
                          >
                            <Icon name="minus" size={16} />
                          </button>
                          <span className="w-6 text-center font-semibold text-sm">{item.qty}</span>
                          <button 
                            onClick={() => app.updateCartQty(item.id, 1)} 
                            disabled={item.qty >= item.stock}
                            className={`touch-target md:w-8 md:h-8 w-10 h-10 rounded-lg shadow-sm border flex items-center justify-center transition-colors ${item.qty >= item.stock ? 'bg-zinc-100 border-zinc-200 text-zinc-350 cursor-not-allowed opacity-50' : 'bg-white border-zinc-100 text-zinc-650 hover:bg-zinc-50 active:bg-zinc-100'}`}
                          >
                            <Icon name="plus" size={16} />
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            <div className="p-5 bg-zinc-50/80 border-t border-zinc-100">
              <div className="space-y-3 mb-5 text-sm">
                <div className="flex justify-between text-zinc-605">
                  <span>Subtotal</span>
                  <span className="font-semibold text-zinc-800">Rp {subtotal.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between text-zinc-605">
                  <span>Pajak (PPN 10%)</span>
                  <span className="font-semibold text-zinc-800">Rp {tax.toLocaleString('id-ID')}</span>
                </div>
                {cartDetails.memberDiscount > 0 && (
                  <div className="flex justify-between text-zinc-605">
                    <span>Diskon Member</span>
                    <span className="font-semibold text-sky-600">- Rp {cartDetails.memberDiscount.toLocaleString('id-ID')}</span>
                  </div>
                )}
                
                <div className="flex justify-between items-center text-zinc-605">
                  <span>Diskon Manual</span>
                  {discount > 0 ? (
                    <div className="flex items-center gap-2">
                      <span className="font-semibold text-rose-500">- Rp {discount.toLocaleString('id-ID')}</span>
                      <button onClick={() => setDiscount(0)} className="text-zinc-400 hover:text-zinc-650"><Icon name="x" size={14}/></button>
                    </div>
                  ) : (
                    <button 
                      onClick={() => setShowDiscountModal(true)}
                      disabled={app.cart.length === 0} 
                      className="text-sky-600 font-semibold hover:underline text-xs bg-sky-50 px-2 py-1 rounded-md"
                    >
                      + Tambah Diskon
                    </button>
                  )}
                </div>

                {cartDetails.rounding !== 0 && (
                  <div className="flex justify-between text-zinc-605">
                    <span>Pembulatan Tunai</span>
                    <span className={`font-semibold ${cartDetails.rounding > 0 ? 'text-zinc-600' : 'text-emerald-600'}`}>
                      {cartDetails.rounding > 0 ? '+' : ''} Rp {cartDetails.rounding.toLocaleString('id-ID')}
                    </span>
                  </div>
                )}
                
                <div className="flex justify-between text-lg font-bold text-zinc-900 pt-3 border-t border-zinc-200/60">
                  <span>Total Tagihan</span>
                  <span className="text-sky-600 font-extrabold text-xl">Rp {total.toLocaleString('id-ID')}</span>
                </div>
              </div>
              <button 
                onClick={() => { setPaymentAmount(''); setPayMethod('cash'); setShowPaymentModal(true); }}
                disabled={app.cart.length === 0}
                className="w-full py-4 bg-zinc-900 disabled:bg-zinc-300 disabled:cursor-not-allowed text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-zinc-800 active:scale-[0.98] transition flex items-center justify-center gap-2"
              >
                <Icon name="credit-card" size={22} />
                Bayar Sekarang
              </button>
            </div>
          </div>

          {/* PAYMENT MODAL */}
          {showPaymentModal && (
            <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
              <div className="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden animate-[slideUp_0.3s_ease-out] max-h-[90vh] overflow-y-auto custom-scroll text-left">
                <div className="px-6 py-4 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50 sticky top-0 z-10 backdrop-blur-md">
                  <h3 className="text-lg font-bold text-zinc-800">Metode Pembayaran</h3>
                  <button onClick={() => setShowPaymentModal(false)} className="p-2 bg-white border border-zinc-200 rounded-full text-zinc-400 hover:text-zinc-650">
                    <Icon name="x" size={18} />
                  </button>
                </div>
                
                <div className="p-6 space-y-6">
                  {/* Top Details */}
                  <div className="flex justify-between items-end bg-sky-50 border border-sky-100 rounded-2xl p-4">
                    <div className="text-left">
                      <p className="text-xs text-sky-700 font-bold uppercase tracking-wider mb-0.5">Total Tagihan</p>
                      <p className="text-3xl font-extrabold text-sky-800">Rp {total.toLocaleString('id-ID')}</p>
                    </div>
                    {selectedMember && (
                      <div className="text-right">
                        <span className="bg-sky-100 text-sky-700 text-[10px] font-extrabold px-2.5 py-1 rounded-full">Member: {selectedMember.name}</span>
                      </div>
                    )}
                  </div>

                  {/* Settings: Rounding & Split Toggle */}
                  <div className="grid grid-cols-2 gap-4 pt-1">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Pembulatan Tunai</label>
                      <select 
                        value={roundingMode} 
                        onChange={e => setRoundingMode(e.target.value)}
                        className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-xs font-semibold outline-none text-zinc-700 focus:bg-white focus:border-sky-500 shadow-sm"
                      >
                        <option value="off">Tanpa Pembulatan</option>
                        <option value="100">Ke Rp 100 terdekat</option>
                        <option value="500">Ke Rp 500 terdekat</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Metode Split Payment</label>
                      <button 
                        type="button"
                        onClick={() => {
                          setIsSplitPayment(!isSplitPayment);
                          setSplitCashAmount('');
                          setSplitQrisAmount('');
                        }}
                        className={`w-full py-2.5 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5 ${isSplitPayment ? 'bg-sky-600 border-sky-600 text-white' : 'bg-white border-zinc-200 text-zinc-650 hover:bg-zinc-50'}`}
                      >
                        <Icon name={isSplitPayment ? 'check-circle' : 'circle'} size={14} />
                        Split (Tunai + QRIS)
                      </button>
                    </div>
                  </div>

                  {isSplitPayment ? (
                    /* SPLIT PAYMENT FORM */
                    <form onSubmit={handleCheckout} className="space-y-5">
                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Bagian 1: Tunai (Cash)</label>
                          <div className="relative">
                            <span className="absolute left-3 top-2.5 text-zinc-400 text-xs font-bold">Rp</span>
                            <input 
                              type="text"
                              value={splitCashAmount ? parseInt(splitCashAmount).toLocaleString('id-ID') : ''}
                              onChange={e => {
                                const val = e.target.value.replace(/[^0-9]/g, '');
                                setSplitCashAmount(val);
                                const numVal = parseFloat(val) || 0;
                                setSplitQrisAmount(Math.max(0, total - numVal).toString());
                              }}
                              className="w-full pl-8 pr-3 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl text-sm font-semibold focus:bg-white focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none text-zinc-800"
                              placeholder="0"
                              required
                            />
                          </div>
                          
                          {/* Quick cash helper for Split Cash */}
                          <div className="flex gap-1.5 mt-2">
                            <button type="button" onClick={() => { setSplitCashAmount('50000'); setSplitQrisAmount(Math.max(0, total - 50000).toString()); }} className="flex-1 py-1 border border-zinc-200 rounded-lg text-[10px] font-bold text-zinc-600 bg-white hover:bg-zinc-50">50k</button>
                            <button type="button" onClick={() => { setSplitCashAmount('100000'); setSplitQrisAmount(Math.max(0, total - 100000).toString()); }} className="flex-1 py-1 border border-zinc-200 rounded-lg text-[10px] font-bold text-zinc-600 bg-white hover:bg-zinc-50">100k</button>
                          </div>
                        </div>

                        <div>
                          <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Bagian 2: QRIS / Debit</label>
                          <div className="relative">
                            <span className="absolute left-3 top-2.5 text-zinc-400 text-xs font-bold">Rp</span>
                            <input 
                              type="text"
                              value={splitQrisAmount ? parseInt(splitQrisAmount).toLocaleString('id-ID') : ''}
                              onChange={e => {
                                const val = e.target.value.replace(/[^0-9]/g, '');
                                setSplitQrisAmount(val);
                              }}
                              className="w-full pl-8 pr-3 py-2.5 bg-zinc-55 border border-zinc-200 rounded-xl text-sm font-semibold outline-none text-zinc-800"
                              placeholder="0"
                              required
                            />
                          </div>
                        </div>
                      </div>

                      {/* Display QRIS helper if QRIS amount > 0 */}
                      {parseFloat(splitQrisAmount) > 0 && (
                        <div className="bg-zinc-50 border border-zinc-200 rounded-2xl p-4 text-center">
                          <p className="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3">Pindai QRIS Bagian Non-Tunai (Rp {parseInt(splitQrisAmount).toLocaleString('id-ID')})</p>
                          <QRISDisplay totalAmount={parseFloat(splitQrisAmount)} qrisMode={qrisMode} setQrisMode={setQrisMode} selectedSavedScanId={selectedSavedScanId} setSelectedSavedScanId={setSelectedSavedScanId} db={db} setQrisZoom={setQrisZoom} />
                        </div>
                      )}

                      <div className="flex justify-between items-center p-3 bg-zinc-50 rounded-xl border border-zinc-100 text-sm">
                        <span className="text-zinc-500 font-bold">Total Terbayar</span>
                        <span className="text-base font-extrabold text-zinc-800">
                          Rp {((parseFloat(splitCashAmount) || 0) + (parseFloat(splitQrisAmount) || 0)).toLocaleString('id-ID')}
                        </span>
                      </div>

                      <button type="submit" disabled={processing || ((parseFloat(splitCashAmount) || 0) + (parseFloat(splitQrisAmount) || 0) < total)} className="w-full py-4 bg-sky-600 disabled:bg-zinc-300 text-white rounded-xl font-bold text-lg hover:bg-sky-700 transition flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10">
                        {processing ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Icon name="check-circle" size={22} />}
                        {processing ? 'Memproses...' : 'Selesaikan Split Transaksi'}
                      </button>
                    </form>
                  ) : (
                    /* REGULAR SINGLE PAYMENT METHOD FORM */
                    <div className="space-y-5">
                      <div className="flex bg-zinc-100 p-1 rounded-xl">
                        <button onClick={() => setPayMethod('cash')} className={`flex-1 py-2.5 rounded-lg text-xs font-bold transition flex justify-center items-center gap-1.5 ${payMethod === 'cash' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-500 hover:text-zinc-700'}`}>
                          <Icon name="banknote" size={16} /> Tunai
                        </button>
                        <button onClick={() => setPayMethod('qris')} className={`flex-1 py-2.5 rounded-lg text-xs font-bold transition flex justify-center items-center gap-1.5 ${payMethod === 'qris' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-500 hover:text-zinc-700'}`}>
                          <Icon name="qr-code" size={16} /> QRIS
                        </button>
                        <button onClick={() => setPayMethod('transfer')} className={`flex-1 py-2.5 rounded-lg text-xs font-bold transition flex justify-center items-center gap-1.5 ${payMethod === 'transfer' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-500 hover:text-zinc-700'}`}>
                          <Icon name="landmark" size={16} /> Transfer
                        </button>
                      </div>

                      {payMethod === 'cash' && (
                        <form onSubmit={handleCheckout}>
                          <label className="block text-sm font-medium text-zinc-700 mb-2 text-left">Uang Diterima</label>
                          <input 
                            type="text" 
                            value={paymentAmount ? parseInt(paymentAmount).toLocaleString('id-ID') : ''} 
                            onChange={e => {
                              const val = e.target.value.replace(/[^0-9]/g, '');
                              setPaymentAmount(val);
                            }}
                            className="w-full px-4 py-3.5 bg-zinc-50 border border-zinc-200 rounded-xl text-lg font-bold focus:bg-white focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none text-zinc-900 mb-4"
                            placeholder="0"
                            autoFocus
                          />
                          
                          <div className="grid grid-cols-3 gap-2 mb-6">
                            <button type="button" onClick={() => setPaymentAmount(total.toString())} className="py-2.5 border border-zinc-200 rounded-xl text-sm font-medium hover:bg-zinc-50 text-zinc-700">Uang Pas</button>
                            <button type="button" onClick={() => setPaymentAmount('50000')} className="py-2.5 border border-zinc-200 rounded-xl text-sm font-medium hover:bg-zinc-50 text-zinc-700 text-sky-700">50k</button>
                            <button type="button" onClick={() => setPaymentAmount('100000')} className="py-2.5 border border-zinc-200 rounded-xl text-sm font-medium hover:bg-zinc-50 text-zinc-700 text-emerald-700">100k</button>
                          </div>

                          <div className="flex justify-between items-center p-4 bg-zinc-50 rounded-xl mb-6 border border-zinc-150">
                            <span className="text-zinc-500 font-bold">Uang Kembalian</span>
                            <span className="text-xl font-extrabold text-zinc-800">
                              Rp {paymentAmount && parseFloat(paymentAmount) > total ? (parseFloat(paymentAmount) - total).toLocaleString('id-ID') : '0'}
                            </span>
                          </div>

                          <button type="submit" disabled={processing || !paymentAmount || parseFloat(paymentAmount) < total} className="w-full py-4 bg-sky-600 disabled:bg-zinc-300 text-white rounded-xl font-bold text-lg hover:bg-sky-700 transition flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10">
                            {processing ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Icon name="check-circle" size={22} />}
                            {processing ? 'Memproses...' : 'Selesaikan Pembayaran'}
                          </button>
                        </form>
                      )}

                      {payMethod === 'qris' && (
                        <div className="text-center">
                          <QRISDisplay totalAmount={total} qrisMode={qrisMode} setQrisMode={setQrisMode} selectedSavedScanId={selectedSavedScanId} setSelectedSavedScanId={setSelectedSavedScanId} db={db} setQrisZoom={setQrisZoom} />
                          <button onClick={handleCheckout} disabled={processing} className="w-full py-4 bg-emerald-600 disabled:bg-zinc-300 text-white rounded-xl font-bold text-lg hover:bg-emerald-700 transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/10 mt-5">
                             {processing ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Icon name="check-circle" size={22} />}
                             Verifikasi & Selesaikan
                          </button>
                        </div>
                      )}

                      {payMethod === 'transfer' && (
                        <div className="space-y-4 text-left">
                          <div className="bg-sky-50 border border-sky-100 rounded-xl p-4 text-xs font-medium text-sky-850 space-y-1.5">
                            <p className="font-bold text-sm text-sky-950">Rekening Pembayaran Toko</p>
                            <p>Bank Transfer : <span className="font-mono font-bold text-sky-900">BCA - 1234567890</span></p>
                            <p>Atas Nama     : <span className="font-bold text-sky-900">POS SMILE SEJAHTERA</span></p>
                            <p className="text-[10px] text-sky-600 font-semibold pt-1 border-t border-sky-100 mt-2">Harap verifikasi mutasi masuk pada mobile banking Anda sebelum menyelesaikan transaksi.</p>
                          </div>
                          
                          <button onClick={handleCheckout} disabled={processing} className="w-full py-4 bg-sky-600 disabled:bg-zinc-300 text-white rounded-xl font-bold text-lg hover:bg-sky-700 transition flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10">
                             {processing ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Icon name="check-circle" size={22} />}
                             Konfirmasi Transfer & Selesaikan
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* DISCOUNT MODAL */}
          {showDiscountModal && (
            <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center bg-zinc-900/40 backdrop-blur-sm">
              <div className="bg-white rounded-t-3xl md:rounded-3xl shadow-2xl w-full max-w-sm p-6 animate-[slideUp_0.3s_ease-out]">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-bold text-zinc-800">Tambah Diskon</h3>
                  <button onClick={() => setShowDiscountModal(false)} className="p-2 bg-zinc-100 rounded-full text-zinc-500"><Icon name="x" size={16} /></button>
                </div>
                
                <div className="grid grid-cols-2 gap-3 mb-4">
                  <button onClick={() => { setDiscount(subtotal * 0.05); setShowDiscountModal(false); }} className="py-3 border border-zinc-200 rounded-xl font-semibold text-sky-600 hover:bg-sky-50">5% OFF</button>
                  <button onClick={() => { setDiscount(subtotal * 0.10); setShowDiscountModal(false); }} className="py-3 border border-zinc-200 rounded-xl font-semibold text-sky-600 hover:bg-sky-50">10% OFF</button>
                  <button onClick={() => { setDiscount(10000); setShowDiscountModal(false); }} className="py-3 border border-zinc-200 rounded-xl font-semibold text-sky-600 hover:bg-sky-50">- 10 Ribu</button>
                  <button onClick={() => { setDiscount(20000); setShowDiscountModal(false); }} className="py-3 border border-zinc-200 rounded-xl font-semibold text-sky-600 hover:bg-sky-50">- 20 Ribu</button>
                </div>
                <div className="relative">
                  <span className="absolute left-4 top-3 text-zinc-500 font-medium">Rp</span>
                  <input type="number" placeholder="Nominal manual" className="w-full pl-10 pr-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500" 
                    onKeyDown={(e) => {
                      if(e.key === 'Enter' && e.target.value) {
                        setDiscount(parseFloat(e.target.value)); setShowDiscountModal(false);
                      }
                    }}
                  />
                </div>
              </div>
            </div>
          )}

          {/* CRM MEMBER ADD/EDIT MODAL */}
          {showMemberModal && (
            <div className="fixed inset-0 z-[70] flex items-end md:items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4">
              <form onSubmit={handleSaveMember} className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 animate-[slideUp_0.3s_ease-out] border border-zinc-200">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-lg font-bold text-zinc-800 text-left">
                    {showMemberModal.mode === 'add' ? 'Tambah Pelanggan Baru' : 'Ubah Data Pelanggan'}
                  </h3>
                  <button type="button" onClick={() => setShowMemberModal(null)} className="p-2 bg-zinc-100 rounded-full text-zinc-500 hover:bg-zinc-200 transition">
                    <Icon name="x" size={16} />
                  </button>
                </div>
                
                <div className="space-y-4 text-left">
                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Nama Pelanggan *</label>
                    <input 
                      type="text" 
                      required 
                      value={memberInputName}
                      onChange={e => setMemberInputName(e.target.value)}
                      placeholder="Masukkan nama pelanggan"
                      className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Nomor Telepon</label>
                    <input 
                      type="text" 
                      value={memberInputPhone}
                      onChange={e => setMemberInputPhone(e.target.value)}
                      placeholder="Contoh: 08123456789"
                      className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Diskon Member (%)</label>
                    <div className="relative">
                      <input 
                        type="number" 
                        value={memberInputDiscount}
                        onChange={e => setMemberInputDiscount(e.target.value)}
                        placeholder="0"
                        className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm"
                      />
                      <span className="absolute right-4 top-3 text-zinc-400 font-bold text-sm">%</span>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3 mt-6">
                  <button type="button" onClick={() => setShowMemberModal(null)} className="py-3 bg-zinc-100 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-200 transition text-sm">Batal</button>
                  <button type="submit" className="py-3 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 transition text-sm flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10">
                    <Icon name="check-circle" size={16} /> Simpan
                  </button>
                </div>
              </form>
            </div>
          )}

          {/* QRIS ZOOM MODAL */}
          {qrisZoom && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-zinc-900/90 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out]" onClick={() => setQrisZoom(false)}>
              <div className="relative max-w-sm w-full bg-white rounded-3xl p-6 shadow-2xl flex flex-col items-center justify-center" onClick={e => e.stopPropagation()}>
                <button className="absolute top-4 right-4 p-2 text-zinc-400 hover:text-zinc-650 hover:bg-zinc-100 rounded-full transition" onClick={() => setQrisZoom(false)}>
                  <Icon name="x" size={20} />
                </button>
                
                <h3 className="text-sm font-bold text-zinc-800 mb-4">
                  {qrisMode === 'shop' && 'QR Toko (Besar)'}
                  {qrisMode === 'dynamic' && 'QR Dinamis (Besar)'}
                  {qrisMode === 'saved' && 'Scan Tersimpan (Besar)'}
                </h3>

                <div className="w-full max-w-[280px] aspect-square flex items-center justify-center border border-zinc-100 rounded-2xl overflow-hidden bg-zinc-50 p-2">
                  {qrisMode === 'shop' && (
                    <>
                      <img src="./qris.jpg" alt="QRIS Code" className="w-full h-full object-contain" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                      <div style={{display:'none'}} className="w-full h-full flex items-center justify-center text-zinc-400 text-xs text-center px-4">
                        File qris.jpg tidak ditemukan.
                      </div>
                    </>
                  )}

                  {qrisMode === 'dynamic' && (() => {
                    const amt = isSplitPayment ? (parseFloat(splitQrisAmount) || 0) : total;
                    return <DynamicQRCode text={`qris://payment?amount=${isNaN(amt) ? 0 : amt}&tx=TX${Date.now()}`} width={260} />;
                  })()}

                  {qrisMode === 'saved' && (() => {
                    const currentSavedScan = db.scans.find(s => s.id === selectedSavedScanId);
                    if (currentSavedScan) {
                      return currentSavedScan.scanType === 'photo' ? (
                        <img src={currentSavedScan.photoData} className="w-full h-full object-contain" />
                      ) : (
                        <img src={currentSavedScan.qrCode} className="w-full h-full object-contain p-2" />
                      );
                    }
                    return <span className="text-xs text-zinc-450 text-center font-semibold">Belum ada scan dipilih</span>;
                  })()}
                </div>
                
                <p className="mt-4 text-xs font-bold text-zinc-500 text-center">
                  {qrisMode === 'dynamic' && `Nominal: Rp ${(isSplitPayment ? (parseFloat(splitQrisAmount) || 0) : total).toLocaleString('id-ID')}`}
                  {qrisMode === 'saved' && (selectedSavedScanId ? `ID Scan: ${selectedSavedScanId}` : '')}
                </p>
              </div>
            </div>
          )}

          {/* POS SCANNER MODAL (Live Camera QR/Barcode) */}
          {showPOSScanner && (
            <POSScannerModal
              onClose={() => setShowPOSScanner(false)}
              onScanSuccess={handleScanSuccess}
              onPhotoCapture={handlePhotoCapture}
              appState={app}
            />
          )}

          {/* OPEN PRICE MODAL */}
          {showOpenPriceModal && selectedOpenPriceProduct && (
            <OpenPriceModal
              product={selectedOpenPriceProduct}
              onConfirm={(price) => {
                app.addToCart({ ...selectedOpenPriceProduct, price });
                app.addToast(`Ditambahkan: ${selectedOpenPriceProduct.name} @ Rp ${price.toLocaleString('id-ID')}`, 'success');
                setShowOpenPriceModal(false);
                setSelectedOpenPriceProduct(null);
              }}
              onCancel={() => {
                setShowOpenPriceModal(false);
                setSelectedOpenPriceProduct(null);
              }}
            />
          )}
        </div>
      );
    }

    function CategoryModal({ onClose, app }) {
      const [categories, setCategories] = useState([]);
      const [newCategory, setNewCategory] = useState('');
      const [editIndex, setEditIndex] = useState(-1);
      const [editValue, setEditValue] = useState('');

      useEffect(() => {
        setCategories(getDB().categories || []);
      }, [app.dbVersion]);

      const handleAdd = (e) => {
        e.preventDefault();
        const trimmed = newCategory.trim();
        if (!trimmed) return;
        if (categories.includes(trimmed)) {
          app.addToast('Kategori sudah ada', 'error');
          return;
        }
        const db = getDB();
        db.categories.push(trimmed);
        saveDB(db);
        app.refreshDB();
        setNewCategory('');
        app.addToast('Kategori ditambahkan', 'success');
      };

      const handleSaveEdit = (idx) => {
        const trimmed = editValue.trim();
        if (!trimmed) return;
        if (categories.includes(trimmed) && categories[idx] !== trimmed) {
          app.addToast('Kategori sudah ada', 'error');
          return;
        }
        const db = getDB();
        const oldName = db.categories[idx];
        db.categories[idx] = trimmed;
        
        // Update products category if they were using the old category
        db.products = db.products.map(p => {
          if (p.category === oldName) p.category = trimmed;
          return p;
        });

        saveDB(db);
        app.refreshDB();
        setEditIndex(-1);
        app.addToast('Kategori diperbarui', 'success');
      };

      const handleDelete = (idx) => {
        const catName = categories[idx];
        const db = getDB();
        const isUsed = db.products.some(p => p.category === catName && p.active);
        if (isUsed) {
          if (!confirm(`Kategori "${catName}" sedang digunakan oleh produk aktif. Tetap hapus?`)) {
            return;
          }
        }
        db.categories.splice(idx, 1);
        saveDB(db);
        app.refreshDB();
        app.addToast('Kategori dihapus', 'success');
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[slideUp_0.3s_ease-out] flex flex-col max-h-[85vh]">
            <div className="px-6 py-5 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <h3 className="text-xl font-bold text-zinc-800 text-left">Kelola Kategori</h3>
              <button onClick={onClose} className="p-2 bg-zinc-100 hover:bg-zinc-200 rounded-full transition"><Icon name="x" size={18} /></button>
            </div>
            
            <div className="p-6 flex-1 overflow-y-auto space-y-5 custom-scroll">
              <form onSubmit={handleAdd} className="flex gap-2">
                <input 
                  type="text" 
                  value={newCategory} 
                  onChange={e => setNewCategory(e.target.value)}
                  placeholder="Kategori baru..." 
                  className="flex-1 px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white focus:border-sky-500 font-medium text-sm text-zinc-800"
                  required
                />
                <button type="submit" className="px-4 py-2.5 bg-zinc-900 hover:bg-zinc-800 text-white rounded-xl font-semibold text-sm shadow-md">Tambah</button>
              </form>

              <div className="divide-y divide-zinc-100 border border-zinc-200 rounded-2xl overflow-hidden bg-white">
                {categories.map((c, idx) => (
                  <div key={idx} className="p-4 flex items-center justify-between gap-3 hover:bg-zinc-50/30">
                    {editIndex === idx ? (
                      <div className="flex-1 flex gap-2">
                        <input 
                          type="text" 
                          value={editValue} 
                          onChange={e => setEditValue(e.target.value)}
                          className="flex-1 px-3 py-1.5 bg-white border border-zinc-300 rounded-lg outline-none focus:border-sky-500 text-sm font-semibold"
                          autoFocus
                        />
                        <button onClick={() => handleSaveEdit(idx)} className="p-2 text-emerald-600 bg-emerald-50 rounded-lg hover:bg-emerald-100"><Icon name="check" size={16}/></button>
                        <button onClick={() => setEditIndex(-1)} className="p-2 text-zinc-500 bg-zinc-100 rounded-lg hover:bg-zinc-200"><Icon name="x" size={16}/></button>
                      </div>
                    ) : (
                      <>
                        <span className="font-semibold text-zinc-700 text-sm">{c}</span>
                        <div className="flex gap-1">
                          <button onClick={() => { setEditIndex(idx); setEditValue(c); }} className="p-2 text-sky-600 hover:bg-sky-50 rounded-lg"><Icon name="edit" size={14} /></button>
                          <button onClick={() => handleDelete(idx)} className="p-2 text-rose-600 hover:bg-rose-50 rounded-lg"><Icon name="trash-2" size={14} /></button>
                        </div>
                      </>
                    )}
                  </div>
                ))}
                {categories.length === 0 && <div className="p-6 text-center text-zinc-400 text-sm">Belum ada kategori</div>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // 3. PRODUCTS PAGE
    function ProductsPage() {
      const app = useContext(AppContext);
      const [products, setProducts] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [showCategoryModal, setShowCategoryModal] = useState(false);
      const [editProduct, setEditProduct] = useState(null);
      
      // Pagination
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 8;

      const loadProducts = useCallback(() => {
        setProducts(getDB().products);
      }, [app.dbVersion]);

      useEffect(() => { loadProducts(); }, [loadProducts]);

      // Filter active and sort desc by updatedAt
      const activeProducts = products.filter(p => p.active !== false);
      const sortedProducts = [...activeProducts].sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

      const totalPages = Math.ceil(sortedProducts.length / itemsPerPage);
      const displayedProducts = sortedProducts.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

      const handleExportCSV = () => {
        try {
          const db = getDB();
          const activeProds = db.products.filter(p => p.active !== false);
          const headers = ['SKU', 'Nama', 'Kategori', 'Harga Jual', 'Modal', 'Stok', 'Harga Grosir', 'Minimal Grosir', 'Batas Minimum Stok'];
          const rows = activeProds.map(p => [
            p.sku || '',
            p.name || '',
            p.category || '',
            p.price || 0,
            p.cost || 0,
            p.stock || 0,
            p.wholesalePrice || 0,
            p.wholesaleMinQty || 0,
            p.minStock || 5
          ]);
          const csvContent = [headers, ...rows].map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(",")).join("\n");
          const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.setAttribute("href", url);
          link.setAttribute("download", `Data_Produk_${new Date().toISOString().slice(0,10)}.csv`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
          app.addToast('Data produk berhasil diekspor ke CSV', 'success');
        } catch (err) {
          console.error("Gagal ekspor CSV:", err);
          app.addToast('Gagal ekspor data produk', 'error');
        }
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const lines = text.split(/\r\n|\n/);
            if (lines.length <= 1) {
              app.addToast('File CSV kosong atau tidak valid', 'error');
              return;
            }
            
            const db = getDB();
            let importedCount = 0;
            let updatedCount = 0;
            const nowStr = new Date().toISOString();
            
            const parseCSVLine = (line) => {
              const result = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                  inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                  result.push(current.trim());
                  current = '';
                } else {
                  current += char;
                }
              }
              result.push(current.trim());
              return result;
            };
            
            for (let i = 1; i < lines.length; i++) {
              const line = lines[i].trim();
              if (!line) continue;
              
              const columns = parseCSVLine(line);
              if (columns.length < 6) continue;
              
              const sku = columns[0] || `SKU${Date.now().toString().slice(-4)}_${i}`;
              const name = columns[1];
              const category = columns[2] || 'Lainnya';
              const price = parseFloat(columns[3]) || 0;
              const cost = parseFloat(columns[4]) || 0;
              const stock = parseFloat(columns[5]) || 0;
              const wholesalePrice = parseFloat(columns[6]) || 0;
              const wholesaleMinQty = parseFloat(columns[7]) || 0;
              const minStock = parseFloat(columns[8]) || 5;
              
              if (!name) continue;
              
              const existingIdx = db.products.findIndex(p => p.sku.toLowerCase() === sku.toLowerCase());
              if (existingIdx !== -1) {
                db.products[existingIdx] = {
                  ...db.products[existingIdx],
                  name,
                  category,
                  price,
                  cost,
                  stock,
                  wholesalePrice,
                  wholesaleMinQty,
                  minStock,
                  active: true,
                  updatedAt: nowStr
                };
                updatedCount++;
              } else {
                db.products.push({
                  id: 'p_' + Date.now() + '_' + i,
                  sku,
                  name,
                  category,
                  price,
                  cost,
                  stock,
                  wholesalePrice,
                  wholesaleMinQty,
                  minStock,
                  active: true,
                  createdAt: nowStr,
                  updatedAt: nowStr
                });
                importedCount++;
              }
              
              if (category && !db.categories.includes(category)) {
                db.categories.push(category);
              }
            }
            
            saveDB(db);
            app.refreshDB();
            logAuditAction('Impor CSV', `Mengimpor produk via CSV secara massal. ${importedCount} baru, ${updatedCount} diperbarui.`, app.user);
            app.addToast(`Impor selesai: ${importedCount} baru, ${updatedCount} diperbarui.`, 'success');
          } catch (err) {
            console.error("Gagal impor CSV:", err);
            app.addToast('Gagal memproses file CSV', 'error');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const handleSave = (data) => {
        const valError = validateProductData(data, editProduct ? editProduct.id : null);
        if (valError) {
          app.addToast(valError, 'error');
          return;
        }

        const db = getDB();
        const nowStr = new Date().toISOString();
        if (editProduct) {
          const idx = db.products.findIndex(p => p.id === editProduct.id);
          if (idx !== -1) {
            db.products[idx] = { 
              ...db.products[idx], 
              ...data,
              updatedAt: nowStr
            };
          }
          logAuditAction('Ubah Produk', `Mengubah produk "${data.name}" (SKU: ${data.sku}). Harga: Rp ${data.price}, Stok: ${data.stock}`, app.user);
          app.addToast('Produk diperbarui', 'success');
        } else {
          db.products.push({ 
            id: 'p' + Date.now(), 
            ...data, 
            active: true,
            createdAt: nowStr,
            updatedAt: nowStr
          });
          logAuditAction('Tambah Produk', `Menambahkan produk baru "${data.name}" (SKU: ${data.sku}) dengan stok ${data.stock}`, app.user);
          app.addToast('Produk ditambahkan', 'success');
        }
        saveDB(db);
        app.refreshDB();
        setShowForm(false);
        setEditProduct(null);
      };

      const handleDelete = (id) => {
        if(confirm('Hapus produk ini?')) {
          const db = getDB();
          const idx = db.products.findIndex(p => p.id === id);
          if (idx !== -1) {
            const prod = db.products[idx];
            prod.active = false;
            prod.updatedAt = new Date().toISOString();
            logAuditAction('Hapus Produk', `Menghapus produk "${prod.name}" (SKU: ${prod.sku})`, app.user);
            saveDB(db);
            app.refreshDB();
            app.addToast('Produk dihapus', 'success');
          }
        }
      };

      return (
        <div className="pb-16 md:pb-0">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
              <h3 className="text-xl font-bold text-zinc-800">Manajemen Produk</h3>
              <p className="text-sm text-zinc-500">Kelola katalog dan stok barang</p>
            </div>
            <div className="flex flex-wrap gap-2 w-full sm:w-auto mt-2 sm:mt-0">
              <button 
                onClick={() => setShowCategoryModal(true)} 
                className="px-4 py-2.5 bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 shadow-sm"
              >
                <Icon name="tags" size={16} /> Kategori
              </button>
              
              {/* Import/Export CSV */}
              <button 
                onClick={handleExportCSV} 
                className="px-4 py-2.5 bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 shadow-sm"
                title="Ekspor Inventaris ke CSV"
              >
                <Icon name="download" size={16} /> Ekspor
              </button>
              
              <label className="px-4 py-2.5 bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 shadow-sm cursor-pointer">
                <Icon name="upload" size={16} /> Impor
                <input type="file" accept=".csv" onChange={handleImportCSV} className="hidden" />
              </label>

              <button 
                onClick={() => { setEditProduct(null); setShowForm(true); }} 
                className="px-4 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 transition bg-zinc-900 hover:bg-zinc-800 text-white shadow-md"
              >
                <Icon name="plus" size={16} /> Tambah Produk
              </button>
            </div>
          </div>

          {/* Admin Approval Section for Product Proposals */}
          {app.user?.role === 'admin' && (
            <>
              {(() => {
                const db = getDB();
                const pendingProposals = db.productProposals?.filter(p => p.status === 'pending') || [];
                return pendingProposals.length > 0 ? (
                  <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-6">
                    <h4 className="font-bold text-amber-900 mb-4 flex items-center gap-2">
                      <Icon name="inbox" size={20} /> Pengajuan Produk dari Kasir ({pendingProposals.length})
                    </h4>
                    <div className="space-y-3 max-h-64 overflow-y-auto">
                      {pendingProposals.map(prop => (
                        <div key={prop.id} className="bg-white rounded-lg p-3 border border-amber-100 text-sm">
                          <div className="flex justify-between items-start mb-2">
                            <div>
                              <p className="font-semibold text-zinc-800">{prop.name}</p>
                              <p className="text-xs text-zinc-500">Dari: {prop.proposedByName} • Rp {prop.price?.toLocaleString('id-ID') || 0}</p>
                            </div>
                            <div className="flex gap-1">
                              <button 
                                onClick={() => {
                                  const db2 = getDB();
                                  db2.products.push({ id: 'p' + Date.now(), ...prop, active: true, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
                                  const pidx = db2.productProposals.findIndex(x => x.id === prop.id);
                                  if(pidx !== -1) db2.productProposals[pidx].status = 'approved';
                                  saveDB(db2);
                                  app.refreshDB();
                                  app.addToast(`Produk "${prop.name}" disetujui`, 'success');
                                }}
                                className="px-2 py-1 bg-emerald-500 hover:bg-emerald-600 text-white rounded text-xs font-semibold transition"
                              >
                                Terima
                              </button>
                              <button 
                                onClick={() => {
                                  const db2 = getDB();
                                  const pidx = db2.productProposals.findIndex(x => x.id === prop.id);
                                  if(pidx !== -1) db2.productProposals[pidx].status = 'rejected';
                                  saveDB(db2);
                                  app.refreshDB();
                                  app.addToast(`Produk "${prop.name}" ditolak`, 'info');
                                }}
                                className="px-2 py-1 bg-rose-500 hover:bg-rose-600 text-white rounded text-xs font-semibold transition"
                              >
                                Tolak
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : null;
              })()}
            </>
          )}

          {/* Desktop Table View */}
          <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden">
            <table className="w-full">
              <thead>
                <tr className="bg-zinc-50 border-b border-zinc-200">
                  <th className="text-left px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Produk</th>
                  <th className="text-left px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Kategori</th>
                  <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Harga</th>
                  <th className="text-center px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Stok</th>
                  <th className="text-center px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Aksi</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-zinc-100">
                {displayedProducts.map(p => (
                  <tr key={p.id} className="hover:bg-zinc-50/50">
                    <td className="px-6 py-4 flex items-center gap-4 text-left">
                      {p.image ? (
                        <img src={p.image} className="w-10 h-10 rounded-lg object-cover border border-zinc-200" />
                      ) : (
                         <div className="w-10 h-10 bg-sky-100 text-sky-600 rounded-lg flex items-center justify-center font-bold">{p.name.substring(0,2).toUpperCase()}</div>
                      )}
                      <div>
                        <div className="font-semibold text-zinc-800">{p.name}</div>
                        <div className="text-xs text-zinc-500 font-mono mt-0.5">{p.sku}</div>
                        <div className="text-[10px] text-zinc-400 mt-2 flex items-center gap-1 font-medium">
                          <Icon name="clock" size={10} />
                          <span>Update: {formatTimeAgo(p.updatedAt)}</span>
                        </div>
                      </div>
                    </td>
                    <td className="px-6 py-4 text-sm text-zinc-600 text-left">
                      <span className="bg-zinc-100 px-3 py-1 rounded-full text-xs font-medium">{p.category}</span>
                    </td>
                    <td className="px-6 py-4 text-sm text-right font-bold text-zinc-700">Rp {p.price.toLocaleString('id-ID')}</td>
                    <td className="px-6 py-4 text-center">
                      <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold ${p.stock <= 5 ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}`}>
                        {p.stock}
                      </span>
                    </td>
                    <td className="px-6 py-4">
                      <div className="flex justify-center gap-2">
                        <button onClick={() => { setEditProduct(p); setShowForm(true); }} className="p-2 text-sky-600 bg-sky-50 hover:bg-sky-100 rounded-lg transition"><Icon name="edit" size={16} /></button>
                        <button onClick={() => handleDelete(p.id)} className="p-2 text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg transition"><Icon name="trash-2" size={16} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Mobile Card View */}
          <div className="md:hidden flex flex-col gap-4">
            {displayedProducts.map(p => (
              <div key={p.id} className="bg-white p-4 rounded-2xl border border-zinc-200 shadow-sm flex flex-col gap-3">
                <div className="flex items-start gap-3 text-left">
                  {p.image ? (
                     <img src={p.image} className="w-14 h-14 rounded-xl object-cover border border-zinc-200" />
                  ) : (
                     <div className="w-14 h-14 bg-sky-100 text-sky-600 rounded-xl flex items-center justify-center font-bold text-xl flex-shrink-0">{p.name.substring(0,2).toUpperCase()}</div>
                  )}
                  <div className="flex-1">
                    <h4 className="font-bold text-zinc-800 leading-tight">{p.name}</h4>
                    <p className="text-xs text-zinc-500 font-mono mt-1">{p.sku}</p>
                    <span className="inline-block bg-zinc-100 text-zinc-600 px-2 py-0.5 rounded text-[10px] font-medium mt-1">{p.category}</span>
                    <p className="text-[10px] text-zinc-400 mt-2 flex items-center gap-1 font-medium">
                      <Icon name="clock" size={10} />
                      <span>Update: {formatTimeAgo(p.updatedAt)}</span>
                    </p>
                  </div>
                </div>
                <div className="flex justify-between items-end border-t border-zinc-100 pt-3">
                  <div className="text-left">
                    <p className="text-xs text-zinc-500 mb-0.5">Harga & Stok</p>
                    <div className="flex items-center gap-2">
                       <span className="font-bold text-sky-600">Rp {p.price.toLocaleString('id-ID')}</span>
                       <span className="text-zinc-300">•</span>
                       <span className={`text-xs font-bold ${p.stock <= 5 ? 'text-rose-500' : 'text-emerald-600'}`}>{p.stock} item</span>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => { setEditProduct(p); setShowForm(true); }} className="p-2.5 bg-zinc-100 text-zinc-700 rounded-xl"><Icon name="edit" size={18} /></button>
                    <button onClick={() => handleDelete(p.id)} className="p-2.5 bg-rose-50 text-rose-600 rounded-xl"><Icon name="trash-2" size={18} /></button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Pagination */}
          {totalPages > 1 && (
            <div className="mt-6 flex justify-between items-center bg-white px-4 py-3 rounded-xl border border-zinc-200">
               <button 
                 disabled={currentPage === 1} 
                 onClick={() => setCurrentPage(p => p - 1)}
                 className="px-4 py-2 text-sm font-medium text-zinc-600 bg-zinc-50 rounded-lg disabled:opacity-50"
               >
                 Prev
               </button>
               <span className="text-sm font-medium text-zinc-600">Hal {currentPage} dari {totalPages}</span>
               <button 
                 disabled={currentPage === totalPages} 
                 onClick={() => setCurrentPage(p => p + 1)}
                 className="px-4 py-2 text-sm font-medium text-zinc-600 bg-zinc-50 rounded-lg disabled:opacity-50"
               >
                 Next
               </button>
            </div>
          )}

          {/* Form Modal */}
          {showForm && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto custom-scroll animate-[slideUp_0.3s_ease-out]">
                <div className="sticky top-0 bg-white/90 backdrop-blur-md px-6 py-5 border-b border-zinc-100 flex justify-between items-center z-10">
                  <h3 className="text-xl font-bold text-zinc-800">{editProduct ? 'Edit Produk' : 'Tambah Produk'}</h3>
                  <button onClick={() => setShowForm(false)} className="p-2 bg-zinc-100 hover:bg-zinc-200 rounded-full transition"><Icon name="x" size={18} /></button>
                </div>
                <ProductForm product={editProduct} onSave={handleSave} onCancel={() => setShowForm(false)} />
              </div>
            </div>
          )}

          {/* Category Management Modal */}
          {showCategoryModal && (
            <CategoryModal onClose={() => setShowCategoryModal(false)} app={app} />
          )}
        </div>
      );
    }

    function ProductForm({ product, onSave, onCancel }) {
      const dbCategories = getDB().categories || ['Makanan', 'Minuman', 'Snack'];
      
      const [form, setForm] = useState({
        sku: product?.sku || `SKU${Date.now().toString().slice(-4)}`,
        name: product?.name || '',
        category: product?.category || dbCategories[0] || 'Makanan',
        price: product?.price || '',
        cost: product?.cost || '',
        stock: product?.stock || '',
        image: product?.image || '',
        wholesalePrice: product?.wholesalePrice || '',
        wholesaleMinQty: product?.wholesaleMinQty || '',
        taxIncluded: product?.taxIncluded || false,
        openPrice: product?.openPrice || false,
        minStock: product?.minStock || 5
      });

      const handleImage = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 300;
            let { width, height } = img;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            setForm({...form, image: canvas.toDataURL('image/jpeg', 0.8)});
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <form onSubmit={e => { e.preventDefault(); onSave(form); }} className="p-6 space-y-5">
          <div className="flex justify-center mb-2">
            <div className="relative">
              <div className="w-24 h-24 rounded-2xl bg-zinc-100 border-2 border-dashed border-zinc-300 flex items-center justify-center overflow-hidden">
                {form.image ? <img src={form.image} className="w-full h-full object-cover" /> : <Icon name="image" size={32} className="text-zinc-400" />}
              </div>
              <label className="absolute -bottom-2 -right-2 p-2 bg-zinc-800 text-white rounded-full shadow-lg cursor-pointer hover:bg-zinc-700">
                <Icon name="camera" size={14} />
                <input type="file" accept="image/*" onChange={handleImage} className="hidden" />
              </label>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2 text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Nama Barang / Menu</label>
              <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:bg-white focus:border-zinc-500 outline-none font-medium text-zinc-800" required />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Kode Barang</label>
              <input type="text" value={form.sku} onChange={e => setForm({...form, sku: e.target.value})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-mono text-sm text-zinc-800 focus:bg-white focus:border-zinc-500" required placeholder="Contoh: SKU001" />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Kategori</label>
              <select 
                value={form.category} 
                onChange={e => setForm({...form, category: e.target.value})} 
                className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500" 
                required
              >
                {dbCategories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Harga untuk Pembeli</label>
              <input type="number" value={form.price} onChange={e => setForm({...form, price: parseInt(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-semibold text-zinc-800 focus:bg-white focus:border-zinc-500" required disabled={form.openPrice} placeholder={form.openPrice ? "Diisi saat transaksi" : "0"} />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Modal / Harga Beli</label>
              <input type="number" value={form.cost} onChange={e => setForm({...form, cost: parseInt(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-semibold text-zinc-800 focus:bg-white focus:border-zinc-500" required placeholder="Modal per barang" />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Stok</label>
              <input type="number" value={form.stock} onChange={e => setForm({...form, stock: parseFloat(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500" required />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Batas Minimum Stok</label>
              <input type="number" value={form.minStock} onChange={e => setForm({...form, minStock: parseFloat(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500" required placeholder="Contoh: 5" />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Harga Jika Beli Banyak (Grosir)</label>
              <input type="number" value={form.wholesalePrice} onChange={e => setForm({...form, wholesalePrice: parseInt(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-semibold text-zinc-800 focus:bg-white focus:border-zinc-500" placeholder="0" />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Minimal Beli Banyak (Qty)</label>
              <input type="number" value={form.wholesaleMinQty} onChange={e => setForm({...form, wholesaleMinQty: parseInt(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500" placeholder="Contoh: 5" />
            </div>

            <div className="col-span-2 flex flex-col gap-3 py-2.5 border-t border-b border-zinc-150 my-1">
              <label className="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" checked={form.taxIncluded} onChange={e => setForm({...form, taxIncluded: e.target.checked})} className="w-4 h-4 rounded text-zinc-700 border-zinc-300 focus:ring-zinc-500" />
                <span className="text-sm font-semibold text-zinc-700">Harga di atas sudah termasuk PPN 10%</span>
              </label>
              <label className="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" checked={form.openPrice} onChange={e => setForm({...form, openPrice: e.target.checked, price: e.target.checked ? 0 : form.price})} className="w-4 h-4 rounded text-zinc-700 border-zinc-300 focus:ring-zinc-500" />
                <span className="text-sm font-semibold text-zinc-700">Harga diisi manual saat transaksi</span>
              </label>
            </div>
          </div>

          <div className="flex gap-3 pt-4 border-t border-zinc-100">
            <button type="button" onClick={onCancel} className="flex-1 py-3 bg-zinc-100 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-200 transition">Batal</button>
            <button type="submit" className="flex-1 py-3 bg-zinc-900 text-white rounded-xl font-semibold hover:bg-zinc-800 transition shadow-lg">Simpan</button>
          </div>
        </form>
      );
    }

    function TransactionEditModal({ tx, onClose, app }) {
      const [cashier, setCashier] = useState(tx.cashier);
      const [method, setMethod] = useState(tx.method || 'cash');
      const [discount, setDiscount] = useState(tx.discount || 0);
      const [items, setItems] = useState(JSON.parse(JSON.stringify(tx.items))); // deep clone
      
      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
      const total = subtotal - discount;

      const handleUpdateQty = (itemId, delta) => {
        const db = getDB();
        const prod = db.products.find(p => p.id === itemId);
        if (!prod) return;

        setItems(prev => prev.map(item => {
          if (item.id === itemId) {
            const currentTxQty = item.qty;
            const newTxQty = currentTxQty + delta;
            
            if (newTxQty < 1) return item;

            const diff = newTxQty - currentTxQty;
            if (diff > 0 && prod.stock < diff) {
              app.addToast(`Stok ${prod.name} tidak mencukupi untuk ditambah`, 'error');
              return item;
            }
            return { ...item, qty: newTxQty };
          }
          return item;
        }));
      };

      const handleRemoveItem = (itemId) => {
        if (items.length <= 1) {
          app.addToast('Transaksi harus memiliki minimal 1 produk', 'error');
          return;
        }
        setItems(prev => prev.filter(i => i.id !== itemId));
      };

      const handleSave = () => {
        const db = getDB();
        const txIdx = db.transactions.findIndex(t => t.id === tx.id);
        if (txIdx === -1) return;

        const originalTx = db.transactions[txIdx];
        
        // Rollback old stock changes for the original items
        originalTx.items.forEach(oldItem => {
          const prod = db.products.find(p => p.id === oldItem.id);
          if (prod) {
            prod.stock += oldItem.qty; // restore original stock
          }
        });

        // Verify and apply new stock deductions
        let stockOk = true;
        let failedProd = '';
        items.forEach(newItem => {
          const prod = db.products.find(p => p.id === newItem.id);
          if (!prod || prod.stock < newItem.qty) {
            stockOk = false;
            failedProd = prod ? prod.name : 'Produk tidak ditemukan';
          }
        });

        if (!stockOk) {
          app.addToast(`Stok ${failedProd} tidak mencukupi`, 'error');
          // Re-rollback products to keep database consistent
          originalTx.items.forEach(oldItem => {
            const prod = db.products.find(p => p.id === oldItem.id);
            if (prod) {
              prod.stock -= oldItem.qty;
            }
          });
          return;
        }

        // Apply new stock deductions
        items.forEach(newItem => {
          const prod = db.products.find(p => p.id === newItem.id);
          if (prod) {
            prod.stock -= newItem.qty;
            prod.updatedAt = new Date().toISOString();
          }
        });

        // Update transaction details
        originalTx.cashier = cashier;
        originalTx.method = method;
        originalTx.discount = discount;
        originalTx.items = items;
        originalTx.subtotal = subtotal;
        originalTx.total = total;
        originalTx.updatedAt = new Date().toISOString();

        saveDB(db);
        app.refreshDB();
        app.addToast('Transaksi berhasil diperbarui', 'success');
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[95vh] overflow-hidden flex flex-col shadow-2xl">
            <div className="p-6 border-b border-zinc-150 flex justify-between items-center bg-zinc-50">
              <div>
                <h3 className="text-lg font-bold text-zinc-950">Edit Transaksi</h3>
                <p className="text-xs text-zinc-500 mt-0.5">ID Transaksi: {tx.id}</p>
              </div>
              <button onClick={onClose} className="p-1.5 hover:bg-zinc-200 rounded-lg transition text-zinc-500">
                <Icon name="x" size={20} />
              </button>
            </div>
            
            <div className="p-6 flex-1 overflow-y-auto space-y-6 text-left">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Kasir</label>
                  <input 
                    type="text" 
                    value={cashier} 
                    onChange={e => setCashier(e.target.value)} 
                    className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:bg-white focus:border-zinc-500 outline-none font-medium text-zinc-800" 
                  />
                </div>
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Metode Pembayaran</label>
                  <select 
                    value={method} 
                    onChange={e => setMethod(e.target.value)} 
                    className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500"
                  >
                    <option value="cash">Tunai (Cash)</option>
                    <option value="qris">QRIS</option>
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3">Item Produk</label>
                <div className="border border-zinc-150 rounded-xl overflow-hidden divide-y divide-zinc-100">
                  {items.map(item => (
                    <div key={item.id} className="p-4 flex items-center justify-between gap-4">
                      <div className="flex-1 min-w-0">
                        <p className="font-semibold text-zinc-800 truncate text-sm">{item.name}</p>
                        <p className="text-xs text-zinc-400 font-medium">Rp {item.price.toLocaleString('id-ID')} x {item.qty}</p>
                      </div>
                      
                      <div className="flex items-center gap-3">
                        <div className="flex items-center bg-zinc-100 rounded-lg p-0.5 border border-zinc-200">
                          <button type="button" onClick={() => handleUpdateQty(item.id, -1)} className="p-1 hover:bg-white rounded text-zinc-650 transition"><Icon name="minus" size={14} /></button>
                          <span className="w-10 text-center font-bold text-xs text-zinc-800">{item.qty}</span>
                          <button type="button" onClick={() => handleUpdateQty(item.id, 1)} className="p-1 hover:bg-white rounded text-zinc-650 transition"><Icon name="plus" size={14} /></button>
                        </div>
                        
                        <button type="button" onClick={() => handleRemoveItem(item.id)} className="p-2 hover:bg-rose-50 rounded-lg text-rose-500 transition" title="Hapus Produk">
                          <Icon name="trash-2" size={16} />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="p-4 bg-zinc-50 rounded-xl border border-zinc-150 space-y-2">
                <div className="flex justify-between text-sm text-zinc-650">
                  <span>Subtotal</span>
                  <span className="font-semibold text-zinc-800">Rp {subtotal.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between items-center text-sm text-zinc-650">
                  <span>Diskon</span>
                  <input 
                    type="number" 
                    value={discount} 
                    onChange={e => setDiscount(Math.max(0, parseInt(e.target.value) || 0))} 
                    className="w-28 text-right px-2.5 py-1 bg-zinc-50 border border-zinc-200 rounded-lg outline-none font-semibold focus:bg-white text-zinc-850" 
                  />
                </div>
                <div className="flex justify-between text-lg font-bold text-zinc-950 pt-2 border-t border-zinc-200">
                  <span>Total Tagihan Baru</span>
                  <span className="text-sky-600">Rp {total.toLocaleString('id-ID')}</span>
                </div>
              </div>
            </div>
            
            <div className="p-6 bg-zinc-50 flex gap-3 border-t border-zinc-150">
              <button type="button" onClick={onClose} className="flex-1 py-3 bg-white border border-zinc-200 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-100 transition">Batal</button>
              <button type="button" onClick={handleSave} className="flex-1 py-3 bg-zinc-900 text-white rounded-xl font-semibold hover:bg-zinc-800 transition shadow-md">Simpan Perubahan</button>
            </div>
          </div>
        </div>
      );
    }

    function ReportsPage() {
      const app = useContext(AppContext);
      const db = getDB();
      const [filter, setFilter] = useState('7days');
