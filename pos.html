    function CategoryModal({ onClose, app }) {
      const [categories, setCategories] = useState([]);
      const [newCategory, setNewCategory] = useState('');
      const [editIndex, setEditIndex] = useState(-1);
      const [editValue, setEditValue] = useState('');

      useEffect(() => {
        setCategories(getDB().categories || []);
      }, [app.dbVersion]);

      const handleAdd = (e) => {
        e.preventDefault();
        const trimmed = newCategory.trim();
        if (!trimmed) return;
        if (categories.includes(trimmed)) {
          app.addToast('Kategori sudah ada', 'error');
          return;
        }
        const db = getDB();
        db.categories.push(trimmed);
        saveDB(db);
        app.refreshDB();
        setNewCategory('');
        app.addToast('Kategori ditambahkan', 'success');
      };

      const handleSaveEdit = (idx) => {
        const trimmed = editValue.trim();
        if (!trimmed) return;
        if (categories.includes(trimmed) && categories[idx] !== trimmed) {
          app.addToast('Kategori sudah ada', 'error');
          return;
        }
        const db = getDB();
        const oldName = db.categories[idx];
        db.categories[idx] = trimmed;
        
        // Update products category if they were using the old category
        db.products = db.products.map(p => {
          if (p.category === oldName) p.category = trimmed;
          return p;
        });

        saveDB(db);
        app.refreshDB();
        setEditIndex(-1);
        app.addToast('Kategori diperbarui', 'success');
      };

      const handleDelete = (idx) => {
        const catName = categories[idx];
        const db = getDB();
        const isUsed = db.products.some(p => p.category === catName && p.active);
        if (isUsed) {
          if (!confirm(`Kategori "${catName}" sedang digunakan oleh produk aktif. Tetap hapus?`)) {
            return;
          }
        }
        db.categories.splice(idx, 1);
        saveDB(db);
        app.refreshDB();
        app.addToast('Kategori dihapus', 'success');
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[slideUp_0.3s_ease-out] flex flex-col max-h-[85vh]">
            <div className="px-6 py-5 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <h3 className="text-xl font-bold text-zinc-800 text-left">Kelola Kategori</h3>
              <button onClick={onClose} className="p-2 bg-zinc-100 hover:bg-zinc-200 rounded-full transition"><Icon name="x" size={18} /></button>
            </div>
            
            <div className="p-6 flex-1 overflow-y-auto space-y-5 custom-scroll">
              <form onSubmit={handleAdd} className="flex gap-2">
                <input 
                  type="text" 
                  value={newCategory} 
                  onChange={e => setNewCategory(e.target.value)}
                  placeholder="Kategori baru..." 
                  className="flex-1 px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white focus:border-sky-500 font-medium text-sm text-zinc-800"
                  required
                />
                <button type="submit" className="px-4 py-2.5 bg-zinc-900 hover:bg-zinc-800 text-white rounded-xl font-semibold text-sm shadow-md">Tambah</button>
              </form>

              <div className="divide-y divide-zinc-100 border border-zinc-200 rounded-2xl overflow-hidden bg-white">
                {categories.map((c, idx) => (
                  <div key={idx} className="p-4 flex items-center justify-between gap-3 hover:bg-zinc-50/30">
                    {editIndex === idx ? (
                      <div className="flex-1 flex gap-2">
                        <input 
                          type="text" 
                          value={editValue} 
                          onChange={e => setEditValue(e.target.value)}
                          className="flex-1 px-3 py-1.5 bg-white border border-zinc-300 rounded-lg outline-none focus:border-sky-500 text-sm font-semibold"
                          autoFocus
                        />
                        <button onClick={() => handleSaveEdit(idx)} className="p-2 text-emerald-600 bg-emerald-50 rounded-lg hover:bg-emerald-100"><Icon name="check" size={16}/></button>
                        <button onClick={() => setEditIndex(-1)} className="p-2 text-zinc-500 bg-zinc-100 rounded-lg hover:bg-zinc-200"><Icon name="x" size={16}/></button>
                      </div>
                    ) : (
                      <>
                        <span className="font-semibold text-zinc-700 text-sm">{c}</span>
                        <div className="flex gap-1">
                          <button onClick={() => { setEditIndex(idx); setEditValue(c); }} className="p-2 text-sky-600 hover:bg-sky-50 rounded-lg"><Icon name="edit" size={14} /></button>
                          <button onClick={() => handleDelete(idx)} className="p-2 text-rose-600 hover:bg-rose-50 rounded-lg"><Icon name="trash-2" size={14} /></button>
                        </div>
                      </>
                    )}
                  </div>
                ))}
                {categories.length === 0 && <div className="p-6 text-center text-zinc-400 text-sm">Belum ada kategori</div>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // 3. PRODUCTS PAGE
    function ProductsPage() {
      const app = useContext(AppContext);
      const [products, setProducts] = useState([]);
      const [showForm, setShowForm] = useState(false);
      const [showCategoryModal, setShowCategoryModal] = useState(false);
      const [editProduct, setEditProduct] = useState(null);
      
      // Pagination
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 8;

      const loadProducts = useCallback(() => {
        setProducts(getDB().products);
      }, [app.dbVersion]);

      useEffect(() => { loadProducts(); }, [loadProducts]);

      // Filter active and sort desc by updatedAt
      const activeProducts = products.filter(p => p.active !== false);
      const sortedProducts = [...activeProducts].sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

      const totalPages = Math.ceil(sortedProducts.length / itemsPerPage);
      const displayedProducts = sortedProducts.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

      const handleExportCSV = () => {
        try {
          const db = getDB();
          const activeProds = db.products.filter(p => p.active !== false);
          const headers = ['SKU', 'Nama', 'Kategori', 'Harga Jual', 'Modal', 'Stok', 'Harga Grosir', 'Minimal Grosir', 'Batas Minimum Stok'];
          const rows = activeProds.map(p => [
            p.sku || '',
            p.name || '',
            p.category || '',
            p.price || 0,
            p.cost || 0,
            p.stock || 0,
            p.wholesalePrice || 0,
            p.wholesaleMinQty || 0,
            p.minStock || 5
          ]);
          const csvContent = [headers, ...rows].map(e => e.map(val => `"${String(val).replace(/"/g, '""')}"`).join(",")).join("\n");
          const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.setAttribute("href", url);
          link.setAttribute("download", `Data_Produk_${new Date().toISOString().slice(0,10)}.csv`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
          app.addToast('Data produk berhasil diekspor ke CSV', 'success');
        } catch (err) {
          console.error("Gagal ekspor CSV:", err);
          app.addToast('Gagal ekspor data produk', 'error');
        }
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const text = event.target.result;
            const lines = text.split(/\r\n|\n/);
            if (lines.length <= 1) {
              app.addToast('File CSV kosong atau tidak valid', 'error');
              return;
            }
            
            const db = getDB();
            let importedCount = 0;
            let updatedCount = 0;
            const nowStr = new Date().toISOString();
            
            const parseCSVLine = (line) => {
              const result = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                  inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                  result.push(current.trim());
                  current = '';
                } else {
                  current += char;
                }
              }
              result.push(current.trim());
              return result;
            };
            
            for (let i = 1; i < lines.length; i++) {
              const line = lines[i].trim();
              if (!line) continue;
              
              const columns = parseCSVLine(line);
              if (columns.length < 6) continue;
              
              const sku = columns[0] || `SKU${Date.now().toString().slice(-4)}_${i}`;
              const name = columns[1];
              const category = columns[2] || 'Lainnya';
              const price = parseFloat(columns[3]) || 0;
              const cost = parseFloat(columns[4]) || 0;
              const stock = parseFloat(columns[5]) || 0;
              const wholesalePrice = parseFloat(columns[6]) || 0;
              const wholesaleMinQty = parseFloat(columns[7]) || 0;
              const minStock = parseFloat(columns[8]) || 5;
              
              if (!name) continue;
              
              const existingIdx = db.products.findIndex(p => p.sku.toLowerCase() === sku.toLowerCase());
              if (existingIdx !== -1) {
                db.products[existingIdx] = {
                  ...db.products[existingIdx],
                  name,
                  category,
                  price,
                  cost,
                  stock,
                  wholesalePrice,
                  wholesaleMinQty,
                  minStock,
                  active: true,
                  updatedAt: nowStr
                };
                updatedCount++;
              } else {
                db.products.push({
                  id: 'p_' + Date.now() + '_' + i,
                  sku,
                  name,
                  category,
                  price,
                  cost,
                  stock,
                  wholesalePrice,
                  wholesaleMinQty,
                  minStock,
                  active: true,
                  createdAt: nowStr,
                  updatedAt: nowStr,
                  createdBy: app.user?.name,
                  createdById: app.user?.id
                });
                importedCount++;
              }
              
              if (category && !db.categories.includes(category)) {
                db.categories.push(category);
              }
            }
            
            saveDB(db);
            app.refreshDB();
            logAuditAction('Impor CSV', `Mengimpor produk via CSV secara massal. ${importedCount} baru, ${updatedCount} diperbarui.`, app.user);
            app.addToast(`Impor selesai: ${importedCount} baru, ${updatedCount} diperbarui.`, 'success');
          } catch (err) {
            console.error("Gagal impor CSV:", err);
            app.addToast('Gagal memproses file CSV', 'error');
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      const handleSave = (data) => {
        const valError = validateProductData(data, editProduct ? editProduct.id : null);
        if (valError) {
          app.addToast(valError, 'error');
          return;
        }

        const db = getDB();
        const nowStr = new Date().toISOString();
        if (editProduct) {
          const idx = db.products.findIndex(p => p.id === editProduct.id);
          if (idx !== -1) {
            db.products[idx] = { 
              ...db.products[idx], 
              ...data,
              updatedAt: nowStr
            };
          }
          logAuditAction('Ubah Produk', `Mengubah produk "${data.name}" (SKU: ${data.sku}). Harga: Rp ${data.price}, Stok: ${data.stock}`, app.user);
          app.addToast('Produk diperbarui', 'success');
        } else {
          db.products.push({ 
            id: 'p' + Date.now(), 
            ...data, 
            active: true,
            createdAt: nowStr,
            updatedAt: nowStr,
            createdBy: app.user?.name,
            createdById: app.user?.id
          });
          logAuditAction('Tambah Produk', `Menambahkan produk baru "${data.name}" (SKU: ${data.sku}) dengan stok ${data.stock}`, app.user);
          app.addToast('Produk ditambahkan', 'success');
        }
        saveDB(db);
        app.refreshDB();
        setShowForm(false);
        setEditProduct(null);
      };

      const handleDelete = (id) => {
        if(confirm('Hapus produk ini?')) {
          const db = getDB();
          const idx = db.products.findIndex(p => p.id === id);
          if (idx !== -1) {
            const prod = db.products[idx];
            prod.active = false;
            prod.updatedAt = new Date().toISOString();
            logAuditAction('Hapus Produk', `Menghapus produk "${prod.name}" (SKU: ${prod.sku})`, app.user);
            saveDB(db);
            app.refreshDB();
            app.addToast('Produk dihapus', 'success');
          }
        }
      };

      return (
        <div className="pb-16 md:pb-0">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
              <h3 className="text-xl font-bold text-zinc-800">Manajemen Produk</h3>
              <p className="text-sm text-zinc-500">Kelola katalog dan stok barang</p>
            </div>
            <div className="flex flex-wrap gap-2 w-full sm:w-auto mt-2 sm:mt-0">
              <button 
                onClick={() => setShowCategoryModal(true)} 
                className="px-4 py-2.5 bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 shadow-sm"
              >
                <Icon name="tags" size={16} /> Kategori
              </button>
              
              {/* Import/Export CSV */}
              <button 
                onClick={handleExportCSV} 
                className="px-4 py-2.5 bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 shadow-sm"
                title="Ekspor Inventaris ke CSV"
              >
                <Icon name="download" size={16} /> Ekspor
              </button>
              
              <label className="px-4 py-2.5 bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 shadow-sm cursor-pointer">
                <Icon name="upload" size={16} /> Impor
                <input type="file" accept=".csv" onChange={handleImportCSV} className="hidden" />
              </label>

              <button 
                onClick={() => { setEditProduct(null); setShowForm(true); }} 
                className="px-4 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 transition bg-zinc-900 hover:bg-zinc-800 text-white shadow-md"
              >
                <Icon name="plus" size={16} /> Tambah Produk
              </button>
            </div>
          </div>

          {/* Admin Approval Section for Product Proposals */}
          {app.user?.role === 'admin' && (
            <>
              {(() => {
                const db = getDB();
                const pendingProposals = db.productProposals?.filter(p => p.status === 'pending') || [];
                return pendingProposals.length > 0 ? (
                  <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-6">
                    <h4 className="font-bold text-amber-900 mb-4 flex items-center gap-2">
                      <Icon name="inbox" size={20} /> Pengajuan Produk dari Kasir ({pendingProposals.length})
                    </h4>
                    <div className="space-y-3 max-h-64 overflow-y-auto">
                      {pendingProposals.map(prop => (
                        <div key={prop.id} className="bg-white rounded-lg p-3 border border-amber-100 text-sm">
                          <div className="flex justify-between items-start mb-2">
                            <div>
                              <p className="font-semibold text-zinc-800">{prop.name}</p>
                              <p className="text-xs text-zinc-500">Dari: {prop.proposedByName} • Rp {prop.price?.toLocaleString('id-ID') || 0}</p>
                            </div>
                            <div className="flex gap-1">
                              <button 
                                onClick={() => {
                                  const db2 = getDB();
                                  db2.products.push({ id: 'p' + Date.now(), ...prop, active: true, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
                                  const pidx = db2.productProposals.findIndex(x => x.id === prop.id);
                                  if(pidx !== -1) db2.productProposals[pidx].status = 'approved';
                                  saveDB(db2);
                                  app.refreshDB();
                                  app.addToast(`Produk "${prop.name}" disetujui`, 'success');
                                }}
                                className="px-2 py-1 bg-emerald-500 hover:bg-emerald-600 text-white rounded text-xs font-semibold transition"
                              >
                                Terima
                              </button>
                              <button 
                                onClick={() => {
                                  const db2 = getDB();
                                  const pidx = db2.productProposals.findIndex(x => x.id === prop.id);
                                  if(pidx !== -1) db2.productProposals[pidx].status = 'rejected';
                                  saveDB(db2);
                                  app.refreshDB();
                                  app.addToast(`Produk "${prop.name}" ditolak`, 'info');
                                }}
                                className="px-2 py-1 bg-rose-500 hover:bg-rose-600 text-white rounded text-xs font-semibold transition"
                              >
                                Tolak
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : null;
              })()}
            </>
          )}

          {/* Desktop Table View */}
          <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden">
            <table className="w-full">
              <thead>
                <tr className="bg-zinc-50 border-b border-zinc-200">
                  <th className="text-left px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Produk</th>
                  <th className="text-left px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Kategori</th>
                  <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Harga</th>
                  <th className="text-center px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Stok</th>
                  <th className="text-center px-6 py-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Aksi</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-zinc-100">
                {displayedProducts.map(p => (
                  <tr key={p.id} className="hover:bg-zinc-50/50">
                    <td className="px-6 py-4 flex items-center gap-4 text-left">
                      {p.image ? (
                        <img src={p.image} className="w-10 h-10 rounded-lg object-cover border border-zinc-200" />
                      ) : (
                         <div className="w-10 h-10 bg-sky-100 text-sky-600 rounded-lg flex items-center justify-center font-bold">{p.name.substring(0,2).toUpperCase()}</div>
                      )}
                      <div>
                        <div className="font-semibold text-zinc-800">{p.name}</div>
                        <div className="text-xs text-zinc-500 font-mono mt-0.5">{p.sku}</div>
                        <div className="text-[10px] text-zinc-400 mt-2 flex items-center gap-1 font-medium">
                          <Icon name="clock" size={10} />
                          <span>Update: {formatTimeAgo(p.updatedAt)}</span>
                        </div>
                      </div>
                    </td>
                    <td className="px-6 py-4 text-sm text-zinc-600 text-left">
                      <span className="bg-zinc-100 px-3 py-1 rounded-full text-xs font-medium">{p.category}</span>
                    </td>
                    <td className="px-6 py-4 text-sm text-right font-bold text-zinc-700">Rp {p.price.toLocaleString('id-ID')}</td>
                    <td className="px-6 py-4 text-center">
                      <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold ${p.stock <= 5 ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}`}>
                        {p.stock}
                      </span>
                    </td>
                    <td className="px-6 py-4">
                      <div className="flex justify-center gap-2">
                        <button onClick={() => { setEditProduct(p); setShowForm(true); }} className="p-2 text-sky-600 bg-sky-50 hover:bg-sky-100 rounded-lg transition"><Icon name="edit" size={16} /></button>
                        <button onClick={() => handleDelete(p.id)} className="p-2 text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg transition"><Icon name="trash-2" size={16} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Mobile Card View */}
          <div className="md:hidden flex flex-col gap-4">
            {displayedProducts.map(p => (
              <div key={p.id} className="bg-white p-4 rounded-2xl border border-zinc-200 shadow-sm flex flex-col gap-3">
                <div className="flex items-start gap-3 text-left">
                  {p.image ? (
                     <img src={p.image} className="w-14 h-14 rounded-xl object-cover border border-zinc-200" />
                  ) : (
                     <div className="w-14 h-14 bg-sky-100 text-sky-600 rounded-xl flex items-center justify-center font-bold text-xl flex-shrink-0">{p.name.substring(0,2).toUpperCase()}</div>
                  )}
                  <div className="flex-1">
                    <h4 className="font-bold text-zinc-800 leading-tight">{p.name}</h4>
                    <p className="text-xs text-zinc-500 font-mono mt-1">{p.sku}</p>
                    <span className="inline-block bg-zinc-100 text-zinc-600 px-2 py-0.5 rounded text-[10px] font-medium mt-1">{p.category}</span>
                    <p className="text-[10px] text-zinc-400 mt-2 flex items-center gap-1 font-medium">
                      <Icon name="clock" size={10} />
                      <span>Update: {formatTimeAgo(p.updatedAt)}</span>
                    </p>
                  </div>
                </div>
                <div className="flex justify-between items-end border-t border-zinc-100 pt-3">
                  <div className="text-left">
                    <p className="text-xs text-zinc-500 mb-0.5">Harga & Stok</p>
                    <div className="flex items-center gap-2">
                       <span className="font-bold text-sky-600">Rp {p.price.toLocaleString('id-ID')}</span>
                       <span className="text-zinc-300">•</span>
                       <span className={`text-xs font-bold ${p.stock <= 5 ? 'text-rose-500' : 'text-emerald-600'}`}>{p.stock} item</span>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => { setEditProduct(p); setShowForm(true); }} className="p-2.5 bg-zinc-100 text-zinc-700 rounded-xl"><Icon name="edit" size={18} /></button>
                    <button onClick={() => handleDelete(p.id)} className="p-2.5 bg-rose-50 text-rose-600 rounded-xl"><Icon name="trash-2" size={18} /></button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Pagination */}
          {totalPages > 1 && (
            <div className="mt-6 flex justify-between items-center bg-white px-4 py-3 rounded-xl border border-zinc-200">
               <button 
                 disabled={currentPage === 1} 
                 onClick={() => setCurrentPage(p => p - 1)}
                 className="px-4 py-2 text-sm font-medium text-zinc-600 bg-zinc-50 rounded-lg disabled:opacity-50"
               >
                 Prev
               </button>
               <span className="text-sm font-medium text-zinc-600">Hal {currentPage} dari {totalPages}</span>
               <button 
                 disabled={currentPage === totalPages} 
                 onClick={() => setCurrentPage(p => p + 1)}
                 className="px-4 py-2 text-sm font-medium text-zinc-600 bg-zinc-50 rounded-lg disabled:opacity-50"
               >
                 Next
               </button>
            </div>
          )}

          {/* Form Modal */}
          {showForm && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto custom-scroll animate-[slideUp_0.3s_ease-out]">
                <div className="sticky top-0 bg-white/90 backdrop-blur-md px-6 py-5 border-b border-zinc-100 flex justify-between items-center z-10">
                  <h3 className="text-xl font-bold text-zinc-800">{editProduct ? 'Edit Produk' : 'Tambah Produk'}</h3>
                  <button onClick={() => setShowForm(false)} className="p-2 bg-zinc-100 hover:bg-zinc-200 rounded-full transition"><Icon name="x" size={18} /></button>
                </div>
                <ProductForm product={editProduct} onSave={handleSave} onCancel={() => setShowForm(false)} />
              </div>
            </div>
          )}

          {/* Category Management Modal */}
          {showCategoryModal && (
            <CategoryModal onClose={() => setShowCategoryModal(false)} app={app} />
          )}
        </div>
      );
    }

    function ProductForm({ product, onSave, onCancel }) {
      const dbCategories = getDB().categories || ['Makanan', 'Minuman', 'Snack'];
      
      const [form, setForm] = useState({
        sku: product?.sku || `SKU${Date.now().toString().slice(-4)}`,
        name: product?.name || '',
        category: product?.category || dbCategories[0] || 'Makanan',
        price: product?.price || '',
        cost: product?.cost || '',
        stock: product?.stock || '',
        image: product?.image || '',
        wholesalePrice: product?.wholesalePrice || '',
        wholesaleMinQty: product?.wholesaleMinQty || '',
        taxIncluded: product?.taxIncluded || false,
        openPrice: product?.openPrice || false,
        minStock: product?.minStock || 5
      });

      const handleImage = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 300;
            let { width, height } = img;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            setForm({...form, image: canvas.toDataURL('image/jpeg', 0.8)});
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <form onSubmit={e => { e.preventDefault(); onSave(form); }} className="p-6 space-y-5">
          <div className="flex justify-center mb-2">
            <div className="relative">
              <div className="w-24 h-24 rounded-2xl bg-zinc-100 border-2 border-dashed border-zinc-300 flex items-center justify-center overflow-hidden">
                {form.image ? <img src={form.image} className="w-full h-full object-cover" /> : <Icon name="image" size={32} className="text-zinc-400" />}
              </div>
              <label className="absolute -bottom-2 -right-2 p-2 bg-zinc-800 text-white rounded-full shadow-lg cursor-pointer hover:bg-zinc-700">
                <Icon name="camera" size={14} />
                <input type="file" accept="image/*" onChange={handleImage} className="hidden" />
              </label>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2 text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Nama Barang / Menu</label>
              <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:bg-white focus:border-zinc-500 outline-none font-medium text-zinc-800" required />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Kode Barang</label>
              <input type="text" value={form.sku} onChange={e => setForm({...form, sku: e.target.value})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-mono text-sm text-zinc-800 focus:bg-white focus:border-zinc-500" required placeholder="Contoh: SKU001" />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Kategori</label>
              <select 
                value={form.category} 
                onChange={e => setForm({...form, category: e.target.value})} 
                className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500" 
                required
              >
                {dbCategories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Harga untuk Pembeli</label>
              <input type="number" value={form.price} onChange={e => setForm({...form, price: parseInt(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-semibold text-zinc-800 focus:bg-white focus:border-zinc-500" required disabled={form.openPrice} placeholder={form.openPrice ? "Diisi saat transaksi" : "0"} />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Modal / Harga Beli</label>
              <input type="number" value={form.cost} onChange={e => setForm({...form, cost: parseInt(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-semibold text-zinc-800 focus:bg-white focus:border-zinc-500" required placeholder="Modal per barang" />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Stok</label>
              <input type="number" value={form.stock} onChange={e => setForm({...form, stock: parseFloat(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500" required />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Batas Minimum Stok</label>
              <input type="number" value={form.minStock} onChange={e => setForm({...form, minStock: parseFloat(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500" required placeholder="Contoh: 5" />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Harga Jika Beli Banyak (Grosir)</label>
              <input type="number" value={form.wholesalePrice} onChange={e => setForm({...form, wholesalePrice: parseInt(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-semibold text-zinc-800 focus:bg-white focus:border-zinc-500" placeholder="0" />
            </div>
            <div className="text-left">
              <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Minimal Beli Banyak (Qty)</label>
              <input type="number" value={form.wholesaleMinQty} onChange={e => setForm({...form, wholesaleMinQty: parseInt(e.target.value) || 0})} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500" placeholder="Contoh: 5" />
            </div>

              <label className="flex items-center gap-2 cursor-pointer select-none">
