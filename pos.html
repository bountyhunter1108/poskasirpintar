                        <input type="number" value={payBase} onChange={e => setPayBase(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" placeholder="4000000" />
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Lembur (Jam)</label>
                        <input type="number" value={payOvertimeHours} onChange={e => setPayOvertimeHours(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" placeholder="0" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Tarif Lembur/Jam</label>
                        <input type="number" value={payOvertimeRate} onChange={e => setPayOvertimeRate(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" placeholder="20000" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Bonus & Insentif (Rp)</label>
                      <input type="number" value={payBonus} onChange={e => setPayBonus(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" placeholder="0" />
                    </div>
                    
                    <div className="bg-zinc-50 border border-zinc-150 rounded-2xl p-4 text-[10px] text-zinc-500 space-y-1">
                      <p className="font-bold">Potongan BPJS Otomatis:</p>
                      <p>• BPJS Kesehatan: 1% Gaji Pokok</p>
                      <p>• BPJS Ketenagakerjaan: 2% Gaji Pokok</p>
                    </div>

                    <button onClick={handleCalculatePayroll} className="w-full py-2.5 bg-sky-600 text-white rounded-xl font-bold text-xs hover:bg-sky-700 transition shadow-sm">Kalkulasi Gaji</button>
                  </div>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  {slipResult ? (
                    <div className="border border-sky-100 bg-sky-50/20 rounded-2xl p-6 relative animate-[scaleIn_0.2s]">
                      <h4 className="font-bold text-sky-900 text-sm border-b border-sky-100 pb-3 uppercase tracking-wide">Slip Gaji Bulanan - Smile POS</h4>
                      
                      <div className="grid grid-cols-2 gap-4 text-xs my-4 text-zinc-700">
                        <div>
                          <p><span className="font-bold">Karyawan:</span> {slipResult.employeeName}</p>
                          <p><span className="font-bold">Jabatan:</span> {slipResult.employeeRole}</p>
                        </div>
                        <div className="text-right">
                          <p><span className="font-bold">Periode:</span> {slipResult.month}</p>
                          <p><span className="font-bold">Tanggal Hitung:</span> {new Date().toLocaleDateString('id-ID')}</p>
                        </div>
                      </div>

                      <div className="border-t border-dashed border-zinc-250 py-3 space-y-2 text-xs">
                        <div className="flex justify-between"><span>Gaji Pokok</span><span className="font-semibold text-zinc-800">Rp {slipResult.base.toLocaleString('id-ID')}</span></div>
                        <div className="flex justify-between"><span>Gaji Lembur</span><span className="font-semibold text-zinc-800">Rp {slipResult.overtimePay.toLocaleString('id-ID')}</span></div>
                        <div className="flex justify-between"><span>Insentif / Bonus</span><span className="font-semibold text-zinc-800">Rp {slipResult.bonus.toLocaleString('id-ID')}</span></div>
                        <div className="flex justify-between text-rose-600"><span>Potongan BPJS Kesehatan (1%)</span><span>- Rp {slipResult.bpjsKes.toLocaleString('id-ID')}</span></div>
                        <div className="flex justify-between text-rose-600"><span>Potongan BPJS Ketenagakerjaan (2%)</span><span>- Rp {slipResult.bpjsKet.toLocaleString('id-ID')}</span></div>
                      </div>

                      <div className="border-t border-sky-100 pt-3 flex justify-between font-bold text-sm text-sky-950 bg-sky-100/50 p-3 rounded-xl">
                        <span>GAJI BERSIH (NET)</span>
                        <span>Rp {slipResult.total.toLocaleString('id-ID')}</span>
                      </div>

                      <div className="flex gap-2.5 mt-5">
                        <button onClick={() => setSlipResult(null)} className="flex-1 py-2 bg-zinc-100 hover:bg-zinc-200 text-zinc-700 font-bold rounded-xl text-xs transition">Batal</button>
                        <button onClick={handleSavePayroll} className="flex-1 py-2 bg-sky-600 hover:bg-sky-700 text-white font-bold rounded-xl text-xs transition flex items-center justify-center gap-1"><Icon name="file-check" size={13} />Simpan & Print Slip</button>
                      </div>
                    </div>
                  ) : (
                    <div className="h-full flex flex-col justify-center items-center py-16 text-zinc-400">
                      <Icon name="file-text" size={48} className="text-zinc-300 mb-2" />
                      <p className="text-xs">Pilih karyawan & lakukan kalkulasi gaji untuk mencetak slip bulanan.</p>
                      
                      <div className="w-full mt-8 border-t border-zinc-150 pt-5 text-left">
                        <h5 className="font-bold text-zinc-700 text-xs mb-3">Daftar Slip Gaji Tersimpan</h5>
                        <div className="overflow-x-auto text-[10px]">
                          <table className="w-full">
                            <thead>
                              <tr className="bg-zinc-50 border-b border-zinc-200 text-zinc-500">
                                <th className="p-2 text-left">Karyawan</th>
                                <th className="p-2 text-center">Bulan</th>
                                <th className="p-2 text-right">Gaji Pokok</th>
                                <th className="p-2 text-right">Potongan BPJS</th>
                                <th className="p-2 text-right">Total Bersih</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-zinc-100">
                              {payrollList.map(p => (
                                <tr key={p.id}>
                                  <td className="p-2 font-semibold text-zinc-700">{p.employeeName}</td>
                                  <td className="p-2 text-center text-zinc-500">{p.month}</td>
                                  <td className="p-2 text-right">Rp {p.base.toLocaleString('id-ID')}</td>
                                  <td className="p-2 text-right text-rose-600">-Rp {p.deductions.toLocaleString('id-ID')}</td>
                                  <td className="p-2 text-right font-bold text-zinc-800">Rp {p.total.toLocaleString('id-ID')}</td>
                                </tr>
                              ))}
                              {payrollList.length === 0 && (
                                <tr><td colSpan="5" className="text-center p-4 text-zinc-400">Belum ada slip gaji yang disimpan.</td></tr>
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* TAB: RECRUITS */}
            {activeTab === 'recruits' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Form Rekrutmen Pelamar</h4>
                  <form onSubmit={handleAddRecruit} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nama Lengkap Pelamar</label>
                      <input type="text" value={recName} onChange={e => setRecName(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-sm" placeholder="Ketik nama kandidat..." />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Posisi Dilamar</label>
                        <select value={recPosition} onChange={e => setRecPosition(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:bg-white">
                          <option value="Kasir">Kasir</option>
                          <option value="Dapur">Staf Dapur</option>
                          <option value="Kurir">Kurir / Logistik</option>
                          <option value="Admin">Staf Administrasi</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Kontak (HP)</label>
                        <input type="text" value={recContact} onChange={e => setRecContact(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" placeholder="0812..." />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Keterangan / Catatan Resume</label>
                      <textarea value={recNotes} onChange={e => setRecNotes(e.target.value)} rows={3} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-xs" placeholder="Pengalaman kasir 2 tahun, domisili dekat toko..."></textarea>
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-zinc-900 text-white rounded-xl font-bold text-xs hover:bg-zinc-800 transition">Daftarkan Kandidat</button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Pipeline Rekrutmen (Pelamar Kerja)</h4>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                          <th className="p-3 text-left">Kandidat</th>
                          <th className="p-3 text-left">Kontak</th>
                          <th className="p-3 text-left">Catatan</th>
                          <th className="p-3 text-center">Status</th>
                          <th className="p-3 text-right">Aksi Tahapan</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">
                        {recruitsList.map(item => (
                          <tr key={item.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-bold text-zinc-700">{item.name}</td>
                            <td className="p-3 text-zinc-500 font-mono">{item.phone}</td>
                            <td className="p-3 text-zinc-650 max-w-[180px] truncate" title={item.notes}>{item.notes}</td>
                            <td className="p-3 text-center">
                              <span className={`px-2 py-0.5 rounded font-bold ${
                                item.status === 'Diterima' ? 'bg-emerald-50 text-emerald-700' :
                                item.status === 'Interview' ? 'bg-sky-50 text-sky-700' :
                                item.status === 'Ditolak' ? 'bg-rose-50 text-rose-700' : 'bg-zinc-100 text-zinc-600'
                              }`}>{item.status}</span>
                            </td>
                            <td className="p-3 text-right space-x-1 whitespace-nowrap">
                              <select value={item.status} onChange={e => handleUpdateRecruit(item.id, e.target.value)} className="bg-zinc-50 border border-zinc-200 rounded p-1 text-[10px] focus:bg-white font-semibold">
                                <option value="Seleksi Berkas">Berkas</option>
                                <option value="Interview">Wawancara</option>
                                <option value="Diterima">Diterima</option>
                                <option value="Ditolak">Ditolak</option>
                              </select>
                            </td>
                          </tr>
                        ))}
                        {recruitsList.length === 0 && (
                          <tr><td colSpan="5" className="text-center p-8 text-zinc-400">Tidak ada pelamar terdaftar.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderMarketing = () => {
        return (
          <div className="space-y-6 text-left">
            <div className="flex border-b border-zinc-200 gap-4 mb-4">
              <button onClick={() => setActiveTab('coupons')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'coupons' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Kupon Diskon POS</button>
              <button onClick={() => setActiveTab('crm')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'crm' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>CRM & Prospek Pelanggan</button>
            </div>

            {/* TAB: COUPONS */}
            {activeTab === 'coupons' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Buat Voucher Kupon Promo</h4>
                  <form onSubmit={handleAddCoupon} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Kode Voucher (Kapital)</label>
                      <input type="text" value={promoCode} onChange={e => setPromoCode(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-sm font-semibold uppercase" placeholder="SMILEHEBOH, DISKON10" />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Tipe Diskon</label>
                        <select value={promoType} onChange={e => setPromoType(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:bg-white">
                          <option value="nominal">Nominal (Rupiah)</option>
                          <option value="percent">Persentase (%)</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nilai Voucher</label>
                        <input type="number" value={promoValue} onChange={e => setPromoValue(e.target.value)} required min="1" className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:bg-white" placeholder="10000 atau 10" />
                      </div>
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-zinc-900 text-white rounded-xl font-bold text-xs hover:bg-zinc-800 transition">Buat Voucher</button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Voucher Promo Aktif (POS Kasir)</h4>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                          <th className="p-3 text-left">Kode Kupon</th>
                          <th className="p-3 text-left">Jenis Diskon</th>
                          <th className="p-3 text-right">Nilai Potongan</th>
                          <th className="p-3 text-center">Status</th>
                          <th className="p-3 text-right">Aksi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">
                        {couponsList.map(item => (
                          <tr key={item.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-mono font-bold text-sky-750 text-sm">{item.code}</td>
                            <td className="p-3 text-zinc-650 capitalize">{item.type === 'percent' ? 'Persentase (%)' : 'Nominal Potongan'}</td>
                            <td className="p-3 text-right font-bold text-zinc-800">
                              {item.type === 'percent' ? `${item.value}%` : `Rp ${item.value.toLocaleString('id-ID')}`}
                            </td>
                            <td className="p-3 text-center">
                              <button onClick={() => handleToggleCoupon(item.id)} className={`px-2 py-0.5 rounded font-bold ${
                                item.active ? 'bg-emerald-50 text-emerald-700' : 'bg-zinc-150 text-zinc-500'
                              }`}>{item.active ? 'Aktif' : 'Nonaktif'}</button>
                            </td>
                            <td className="p-3 text-right">
                              <button onClick={() => deleteCoupon(item.id)} className="p-1 bg-rose-50 text-rose-600 rounded hover:bg-rose-100"><Icon name="trash-2" size={12} /></button>
                            </td>
                          </tr>
                        ))}
                        {couponsList.length === 0 && (
                          <tr><td colSpan="5" className="text-center p-8 text-zinc-400">Belum ada kupon voucher dibuat.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: CRM */}
            {activeTab === 'crm' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Input Prospek Baru (CRM)</h4>
                  <form onSubmit={handleAddLead} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nama Prospek</label>
                      <input type="text" value={leadName} onChange={e => setLeadName(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-sm" placeholder="Nama pelanggan/perusahaan..." />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Nomor WA/HP</label>
                        <input type="text" value={leadPhone} onChange={e => setLeadPhone(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" placeholder="08..." />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Status Prospek</label>
                        <select value={leadStatus} onChange={e => setLeadStatus(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:bg-white">
                          <option value="Prospek Baru">Prospek Baru</option>
                          <option value="Negosiasi">Negosiasi</option>
                          <option value="Hubungi Kembali">Hubungi Kembali</option>
                          <option value="Deal">Deal (Selesai)</option>
                          <option value="Batal">Batal</option>
                        </select>
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Histori Diskusi / Feedback</label>
                      <textarea value={leadNotes} onChange={e => setLeadNotes(e.target.value)} required rows={3} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-xs" placeholder="Ingin pesan nasi kotak 100 pax untuk minggu depan..."></textarea>
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-zinc-900 text-white rounded-xl font-bold text-xs hover:bg-zinc-800 transition">Simpan Prospek</button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Daftar Kontak Prospek Pelanggan (CRM)</h4>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                          <th className="p-3 text-left">Nama Prospek</th>
                          <th className="p-3 text-left">Kontak WA</th>
                          <th className="p-3 text-left">Histori / Feedback</th>
                          <th className="p-3 text-center">Status</th>
                          <th className="p-3 text-right">Ubah Status</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">
                        {leadsList.map(item => (
                          <tr key={item.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-bold text-zinc-700">{item.name}</td>
                            <td className="p-3 text-zinc-500 font-mono">{item.phone}</td>
                            <td className="p-3 text-zinc-650 max-w-[200px] truncate" title={item.notes}>{item.notes}</td>
                            <td className="p-3 text-center">
                              <span className={`px-2 py-0.5 rounded font-bold ${
                                item.status === 'Deal' ? 'bg-emerald-50 text-emerald-700' :
                                item.status === 'Negosiasi' ? 'bg-sky-50 text-sky-700' :
                                item.status === 'Batal' ? 'bg-rose-50 text-rose-700' : 'bg-amber-50 text-amber-700'
                              }`}>{item.status}</span>
                            </td>
                            <td className="p-3 text-right">
                              <select value={item.status} onChange={e => updateLeadStatus(item.id, e.target.value)} className="bg-zinc-50 border border-zinc-200 rounded p-1 text-[10px] focus:bg-white font-semibold">
                                <option value="Prospek Baru">Prospek</option>
                                <option value="Negosiasi">Nego</option>
                                <option value="Hubungi Kembali">Recall</option>
                                <option value="Deal">Deal</option>
                                <option value="Batal">Batal</option>
                              </select>
                            </td>
                          </tr>
                        ))}
                        {leadsList.length === 0 && (
                          <tr><td colSpan="5" className="text-center p-8 text-zinc-400">Belum ada data prospek pelanggan CRM.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderGudang = () => {
        const ledgerList = (db.stockLedger || []).sort((a, b) => new Date(b.date) - new Date(a.date));
        return (
          <div className="space-y-6 text-left">
            <div className="flex border-b border-zinc-200 gap-4 mb-4">
              <button onClick={() => setActiveTab('opname')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'opname' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Stock Opname</button>
              <button onClick={() => setActiveTab('ledger')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'ledger' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-sky-600'}`}>Mutasi Kartu Stok</button>
              <button onClick={() => setActiveTab('damaged')} className={`pb-2.5 font-bold text-sm transition ${activeTab === 'damaged' ? 'border-b-2 border-sky-600 text-sky-600' : 'text-zinc-400'}`}>Pencatatan Barang Rusak</button>
            </div>

            {/* TAB: OPNAME */}
            {activeTab === 'opname' && (
              <div className="bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                <h4 className="font-bold text-zinc-800 text-sm mb-4">Pencocokan Stok Fisik (Stock Opname)</h4>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                        <th className="p-3 text-left">SKU</th>
                        <th className="p-3 text-left">Nama Produk</th>
                        <th className="p-3 text-center">Stok Sistem</th>
                        <th className="p-3 text-center">Stok Fisik Nyata</th>
                        <th className="p-3 text-center">Selisih</th>
                        <th className="p-3 text-right">Aksi</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-zinc-100">
                      {db.products.filter(p => p.active !== false).map(p => {
                        const inputVal = physicalQty[p.id] || '';
                        const sysStock = p.stock || 0;
                        const parsedInput = inputVal !== '' ? parseFloat(inputVal) : sysStock;
                        const diff = parsedInput - sysStock;
                        return (
                          <tr key={p.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 font-mono font-semibold text-zinc-550">{p.sku}</td>
                            <td className="p-3 font-bold text-zinc-700">{p.name}</td>
                            <td className="p-3 text-center font-mono font-bold text-zinc-650">{sysStock} pcs</td>
                            <td className="p-3 text-center">
                              <input 
                                type="number" 
                                value={inputVal} 
                                onChange={e => {
                                  const val = e.target.value;
                                  setPhysicalQty(prev => ({ ...prev, [p.id]: val }));
                                }} 
                                placeholder={sysStock}
                                className="w-20 px-2 py-1 bg-zinc-50 border border-zinc-200 rounded font-mono text-center text-xs outline-none focus:bg-white focus:border-sky-500" 
                              />
                            </td>
                            <td className="p-3 text-center font-mono font-bold">
                              {inputVal !== '' ? (
                                <span className={diff === 0 ? 'text-zinc-500' : (diff > 0 ? 'text-emerald-600' : 'text-rose-600')}>
                                  {diff > 0 ? `+${diff}` : diff}
                                </span>
                              ) : <span className="text-zinc-300">-</span>}
                            </td>
                            <td className="p-3 text-right">
                              <button 
                                onClick={() => handleStockOpnameAdjust(p.id, sysStock)}
                                disabled={inputVal === ''}
                                className={`px-2.5 py-1.5 font-bold rounded text-[10px] transition ${
                                  inputVal !== '' ? 'bg-sky-600 hover:bg-sky-700 text-white cursor-pointer' : 'bg-zinc-100 text-zinc-400 cursor-not-allowed'
                                }`}
                              >
                                Sesuaikan
                              </button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* TAB: LEDGER */}
            {activeTab === 'ledger' && (
              <div className="bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                <h4 className="font-bold text-zinc-800 text-sm mb-4">Mutasi Kartu Stok Barang Ritel</h4>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                        <th className="p-3 text-left">Waktu Log</th>
                        <th className="p-3 text-left">SKU</th>
                        <th className="p-3 text-left">Nama Produk</th>
                        <th className="p-3 text-left">Tipe Mutasi</th>
                        <th className="p-3 text-center">Jumlah</th>
                        <th className="p-3 text-left">Detail Alasan / Catatan</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-zinc-100">
                      {ledgerList.map(item => (
                        <tr key={item.id} className="hover:bg-zinc-50/50">
                          <td className="p-3 text-zinc-450 font-mono text-[10px]">{new Date(item.date).toLocaleString('id-ID')}</td>
                          <td className="p-3 font-mono font-semibold text-zinc-500">{item.sku || '-'}</td>
                          <td className="p-3 font-bold text-zinc-700">{item.productName}</td>
                          <td className="p-3">
                            <span className={`px-2 py-0.5 rounded font-bold uppercase text-[9px] ${
                              item.type.includes('Opname') ? 'bg-amber-50 text-amber-700' :
                              item.type.includes('Rusak') ? 'bg-rose-50 text-rose-700' : 'bg-emerald-50 text-emerald-700'
                            }`}>{item.type}</span>
                          </td>
                          <td className="p-3 text-center font-mono font-bold">
                            <span className={item.qty > 0 ? 'text-emerald-600' : 'text-rose-600'}>
                              {item.qty > 0 ? `+${item.qty}` : item.qty} pcs
                            </span>
                          </td>
                          <td className="p-3 text-zinc-500 italic font-mono">{item.notes}</td>
                        </tr>
                      ))}
                      {ledgerList.length === 0 && (
                        <tr><td colSpan="6" className="text-center p-8 text-zinc-400">Belum ada riwayat mutasi stok.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* TAB: DAMAGED */}
            {activeTab === 'damaged' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="bg-white rounded-2xl border border-zinc-200 p-5 h-fit shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Catat Barang Rusak/Kedaluwarsa</h4>
                  <form onSubmit={handleAddDamaged} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Pilih Produk</label>
                      <select value={dmgProduct} onChange={e => setDmgProduct(e.target.value)} required className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:bg-white">
                        <option value="">-- Pilih Produk --</option>
                        {db.products.filter(p => p.active !== false).map(p => (
                          <option key={p.id} value={p.id}>{p.name} (Stok: {p.stock})</option>
                        ))}
                      </select>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Jumlah Rusak (Qty)</label>
                        <input type="number" value={dmgQty} onChange={e => setDmgQty(e.target.value)} required min="1" step="any" className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm" placeholder="0" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-zinc-500 uppercase mb-1">Tindakan</label>
                        <select value={dmgAction} onChange={e => setDmgAction(e.target.value)} className="w-full px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl text-sm focus:bg-white">
                          <option value="Dibuang">Dibuang / Dimusnahkan</option>
                          <option value="Diretur">Diretur ke Supplier</option>
                        </select>
                      </div>
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-zinc-900 text-white rounded-xl font-bold text-xs hover:bg-zinc-800 transition">Catat Barang Rusak</button>
                  </form>
                </div>

                <div className="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 p-5 shadow-sm">
                  <h4 className="font-bold text-zinc-800 text-sm mb-4">Log Barang Rusak & Kerugian HPP</h4>
                  <div className="overflow-x-auto">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-zinc-50 text-zinc-500 border-b border-zinc-200">
                          <th className="p-3 text-left">Tanggal</th>
                          <th className="p-3 text-left">Nama Produk</th>
                          <th className="p-3 text-center">Jumlah Rusak</th>
                          <th className="p-3 text-right">Taksiran Rugi HPP</th>
                          <th className="p-3 text-left">Tindakan</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-zinc-100">
                        {damagedList.map(item => (
                          <tr key={item.id} className="hover:bg-zinc-50/50">
                            <td className="p-3 text-zinc-500">{item.date}</td>
                            <td className="p-3 font-bold text-zinc-700">{item.productName}</td>
                            <td className="p-3 text-center font-mono font-bold text-rose-600">{item.qty} pcs</td>
                            <td className="p-3 text-right font-bold text-zinc-800">Rp {item.lossValue?.toLocaleString('id-ID')}</td>
                            <td className="p-3"><span className="px-2 py-0.5 rounded font-bold bg-zinc-100 text-zinc-700">{item.action}</span></td>
                          </tr>
                        ))}
                        {damagedList.length === 0 && (
                          <tr><td colSpan="5" className="text-center p-8 text-zinc-400">Belum ada catatan barang rusak.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="pb-24 md:pb-8">
          {/* OWNER FEEDBACK BANNER */}
          {renderFeedbackNotifications()}

          {/* MAIN WORKSPACE HEADER */}
          <div className="bg-gradient-to-r from-zinc-900 to-zinc-800 rounded-3xl p-6 text-white mb-6 shadow-md border border-zinc-850 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 text-left">
            <div>
              <div className="flex items-center gap-2">
                <span className="px-2.5 py-0.5 rounded-lg bg-sky-500 text-white font-bold text-[10px] uppercase">
                  Workspace
                </span>
                <span className="text-xs text-zinc-400">• Logged as {app.user?.roleLabel || 'Karyawan'}</span>
              </div>
              <h2 className="text-xl font-bold mt-1.5">{app.user?.roleLabel || 'Workspace Karyawan'}</h2>
              <p className="text-xs text-zinc-400 mt-1">Akses eksklusif pengelolaan data internal Smile POS divisi administrasi.</p>
            </div>
            
            <div className="flex items-center gap-3 bg-zinc-700/40 p-3 rounded-2xl border border-zinc-650 backdrop-blur-sm">
              <div className="w-10 h-10 bg-sky-600 text-white font-bold rounded-xl flex items-center justify-center text-sm shadow-inner uppercase">
                {app.user?.name?.substring(0,2)}
              </div>
              <div>
                <p className="text-xs font-bold">{app.user?.name}</p>
                <p className="text-[10px] text-zinc-400 font-mono">{app.user?.email}</p>
              </div>
            </div>
          </div>

          {/* DYNAMIC SUB-WORKSPACE PAGE */}
          {roleId === 'admin_operasional' && renderOperasional()}
          {roleId === 'admin_keuangan' && renderKeuangan()}
          {roleId === 'admin_hr' && renderHR()}
          {roleId === 'admin_marketing' && renderMarketing()}
          {roleId === 'admin_gudang' && renderGudang()}
          {roleId === 'keuangan' && renderKeuanganWorkspace()}
          {roleId === 'manager' && renderManagerWorkspace()}
          {roleId === 'supervisor' && renderSupervisorWorkspace()}
          {roleId === 'staff' && renderStaffWorkspace()}
        </div>
      );
    }

    function Sidebar() {
      const app = useContext(AppContext);
      const { user, page, sidebar } = app;
      
      const menuItems = [];
      if (user?.role === 'owner') {
        menuItems.push({ id: 'owner_dashboard', icon: 'layout-dashboard', label: 'Dashboard Owner' });
      }
      if (['admin_operasional', 'admin_keuangan', 'admin_hr', 'admin_marketing', 'admin_gudang', 'keuangan', 'manager', 'supervisor', 'staff'].includes(user?.roleId)) {
        let label = 'Workspace Admin';
        if (user?.roleId === 'keuangan') label = 'Workspace Keuangan';
        else if (user?.roleId === 'manager') label = 'Workspace Manajer';
        else if (user?.roleId === 'supervisor') label = 'Workspace Supervisor';
        else if (user?.roleId === 'staff') label = 'Workspace Staf';
        menuItems.push({ id: 'admin_workspace', icon: 'briefcase', label: label });
      }
      menuItems.push({ id: 'pos', icon: 'shopping-cart', label: 'Kasir POS' });
      if (['admin', 'owner', 'keuangan', 'manager'].includes(user?.role)) {
        menuItems.push({ id: 'products', icon: 'package', label: 'Produk' });
        menuItems.push({ id: 'reports', icon: 'bar-chart-3', label: 'Laporan' });
      }
      if (['admin', 'owner'].includes(user?.role)) {
        menuItems.push({ id: 'users', icon: 'users', label: 'Pengguna' });
      }
      if (['admin', 'owner', 'keuangan', 'manager'].includes(user?.role)) {
        menuItems.push({ id: 'purchases', icon: 'shopping-bag', label: 'Pengadaan' });
      }

      return (
        <aside className={`${sidebar ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 z-40 w-64 bg-zinc-900 text-white transition-transform duration-300 flex flex-col`}>
          <div className="h-16 flex items-center px-6 border-b border-zinc-800 justify-between md:justify-start">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center">
                <Icon name="shopping-bag" size={18} color="white" />
              </div>
              <span className="font-bold text-lg tracking-wide">SMILE POS</span>
            </div>
            <button onClick={() => app.setSidebar(false)} className="md:hidden text-zinc-400 hover:text-white">
              <Icon name="x" size={24} />
            </button>
          </div>
          
          <div className="flex-1 px-4 py-6 space-y-2 custom-scroll overflow-y-auto text-left">
            {menuItems.map(item => (
              <button
                key={item.id}
                onClick={() => { app.setPage(item.id); if(window.innerWidth < 768) app.setSidebar(false); }}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm ${page === item.id ? 'bg-sky-500 text-white shadow-md' : 'text-zinc-400 hover:bg-zinc-800 hover:text-white'}`}
              >
                <Icon name={item.icon} size={20} />
                {item.label}
              </button>
            ))}

            {user?.role !== 'admin' && app.activeShift && (
              <button
                onClick={() => app.setShowTutupShiftModal(true)}
                className="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-amber-400 hover:bg-amber-500/10"
              >
                <Icon name="key-round" size={20} />
                Tutup Shift (Kas)
              </button>
            )}
          </div>

          <div className="p-4 border-t border-zinc-800 text-left pb-24 md:pb-4">
            <div className="flex items-center gap-3 px-2 py-3 bg-zinc-800/50 rounded-xl mb-3">
              <div className="w-9 h-9 bg-zinc-700 rounded-full flex items-center justify-center font-bold text-sm text-zinc-300">
                {user?.name?.substring(0,2).toUpperCase()}
              </div>
              <div className="flex-1 overflow-hidden">
                <p className="text-sm font-semibold truncate">{user?.name}</p>
                <p className="text-xs text-zinc-500 truncate">{user?.roleLabel || user?.role}</p>
              </div>
            </div>
            <button 
              onClick={() => {
                if (user?.role !== 'admin' && app.activeShift) {
                  app.setShowTutupShiftModal(true);
                } else {
                  app.logout();
                }
              }} 
              className="w-full flex items-center justify-center gap-2 px-3 py-2.5 text-rose-400 hover:bg-rose-500/10 rounded-xl transition text-sm font-medium"
            >
              <Icon name="log-out" size={18} /> Keluar
            </button>
          </div>
        </aside>
      );
    }

    function BottomNav() {
      const app = useContext(AppContext);
      const menuItems = [];
      if (app.user?.role === 'owner') {
        menuItems.push({ id: 'owner_dashboard', icon: 'layout-dashboard', label: 'Dashboard' });
      }
      if (['admin_operasional', 'admin_keuangan', 'admin_hr', 'admin_marketing', 'admin_gudang', 'keuangan', 'manager', 'supervisor', 'staff'].includes(app.user?.roleId)) {
        menuItems.push({ id: 'admin_workspace', icon: 'briefcase', label: 'Workspace' });
      }
      menuItems.push({ id: 'pos', icon: 'shopping-cart', label: 'POS' });
      if (['admin', 'owner', 'keuangan', 'manager'].includes(app.user?.role)) {
        menuItems.push({ id: 'products', icon: 'package', label: 'Produk' });
        menuItems.push({ id: 'reports', icon: 'bar-chart-3', label: 'Laporan' });
      }
      if (['admin', 'owner'].includes(app.user?.role)) {
        menuItems.push({ id: 'users', icon: 'users', label: 'Akun' });
      }
      if (['admin', 'owner', 'keuangan', 'manager'].includes(app.user?.role)) {
        menuItems.push({ id: 'purchases', icon: 'shopping-bag', label: 'Pengadaan' });
      }

      return (
        <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 flex justify-around items-center h-16 z-40 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
          {menuItems.map(item => (
            <button key={item.id} onClick={() => app.setPage(item.id)} className={`flex flex-col items-center justify-center w-full h-full ${app.page === item.id ? 'text-sky-600' : 'text-zinc-400'}`}>
              <Icon name={item.icon} size={22} className={app.page === item.id ? 'fill-sky-100' : ''} />
              <span className={`text-[10px] mt-1 font-medium ${app.page === item.id ? 'font-bold' : ''}`}>{item.label}</span>
            </button>
          ))}
        </nav>
      );
    }

    function Header() {
      const app = useContext(AppContext);
      const [showNotif, setShowNotif] = useState(false);
      const [now, setNow] = useState(new Date());
      const titles = { owner_dashboard: 'Dashboard Owner', admin_workspace: 'Workspace Admin', pos: 'Point of Sale', products: 'Produk', reports: 'Laporan', users: 'Pengguna', purchases: 'Manajemen Pengadaan' };
      
      const lowStockItems = useMemo(() => {
        return getDB().products.filter(p => p.active !== false && p.stock <= (p.minStock || 5));
      }, [app.dbVersion]);
      const lowStockCount = lowStockItems.length;
      const [showLowStock, setShowLowStock] = useState(false);
      
      useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const db = getDB();
      const pendingReqs = db.bypassRequests.filter(r => r.status === 'pending');
      const pendingPurchases = (db.purchases || []).filter(p => p.status === 'pending');
      const totalNotifs = pendingReqs.length + (app.user?.role === 'owner' ? pendingPurchases.length : 0);
      const currentDateTime = now.toLocaleDateString('id-ID', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }) + ', ' + now.toLocaleTimeString('id-ID', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      
      return (
        <header className="h-16 bg-white border-b border-zinc-200 flex items-center px-4 md:px-6 flex-shrink-0 z-30 sticky top-0">
          <button onClick={() => app.setSidebar(true)} className="md:hidden mr-4 p-2 -ml-2 text-zinc-600 rounded-lg hover:bg-zinc-100">
            <Icon name="menu" size={24} />
          </button>
          <h2 className="text-xl font-bold text-zinc-800">{titles[app.page]}</h2>
          
          <div className="ml-auto flex items-center gap-3">
            {/* Indikator Koneksi Internet */}
            <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl border text-xs font-semibold ${app.isOnline ? 'bg-emerald-50 border-emerald-250 text-emerald-600' : 'bg-rose-50 border-rose-250 text-rose-600'}`}>
              <div className={`w-1.5 h-1.5 rounded-full ${app.isOnline ? 'bg-emerald-500' : 'bg-rose-500 animate-pulse'}`}></div>
              <span className="hidden md:inline">{app.isOnline ? 'Online' : 'Offline'}</span>
            </div>

            <button 
              onClick={() => app.setShowSyncModal(true)} 
              className={`p-2 rounded-xl border flex items-center gap-1.5 transition text-xs font-semibold ${app.syncEnabled ? 'bg-emerald-50 border-emerald-250 text-emerald-600 hover:bg-emerald-100' : 'bg-zinc-50 border-zinc-200 text-zinc-500 hover:bg-zinc-100'}`}
              title="Pengaturan Sinkronisasi"
            >
              <Icon name="cloud" size={16} className={app.syncStatus === 'syncing' ? 'animate-pulse' : ''} />
              <span className="hidden sm:inline">{app.syncEnabled ? 'Sync Aktif' : 'Sync Mati'}</span>
            </button>

            <button 
              onClick={app.lockScreen} 
              className="p-2 bg-zinc-50 border border-zinc-200 text-zinc-500 hover:text-zinc-850 rounded-xl transition"
              title="Kunci Layar"
            >
              <Icon name="lock" size={16} />
            </button>

            {/* Notifikasi Stok Rendah untuk Admin/Owner */}
            {['admin', 'owner'].includes(app.user?.role) && (
              <div className="relative">
                <button 
                  onClick={() => setShowLowStock(!showLowStock)} 
                  className={`p-2 bg-zinc-50 border border-zinc-200 hover:bg-zinc-100 rounded-xl transition flex items-center justify-center ${lowStockCount > 0 ? 'text-rose-500 border-rose-250' : 'text-zinc-500'}`}
                  title="Peringatan Stok Rendah"
                >
                  <Icon name="alert-triangle" size={16} />
                  {lowStockCount > 0 && (
                    <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full font-bold">{lowStockCount}</span>
                  )}
                </button>

                {showLowStock && (
                  <div className="absolute right-0 mt-2 w-80 bg-white border border-zinc-200 rounded-2xl shadow-xl z-[100] animate-[fadeIn_0.2s_ease-out] overflow-hidden">
                    <div className="p-4 bg-zinc-50 border-b border-zinc-100 flex justify-between items-center text-left">
                      <span className="font-bold text-zinc-800 text-sm">Stok Rendah</span>
                      <span className="text-[10px] bg-rose-100 text-rose-800 px-2 py-0.5 rounded-full font-bold">{lowStockCount} Peringatan</span>
                    </div>
                    <div className="max-h-64 overflow-y-auto custom-scroll divide-y divide-zinc-100 text-left">
                      {lowStockItems.length === 0 ? (
                        <div className="p-6 text-center text-zinc-400 text-xs font-medium">Semua stok aman!</div>
                      ) : (
                        lowStockItems.map(p => (
                          <div key={p.id} className="p-3 flex justify-between items-center text-xs">
                            <div>
                              <p className="font-bold text-zinc-800">{p.name}</p>
                              <p className="text-zinc-500 text-[10px] font-mono">{p.sku}</p>
                            </div>
                            <div className="text-right">
                              <span className="font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-lg border border-rose-100">{p.stock} pcs</span>
                              <p className="text-[9px] text-zinc-450 mt-1">Min: {p.minStock || 5}</p>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            {['admin', 'owner'].includes(app.user?.role) && (
              <div className="relative">
                <button 
                  onClick={() => setShowNotif(!showNotif)} 
                  className={`p-2 bg-zinc-50 border border-zinc-200 hover:bg-zinc-100 rounded-xl transition flex items-center justify-center ${totalNotifs > 0 ? 'text-amber-500 border-amber-250 animate-bounce' : 'text-zinc-500'}`}
                  title="Notifikasi Masuk"
                >
                  <Icon name="bell" size={16} />
                  {totalNotifs > 0 && (
                    <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[9px] w-4.5 h-4.5 flex items-center justify-center rounded-full font-bold">{totalNotifs}</span>
                  )}
                </button>

                {showNotif && (
                  <div className="absolute right-0 mt-2 w-80 bg-white border border-zinc-200 rounded-2xl shadow-xl z-[100] animate-[fadeIn_0.2s_ease-out] overflow-hidden">
                    <div className="p-4 bg-zinc-50 border-b border-zinc-100 flex justify-between items-center text-left">
                      <span className="font-bold text-zinc-800 text-sm">Notifikasi Masuk</span>
                      <span className="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold">{totalNotifs} Menunggu</span>
                    </div>
                    <div className="max-h-80 overflow-y-auto custom-scroll divide-y divide-zinc-100">
                      {totalNotifs === 0 ? (
                        <div className="p-6 text-center text-zinc-400 text-xs font-medium">Tidak ada pemberitahuan baru</div>
                      ) : (
                        <>
                          {/* Bypass Requests */}
                          {pendingReqs.map(req => (
                            <div key={req.id} className="p-4 space-y-2 text-xs text-left">
                              <div className="flex justify-between items-start">
                                <div>
                                  <p className="font-bold text-zinc-800 flex items-center gap-1.5">
                                    <span className="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
                                    <span>Izin Masuk Kasir</span>
                                  </p>
                                  <p className="text-zinc-500 text-[10px] font-semibold mt-0.5">{req.name} ({req.email})</p>
                                </div>
                                <span className="text-[9px] text-zinc-450 font-mono">{new Date(req.time).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'})}</span>
                              </div>
                              <div className="text-zinc-550 bg-zinc-50 p-2 rounded-lg font-mono text-[10px]">
                                <div><span className="text-zinc-400">Lokasi:</span> {req.location}</div>
                                <div className="truncate"><span className="text-zinc-400">Device:</span> {req.device}</div>
                              </div>
                              <div className="flex gap-2 pt-1">
                                <button onClick={() => { app.approveBypassRequest(req.id); setShowNotif(false); }} className="flex-1 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-bold text-[10px]">Setujui</button>
                                <button onClick={() => { app.rejectBypassRequest(req.id); setShowNotif(false); }} className="flex-1 py-1.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg font-bold text-[10px]">Tolak</button>
                              </div>
                            </div>
                          ))}
                          
                          {/* Pending Purchase Proposals (Only for Owner) */}
                          {app.user?.role === 'owner' && pendingPurchases.map(p => (
                            <div key={p.id} className="p-4 space-y-2 text-xs text-left">
                              <div className="flex justify-between items-start">
                                <div>
                                  <p className="font-bold text-zinc-800 flex items-center gap-1.5">
                                    <span className="w-1.5 h-1.5 rounded-full bg-sky-500 animate-pulse"></span>
                                    <span>Pengajuan Pengadaan</span>
                                  </p>
                                  <p className="text-zinc-500 text-[10px] font-semibold mt-0.5">Oleh: {p.proposedBy} ({p.proposedByRole === 'keuangan' ? 'Keuangan' : p.proposedByRole})</p>
                                </div>
                                <span className="text-[9px] text-zinc-455 font-mono">{new Date(p.date).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'})}</span>
                              </div>
                              <div className="text-zinc-550 bg-sky-50/50 p-2.5 rounded-xl border border-sky-100/50 font-mono text-[10px]">
                                <div className="font-bold text-zinc-800">{p.productName}</div>
                                <div className="mt-1"><span className="text-zinc-400">Tipe:</span> <span className="font-bold capitalize">{p.type === 'buy' ? 'Beli Baru' : p.type === 'refund' ? 'Retur' : p.type === 'take' ? 'Ambil' : 'Void'}</span></div>
                                <div><span className="text-zinc-400">Estimasi:</span> <span className="font-bold text-zinc-700">{p.qty} pcs @ Rp {p.cost?.toLocaleString('id-ID')}</span></div>
                              </div>
                              <button 
                                onClick={() => { app.setPage('purchases'); setShowNotif(false); }} 
                                className="w-full py-1.5 bg-zinc-900 hover:bg-zinc-800 text-white rounded-lg font-bold text-[10px] flex items-center justify-center gap-1 transition shadow-sm"
                              >
                                <Icon name="eye" size={12} /> Tinjau Pengadaan
                              </button>
                            </div>
                          ))}
                        </>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            <div className="ml-2 text-sm font-medium text-zinc-500 hidden lg:block tabular-nums">
              {currentDateTime}
            </div>
          </div>
        </header>
      );
    }

    // ==================== BUKA SHIFT PAGE ====================
    function BukaShiftPage() {
      const app = useContext(AppContext);
      const [modalUang, setModalUang] = useState('');

      const handleBukaShift = (e) => {
        e.preventDefault();
        const amount = parseFloat(String(modalUang).replace(/[^0-9.]/g, '')) || 0;
        app.startShift(amount);
      };

      return (
        <div className="flex items-center justify-center h-full">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-lg border border-zinc-200 overflow-hidden">
            <div className="bg-sky-600 p-6 text-center text-white">
              <div className="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3 backdrop-blur-sm">
                <Icon name="clock" size={28} color="white" />
              </div>
              <h2 className="text-xl font-bold">Buka Shift</h2>
              <p className="text-sky-100 text-sm mt-1">Masukkan modal uang awal untuk memulai shift hari ini</p>
            </div>
            <form onSubmit={handleBukaShift} className="p-6 space-y-5">
              <div>
                <label className="block text-sm font-semibold text-zinc-700 mb-2">Modal Uang Awal (Rp)</label>
                <input
                  type="number"
                  value={modalUang}
                  onChange={e => setModalUang(e.target.value)}
                  className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:bg-white focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none transition text-lg font-semibold"
                  placeholder="Contoh: 500000"
                  min="0"
                />
                <p className="text-xs text-zinc-400 mt-1.5">Kosongkan jika tidak ada modal awal (Rp 0)</p>
              </div>
              <button
                type="submit"
                className="w-full py-3.5 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 active:bg-sky-800 transition shadow-lg shadow-sky-600/30 flex items-center justify-center gap-2"
              >
                <Icon name="play" size={18} color="white" />
                Mulai Shift
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ==================== LOCK SCREEN OVERLAY ====================
    function LockScreenOverlay({ appState }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleUnlock = (e) => {
        e.preventDefault();
        if (appState.unlockScreen(password)) {
          setPassword('');
          setError('');
        } else {
          setError('Password salah');
          setPassword('');
        }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-zinc-900/95 backdrop-blur-md">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-[scaleIn_0.2s_ease-out] mx-4">
            <div className="bg-sky-600 p-8 text-center text-white">
              <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="lock" size={32} color="white" />
              </div>
              <h2 className="text-xl font-bold">Layar Terkunci</h2>
              <p className="text-sky-100 text-sm mt-1">{appState.user?.name || 'User'}</p>
            </div>
            <form onSubmit={handleUnlock} className="p-6 space-y-4">
              {error && (
                <div className="bg-rose-50 border border-rose-200 text-rose-700 px-4 py-2.5 rounded-xl text-sm font-medium text-center">
                  {error}
                </div>
              )}
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800"
                  placeholder="Masukkan password..."
                  autoFocus
                  required
                />
              </div>
              <button type="submit" className="w-full py-3 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 transition shadow-lg">
                <Icon name="unlock" size={16} className="inline mr-2" />Buka Kunci
              </button>
              <button type="button" onClick={() => appState.logout()} className="w-full py-2.5 bg-zinc-100 text-zinc-600 rounded-xl font-medium hover:bg-zinc-200 transition text-sm">
                Keluar Akun
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ==================== OPERATIONAL HOURS OVERLAY ====================
    function OperationalHoursOverlay({ appState }) {
      const [requested, setRequested] = useState(false);

      const handleRequestBypass = () => {
        const db = getDB();
        const existing = db.bypassRequests.find(r => r.email === appState.user?.email && r.status === 'pending');
        if (!existing) {
          db.bypassRequests.push({
            id: 'br' + Date.now(),
            email: appState.user?.email,
            name: appState.user?.name,
            requestedAt: new Date().toISOString(),
            status: 'pending'
          });
          saveDB(db);
          appState.refreshDB();
        }
        setRequested(true);
      };

      return (
        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-zinc-900/95 backdrop-blur-md">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-[scaleIn_0.2s_ease-out] mx-4">
            <div className="bg-amber-500 p-8 text-center text-white">
              <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="clock" size={32} color="white" />
              </div>
              <h2 className="text-xl font-bold">Di Luar Jam Operasional</h2>
              <p className="text-amber-100 text-sm mt-1">Jam operasional: 06:00 – 20:00</p>
            </div>
            <div className="p-6 space-y-4 text-center">
              <p className="text-zinc-600 text-sm">
                Saat ini sudah di luar jam operasional. Hubungi admin untuk mendapatkan izin akses.
              </p>
              {requested ? (
                <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 rounded-xl text-sm font-medium">
                  <Icon name="check-circle" size={16} className="inline mr-1.5" />
                  Permintaan terkirim. Menunggu persetujuan admin...
                </div>
              ) : (
                <button onClick={handleRequestBypass} className="w-full py-3 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition shadow-lg">
                  <Icon name="send" size={16} className="inline mr-2" />Minta Izin Akses
                </button>
              )}
              <button onClick={() => appState.logout()} className="w-full py-2.5 bg-zinc-100 text-zinc-600 rounded-xl font-medium hover:bg-zinc-200 transition text-sm">
                Keluar Akun
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==================== MAIN APP ====================
    // ==================== TRANSACTION SUCCESS MODAL ====================
    function TransactionSuccessModal({ transaction, onClose }) {
      const [waNumber, setWaNumber] = useState('');
      const [emailAddr, setEmailAddr] = useState('');

      const getReceiptText = () => {
        let text = `*SMILE POS - NOTA TRANSAKSI*\n`;
        text += `No. Nota: ${transaction.id}\n`;
        text += `Tanggal: ${new Date(transaction.date).toLocaleString('id-ID')}\n`;
        text += `Kasir: ${transaction.cashier}\n`;
        if (transaction.memberName) text += `Pelanggan: ${transaction.memberName}\n`;
        text += `----------------------------------------\n`;
        transaction.items.forEach(item => {
          text += `${item.name}\n  ${item.qty} x Rp ${item.effectivePrice.toLocaleString('id-ID')} = Rp ${(item.qty * item.effectivePrice).toLocaleString('id-ID')}\n`;
        });
        text += `----------------------------------------\n`;
        text += `Subtotal: Rp ${transaction.subtotal.toLocaleString('id-ID')}\n`;
        if (transaction.tax > 0) text += `PPN (10%): Rp ${transaction.tax.toLocaleString('id-ID')}\n`;
        if (transaction.discount > 0) text += `Diskon: -Rp ${transaction.discount.toLocaleString('id-ID')}\n`;
        text += `*TOTAL: Rp ${transaction.total.toLocaleString('id-ID')}*\n`;
        text += `Bayar: Rp ${transaction.payment.toLocaleString('id-ID')} (${transaction.method.toUpperCase()})\n`;
        text += `Kembali: Rp ${transaction.change.toLocaleString('id-ID')}\n\n`;
        text += `Terima kasih telah berbelanja!`;
        return text;
      };

      const sendWhatsApp = () => {
        let num = waNumber.trim().replace(/[^0-9]/g, '');
        if (!num) {
          alert('Masukkan nomor WhatsApp yang valid');
          return;
        }
        if (num.startsWith('0')) {
          num = '62' + num.slice(1);
        }
        const text = encodeURIComponent(getReceiptText());
        window.open(`https://api.whatsapp.com/send?phone=${num}&text=${text}`, '_blank');
      };

      const sendEmail = () => {
        const mail = emailAddr.trim();
        if (!mail || !mail.includes('@')) {
          alert('Masukkan alamat email yang valid');
          return;
        }
        const subject = encodeURIComponent(`Nota Transaksi ${transaction.id} - Smile POS`);
        const body = encodeURIComponent(getReceiptText());
        window.open(`mailto:${mail}?subject=${subject}&body=${body}`, '_blank');
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/60 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out] no-print">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[scaleIn_0.3s_ease-out] border border-zinc-200">
            <div className="p-6 bg-emerald-50 text-center text-emerald-800 border-b border-emerald-100">
              <div className="w-16 h-16 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto mb-3 shadow-lg shadow-emerald-500/20">
                <Icon name="check" size={32} />
              </div>
              <h3 className="text-xl font-bold">Pembayaran Sukses</h3>
              <p className="text-sm text-emerald-600 mt-1">Kembalian: Rp {transaction.change.toLocaleString('id-ID')}</p>
            </div>
            
            <div className="p-6 space-y-4">
              <button 
                onClick={() => window.print()} 
                className="w-full py-3.5 bg-zinc-900 text-white rounded-xl font-semibold hover:bg-zinc-800 transition shadow-md flex items-center justify-center gap-2"
              >
                <Icon name="printer" size={18} /> Cetak Struk Fisik
              </button>

              <div className="border-t border-zinc-100 pt-4 text-left">
                <h4 className="font-bold text-xs text-zinc-500 uppercase tracking-wider mb-2.5">Kirim Struk Digital</h4>
                
                <div className="space-y-3">
                  <div className="flex gap-2">
                    <input 
                      type="text" 
                      placeholder="No WhatsApp (contoh: 0812...)" 
                      value={waNumber} 
                      onChange={e => setWaNumber(e.target.value)}
                      className="flex-1 px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-xs font-semibold"
                    />
                    <button 
                      onClick={sendWhatsApp}
                      className="px-4 py-2 bg-emerald-605 hover:bg-emerald-700 text-white font-bold rounded-xl text-xs transition"
                    >
                      Kirim WA
                    </button>
                  </div>

                  <div className="flex gap-2">
                    <input 
                      type="email" 
                      placeholder="Alamat Email..." 
                      value={emailAddr} 
                      onChange={e => setEmailAddr(e.target.value)}
                      className="flex-1 px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-xs font-semibold"
                    />
                    <button 
                      onClick={sendEmail}
                      className="px-4 py-2 bg-sky-650 hover:bg-sky-700 text-white font-bold rounded-xl text-xs transition"
                    >
                      Kirim Email
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div className="p-4 bg-zinc-50 border-t border-zinc-100 flex gap-2">
              <button 
                onClick={onClose} 
                className="w-full py-3 bg-zinc-250 hover:bg-zinc-300 text-zinc-850 rounded-xl font-bold transition text-sm"
              >
                Selesai / Transaksi Baru
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==================== MAIN APP COMPONENT ====================
    function App() {
      const appState = useAppState();

      const isOutsideHours = isOutsideOperationalHours();
      const showHoursBlock = appState.user && !['admin', 'owner'].includes(appState.user.role) && isOutsideHours && !appState.bypassApproved;

      return (
        <AppContext.Provider value={appState}>
          {!appState.user ? (
            <LoginPage />
          ) : (
            <div className="flex h-screen overflow-hidden bg-zinc-50">
              <Sidebar />
              {appState.sidebar && (
                <div onClick={() => appState.setSidebar(false)} className="md:hidden fixed inset-0 bg-black/50 z-30 animate-[fadeIn_0.3s]"></div>
              )}
              
              <div className="flex-1 flex flex-col overflow-hidden relative">
                <Header />
                <main className="flex-1 overflow-y-auto p-4 md:p-6 custom-scroll">
                  <div className="max-w-7xl mx-auto h-full">
                    {appState.page === 'owner_dashboard' && <OwnerDashboard />}
                    {appState.page === 'admin_workspace' && <AdminWorkspace />}
                    {appState.page === 'pos' && (!['admin', 'owner'].includes(appState.user?.role) ? (appState.activeShift ? <POSPage /> : <BukaShiftPage />) : <POSPage />)}
                    {appState.page === 'products' && <ProductsPage />}
                    {appState.page === 'reports' && <ReportsPage />}
                    {appState.page === 'users' && <UsersPage />}
                    {appState.page === 'purchases' && <PurchasesPage />}
                  </div>
                </main>
                <BottomNav />
              </div>
            </div>
          )}
          
          {appState.isLocked && appState.user && (
            <LockScreenOverlay appState={appState} />
          )}

          {showHoursBlock && (
            <OperationalHoursOverlay appState={appState} />
          )}

          {appState.showTutupShiftModal && (
            <TutupShiftModal appState={appState} />
          )}

          {appState.showSyncModal && (
            <SyncModal appState={appState} />
          )}

          {appState.showSuccessModal && appState.lastTransaction && (
            <TransactionSuccessModal 
              transaction={appState.lastTransaction} 
              onClose={() => {
                appState.setShowSuccessModal(false);
                appState.setLastTransaction(null);
              }}
            />
          )}

          {/* Hidden Printable Receipt */}
          {appState.lastTransaction && (
            <div className="print-receipt print-only">
              <div className="text-center font-bold mb-2">
                <h3 className="text-base font-bold">SMILE POS</h3>
                <p className="text-[9px]">Sistem Kasir Pintar</p>
                <p className="text-[9px] border-b border-dashed border-zinc-400 pb-1">Jl. POS Sejahtera No. 88</p>
              </div>
              
              <div className="text-[9px] mb-2 font-mono">
                <div>No. Nota: {appState.lastTransaction.id}</div>
                <div>Tanggal : {new Date(appState.lastTransaction.date).toLocaleString('id-ID')}</div>
                <div>Kasir   : {appState.lastTransaction.cashier}</div>
                {appState.lastTransaction.memberName && <div>Pelanggan: {appState.lastTransaction.memberName}</div>}
                <div className="border-b border-dashed border-zinc-400 my-1"></div>
              </div>
              
              <div className="text-[9px] font-mono space-y-1">
                {appState.lastTransaction.items.map(item => (
                  <div key={item.id}>
                     <div className="font-semibold">{item.name}</div>
                     <div className="flex justify-between pl-2">
                       <span>{item.qty} x Rp {item.effectivePrice.toLocaleString('id-ID')}</span>
                       <span>Rp {(item.qty * item.effectivePrice).toLocaleString('id-ID')}</span>
                     </div>
                  </div>
                ))}
                <div className="border-b border-dashed border-zinc-400 my-1"></div>
              </div>
              
              <div className="text-[9px] font-mono space-y-0.5 text-right pl-6">
                <div className="flex justify-between font-mono">
                  <span>Subtotal:</span>
                  <span>Rp {appState.lastTransaction.subtotal.toLocaleString('id-ID')}</span>
                </div>
                {appState.lastTransaction.tax > 0 && (
                  <div className="flex justify-between font-mono">
                    <span>PPN (10%):</span>
                    <span>Rp {appState.lastTransaction.tax.toLocaleString('id-ID')}</span>
                  </div>
                )}
                {appState.lastTransaction.discount > 0 && (
                  <div className="flex justify-between font-mono text-rose-600">
                    <span>Diskon:</span>
                    <span>-Rp {appState.lastTransaction.discount.toLocaleString('id-ID')}</span>
                  </div>
                )}
                {appState.lastTransaction.rounding !== 0 && (
                  <div className="flex justify-between font-mono">
                    <span>Pembulatan:</span>
                    <span>Rp {appState.lastTransaction.rounding.toLocaleString('id-ID')}</span>
                  </div>
                )}
                <div className="border-t border-double border-zinc-400 pt-1 flex justify-between font-bold">
                  <span>TOTAL:</span>
                  <span>Rp {appState.lastTransaction.total.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between font-mono">
                  <span>Bayar ({appState.lastTransaction.method.toUpperCase()}):</span>
                  <span>Rp {appState.lastTransaction.payment.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between font-mono">
                  <span>Kembali:</span>
                  <span>Rp {appState.lastTransaction.change.toLocaleString('id-ID')}</span>
                </div>
              </div>
              
              <div className="text-center font-mono text-[8px] mt-4 border-t border-dashed border-zinc-400 pt-2">
                <p>Terima Kasih atas Kunjungan Anda</p>
                <p>Smile POS - Layanan POS Pintar</p>
              </div>
            </div>
          )}

          <div className="fixed top-4 right-4 md:top-6 md:right-6 z-[9999] flex flex-col items-end pointer-events-none">
            {appState.toasts.map(toast => (
              <div key={toast.id} className="pointer-events-auto">
                <Toast toast={toast} onClose={(id) => {
                  appState.setToasts(prev => prev.filter(t => t.id !== id));
                }} />
              </div>
            ))}
          </div>
        </AppContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
