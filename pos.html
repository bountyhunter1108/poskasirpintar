    function TransactionEditModal({ tx, onClose, app }) {
      const [cashier, setCashier] = useState(tx.cashier);
      const [method, setMethod] = useState(tx.method || 'cash');
      const [discount, setDiscount] = useState(tx.discount || 0);
      const [items, setItems] = useState(JSON.parse(JSON.stringify(tx.items))); // deep clone
      
      const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
      const total = subtotal - discount;

      const handleUpdateQty = (itemId, delta) => {
        const db = getDB();
        const prod = db.products.find(p => p.id === itemId);
        if (!prod) return;

        setItems(prev => prev.map(item => {
          if (item.id === itemId) {
            const currentTxQty = item.qty;
            const newTxQty = currentTxQty + delta;
            
            if (newTxQty < 1) return item;

            const diff = newTxQty - currentTxQty;
            if (diff > 0 && prod.stock < diff) {
              app.addToast(`Stok ${prod.name} tidak mencukupi untuk ditambah`, 'error');
              return item;
            }
            return { ...item, qty: newTxQty };
          }
          return item;
        }));
      };

      const handleRemoveItem = (itemId) => {
        if (items.length <= 1) {
          app.addToast('Transaksi harus memiliki minimal 1 produk', 'error');
          return;
        }
        setItems(prev => prev.filter(i => i.id !== itemId));
      };

      const handleSave = () => {
        const db = getDB();
        const txIdx = db.transactions.findIndex(t => t.id === tx.id);
        if (txIdx === -1) return;

        const originalTx = db.transactions[txIdx];
        
        // Rollback old stock changes for the original items
        originalTx.items.forEach(oldItem => {
          const prod = db.products.find(p => p.id === oldItem.id);
          if (prod) {
            prod.stock += oldItem.qty; // restore original stock
          }
        });

        // Verify and apply new stock deductions
        let stockOk = true;
        let failedProd = '';
        items.forEach(newItem => {
          const prod = db.products.find(p => p.id === newItem.id);
          if (!prod || prod.stock < newItem.qty) {
            stockOk = false;
            failedProd = prod ? prod.name : 'Produk tidak ditemukan';
          }
        });

        if (!stockOk) {
          app.addToast(`Stok ${failedProd} tidak mencukupi`, 'error');
          // Re-rollback products to keep database consistent
          originalTx.items.forEach(oldItem => {
            const prod = db.products.find(p => p.id === oldItem.id);
            if (prod) {
              prod.stock -= oldItem.qty;
            }
          });
          return;
        }

        // Apply new stock deductions
        items.forEach(newItem => {
          const prod = db.products.find(p => p.id === newItem.id);
          if (prod) {
            prod.stock -= newItem.qty;
            prod.updatedAt = new Date().toISOString();
          }
        });

        // Update transaction details
        originalTx.cashier = cashier;
        originalTx.method = method;
        originalTx.discount = discount;
        originalTx.items = items;
        originalTx.subtotal = subtotal;
        originalTx.total = total;
        originalTx.updatedAt = new Date().toISOString();

        saveDB(db);
        app.refreshDB();
        app.addToast('Transaksi berhasil diperbarui', 'success');
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[95vh] overflow-hidden flex flex-col shadow-2xl">
            <div className="p-6 border-b border-zinc-150 flex justify-between items-center bg-zinc-50">
              <div>
                <h3 className="text-lg font-bold text-zinc-950">Edit Transaksi</h3>
                <p className="text-xs text-zinc-500 mt-0.5">ID Transaksi: {tx.id}</p>
              </div>
              <button onClick={onClose} className="p-1.5 hover:bg-zinc-200 rounded-lg transition text-zinc-500">
                <Icon name="x" size={20} />
              </button>
            </div>
            
            <div className="p-6 flex-1 overflow-y-auto space-y-6 text-left">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Kasir</label>
                  <input 
                    type="text" 
                    value={cashier} 
                    onChange={e => setCashier(e.target.value)} 
                    className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:bg-white focus:border-zinc-500 outline-none font-medium text-zinc-800" 
                  />
                </div>
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Metode Pembayaran</label>
                  <select 
                    value={method} 
                    onChange={e => setMethod(e.target.value)} 
                    className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:bg-white focus:border-zinc-500"
                  >
                    <option value="cash">Tunai (Cash)</option>
                    <option value="qris">QRIS</option>
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3">Item Produk</label>
                <div className="border border-zinc-150 rounded-xl overflow-hidden divide-y divide-zinc-100">
                  {items.map(item => (
                    <div key={item.id} className="p-4 flex items-center justify-between gap-4">
                      <div className="flex-1 min-w-0">
                        <p className="font-semibold text-zinc-800 truncate text-sm">{item.name}</p>
                        <p className="text-xs text-zinc-400 font-medium">Rp {item.price.toLocaleString('id-ID')} x {item.qty}</p>
                      </div>
                      
                      <div className="flex items-center gap-3">
                        <div className="flex items-center bg-zinc-100 rounded-lg p-0.5 border border-zinc-200">
                          <button type="button" onClick={() => handleUpdateQty(item.id, -1)} className="p-1 hover:bg-white rounded text-zinc-650 transition"><Icon name="minus" size={14} /></button>
                          <span className="w-10 text-center font-bold text-xs text-zinc-800">{item.qty}</span>
                          <button type="button" onClick={() => handleUpdateQty(item.id, 1)} className="p-1 hover:bg-white rounded text-zinc-650 transition"><Icon name="plus" size={14} /></button>
                        </div>
                        
                        <button type="button" onClick={() => handleRemoveItem(item.id)} className="p-2 hover:bg-rose-50 rounded-lg text-rose-500 transition" title="Hapus Produk">
                          <Icon name="trash-2" size={16} />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="p-4 bg-zinc-50 rounded-xl border border-zinc-150 space-y-2">
                <div className="flex justify-between text-sm text-zinc-650">
                  <span>Subtotal</span>
                  <span className="font-semibold text-zinc-800">Rp {subtotal.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between items-center text-sm text-zinc-650">
                  <span>Diskon</span>
                  <input 
                    type="number" 
                    value={discount} 
                    onChange={e => setDiscount(Math.max(0, parseInt(e.target.value) || 0))} 
                    className="w-28 text-right px-2.5 py-1 bg-zinc-50 border border-zinc-200 rounded-lg outline-none font-semibold focus:bg-white text-zinc-850" 
                  />
                </div>
                <div className="flex justify-between text-lg font-bold text-zinc-950 pt-2 border-t border-zinc-200">
                  <span>Total Tagihan Baru</span>
                  <span className="text-sky-600">Rp {total.toLocaleString('id-ID')}</span>
                </div>
              </div>
            </div>
            
            <div className="p-6 bg-zinc-50 flex gap-3 border-t border-zinc-150">
              <button type="button" onClick={onClose} className="flex-1 py-3 bg-white border border-zinc-200 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-100 transition">Batal</button>
              <button type="button" onClick={handleSave} className="flex-1 py-3 bg-zinc-900 text-white rounded-xl font-semibold hover:bg-zinc-800 transition shadow-md">Simpan Perubahan</button>
            </div>
          </div>
        </div>
      );
    }

    function ReportsPage() {
      const app = useContext(AppContext);
      const db = getDB();
      const [filter, setFilter] = useState('7days');
      const [chartType, setChartType] = useState('line'); // 'line' or 'bar'
      const [editTx, setEditTx] = useState(null);
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      // Admin verification for cashier role
      const [showAdminAuthModal, setShowAdminAuthModal] = useState(false);
      const [authAction, setAuthAction] = useState(null); // 'edit' or 'delete'
      const [targetTx, setTargetTx] = useState(null);

      // Shift CRUD state
      const [showShiftModal, setShowShiftModal] = useState(null);

      const handleEditClick = (tx) => {
        if (['admin', 'owner'].includes(app.user?.role)) {
          setEditTx(tx);
        } else {
          setAuthAction('edit');
          setTargetTx(tx);
          setShowAdminAuthModal(true);
        }
      };

      const handleDeleteClick = (tx) => {
        if (['admin', 'owner'].includes(app.user?.role)) {
          handleDeleteTransaction(tx.id);
        } else {
          setAuthAction('delete');
          setTargetTx(tx);
          setShowAdminAuthModal(true);
        }
      };

      const handleSaveShift = (shiftData) => {
        const db = getDB();
        const nowStr = new Date().toISOString();
        if (showShiftModal.mode === 'add') {
          const newShift = {
            id: 'SF' + Date.now(),
            cashierId: app.user?.id || 'u2',
            cashierName: app.user?.name || 'Kasir',
            startTime: shiftData.startTime || nowStr,
            endTime: shiftData.endTime || nowStr,
            startCash: shiftData.startCash || 0,
            expectedCash: shiftData.expectedCash || 0,
            actualCash: shiftData.actualCash || 0,
            difference: (shiftData.actualCash || 0) - (shiftData.expectedCash || 0),
            status: 'closed',
            updatedAt: nowStr
          };
          db.shifts.push(newShift);
          app.addToast('Laporan shift ditambahkan', 'success');
        } else {
          const idx = db.shifts.findIndex(s => s.id === showShiftModal.shift.id);
          if (idx !== -1) {
            const expected = db.shifts[idx].expectedCash;
            const diff = (shiftData.actualCash || 0) - expected;
            db.shifts[idx] = {
              ...db.shifts[idx],
              ...shiftData,
              difference: diff,
              updatedAt: nowStr
            };
            app.addToast('Laporan shift berhasil diperbarui', 'success');
          }
        }
        saveDB(db);
        app.refreshDB();
        setShowShiftModal(null);
      };

      const handleDeleteShift = (shiftId) => {
        if (confirm('Apakah Anda yakin ingin menghapus laporan shift ini?')) {
          const db = getDB();
          const idx = db.shifts.findIndex(s => s.id === shiftId);
          if (idx !== -1) {
            db.shifts.splice(idx, 1);
            saveDB(db);
            app.refreshDB();
            app.addToast('Laporan shift dihapus', 'success');
          }
        }
      };

      const allTx = useMemo(() => {
        return getDB().transactions || [];
      }, [app.dbVersion]);

      const filteredTx = useMemo(() => {
        const now = new Date();
        let txs = allTx.filter(t => !t.deleted);

        if (filter === 'today') {
          txs = txs.filter(t => new Date(t.date).toDateString() === now.toDateString());
        } else if (filter === '7days') {
          const past = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
          txs = txs.filter(t => new Date(t.date) >= past);
        } else if (filter === 'month') {
          txs = txs.filter(t => {
            const d = new Date(t.date);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
          });
        }
        return txs;
      }, [allTx, filter]);

      const { chartLabels, chartData } = useMemo(() => {
        const daily = {};
        filteredTx.forEach(t => {
          const d = new Date(t.date).toLocaleDateString('id-ID', { month: 'short', day: 'numeric' });
          daily[d] = (daily[d] || 0) + t.total;
        });
        const labels = Object.keys(daily).reverse();
        const data = Object.values(daily).reverse();
        return { chartLabels: labels, chartData: data };
      }, [filteredTx]);

      const totalSales = useMemo(() => filteredTx.reduce((s, t) => s + (t.total || 0), 0), [filteredTx]);
      const count = useMemo(() => filteredTx.length, [filteredTx]);

      const handleDeleteTransaction = (id) => {
        if (confirm('Hapus transaksi ini? Stok produk akan otomatis dikembalikan.')) {
          const db = getDB();
          const txIdx = db.transactions.findIndex(t => t.id === id);
          if (txIdx !== -1) {
            const tx = db.transactions[txIdx];
            
            // Restore product stocks
            tx.items.forEach(item => {
              const prod = db.products.find(p => p.id === item.id);
              if (prod) {
                prod.stock += item.qty;
                prod.updatedAt = new Date().toISOString();
              }
            });

            // Mark transaction as deleted
            tx.deleted = true;
            tx.updatedAt = new Date().toISOString();
            
            saveDB(db);
            app.refreshDB();
            app.addToast('Transaksi berhasil dihapus dan stok dikembalikan', 'success');
          }
        }
      };

      const exportCSV = () => {
        const headers = ['ID Transaksi', 'Waktu', 'Kasir', 'Metode', 'Total (IDR)'];
        const rows = filteredTx.map(t => [
          t.id,
          new Date(t.date).toLocaleString('id-ID'),
          t.cashier,
          (t.method || 'cash').toUpperCase(),
          t.total
        ]);
        const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", 'Laporan_Penjualan_' + filter + '.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        app.addToast('Laporan berhasil diekspor ke CSV', 'success');
      };

      const exportPDF = () => {
        const filterLabel = { today: 'Hari Ini', '7days': '7 Hari Terakhir', month: 'Bulan Ini', all: 'Semua Waktu' }[filter] || filter;
        const win = window.open('', '_blank');
        if (!win) { app.addToast('Izinkan pop-up untuk ekspor PDF', 'error'); return; }
        const doc = win.document;
        doc.open();
        const rowsHtml = filteredTx.map(t => {
          const id = t.id || '';
          const tgl = new Date(t.date).toLocaleString('id-ID');
          const kasir = t.cashier || '';
          const metode = (t.method || 'cash').toUpperCase();
          const total = (t.total || 0).toLocaleString('id-ID');
          return ['<tr>',
            '<td style="padding:8px 12px;border-bottom:1px solid #eee;font-family:monospace;color:#0284c7">' + id + '<br><small style="color:#999">' + tgl + '<\/small><\/td>',
            '<td style="padding:8px 12px;border-bottom:1px solid #eee">' + kasir + '<\/td>',
            '<td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:center">' + metode + '<\/td>',
            '<td style="padding:8px 12px;border-bottom:1px solid #eee;text-align:right;font-weight:700">IDR ' + total + '<\/td>',
          '<\/tr>'].join('');
        }).join('');
        const css = [
          'body{font-family:Arial,sans-serif;color:#111;padding:32px;background:#fff;margin:0}',
          'h1{font-size:22px;font-weight:800;color:#0284c7;margin:0 0 4px 0}',
          '.sub{color:#777;font-size:13px;margin:0 0 24px 0}',
          '.summary{display:flex;gap:16px;margin-bottom:24px}',
          '.card{background:#f5f5f5;border-radius:12px;padding:16px 24px;flex:1}',
          '.card h2{font-size:12px;color:#777;margin:0 0 4px 0;text-transform:uppercase}',
          '.card p{font-size:22px;font-weight:800;color:#111;margin:0}',
          'table{width:100%;border-collapse:collapse;font-size:13px}',
          'thead tr{background:#111;color:#fff}',
          'th{padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase}',
          '@media print{body{padding:16px}}'
        ].join('');
        const fullHtml = [
          '<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8">',
          '<title>Laporan Penjualan<\/title>',
          '<style>' + css + '<\/style>',
          '<\/head><body>',
          '<h1>Laporan Penjualan - Smile POS<\/h1>',
          '<p class="sub">Periode: ' + filterLabel + ' &bull; Dicetak: ' + new Date().toLocaleString('id-ID') + '<\/p>',
          '<div class="summary">',
             '<div class="card"><h2>Total Pendapatan<\/h2><p>IDR ' + totalSales.toLocaleString('id-ID') + '<\/p><\/div>',
             '<div class="card"><h2>Jumlah Transaksi<\/h2><p>' + count + ' Nota<\/p><\/div>',
          '<\/div>',
          '<table><thead><tr>',
            '<th>ID \/ Waktu<\/th><th>Kasir<\/th><th>Metode<\/th><th style="text-align:right">Total<\/th>',
          '<\/tr><\/thead><tbody>',
          rowsHtml,
          (filteredTx.length === 0 ? '<tr><td colspan="4" style="text-align:center;padding:24px;color:#999">Tidak ada data<\/td><\/tr>' : ''),
          '<\/tbody><\/table>',
          '<\/body><\/html>'
        ].join('');
        doc.write(fullHtml);
        doc.close();
        setTimeout(() => { win.print(); }, 500);
        app.addToast('Membuka dialog cetak/simpan PDF...', 'info');
      };

      // Chart Effect
      useEffect(() => {
        if (!chartRef.current) return;

        if (chartInstance.current) chartInstance.current.destroy();
        
        const ctx = chartRef.current.getContext('2d');
        let datasetConfig = {};

        if (chartType === 'line') {
          const gradient = ctx.createLinearGradient(0, 0, 0, 240);
          gradient.addColorStop(0, 'rgba(79, 70, 229, 0.35)'); // sky-600 / Indigo-600 color
          gradient.addColorStop(1, 'rgba(79, 70, 229, 0.0)');
          
          datasetConfig = {
            type: 'line',
            label: 'Pendapatan (Rp)',
            data: chartData,
            borderColor: '#4f46e5', // sky-600 / Indigo-600
            backgroundColor: gradient,
            borderWidth: 3,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#4f46e5',
            pointBorderWidth: 3,
            pointRadius: 4,
            pointHoverRadius: 7,
            pointHoverBackgroundColor: '#4f46e5',
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 3,
            fill: true,
            tension: 0.4
          };
        } else {
          const gradient = ctx.createLinearGradient(0, 0, 0, 240);
          gradient.addColorStop(0, 'rgba(79, 70, 229, 0.85)');
          gradient.addColorStop(1, 'rgba(79, 70, 229, 0.2)');
          
          datasetConfig = {
            type: 'bar',
            label: 'Pendapatan (Rp)',
            data: chartData,
            borderColor: 'transparent',
            backgroundColor: gradient,
            borderWidth: 0,
            borderRadius: 8,
            borderSkipped: false,
            barPercentage: 0.55
          };
        }

        chartInstance.current = new Chart(chartRef.current, {
          data: {
            labels: chartLabels,
            datasets: [datasetConfig]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: 'index',
              intersect: false
            },
            animation: {
              duration: 1500,
              easing: 'easeOutQuart'
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.95)', // Slate-900 with nice opacity
                titleFont: { size: 12, weight: 'bold', family: 'Inter' },
                bodyFont: { size: 11, family: 'Inter' },
                padding: 12,
                cornerRadius: 12,
                displayColors: false,
                borderWidth: 1,
                borderColor: 'rgba(255, 255, 255, 0.1)',
                callbacks: {
                  label: function(context) {
                    return ' Pendapatan: Rp ' + context.raw.toLocaleString('id-ID');
                  }
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: 'rgba(0, 0, 0, 0.04)', drawBorder: false },
                ticks: {
                  callback: function(value) {
                    return 'Rp ' + value.toLocaleString('id-ID');
                  },
                  font: { family: 'Inter', size: 10 },
                  color: '#64748b'
                }
              },
              x: {
                grid: { display: false },
                ticks: { font: { family: 'Inter', size: 10 }, color: '#64748b' }
              }
            }
          }
        });

        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [chartLabels, chartData, chartType]);

      return (
        <div className="pb-16 md:pb-0">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
              <h3 className="text-xl font-bold text-zinc-800">Laporan Penjualan</h3>
              <p className="text-sm text-zinc-500">Ringkasan transaksi dan performa</p>
            </div>
            <div className="flex gap-2 w-full sm:w-auto">
              <select value={filter} onChange={e => setFilter(e.target.value)} className="px-4 py-2.5 bg-white border border-zinc-200 rounded-xl font-medium outline-none text-zinc-700 shadow-sm flex-1 sm:flex-none">
                <option value="today">Hari Ini</option>
                <option value="7days">7 Hari Terakhir</option>
                <option value="month">Bulan Ini</option>
                <option value="all">Semua Waktu</option>
              </select>
              <button onClick={exportCSV} className="px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold shadow-sm flex items-center gap-2 transition active:scale-95" title="Ekspor ke CSV (Excel)">
                <Icon name="file-spreadsheet" size={18} /> CSV
              </button>
              <button onClick={exportPDF} className="px-4 py-2.5 bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-sm font-semibold shadow-sm flex items-center gap-2 transition active:scale-95" title="Ekspor ke PDF">
                <Icon name="file-text" size={18} /> PDF
              </button>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div className="bg-white rounded-2xl shadow-sm border border-zinc-200 p-6 flex items-center gap-5">
              <div className="w-14 h-14 rounded-full bg-emerald-100 flex items-center justify-center">
                <span className="font-extrabold text-xl text-emerald-600">Rp</span>
              </div>
              <div className="text-left">
                <p className="text-sm text-zinc-500 font-medium mb-1">Total Pendapatan</p>
                <p className="text-3xl font-extrabold text-zinc-800">Rp {totalSales.toLocaleString('id-ID')}</p>
              </div>
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-zinc-200 p-6 flex items-center gap-5">
              <div className="w-14 h-14 rounded-full bg-sky-100 flex items-center justify-center">
                <Icon name="shopping-bag" size={28} className="text-sky-600" />
              </div>
              <div className="text-left">
                <p className="text-sm text-zinc-500 font-medium mb-1">Jumlah Transaksi</p>
                <p className="text-3xl font-extrabold text-zinc-800">{count} Nota</p>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-zinc-200 p-6 mb-6">
            <div className="flex justify-between items-center mb-4">
              <h4 className="font-bold text-zinc-800">Grafik Penjualan</h4>
              <div className="flex bg-zinc-100 p-1 rounded-xl">
                <button onClick={() => setChartType('line')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1.5 ${chartType === 'line' ? 'bg-white shadow-sm text-sky-600' : 'text-zinc-500 hover:text-zinc-800'}`}>
                  <Icon name="activity" size={14} /> Area
                </button>
                <button onClick={() => setChartType('bar')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1.5 ${chartType === 'bar' ? 'bg-white shadow-sm text-sky-600' : 'text-zinc-500 hover:text-zinc-800'}`}>
                  <Icon name="bar-chart" size={14} /> Batang
                </button>
              </div>
            </div>
            <div className="h-64 relative w-full">
              <canvas ref={chartRef}></canvas>
            </div>
          </div>
          
          <div className="bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden mb-6">
            <div className="px-6 py-5 border-b border-zinc-100 bg-zinc-50/50 flex justify-between items-center">
              <h4 className="font-bold text-zinc-800">Riwayat Transaksi Terbaru</h4>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full min-w-[600px]">
                <thead>
                  <tr className="bg-white border-b border-zinc-100">
                    <th className="text-left px-6 py-4 text-xs font-bold text-zinc-500 uppercase">ID / Waktu</th>
                    <th className="text-left px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Kasir</th>
                    <th className="text-center px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Metode</th>
                    <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Total</th>
                    <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase pr-8">Aksi</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-zinc-50">
                  {filteredTx.map(t => (
                    <tr key={t.id} className="hover:bg-zinc-50/50">
                      <td className="px-6 py-4 text-left">
                        <div className="font-mono text-sm text-sky-600 font-medium">{t.id}</div>
                        <div className="text-xs text-zinc-400">{new Date(t.date).toLocaleString('id-ID')}</div>
                      </td>
                      <td className="px-6 py-4 text-sm font-medium text-zinc-700 text-left">{t.cashier}</td>
                      <td className="px-6 py-4 text-center text-sm font-semibold text-zinc-650">
                        <span className={`px-2.5 py-1 rounded-full text-xs font-bold ${t.method === 'qris' ? 'bg-indigo-55 hover:bg-indigo-100 text-indigo-700' : 'bg-emerald-55 hover:bg-emerald-100 text-emerald-700'}`}>
                          {(t.method || 'cash').toUpperCase()}
                        </span>
                      </td>
                      <td className="px-6 py-4 text-right font-bold text-zinc-800">Rp {t.total?.toLocaleString('id-ID')}</td>
                      <td className="px-6 py-4">
                        {['admin', 'owner'].includes(app.user?.role) && (
                          <div className="flex justify-end gap-2 pr-2">
                            <button onClick={() => handleEditClick(t)} className="p-2 text-sky-600 bg-sky-50 hover:bg-sky-100 rounded-lg transition" title="Edit Transaksi"><Icon name="edit" size={14} /></button>
                            <button onClick={() => handleDeleteClick(t)} className="p-2 text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg transition" title="Hapus Transaksi"><Icon name="trash-2" size={14} /></button>
                          </div>
                        )}
                      </td>
                    </tr>
                  ))}
                  {filteredTx.length === 0 && (
                    <tr><td colSpan="5" className="text-center py-8 text-zinc-400">Tidak ada transaksi di periode ini</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Riwayat Shift Kasir (Semua role bisa melihat, admin bisa kelola) */}
          <div className="bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden mb-6">
            <div className="px-6 py-5 border-b border-zinc-100 bg-zinc-50/50 flex justify-between items-center">
              <h4 className="font-bold text-zinc-800">Laporan Shift & Kas Mandiri</h4>
              {['admin', 'owner'].includes(app.user?.role) && (
              <button 
                onClick={() => setShowShiftModal({ mode: 'add' })}
                className="px-3 py-1.5 bg-zinc-900 hover:bg-zinc-800 text-white rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-sm transition active:scale-95 animate-[scaleIn_0.15s_ease-out]"
              >
                <Icon name="plus" size={14} />
                <span>Tambah Shift</span>
              </button>
              )}
            </div>
            <div className="overflow-x-auto">
              <table className="w-full min-w-[600px]">
                <thead>
                  <tr className="bg-white border-b border-zinc-100">
                    <th className="text-left px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Kasir / Waktu</th>
                    <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Modal Awal</th>
                    <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Diharapkan</th>
                    <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Fisik Laci</th>
                    <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Selisih</th>
                    <th className="text-center px-6 py-4 text-xs font-bold text-zinc-500 uppercase">Status</th>
                    <th className="text-right px-6 py-4 text-xs font-bold text-zinc-500 uppercase pr-8">Aksi</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-zinc-50">
                  {(db.shifts || []).slice(0, 10).map(s => {
                    const diff = s.difference || 0;
                    return (
                      <tr key={s.id} className="hover:bg-zinc-50/50">
                        <td className="px-6 py-4 text-left">
                          <div className="font-semibold text-zinc-800">{s.cashierName}</div>
                          <div className="text-xs text-zinc-400">
                            {new Date(s.startTime).toLocaleTimeString('id-ID')} {s.endTime && ` - ${new Date(s.endTime).toLocaleTimeString('id-ID')}`}
                          </div>
                        </td>
                        <td className="px-6 py-4 text-right font-medium text-zinc-700">Rp {s.startCash.toLocaleString('id-ID')}</td>
                        <td className="px-6 py-4 text-right font-medium text-zinc-700">Rp {s.expectedCash?.toLocaleString('id-ID') || 0}</td>
                        <td className="px-6 py-4 text-right font-medium text-zinc-700">Rp {s.actualCash?.toLocaleString('id-ID') || 0}</td>
                        <td className={`px-6 py-4 text-right font-bold ${diff === 0 ? 'text-zinc-700' : diff > 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                          {diff === 0 ? 'Pas' : diff > 0 ? `+Rp ${diff.toLocaleString('id-ID')}` : `-Rp ${Math.abs(diff).toLocaleString('id-ID')}`}
                        </td>
                        <td className="px-6 py-4 text-center">
                          <span className={`px-2.5 py-0.5 rounded-lg text-xs font-bold ${s.status === 'open' ? 'bg-amber-100 text-amber-700' : 'bg-zinc-100 text-zinc-500'}`}>
                            {s.status === 'open' ? 'Buka' : 'Tutup'}
                          </span>
                        </td>
                        <td className="px-6 py-4">
                          {['admin', 'owner'].includes(app.user?.role) && (
                          <div className="flex justify-end gap-2 pr-2">
                            <button onClick={() => setShowShiftModal({ mode: 'edit', shift: s })} className="p-2 text-sky-600 bg-sky-50 hover:bg-sky-100 rounded-lg transition" title="Edit Shift"><Icon name="edit" size={14} /></button>
                            <button onClick={() => handleDeleteShift(s.id)} className="p-2 text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg transition" title="Hapus Shift"><Icon name="trash-2" size={14} /></button>
                          </div>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                  {(db.shifts || []).length === 0 && (
                    <tr><td colSpan="6" className="text-center py-8 text-zinc-400">Belum ada laporan shift</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Edit Transaction Modal */}
          {editTx && (
            <TransactionEditModal tx={editTx} onClose={() => setEditTx(null)} app={app} />
          )}

          {/* Shift Form Modal */}
          {showShiftModal && (
            <ShiftFormModal 
              shift={showShiftModal.shift} 
              onSave={handleSaveShift} 
              onCancel={() => setShowShiftModal(null)} 
            />
          )}

          {/* Admin Verification Modal for Cashier Operations */}
          {showAdminAuthModal && (
            <VoidWithPINModal
              onConfirm={() => {
                setShowAdminAuthModal(false);
                if (authAction === 'edit') {
                  setEditTx(targetTx);
                } else if (authAction === 'delete') {
                  handleDeleteTransaction(targetTx.id);
                }
                setTargetTx(null);
                setAuthAction(null);
              }}
              onCancel={() => {
                setShowAdminAuthModal(false);
                setTargetTx(null);
                setAuthAction(null);
              }}
            />
          )}
        </div>
      );
    }
    
    // ==================== SHIFT FORM MODAL ====================
    function formatDateTimeLocal(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return '';
      const tzoffset = date.getTimezoneOffset() * 60000;
      const localISOTime = (new Date(date.getTime() - tzoffset)).toISOString().slice(0, 16);
      return localISOTime;
    }

    function ShiftFormModal({ shift, onSave, onCancel }) {
      const [startTime, setStartTime] = useState(shift ? formatDateTimeLocal(shift.startTime) : formatDateTimeLocal(new Date().toISOString()));
      const [endTime, setEndTime] = useState(shift ? formatDateTimeLocal(shift.endTime) : formatDateTimeLocal(new Date().toISOString()));
      const [startCash, setStartCash] = useState(shift ? String(shift.startCash) : '0');
      const [expectedCash, setExpectedCash] = useState(shift ? String(shift.expectedCash) : '0');
      const [actualCash, setActualCash] = useState(shift ? String(shift.actualCash) : '0');
      
      const handleSubmit = (e) => {
        e.preventDefault();
        onSave({
          startTime: new Date(startTime).toISOString(),
          endTime: new Date(endTime).toISOString(),
          startCash: parseFloat(startCash) || 0,
          expectedCash: parseFloat(expectedCash) || 0,
          actualCash: parseFloat(actualCash) || 0
        });
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s_ease-out]">
            <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50 text-left">
              <h3 className="text-lg font-bold text-zinc-800">{shift ? 'Edit Shift' : 'Tambah Shift'}</h3>
              <button onClick={onCancel} type="button" className="p-2 bg-zinc-100 rounded-full text-zinc-500 hover:bg-zinc-200 transition"><Icon name="x" size={16} /></button>
            </div>
            <form onSubmit={handleSubmit} className="p-6 text-left space-y-4">
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Waktu Mulai</label>
                <input type="datetime-local" value={startTime} onChange={e => setStartTime(e.target.value)} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" required />
              </div>
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Waktu Selesai</label>
                <input type="datetime-local" value={endTime} onChange={e => setEndTime(e.target.value)} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" required />
              </div>
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Modal Awal (Rp)</label>
                <input type="number" value={startCash} onChange={e => setStartCash(e.target.value)} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" min="0" required />
              </div>
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Diharapkan (Rp)</label>
                <input type="number" value={expectedCash} onChange={e => setExpectedCash(e.target.value)} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" min="0" required />
              </div>
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Uang Fisik Laci (Rp)</label>
                <input type="number" value={actualCash} onChange={e => setActualCash(e.target.value)} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" min="0" required />
              </div>
              <div className="flex gap-3 pt-2">
                <button type="button" onClick={onCancel} className="flex-1 py-3 bg-zinc-100 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-200 transition">Batal</button>
                <button type="submit" className="flex-1 py-3 bg-sky-600 text-white rounded-xl font-semibold hover:bg-sky-700 transition shadow-lg">Simpan</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ==================== TUTUP SHIFT MODAL ====================
    function TutupShiftModal({ appState }) {
      const [actualCash, setActualCash] = useState('');
      const db = getDB();
      const activeShift = appState.activeShift;

      if (!activeShift) return null;

      const cashSales = db.transactions
        .filter(t => t.cashier === appState.user?.name && new Date(t.date) >= new Date(activeShift.startTime) && t.method === 'cash' && !t.deleted)
        .reduce((sum, t) => sum + t.total, 0);

      const expectedCash = activeShift.startCash + cashSales;
      const difference = (parseFloat(actualCash) || 0) - expectedCash;

      const handleSubmit = (e) => {
        e.preventDefault();
        const cash = parseFloat(actualCash) || 0;
        appState.endShift(cash);
        appState.setShowTutupShiftModal(false);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s_ease-out]">
            <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50 text-left">
              <h3 className="text-lg font-bold text-zinc-800">Tutup Shift</h3>
              <button onClick={() => appState.setShowTutupShiftModal(false)} type="button" className="p-2 bg-zinc-100 rounded-full text-zinc-500 hover:bg-zinc-200 transition"><Icon name="x" size={16} /></button>
            </div>
            <form onSubmit={handleSubmit} className="p-6 text-left space-y-4">
              <div className="bg-zinc-50 p-4 rounded-2xl border border-zinc-150 space-y-2 text-sm text-zinc-700">
                <div className="flex justify-between">
                  <span className="text-zinc-500">Kasir:</span>
                  <span className="font-semibold text-zinc-800">{activeShift.cashierName}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-zinc-500">Mulai Shift:</span>
                  <span className="font-medium">{new Date(activeShift.startTime).toLocaleString('id-ID')}</span>
                </div>
                <hr className="border-zinc-200 my-1" />
                <div className="flex justify-between">
                  <span className="text-zinc-500">Modal Awal:</span>
                  <span className="font-semibold">Rp {activeShift.startCash.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between">
                  <span className="text-zinc-500">Penjualan Tunai:</span>
                  <span className="font-semibold text-emerald-600">+Rp {cashSales.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between border-t border-zinc-200 pt-2 font-bold text-zinc-800">
                  <span>Diharapkan di Laci:</span>
                  <span>Rp {expectedCash.toLocaleString('id-ID')}</span>
                </div>
              </div>

              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Uang Fisik di Laci (Rp)</label>
                <input
                  type="number"
                  value={actualCash}
                  onChange={e => setActualCash(e.target.value)}
                  className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white focus:border-sky-500 focus:ring-2 focus:ring-sky-200 text-lg font-bold text-zinc-800"
                  placeholder="Masukkan jumlah fisik uang..."
                  min="0"
                  required
                />
              </div>

              <div className="flex justify-between items-center bg-zinc-50 p-3.5 rounded-xl border border-zinc-150 text-xs">
                <span className="font-semibold text-zinc-500">Selisih:</span>
                <span className={`font-bold text-sm ${difference === 0 ? 'text-zinc-700' : difference > 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                  {difference === 0 ? 'Pas (Rp 0)' : difference > 0 ? `Lebih: +Rp ${difference.toLocaleString('id-ID')}` : `Kurang: -Rp ${Math.abs(difference).toLocaleString('id-ID')}`}
                </span>
              </div>

              <div className="flex gap-3 pt-2">
                <button type="button" onClick={() => appState.setShowTutupShiftModal(false)} className="flex-1 py-3 bg-zinc-100 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-200 transition">Batal</button>
                <button type="submit" className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-semibold hover:bg-rose-700 transition shadow-lg shadow-rose-600/20">Tutup Shift</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ==================== OPEN PRICE MODAL ====================
    function OpenPriceModal({ product, onConfirm, onCancel }) {
      const [priceInput, setPriceInput] = useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        const numPrice = parseInt(priceInput.replace(/[^0-9]/g, '')) || 0;
        if (numPrice <= 0) return;
        onConfirm(numPrice);
      };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-[slideUp_0.3s_ease-out]">
            <div className="px-6 py-5 border-b border-zinc-100 bg-zinc-50/50 text-left">
              <h3 className="text-lg font-bold text-zinc-800">Masukkan Harga Jual</h3>
              <p className="text-xs text-zinc-500 mt-1">{product?.name} — <span className="text-sky-600 font-bold">Open Price</span></p>
            </div>
            <form onSubmit={handleSubmit} className="p-6 space-y-5">
              <div className="relative">
                <span className="absolute left-4 top-3.5 text-zinc-500 font-semibold text-lg">Rp</span>
                <input
                  type="text"
                  value={priceInput ? parseInt(priceInput).toLocaleString('id-ID') : ''}
                  onChange={e => setPriceInput(e.target.value.replace(/[^0-9]/g, ''))}
                  className="w-full pl-12 pr-4 py-3.5 bg-zinc-50 border border-zinc-200 rounded-2xl text-lg font-bold outline-none focus:bg-white focus:border-sky-500 focus:ring-2 focus:ring-sky-200 transition text-zinc-850"
                  placeholder="0"
                  autoFocus
                  required
                />
              </div>
              <div className="grid grid-cols-3 gap-2">
                {[5000,10000,15000,20000,25000,50000].map(v => (
                  <button key={v} type="button" onClick={() => setPriceInput(v.toString())}
                    className="py-2 border border-zinc-200 rounded-xl text-xs font-bold text-zinc-700 hover:bg-zinc-50 hover:border-sky-400 transition">
                    {(v/1000).toFixed(0)}rb
                  </button>
                ))}
              </div>
              <div className="flex gap-3 pt-2">
                <button type="button" onClick={onCancel} className="flex-1 py-3 bg-zinc-100 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-200 transition">Batal</button>
                <button type="submit" className="flex-1 py-3 bg-sky-600 text-white rounded-xl font-semibold hover:bg-sky-700 transition shadow-lg flex items-center justify-center gap-2">
                  <Icon name="plus" size={16} /> Tambah ke Keranjang
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // ==================== VOID WITH PIN MODAL ====================
    function VoidWithPINModal({ onConfirm, onCancel }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const handleSubmit = (e) => {
        e.preventDefault();
        const db = getDB();
        const admin = db.users.find(u => ['admin', 'owner'].includes(u.role) && u.password === password && u.active);
        if (admin) {
          onConfirm();
        } else {
          setError('Password Admin/Owner salah!');
          setPassword('');
          setTimeout(() => setError(''), 2500);
        }
      };
      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-zinc-900/50 backdrop-blur-sm animate-[fadeIn_0.2s]">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-[slideUp_0.3s]">
            <div className="px-6 py-5 border-b border-rose-100 bg-rose-50/80 flex items-center gap-3">
              <div className="w-10 h-10 bg-rose-100 rounded-xl flex items-center justify-center flex-shrink-0">
                <Icon name="shield-check" size={22} className="text-rose-600" />

              <div className="text-left">
                <h3 className="font-bold text-zinc-800">Verifikasi Admin Diperlukan</h3>

              </div>
            </div>
            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <input
                type="password"

    // ==================== CASHIER REPORT MODAL ====================
    function CashierReportModal({ onClose, app }) {
      const admins = getDB().users.filter(u => ['admin', 'owner'].includes(u.role) && u.active);
      const [targetAdminId, setTargetAdminId] = useState(admins[0]?.id || '');
      const [subject, setSubject] = useState('');
      const [message, setMessage] = useState('');
      const [sending, setSending] = useState(false);

      const handleSend = async (e) => {
        e.preventDefault();
        if (!targetAdminId) { app.addToast('Pilih admin tujuan', 'error'); return; }
        setSending(true);
        await new Promise(r => setTimeout(r, 500));
        const db = getDB();
        db.cashierReports.push({
          id: 'RPT' + Date.now(),
          fromId: app.user?.id,
          fromName: app.user?.name,
          toAdminId: targetAdminId,
          subject,
          message,
          status: 'unread',
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
        saveDB(db);
        app.refreshDB();
        app.addToast('Laporan berhasil dikirim ke Admin!', 'success');
        setSending(false);
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[slideUp_0.3s_ease-out]">
            <div className="px-6 py-5 border-b border-zinc-100 flex justify-between items-center bg-sky-50/50">
              <div className="text-left">
                <h3 className="text-lg font-bold text-zinc-800">Kirim Laporan ke Admin</h3>
                <p className="text-xs text-zinc-500 mt-1">Dari: {app.user?.name} ({app.user?.role})</p>
              </div>
              <button onClick={onClose} className="p-2 bg-zinc-100 rounded-full hover:bg-zinc-200"><Icon name="x" size={16} /></button>

            <form onSubmit={handleSend} className="p-6 space-y-4 text-left">
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Tujuan Admin</label>
                <select value={targetAdminId} onChange={e => setTargetAdminId(e.target.value)} className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none font-medium text-zinc-800 focus:border-sky-500">
                  {admins.length > 0 ? admins.map(a => <option key={a.id} value={a.id}>{a.name} ({a.role === 'owner' ? 'Owner' : 'Admin'})</option>) : <option value="">Tidak ada admin/owner aktif</option>}
                </select>
              </div>
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Subjek Laporan</label>
                <input type="text" value={subject} onChange={e => setSubject(e.target.value)} required
                  className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 font-medium"
                  placeholder="Misal: Permintaan tambah stok Es Teh..." />
              </div>
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Isi Laporan / Pesan</label>
                <textarea value={message} onChange={e => setMessage(e.target.value)} required rows={4}
                  className="w-full px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 font-medium resize-none"
                  placeholder="Jelaskan laporan, masalah, atau permintaan Anda secara detail..." />
              </div>
              <div className="flex gap-3 pt-2">
                <button type="button" onClick={onClose} className="flex-1 py-3 bg-zinc-100 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-200 transition">Batal</button>
                <button type="submit" disabled={sending} className="flex-1 py-3 bg-sky-600 text-white rounded-xl font-semibold hover:bg-sky-700 shadow-lg flex items-center justify-center gap-2 transition disabled:opacity-70">
                  {sending ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <Icon name="send" size={16} />}
                  {sending ? 'Mengirim...' : 'Kirim Laporan'}

    // 5. USERS PAGE
    function UsersPage() {
      const app = useContext(AppContext);
      const [showForm, setShowForm] = useState(false);
      const [editingUser, setEditingUser] = useState(null);
      const [scannerUser, setScannerUser] = useState(null);
      const [search, setSearch] = useState('');

      const db = getDB();
      const users = db.users
        .filter(u => {
          const keyword = search.trim().toLowerCase();
          if (!keyword) return true;
          return `${u.name} ${u.email} ${u.role}`.toLowerCase().includes(keyword);
        })
        .sort((a, b) => {
          if ((b.active === false) !== (a.active === false)) return (a.active === false) ? 1 : -1;
          return (a.name || '').localeCompare(b.name || '');
        });

      const roleLabel = (role) => getRoleName(role, db);

      const handleSave = (formData) => {
        const error = validateUserData(formData, editingUser?.id || null);
        if (error) {
          app.addToast(error, 'error');
          return;
        }

        const db = getDB();
        const now = new Date().toISOString();
        if (editingUser) {
          const idx = db.users.findIndex(u => u.id === editingUser.id);
          if (idx !== -1) {
            db.users[idx] = {
              ...db.users[idx],
              name: formData.name.trim(),
              email: formData.email.trim(),
              role: formData.role,
              updatedAt: now
            };
            if (formData.password) db.users[idx].password = formData.password;
          }
          app.addToast('Pengguna diperbarui', 'success');
        } else {
          db.users.push({
            id: 'u' + Date.now(),
            name: formData.name.trim(),
            email: formData.email.trim(),
            password: formData.password,
            role: formData.role,
            active: true,
            entryStatus: 'exited',
            createdAt: now,
            updatedAt: now
          });
          app.addToast('Pengguna ditambahkan', 'success');
        }

        saveDB(db);
        app.refreshDB();
        setShowForm(false);
        setEditingUser(null);
      };

      const toggleActive = (targetUser) => {
        if (targetUser.id === app.user?.id) {
          app.addToast('Akun yang sedang login tidak bisa dinonaktifkan', 'error');
          return;
        }
        if (targetUser.role === 'owner' && app.user?.role !== 'owner') {
          app.addToast('Anda tidak memiliki akses untuk mengubah status akun Pemilik!', 'error');
          return;
        }

        const db = getDB();
        const idx = db.users.findIndex(u => u.id === targetUser.id);
        if (idx !== -1) {
          db.users[idx].active = db.users[idx].active === false;
          db.users[idx].entryStatus = 'exited';
          db.users[idx].updatedAt = new Date().toISOString();
          saveDB(db);
          app.refreshDB();
          app.addToast(db.users[idx].active ? 'Pengguna diaktifkan' : 'Pengguna dinonaktifkan', 'success');
        }
      };

      const deleteUser = (targetUser) => {
        if (targetUser.id === app.user?.id) {
          app.addToast('Akun yang sedang login tidak bisa dihapus', 'error');
          return;
        }
        if (targetUser.role === 'owner' && app.user?.role !== 'owner') {
          app.addToast('Anda tidak memiliki akses untuk menghapus akun Pemilik!', 'error');
          return;
        }
        if (!confirm(`Hapus pengguna "${targetUser.name}"?`)) return;

        const db = getDB();
        db.users = db.users.filter(u => u.id !== targetUser.id);
        saveDB(db);
        app.refreshDB();
        app.addToast('Pengguna dihapus', 'success');
      };

      return (
        <div className="pb-24 md:pb-8">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div>
              <h3 className="text-xl font-bold text-zinc-800">Manajemen Pengguna</h3>
              <p className="text-sm text-zinc-500">{db.users.length} akun terdaftar</p>
            </div>
            {['admin', 'owner'].includes(app.user?.role) && (
            <button
              onClick={() => { setEditingUser(null); setShowForm(true); }}
              className="w-full sm:w-auto px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 text-white rounded-xl text-sm font-semibold flex items-center justify-center gap-2 shadow-md transition"
            >
              <Icon name="user-plus" size={18} /> Tambah Pengguna
            </button>
            )}
          </div>

          <div className="mb-5 relative max-w-md">
            <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400" />
            <input
              type="text"
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Cari nama, email, atau role..."
              className="w-full pl-10 pr-4 py-3 bg-white border border-zinc-200 rounded-xl outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100 text-sm font-medium shadow-sm"
            />
          </div>

          <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-zinc-200 overflow-hidden">
            <table className="w-full text-left">
              <thead className="bg-zinc-50 border-b border-zinc-200">
                <tr>
                  <th className="px-5 py-3 text-xs font-bold text-zinc-500 uppercase tracking-wider">Pengguna</th>
                  <th className="px-5 py-3 text-xs font-bold text-zinc-500 uppercase tracking-wider">Role</th>
                  <th className="px-5 py-3 text-xs font-bold text-zinc-500 uppercase tracking-wider">Status</th>
                  <th className="px-5 py-3 text-xs font-bold text-zinc-500 uppercase tracking-wider">Terakhir Update</th>
                  {['admin', 'owner'].includes(app.user?.role) && (
                    <th className="px-5 py-3 text-xs font-bold text-zinc-500 uppercase tracking-wider text-right">Aksi</th>
                  )}
                </tr>
              </thead>
              <tbody className="divide-y divide-zinc-100">
                {users.map(u => (
                  <tr key={u.id} className={u.active === false ? 'bg-zinc-50/70 opacity-70' : 'hover:bg-zinc-50/60'}>
                    <td className="px-5 py-4">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-sky-100 text-sky-700 rounded-xl flex items-center justify-center font-bold text-sm">
                          {u.name?.substring(0, 2).toUpperCase()}
                        </div>
                        <div>
                          <p className="font-bold text-zinc-800">{u.name}</p>
                          <p className="text-xs text-zinc-500">{u.email}</p>
                        </div>
                      </div>
                    </td>
                    <td className="px-5 py-4">
                      <span className="inline-flex px-2.5 py-1 rounded-lg bg-zinc-100 text-zinc-700 text-xs font-bold">{roleLabel(u.role)}</span>
                    </td>
                    <td className="px-5 py-4">
                      <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-bold ${u.active === false ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>
                        <span className={`w-1.5 h-1.5 rounded-full ${u.active === false ? 'bg-rose-500' : 'bg-emerald-500'}`}></span>
                        {u.active === false ? 'Nonaktif' : 'Aktif'}
                      </span>
                    </td>
                    <td className="px-5 py-4 text-sm text-zinc-500">{formatTimeAgo(u.updatedAt || u.createdAt)}</td>
                    {['admin', 'owner'].includes(app.user?.role) && (
                    <td className="px-5 py-4">
                      <div className="flex justify-end gap-2">
                        {u.role === 'owner' && app.user?.role !== 'owner' ? (
                          <span className="text-xs text-zinc-400 font-medium italic">Diproteksi</span>
                        ) : (
                          <>
                            <button onClick={() => setScannerUser(u)} className="p-2 bg-amber-50 text-amber-600 hover:bg-amber-100 rounded-lg" title="Ambil Foto"><Icon name="camera" size={16} /></button>
                            <button onClick={() => { setEditingUser(u); setShowForm(true); }} className="p-2 bg-sky-50 text-sky-600 hover:bg-sky-100 rounded-lg" title="Edit"><Icon name="pencil" size={16} /></button>
                            <button onClick={() => toggleActive(u)} className="p-2 bg-zinc-100 text-zinc-600 hover:bg-zinc-200 rounded-lg" title={u.active === false ? 'Aktifkan' : 'Nonaktifkan'}><Icon name={u.active === false ? 'toggle-right' : 'toggle-left'} size={16} /></button>
                            <button onClick={() => deleteUser(u)} className="p-2 bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-lg" title="Hapus"><Icon name="trash-2" size={16} /></button>
                          </>
                        )}
                      </div>
                    </td>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="md:hidden space-y-3">
            {users.map(u => (
              <div key={u.id} className={`bg-white border border-zinc-200 rounded-2xl p-4 shadow-sm ${u.active === false ? 'opacity-70' : ''}`}>
                <div className="flex items-start gap-3">
                  <div className="w-11 h-11 bg-sky-100 text-sky-700 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0">
                    {u.name?.substring(0, 2).toUpperCase()}
                  </div>
                  <div className="min-w-0 flex-1 text-left">
                    <p className="font-bold text-zinc-800 truncate">{u.name}</p>
                    <p className="text-xs text-zinc-500 truncate">{u.email}</p>
                    <div className="flex flex-wrap gap-2 mt-2">
                      <span className="px-2 py-1 rounded-lg bg-zinc-100 text-zinc-700 text-[10px] font-bold">{roleLabel(u.role)}</span>
                      <span className={`px-2 py-1 rounded-lg text-[10px] font-bold ${u.active === false ? 'bg-rose-50 text-rose-600' : 'bg-emerald-50 text-emerald-600'}`}>

                    </div>
                  </div>
                </div>
                {['admin', 'owner'].includes(app.user?.role) && (
                <div className="grid grid-cols-4 gap-2 mt-4">

                    <div className="col-span-4 text-center py-2 bg-zinc-50 rounded-xl text-xs text-zinc-400 font-medium italic">Akun Owner Diproteksi</div>

                    <>
                      <button onClick={() => setScannerUser(u)} className="py-2 bg-amber-50 text-amber-600 rounded-xl flex justify-center"><Icon name="camera" size={17} /></button>
                      <button onClick={() => { setEditingUser(u); setShowForm(true); }} className="py-2 bg-sky-50 text-sky-600 rounded-xl flex justify-center"><Icon name="pencil" size={17} /></button>
                      <button onClick={() => toggleActive(u)} className="py-2 bg-zinc-100 text-zinc-600 rounded-xl flex justify-center"><Icon name={u.active === false ? 'toggle-right' : 'toggle-left'} size={17} /></button>

            <div className="bg-white border border-dashed border-zinc-300 rounded-2xl py-16 text-center text-zinc-400">

            />
