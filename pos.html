    function ScannerModal({ user, onClose, appState }) {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [cameraError, setCameraError] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        let activeStream = null;
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(s => {
            activeStream = s;
            setStream(s);
            if (videoRef.current) {
              videoRef.current.srcObject = s;
              videoRef.current.setAttribute("playsinline", true);
              videoRef.current.play();
            }
          })
          .catch(err => {
            console.error("Gagal kamera:", err);
            setCameraError("Tidak dapat mengakses kamera. Pastikan izin kamera aktif.");
          });

        return () => {
          if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
          }
        };
      }, []);

      const handleCapture = () => {
        if (canvasRef.current && videoRef.current) {
          setLoading(true);
          const video = videoRef.current;
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          
          const photo = canvas.toDataURL('image/png');
          appState.saveScanData(photo, 'photo');
          appState.addToast(`Foto ${user.name} berhasil disimpan`, 'success');
          setLoading(false);
          onClose();
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxDim = 300;
            let w = img.width;
            let h = img.height;
            if (w > h) {
              if (w > maxDim) { h *= maxDim / w; w = maxDim; }
            } else {
              if (h > maxDim) { w *= maxDim / h; h = maxDim; }
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            
            const photo = canvas.toDataURL('image/jpeg', 0.85);
            appState.saveScanData(photo, 'photo');
            appState.addToast(`Foto ${user.name} berhasil disimpan`, 'success');
            onClose();
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s_ease-out] border border-zinc-200">
            <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <div>
                <h3 className="text-lg font-bold text-zinc-800 text-left">Ambil Foto Pengguna</h3>
                <p className="text-xs text-zinc-500 mt-1 text-left">{user.name} ({user.role.toUpperCase()})</p>
              </div>
              <button onClick={onClose} type="button" className="p-2 bg-zinc-100 rounded-full text-zinc-500 hover:bg-zinc-200 transition"><Icon name="x" size={16} /></button>
            </div>
            <div className="p-6 flex flex-col items-center">
              {cameraError ? (
                <div className="w-full h-64 bg-zinc-50 rounded-2xl flex flex-col items-center justify-center text-zinc-400 border-2 border-dashed border-zinc-200 p-4 mb-4">
                  <Icon name="camera-off" size={48} className="mb-2 text-zinc-300" />
                  <p className="text-xs font-semibold text-center text-zinc-500 leading-normal">{cameraError}</p>
                </div>
              ) : (
                <div className="w-full aspect-video bg-zinc-950 rounded-2xl relative overflow-hidden border-2 border-zinc-250 shadow-inner flex items-center justify-center mb-4">
                  <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover" />
                  <canvas ref={canvasRef} className="hidden" />
                </div>
              )}
              
              <div className="w-full flex flex-col gap-3">
                <div className="flex gap-3">
                  {!cameraError && (
                    <button 
                      onClick={handleCapture}
                      disabled={loading}
                      className="flex-1 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-amber-600/10"
                    >
                      <Icon name="camera" size={18} /> {loading ? 'Mengambil...' : 'Ambil Foto'}
                    </button>
                  )}
                  <button 
                    onClick={onClose} 
                    className="flex-1 py-3 bg-zinc-100 text-zinc-700 rounded-xl font-bold hover:bg-zinc-200 transition"
                  >
                    Batal
                  </button>
                </div>

                <label className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/10 cursor-pointer transition active:scale-[0.98]">
                  <Icon name="upload" size={18} />
                  <span>Unggah dari Galeri / Berkas</span>
                  <input type="file" accept="image/*" onChange={handleFileUpload} className="hidden" />
                </label>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function POSScannerModal({ onClose, onScanSuccess, onPhotoCapture, appState }) {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [cameraError, setCameraError] = useState('');
      const animationRef = useRef(null);

      useEffect(() => {
        let activeStream = null;
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(s => {
            activeStream = s;
            setStream(s);
            if (videoRef.current) {
              videoRef.current.srcObject = s;
              videoRef.current.setAttribute("playsinline", true);
              videoRef.current.play();
            }
          })
          .catch(err => {
            console.error("Gagal kamera:", err);
            setCameraError("Tidak dapat mengakses kamera. Pastikan izin kamera aktif.");
          });

        return () => {
          if (activeStream) {
            activeStream.getTracks().forEach(track => track.stop());
          }
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
          }
        };
      }, []);

      const tick = () => {
        if (videoRef.current && videoRef.current.readyState === videoRef.current.HAVE_ENOUGH_DATA) {
          const video = videoRef.current;
          const canvas = canvasRef.current;
          if (canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = 300;
            canvas.height = 300;
            const size = Math.min(video.videoWidth, video.videoHeight);
            const sx = (video.videoWidth - size) / 2;
            const sy = (video.videoHeight - size) / 2;
            ctx.drawImage(video, sx, sy, size, size, 0, 0, canvas.width, canvas.height);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            try {
              const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
              });
              if (code && code.data) {
                onScanSuccess(code.data);
                return;
              }
            } catch(e) {
              console.error("jsQR error:", e);
            }
          }
        }
        animationRef.current = requestAnimationFrame(tick);
      };

      useEffect(() => {
        if (stream) {
          animationRef.current = requestAnimationFrame(tick);
        }
      }, [stream]);

      const handleCapture = () => {
        if (canvasRef.current) {
          const photo = canvasRef.current.toDataURL('image/png');
          onPhotoCapture(photo);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let qrCodeDecoded = null;
            try {
              const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
              });
              if (code && code.data) {
                qrCodeDecoded = code.data;
              }
            } catch (err) {
              console.error("jsQR error:", err);
            }
            
            if (qrCodeDecoded) {
              onScanSuccess(qrCodeDecoded);
            } else {
              const maxDim = 600;
              let w = img.width;
              let h = img.height;
              if (w > h) {
                if (w > maxDim) { h *= maxDim / w; w = maxDim; }
              } else {
                if (h > maxDim) { w *= maxDim / h; h = maxDim; }
              }
              const outputCanvas = document.createElement('canvas');
              outputCanvas.width = w;
              outputCanvas.height = h;
              const outputCtx = outputCanvas.getContext('2d');
              outputCtx.drawImage(img, 0, 0, w, h);
              
              const photo = outputCanvas.toDataURL('image/jpeg', 0.85);
              onPhotoCapture(photo);
            }
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-zinc-900/60 backdrop-blur-sm p-4">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s_ease-out] border border-zinc-200">
            <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <div>
                <h3 className="text-lg font-bold text-zinc-800 text-left">Pindai QR / Barcode / Foto</h3>
                <p className="text-xs text-zinc-500 text-left mt-1">Arahkan kamera ke kode QR/barcode atau klik Ambil Foto</p>
              </div>
              <button onClick={onClose} className="p-2 bg-zinc-100 rounded-full hover:bg-zinc-200"><Icon name="x" size={16} /></button>
            </div>
            
            <div className="p-6 flex flex-col items-center">
              {cameraError ? (
                <div className="w-full h-64 bg-zinc-50 rounded-2xl flex flex-col items-center justify-center text-zinc-400 border-2 border-dashed border-zinc-200 p-4 mb-4">
                  <Icon name="camera-off" size={48} className="mb-2 text-zinc-300" />
                  <p className="text-xs font-semibold text-center text-zinc-500 leading-normal">{cameraError}</p>
                </div>
              ) : (
                <div className="w-full aspect-square bg-zinc-950 rounded-2xl relative overflow-hidden border-4 border-sky-500 shadow-inner flex items-center justify-center mb-4">
                  <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover" />
                  <canvas ref={canvasRef} className="hidden" />
                  <div className="absolute inset-0 border-[32px] border-black/45 pointer-events-none">
                    <div className="w-full h-full border border-sky-400/80 relative">
                      <div className="absolute inset-x-0 top-1/2 h-0.5 bg-red-500/80 animate-pulse"></div>
                    </div>
                  </div>
                </div>
              )}
              
              <div className="w-full flex flex-col gap-3">
                <div className="flex gap-3">
                  {!cameraError && (
                    <button 
                      onClick={handleCapture}
                      className="flex-1 py-3 bg-sky-600 hover:bg-sky-700 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10"
                    >
                      <Icon name="camera" size={18} /> Ambil Foto
                    </button>
                  )}
                  <button 
                    onClick={onClose} 
                    className="flex-1 py-3 bg-zinc-150 hover:bg-zinc-200 text-zinc-700 rounded-xl font-bold"
                  >
                    Batal
                  </button>
                </div>

                <label className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/10 cursor-pointer transition active:scale-[0.98]">
                  <Icon name="upload" size={18} />
                  <span>Unggah File Gambar / Bukti Scan</span>
                  <input type="file" accept="image/*" onChange={handleFileUpload} className="hidden" />
                </label>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function UserForm({ user, onSave, onCancel }) {
      const [name, setName] = useState(user?.name || '');
      const [email, setEmail] = useState(user?.email || '');
      const [password, setPassword] = useState('');
      const standardRoles = ['admin', 'cashier', 'dapur', 'owner', 'manager', 'supervisor', 'staff'];
      const [role, setRole] = useState(() => {
        if (!user?.role) return 'cashier';
        return standardRoles.includes(user.role) ? user.role : 'custom';
      });
      const [customRole, setCustomRole] = useState(() => {
        if (!user?.role) return '';
        return standardRoles.includes(user.role) ? '' : user.role;
      });
      
      const handleSubmit = (e) => {
        e.preventDefault();
        const selectedRole = role === 'custom' ? customRole.trim().toLowerCase() : role;
        if (!selectedRole) {
          alert('Role wajib diisi');
          return;
        }
        onSave({ name, email, password, role: selectedRole });
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-zinc-900/40 backdrop-blur-sm p-4 animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s_ease-out]">
            <div className="p-6 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <h3 className="text-lg font-bold text-zinc-800">{user ? 'Edit Pengguna' : 'Tambah Pengguna'}</h3>
              <button onClick={onCancel} type="button" className="p-2 bg-zinc-100 rounded-full text-zinc-500 hover:bg-zinc-200 transition"><Icon name="x" size={16} /></button>
            </div>
            <form onSubmit={handleSubmit} className="p-6 text-left">
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Nama Pengguna</label>
                  <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" required />
                </div>
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Email</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" required />
                </div>
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Password</label>
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" placeholder={user ? 'Kosongkan jika tidak diubah' : ''} />
                </div>
                <div>
                  <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Role</label>
                  <select value={role} onChange={e => setRole(e.target.value)} className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800">
                    {role === 'owner' && <option value="owner">Pemilik (Owner)</option>}
                    <option value="admin">Admin</option>
                    <option value="cashier">Kasir</option>
                    <option value="dapur">Dapur</option>
                    <option value="manager">Manajer</option>
                    <option value="supervisor">Supervisor</option>
                    <option value="staff">Staf</option>
                    <option value="custom">Lainnya (Kustom)</option>
                  </select>
                </div>
                {role === 'custom' && (
                  <div className="animate-[fadeIn_0.2s_ease-out]">
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Nama Role Kustom</label>
                    <input type="text" value={customRole} onChange={e => setCustomRole(e.target.value)} placeholder="Contoh: owner, manager, dll" className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800" required />
                  </div>
                )}
              </div>
              <div className="flex gap-3 pt-4">
                <button type="button" onClick={onCancel} className="flex-1 py-3 bg-zinc-100 text-zinc-700 rounded-xl font-semibold hover:bg-zinc-200 transition">Batal</button>
                <button type="submit" className="flex-1 py-3 bg-sky-600 text-white rounded-xl font-semibold hover:bg-sky-700 transition shadow-lg">Simpan</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function SyncModal({ appState }) {
      const [inputCode, setInputCode] = useState('');
      const [loading, setLoading] = useState(false);

      if (!appState.showSyncModal) return null;

      const handleEnable = async (e) => {
        e.preventDefault();
        setLoading(true);
        await appState.enableSync(inputCode);
        setLoading(false);
        setInputCode('');
        appState.setShowSyncModal(false);
      };

      const handleCopy = () => {
        navigator.clipboard.writeText(appState.syncCode);
        appState.addToast('Kode sinkronisasi disalin!', 'success');
      };

      return (
        <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[slideUp_0.3s_ease-out] border border-zinc-200">
            <div className="px-6 py-5 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
              <h3 className="text-xl font-bold text-zinc-800">Sinkronisasi Cloud</h3>
              <button onClick={() => appState.setShowSyncModal(false)} className="p-2 bg-white border border-zinc-200 rounded-full text-zinc-400 hover:text-zinc-650">
                <Icon name="x" size={20} />
              </button>
            </div>
            
            <div className="p-6 space-y-6">
              {appState.syncEnabled ? (
                <div className="space-y-5 text-center flex flex-col items-center animate-[scaleIn_0.2s_ease-out]">
                  <div className="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center border border-emerald-500/20">
                    <Icon name="cloud-lightning" size={32} className="text-emerald-600" />
                  </div>
                  <div>
                    <h4 className="font-bold text-zinc-800 text-lg">Sinkronisasi Cloud Aktif</h4>
                    <p className="text-sm text-zinc-500 mt-1">Data Anda tersinkronisasi antar perangkat.</p>
                  </div>
                  
                  <div className="w-full p-4 bg-zinc-50 border border-zinc-200 rounded-2xl flex items-center justify-between gap-3">
                    <div className="text-left">
                      <p className="text-[10px] text-zinc-400 font-bold uppercase tracking-wider">Kode Sinkronisasi</p>
                      <p className="font-mono font-bold text-zinc-700 text-sm select-all mt-0.5">{appState.syncCode}</p>
                    </div>
                    <button onClick={handleCopy} className="p-2.5 bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-500 hover:text-zinc-800 rounded-xl transition flex items-center gap-1.5 text-xs font-semibold shadow-sm">
                      <Icon name="copy" size={14} /> Salin
                    </button>
                  </div>

                  {/* QR Code generator for sharing sync code */}
                  <div className="bg-white p-3 border border-zinc-200 rounded-2xl inline-block mx-auto shadow-sm">
                    <DynamicQRCode text={"sync://" + appState.syncCode} width={140} />
                    <p className="text-[10px] text-zinc-400 mt-2 font-bold uppercase tracking-wider text-center flex items-center gap-1 justify-center"><Icon name="qr-code" size={12}/> Scan QR Perangkat Ini</p>
                  </div>

                  <div className="text-xs text-zinc-405 bg-zinc-50 p-3 rounded-xl border border-zinc-150 flex items-center gap-2">
                    <Icon name="info" size={16} className="text-sky-500 flex-shrink-0" />
                    <p className="text-left leading-normal">Pindai kode QR atau salin kode sinkronisasi di atas ke perangkat lain untuk terhubung dan berbagi data produk secara instan.</p>
                  </div>

                  <div className="w-full flex gap-3 pt-2">
                    <button 
                      onClick={() => appState.triggerSync()} 
                      className="flex-1 py-3 bg-zinc-900 hover:bg-zinc-850 text-white rounded-xl font-bold text-sm transition flex items-center justify-center gap-2 shadow-md"
                    >
                      <Icon name="refresh-cw" size={16} className={appState.syncStatus === 'syncing' ? 'animate-spin' : ''} />
                      Sinkronkan
                    </button>
                    <button 
                      onClick={appState.disableSync} 
                      className="py-3 px-4 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl font-bold text-sm transition"
                    >
                      Matikan
                    </button>
                  </div>
                </div>
              ) : (
                <form onSubmit={handleEnable} className="space-y-5 text-left animate-[scaleIn_0.2s_ease-out]">
                  <div className="text-center">
                    <div className="w-16 h-16 bg-zinc-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                      <Icon name="cloud-off" size={32} className="text-zinc-400" />
                    </div>
                    <h4 className="font-bold text-zinc-800 text-lg">Hubungkan ke Cloud</h4>
                    <p className="text-sm text-zinc-500 mt-1">Menggabungkan data produk dan transaksi dengan perangkat kasir lainnya.</p>
                  </div>

                  <div className="space-y-3">
                    <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider">Kode Sinkronisasi Perangkat (Opsional)</label>
                    <div className="flex gap-2">
                      <input 
                        type="text" 
                        value={inputCode} 
                        onChange={e => setInputCode(e.target.value)}
                        placeholder="Masukkan kode atau kosongkan..."
                        className="flex-1 px-4 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl font-mono text-sm outline-none focus:bg-white focus:border-sky-500 transition-colors text-zinc-800"
                      />
                      <button 
                        type="button"
                        onClick={() => {
                          const rand = 'smile_' + Math.random().toString(36).substring(2, 8).toUpperCase();
                          setInputCode(rand);
                          appState.addToast('Kode acak berhasil dibuat!', 'success');
                        }}
                        className="px-4 bg-zinc-100 hover:bg-zinc-200 text-zinc-700 rounded-xl font-bold text-xs border border-zinc-200 transition"
                      >
                        Acak
                      </button>
                    </div>
                  </div>

                  <div className="space-y-2.5">
                    <button 
                      type="submit" 
                      className="w-full py-3.5 bg-zinc-900 hover:bg-zinc-850 text-white rounded-xl font-bold text-sm shadow-md transition flex items-center justify-center gap-2"
                    >
                      <Icon name="cloud" size={16} />
                      Hubungkan Cloud
                    </button>
                    
                    <button 
                      type="button"
                      onClick={() => {
                        appState.setShowSyncModal(false);
                        const scannerBtn = document.querySelector('[title*="Scanner"]');
                        if (scannerBtn) {
                          scannerBtn.click();
                        } else {
                          appState.addToast('Masuk ke halaman POS Kasir untuk memindai QR', 'info');
                        }
                      }}
                      className="w-full py-2.5 bg-sky-50 border border-sky-200 hover:bg-sky-100 text-sky-600 rounded-xl text-xs font-bold transition flex items-center justify-center gap-1.5 shadow-sm"
                    >
                      <Icon name="scan" size={14} /> Pindai QR Perangkat Lain
                    </button>
                  </div>
                </form>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Sidebar() {
      const app = useContext(AppContext);
      const { user, page, sidebar } = app;
      
      const menuItems = [];
      if (user?.role === 'owner') {
        menuItems.push({ id: 'owner_dashboard', icon: 'layout-dashboard', label: 'Dashboard Owner' });
      }
      menuItems.push({ id: 'pos', icon: 'shopping-cart', label: 'Kasir POS' });
      if (['admin', 'owner'].includes(user?.role)) {
        menuItems.push({ id: 'products', icon: 'package', label: 'Produk' });
        menuItems.push({ id: 'reports', icon: 'bar-chart-3', label: 'Laporan' });
        menuItems.push({ id: 'users', icon: 'users', label: 'Pengguna' });
      }

      return (
        <aside className={`${sidebar ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 z-40 w-64 bg-zinc-900 text-white transition-transform duration-300 flex flex-col`}>
          <div className="h-16 flex items-center px-6 border-b border-zinc-800 justify-between md:justify-start">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center">
                <Icon name="shopping-bag" size={18} color="white" />
              </div>
              <span className="font-bold text-lg tracking-wide">SMILE POS</span>
            </div>
            <button onClick={() => app.setSidebar(false)} className="md:hidden text-zinc-400 hover:text-white">
              <Icon name="x" size={24} />
            </button>
          </div>
          
          <div className="flex-1 px-4 py-6 space-y-2 custom-scroll overflow-y-auto text-left">
            {menuItems.map(item => (
              <button
                key={item.id}
                onClick={() => { app.setPage(item.id); if(window.innerWidth < 768) app.setSidebar(false); }}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm ${page === item.id ? 'bg-sky-500 text-white shadow-md' : 'text-zinc-400 hover:bg-zinc-800 hover:text-white'}`}
              >
                <Icon name={item.icon} size={20} />
                {item.label}
              </button>
            ))}

            {user?.role !== 'admin' && app.activeShift && (
              <button
                onClick={() => app.setShowTutupShiftModal(true)}
                className="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition font-medium text-sm text-amber-400 hover:bg-amber-500/10"
              >
                <Icon name="key-round" size={20} />
                Tutup Shift (Kas)
              </button>
            )}
          </div>

          <div className="p-4 border-t border-zinc-800 text-left pb-24 md:pb-4">
            <div className="flex items-center gap-3 px-2 py-3 bg-zinc-800/50 rounded-xl mb-3">
              <div className="w-9 h-9 bg-zinc-700 rounded-full flex items-center justify-center font-bold text-sm text-zinc-300">
                {user?.name?.substring(0,2).toUpperCase()}
              </div>
              <div className="flex-1 overflow-hidden">
                <p className="text-sm font-semibold truncate">{user?.name}</p>
                <p className="text-xs text-zinc-500 truncate">{user?.roleLabel || user?.role}</p>
              </div>
            </div>
            <button 
              onClick={() => {
                if (user?.role !== 'admin' && app.activeShift) {
                  app.setShowTutupShiftModal(true);
                } else {
                  app.logout();
                }
              }} 
              className="w-full flex items-center justify-center gap-2 px-3 py-2.5 text-rose-400 hover:bg-rose-500/10 rounded-xl transition text-sm font-medium"
            >
              <Icon name="log-out" size={18} /> Keluar
            </button>
          </div>
        </aside>
      );
    }

    function BottomNav() {
      const app = useContext(AppContext);
      const menuItems = [];
      if (app.user?.role === 'owner') {
        menuItems.push({ id: 'owner_dashboard', icon: 'layout-dashboard', label: 'Dashboard' });
      }
      menuItems.push({ id: 'pos', icon: 'shopping-cart', label: 'POS' });
      if (['admin', 'owner'].includes(app.user?.role)) {
        menuItems.push({ id: 'products', icon: 'package', label: 'Produk' });
        menuItems.push({ id: 'reports', icon: 'bar-chart-3', label: 'Laporan' });
        menuItems.push({ id: 'users', icon: 'users', label: 'Akun' });
      }

      return (
        <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-zinc-200 flex justify-around items-center h-16 z-40 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
          {menuItems.map(item => (
            <button key={item.id} onClick={() => app.setPage(item.id)} className={`flex flex-col items-center justify-center w-full h-full ${app.page === item.id ? 'text-sky-600' : 'text-zinc-400'}`}>
              <Icon name={item.icon} size={22} className={app.page === item.id ? 'fill-sky-100' : ''} />
              <span className={`text-[10px] mt-1 font-medium ${app.page === item.id ? 'font-bold' : ''}`}>{item.label}</span>
            </button>
          ))}
        </nav>
      );
    }

    function Header() {
      const app = useContext(AppContext);
      const [showNotif, setShowNotif] = useState(false);
      const [now, setNow] = useState(new Date());
      const titles = { owner_dashboard: 'Dashboard Owner', pos: 'Point of Sale', products: 'Produk', reports: 'Laporan', users: 'Pengguna' };
      
      const lowStockItems = useMemo(() => {
        return getDB().products.filter(p => p.active !== false && p.stock <= (p.minStock || 5));
      }, [app.dbVersion]);
      const lowStockCount = lowStockItems.length;
      const [showLowStock, setShowLowStock] = useState(false);
      
      useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const db = getDB();
      const pendingReqs = db.bypassRequests.filter(r => r.status === 'pending');
      const currentDateTime = now.toLocaleDateString('id-ID', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }) + ', ' + now.toLocaleTimeString('id-ID', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      
      return (
        <header className="h-16 bg-white border-b border-zinc-200 flex items-center px-4 md:px-6 flex-shrink-0 z-30 sticky top-0">
          <button onClick={() => app.setSidebar(true)} className="md:hidden mr-4 p-2 -ml-2 text-zinc-600 rounded-lg hover:bg-zinc-100">
            <Icon name="menu" size={24} />
          </button>
          <h2 className="text-xl font-bold text-zinc-800">{titles[app.page]}</h2>
          
          <div className="ml-auto flex items-center gap-3">
            {/* Indikator Koneksi Internet */}
            <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl border text-xs font-semibold ${app.isOnline ? 'bg-emerald-50 border-emerald-250 text-emerald-600' : 'bg-rose-50 border-rose-250 text-rose-600'}`}>
              <div className={`w-1.5 h-1.5 rounded-full ${app.isOnline ? 'bg-emerald-500' : 'bg-rose-500 animate-pulse'}`}></div>
              <span className="hidden md:inline">{app.isOnline ? 'Online' : 'Offline'}</span>
            </div>

            <button 
              onClick={() => app.setShowSyncModal(true)} 
              className={`p-2 rounded-xl border flex items-center gap-1.5 transition text-xs font-semibold ${app.syncEnabled ? 'bg-emerald-50 border-emerald-250 text-emerald-600 hover:bg-emerald-100' : 'bg-zinc-50 border-zinc-200 text-zinc-500 hover:bg-zinc-100'}`}
              title="Pengaturan Sinkronisasi"
            >
              <Icon name="cloud" size={16} className={app.syncStatus === 'syncing' ? 'animate-pulse' : ''} />
              <span className="hidden sm:inline">{app.syncEnabled ? 'Sync Aktif' : 'Sync Mati'}</span>
            </button>

            <button 
              onClick={app.lockScreen} 
              className="p-2 bg-zinc-50 border border-zinc-200 text-zinc-500 hover:text-zinc-850 rounded-xl transition"
              title="Kunci Layar"
            >
              <Icon name="lock" size={16} />
            </button>

            {/* Notifikasi Stok Rendah untuk Admin/Owner */}
            {['admin', 'owner'].includes(app.user?.role) && (
              <div className="relative">
                <button 
                  onClick={() => setShowLowStock(!showLowStock)} 
                  className={`p-2 bg-zinc-50 border border-zinc-200 hover:bg-zinc-100 rounded-xl transition flex items-center justify-center ${lowStockCount > 0 ? 'text-rose-500 border-rose-250' : 'text-zinc-500'}`}
                  title="Peringatan Stok Rendah"
                >
                  <Icon name="alert-triangle" size={16} />
                  {lowStockCount > 0 && (
                    <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full font-bold">{lowStockCount}</span>
                  )}
                </button>

                {showLowStock && (
                  <div className="absolute right-0 mt-2 w-80 bg-white border border-zinc-200 rounded-2xl shadow-xl z-[100] animate-[fadeIn_0.2s_ease-out] overflow-hidden">
                    <div className="p-4 bg-zinc-50 border-b border-zinc-100 flex justify-between items-center text-left">
                      <span className="font-bold text-zinc-800 text-sm">Stok Rendah</span>
                      <span className="text-[10px] bg-rose-100 text-rose-800 px-2 py-0.5 rounded-full font-bold">{lowStockCount} Peringatan</span>
                    </div>
                    <div className="max-h-64 overflow-y-auto custom-scroll divide-y divide-zinc-100 text-left">
                      {lowStockItems.length === 0 ? (
                        <div className="p-6 text-center text-zinc-400 text-xs font-medium">Semua stok aman!</div>
                      ) : (
                        lowStockItems.map(p => (
                          <div key={p.id} className="p-3 flex justify-between items-center text-xs">
                            <div>
                              <p className="font-bold text-zinc-800">{p.name}</p>
                              <p className="text-zinc-500 text-[10px] font-mono">{p.sku}</p>
                            </div>
                            <div className="text-right">
                              <span className="font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-lg border border-rose-100">{p.stock} pcs</span>
                              <p className="text-[9px] text-zinc-450 mt-1">Min: {p.minStock || 5}</p>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            {['admin', 'owner'].includes(app.user?.role) && (
              <div className="relative">
                <button 
                  onClick={() => setShowNotif(!showNotif)} 
                  className={`p-2 bg-zinc-50 border border-zinc-200 hover:bg-zinc-100 rounded-xl transition flex items-center justify-center ${pendingReqs.length > 0 ? 'text-amber-500 border-amber-250 animate-bounce' : 'text-zinc-500'}`}
                  title="Notifikasi Izin Masuk"
                >
                  <Icon name="bell" size={16} />
                  {pendingReqs.length > 0 && (
                    <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[9px] w-4.5 h-4.5 flex items-center justify-center rounded-full font-bold">{pendingReqs.length}</span>
                  )}
                </button>

                {showNotif && (
                  <div className="absolute right-0 mt-2 w-80 bg-white border border-zinc-200 rounded-2xl shadow-xl z-[100] animate-[fadeIn_0.2s_ease-out] overflow-hidden">
                    <div className="p-4 bg-zinc-50 border-b border-zinc-100 flex justify-between items-center text-left">
                      <span className="font-bold text-zinc-800 text-sm">Izin Masuk Kasir</span>
                      <span className="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold">{pendingReqs.length} Menunggu</span>
                    </div>
                    <div className="max-h-64 overflow-y-auto custom-scroll divide-y divide-zinc-100">
                      {pendingReqs.length === 0 ? (
                        <div className="p-6 text-center text-zinc-400 text-xs font-medium">Tidak ada permintaan izin aktif</div>
                      ) : (
                        pendingReqs.map(req => (
                          <div key={req.id} className="p-4 space-y-2.5 text-left text-xs">
                            <div className="flex justify-between items-start">
                              <div>
                                <p className="font-bold text-zinc-800">{req.name}</p>
                                <p className="text-zinc-500 text-[10px]">{req.email}</p>
                              </div>
                              <span className="text-[9px] text-zinc-400 font-mono">{new Date(req.time).toLocaleTimeString('id-ID')}</span>
                            </div>
                            <div className="text-zinc-550 bg-zinc-50 p-2 rounded-lg font-mono text-[10px]">
                              <div><span className="text-zinc-400">Lokasi:</span> {req.location}</div>
                              <div className="truncate"><span className="text-zinc-400">Device:</span> {req.device}</div>
                            </div>
                            <div className="flex gap-2 pt-1">
                              <button onClick={() => { app.approveBypassRequest(req.id); setShowNotif(false); }} className="flex-1 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-bold">Setujui</button>
                              <button onClick={() => { app.rejectBypassRequest(req.id); setShowNotif(false); }} className="flex-1 py-1.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg font-bold">Tolak</button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            <div className="ml-2 text-sm font-medium text-zinc-500 hidden lg:block tabular-nums">
              {currentDateTime}
            </div>
          </div>
        </header>
      );
    }

    // ==================== BUKA SHIFT PAGE ====================
    function BukaShiftPage() {
      const app = useContext(AppContext);
      const [modalUang, setModalUang] = useState('');

      const handleBukaShift = (e) => {
        e.preventDefault();
        const amount = parseFloat(String(modalUang).replace(/[^0-9.]/g, '')) || 0;
        app.startShift(amount);
      };

      return (
        <div className="flex items-center justify-center h-full">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-lg border border-zinc-200 overflow-hidden">
            <div className="bg-sky-600 p-6 text-center text-white">
              <div className="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3 backdrop-blur-sm">
                <Icon name="clock" size={28} color="white" />
              </div>
              <h2 className="text-xl font-bold">Buka Shift</h2>
              <p className="text-sky-100 text-sm mt-1">Masukkan modal uang awal untuk memulai shift hari ini</p>
            </div>
            <form onSubmit={handleBukaShift} className="p-6 space-y-5">
              <div>
                <label className="block text-sm font-semibold text-zinc-700 mb-2">Modal Uang Awal (Rp)</label>
                <input
                  type="number"
                  value={modalUang}
                  onChange={e => setModalUang(e.target.value)}
                  className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:bg-white focus:border-sky-500 focus:ring-2 focus:ring-sky-200 outline-none transition text-lg font-semibold"
                  placeholder="Contoh: 500000"
                  min="0"
                />
                <p className="text-xs text-zinc-400 mt-1.5">Kosongkan jika tidak ada modal awal (Rp 0)</p>
              </div>
              <button
                type="submit"
                className="w-full py-3.5 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 active:bg-sky-800 transition shadow-lg shadow-sky-600/30 flex items-center justify-center gap-2"
              >
                <Icon name="play" size={18} color="white" />
                Mulai Shift
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ==================== LOCK SCREEN OVERLAY ====================
    function LockScreenOverlay({ appState }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const handleUnlock = (e) => {
        e.preventDefault();
        if (appState.unlockScreen(password)) {
          setPassword('');
          setError('');
        } else {
          setError('Password salah');
          setPassword('');
        }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-zinc-900/95 backdrop-blur-md">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-[scaleIn_0.2s_ease-out] mx-4">
            <div className="bg-sky-600 p-8 text-center text-white">
              <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="lock" size={32} color="white" />
              </div>
              <h2 className="text-xl font-bold">Layar Terkunci</h2>
              <p className="text-sky-100 text-sm mt-1">{appState.user?.name || 'User'}</p>
            </div>
            <form onSubmit={handleUnlock} className="p-6 space-y-4">
              {error && (
                <div className="bg-rose-50 border border-rose-200 text-rose-700 px-4 py-2.5 rounded-xl text-sm font-medium text-center">
                  {error}
                </div>
              )}
              <div>
                <label className="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1.5">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  className="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:border-sky-500 text-sm font-medium text-zinc-800"
                  placeholder="Masukkan password..."
                  autoFocus
                  required
                />
              </div>
              <button type="submit" className="w-full py-3 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 transition shadow-lg">
                <Icon name="unlock" size={16} className="inline mr-2" />Buka Kunci
              </button>
              <button type="button" onClick={() => appState.logout()} className="w-full py-2.5 bg-zinc-100 text-zinc-600 rounded-xl font-medium hover:bg-zinc-200 transition text-sm">
                Keluar Akun
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ==================== OPERATIONAL HOURS OVERLAY ====================
    function OperationalHoursOverlay({ appState }) {
      const [requested, setRequested] = useState(false);

      const handleRequestBypass = () => {
        const db = getDB();
        const existing = db.bypassRequests.find(r => r.email === appState.user?.email && r.status === 'pending');
        if (!existing) {
          db.bypassRequests.push({
            id: 'br' + Date.now(),
            email: appState.user?.email,
            name: appState.user?.name,
            requestedAt: new Date().toISOString(),
            status: 'pending'
          });
          saveDB(db);
          appState.refreshDB();
        }
        setRequested(true);
      };

      return (
        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-zinc-900/95 backdrop-blur-md">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-[scaleIn_0.2s_ease-out] mx-4">
            <div className="bg-amber-500 p-8 text-center text-white">
              <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="clock" size={32} color="white" />
              </div>
              <h2 className="text-xl font-bold">Di Luar Jam Operasional</h2>
              <p className="text-amber-100 text-sm mt-1">Jam operasional: 06:00 – 20:00</p>
            </div>
            <div className="p-6 space-y-4 text-center">
              <p className="text-zinc-600 text-sm">
                Saat ini sudah di luar jam operasional. Hubungi admin untuk mendapatkan izin akses.
              </p>
              {requested ? (
                <div className="bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 rounded-xl text-sm font-medium">
                  <Icon name="check-circle" size={16} className="inline mr-1.5" />
                  Permintaan terkirim. Menunggu persetujuan admin...
                </div>
              ) : (
                <button onClick={handleRequestBypass} className="w-full py-3 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition shadow-lg">
                  <Icon name="send" size={16} className="inline mr-2" />Minta Izin Akses
                </button>
              )}
              <button onClick={() => appState.logout()} className="w-full py-2.5 bg-zinc-100 text-zinc-600 rounded-xl font-medium hover:bg-zinc-200 transition text-sm">
                Keluar Akun
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==================== MAIN APP ====================
    // ==================== TRANSACTION SUCCESS MODAL ====================
    function TransactionSuccessModal({ transaction, onClose }) {
      const [waNumber, setWaNumber] = useState('');
      const [emailAddr, setEmailAddr] = useState('');

      const getReceiptText = () => {
        let text = `*SMILE POS - NOTA TRANSAKSI*\n`;
        text += `No. Nota: ${transaction.id}\n`;
        text += `Tanggal: ${new Date(transaction.date).toLocaleString('id-ID')}\n`;
        text += `Kasir: ${transaction.cashier}\n`;
        if (transaction.memberName) text += `Pelanggan: ${transaction.memberName}\n`;
        text += `----------------------------------------\n`;
        transaction.items.forEach(item => {
          text += `${item.name}\n  ${item.qty} x Rp ${item.effectivePrice.toLocaleString('id-ID')} = Rp ${(item.qty * item.effectivePrice).toLocaleString('id-ID')}\n`;
        });
        text += `----------------------------------------\n`;
        text += `Subtotal: Rp ${transaction.subtotal.toLocaleString('id-ID')}\n`;
        if (transaction.tax > 0) text += `PPN (10%): Rp ${transaction.tax.toLocaleString('id-ID')}\n`;
        if (transaction.discount > 0) text += `Diskon: -Rp ${transaction.discount.toLocaleString('id-ID')}\n`;
        text += `*TOTAL: Rp ${transaction.total.toLocaleString('id-ID')}*\n`;
        text += `Bayar: Rp ${transaction.payment.toLocaleString('id-ID')} (${transaction.method.toUpperCase()})\n`;
        text += `Kembali: Rp ${transaction.change.toLocaleString('id-ID')}\n\n`;
        text += `Terima kasih telah berbelanja!`;
        return text;
      };

      const sendWhatsApp = () => {
        let num = waNumber.trim().replace(/[^0-9]/g, '');
        if (!num) {
          alert('Masukkan nomor WhatsApp yang valid');
          return;
        }
        if (num.startsWith('0')) {
          num = '62' + num.slice(1);
        }
        const text = encodeURIComponent(getReceiptText());
        window.open(`https://api.whatsapp.com/send?phone=${num}&text=${text}`, '_blank');
      };

      const sendEmail = () => {
        const mail = emailAddr.trim();
        if (!mail || !mail.includes('@')) {
          alert('Masukkan alamat email yang valid');
          return;
        }
        const subject = encodeURIComponent(`Nota Transaksi ${transaction.id} - Smile POS`);
        const body = encodeURIComponent(getReceiptText());
        window.open(`mailto:${mail}?subject=${subject}&body=${body}`, '_blank');
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/60 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out] no-print">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-[scaleIn_0.3s_ease-out] border border-zinc-200">
            <div className="p-6 bg-emerald-50 text-center text-emerald-800 border-b border-emerald-100">
              <div className="w-16 h-16 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto mb-3 shadow-lg shadow-emerald-500/20">
                <Icon name="check" size={32} />
              </div>
              <h3 className="text-xl font-bold">Pembayaran Sukses</h3>
              <p className="text-sm text-emerald-600 mt-1">Kembalian: Rp {transaction.change.toLocaleString('id-ID')}</p>
            </div>
            
            <div className="p-6 space-y-4">
              <button 
                onClick={() => window.print()} 
                className="w-full py-3.5 bg-zinc-900 text-white rounded-xl font-semibold hover:bg-zinc-800 transition shadow-md flex items-center justify-center gap-2"
              >
                <Icon name="printer" size={18} /> Cetak Struk Fisik
              </button>

              <div className="border-t border-zinc-100 pt-4 text-left">
                <h4 className="font-bold text-xs text-zinc-500 uppercase tracking-wider mb-2.5">Kirim Struk Digital</h4>
                
                <div className="space-y-3">
                  <div className="flex gap-2">
                    <input 
                      type="text" 
                      placeholder="No WhatsApp (contoh: 0812...)" 
                      value={waNumber} 
                      onChange={e => setWaNumber(e.target.value)}
                      className="flex-1 px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-xs font-semibold"
                    />
                    <button 
                      onClick={sendWhatsApp}
                      className="px-4 py-2 bg-emerald-605 hover:bg-emerald-700 text-white font-bold rounded-xl text-xs transition"
                    >
                      Kirim WA
                    </button>
                  </div>

                  <div className="flex gap-2">
                    <input 
                      type="email" 
                      placeholder="Alamat Email..." 
                      value={emailAddr} 
                      onChange={e => setEmailAddr(e.target.value)}
                      className="flex-1 px-3 py-2 bg-zinc-50 border border-zinc-200 rounded-xl outline-none focus:bg-white text-xs font-semibold"
                    />
                    <button 
                      onClick={sendEmail}
                      className="px-4 py-2 bg-sky-650 hover:bg-sky-700 text-white font-bold rounded-xl text-xs transition"
                    >
                      Kirim Email
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div className="p-4 bg-zinc-50 border-t border-zinc-100 flex gap-2">
              <button 
                onClick={onClose} 
                className="w-full py-3 bg-zinc-250 hover:bg-zinc-300 text-zinc-850 rounded-xl font-bold transition text-sm"
              >
                Selesai / Transaksi Baru
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==================== MAIN APP COMPONENT ====================
    function App() {
      const appState = useAppState();

      const isOutsideHours = isOutsideOperationalHours();
      const showHoursBlock = appState.user && !['admin', 'owner'].includes(appState.user.role) && isOutsideHours && !appState.bypassApproved;

      return (
        <AppContext.Provider value={appState}>
          {!appState.user ? (
            <LoginPage />
          ) : (
            <div className="flex h-screen overflow-hidden bg-zinc-50">
              <Sidebar />
              {appState.sidebar && (
                <div onClick={() => appState.setSidebar(false)} className="md:hidden fixed inset-0 bg-black/50 z-30 animate-[fadeIn_0.3s]"></div>
              )}
              
              <div className="flex-1 flex flex-col overflow-hidden relative">
                <Header />
                <main className="flex-1 overflow-y-auto p-4 md:p-6 custom-scroll">
                  <div className="max-w-7xl mx-auto h-full">
                    {appState.page === 'owner_dashboard' && <OwnerDashboard />}
                    {appState.page === 'pos' && (!['admin', 'owner'].includes(appState.user?.role) ? (appState.activeShift ? <POSPage /> : <BukaShiftPage />) : <POSPage />)}
                    {appState.page === 'products' && <ProductsPage />}
                    {appState.page === 'reports' && <ReportsPage />}
                    {appState.page === 'users' && <UsersPage />}
                  </div>
                </main>
                <BottomNav />
              </div>
            </div>
          )}
          
          {appState.isLocked && appState.user && (
            <LockScreenOverlay appState={appState} />
          )}

          {showHoursBlock && (
            <OperationalHoursOverlay appState={appState} />
          )}

          {appState.showTutupShiftModal && (
            <TutupShiftModal appState={appState} />
          )}

          {appState.showSyncModal && (
            <SyncModal appState={appState} />
          )}

          {appState.showSuccessModal && appState.lastTransaction && (
            <TransactionSuccessModal 
              transaction={appState.lastTransaction} 
              onClose={() => {
                appState.setShowSuccessModal(false);
                appState.setLastTransaction(null);
              }}
            />
          )}

          {/* Hidden Printable Receipt */}
          {appState.lastTransaction && (
            <div className="print-receipt print-only">
              <div className="text-center font-bold mb-2">
                <h3 className="text-base font-bold">SMILE POS</h3>
                <p className="text-[9px]">Sistem Kasir Pintar</p>
                <p className="text-[9px] border-b border-dashed border-zinc-400 pb-1">Jl. POS Sejahtera No. 88</p>
              </div>
              
              <div className="text-[9px] mb-2 font-mono">
                <div>No. Nota: {appState.lastTransaction.id}</div>
                <div>Tanggal : {new Date(appState.lastTransaction.date).toLocaleString('id-ID')}</div>
                <div>Kasir   : {appState.lastTransaction.cashier}</div>
                {appState.lastTransaction.memberName && <div>Pelanggan: {appState.lastTransaction.memberName}</div>}
                <div className="border-b border-dashed border-zinc-400 my-1"></div>
              </div>
              
              <div className="text-[9px] font-mono space-y-1">
                {appState.lastTransaction.items.map(item => (
                  <div key={item.id}>
                     <div className="font-semibold">{item.name}</div>
                     <div className="flex justify-between pl-2">
                       <span>{item.qty} x Rp {item.effectivePrice.toLocaleString('id-ID')}</span>
                       <span>Rp {(item.qty * item.effectivePrice).toLocaleString('id-ID')}</span>
                     </div>
                  </div>
                ))}
                <div className="border-b border-dashed border-zinc-400 my-1"></div>
              </div>
              
              <div className="text-[9px] font-mono space-y-0.5 text-right pl-6">
                <div className="flex justify-between font-mono">
                  <span>Subtotal:</span>
                  <span>Rp {appState.lastTransaction.subtotal.toLocaleString('id-ID')}</span>
                </div>
                {appState.lastTransaction.tax > 0 && (
                  <div className="flex justify-between font-mono">
                    <span>PPN (10%):</span>
                    <span>Rp {appState.lastTransaction.tax.toLocaleString('id-ID')}</span>
                  </div>
                )}
                {appState.lastTransaction.discount > 0 && (
                  <div className="flex justify-between font-mono text-rose-600">
                    <span>Diskon:</span>
                    <span>-Rp {appState.lastTransaction.discount.toLocaleString('id-ID')}</span>
                  </div>
                )}
                {appState.lastTransaction.rounding !== 0 && (
                  <div className="flex justify-between font-mono">
                    <span>Pembulatan:</span>
                    <span>Rp {appState.lastTransaction.rounding.toLocaleString('id-ID')}</span>
                  </div>
                )}
                <div className="border-t border-double border-zinc-400 pt-1 flex justify-between font-bold">
                  <span>TOTAL:</span>
                  <span>Rp {appState.lastTransaction.total.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between font-mono">
                  <span>Bayar ({appState.lastTransaction.method.toUpperCase()}):</span>
                  <span>Rp {appState.lastTransaction.payment.toLocaleString('id-ID')}</span>
                </div>
                <div className="flex justify-between font-mono">
                  <span>Kembali:</span>
                  <span>Rp {appState.lastTransaction.change.toLocaleString('id-ID')}</span>
                </div>
              </div>
              
              <div className="text-center font-mono text-[8px] mt-4 border-t border-dashed border-zinc-400 pt-2">
                <p>Terima Kasih atas Kunjungan Anda</p>
                <p>Smile POS - Layanan POS Pintar</p>
              </div>
            </div>
          )}

          <div className="fixed top-4 right-4 md:top-6 md:right-6 z-[9999] flex flex-col items-end pointer-events-none">
            {appState.toasts.map(toast => (
              <div key={toast.id} className="pointer-events-auto">
                <Toast toast={toast} onClose={(id) => {
                  appState.setToasts(prev => prev.filter(t => t.id !== id));
                }} />
              </div>
            ))}
          </div>
        </AppContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
